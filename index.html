<script>
/* ===== ربط كشف حضور شهري لكل عامل مع العذر والمرفق - نسخة آمنة لا تؤثر على الدخول ===== */
(function(){
  "use strict";

  function num(v){ return parseFloat(String(v == null ? 0 : v).replace(',', '.')) || 0; }
  function today(){ return new Date().toISOString().slice(0,10); }
  function currentYM(){ return today().slice(0,7); }
  function daysInMonth(ym){
    var parts = String(ym || currentYM()).split('-');
    var y = parseInt(parts[0], 10) || new Date().getFullYear();
    var m = parseInt(parts[1], 10) || (new Date().getMonth()+1);
    return new Date(y, m, 0).getDate();
  }
  function pad(n){ return String(n).padStart(2,'0'); }
  function money(v){ return num(v).toFixed(2) + ' ريال'; }
  function safeJSON(key, fallback){
    try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch(e){ return fallback; }
  }
  function saveAttendanceData(){
    try { localStorage.setItem('erp_employees', JSON.stringify(window.employees || [])); } catch(e){}
    try { localStorage.setItem('erp_attendance_records', JSON.stringify(window.attendanceRecords || [])); } catch(e){}
    try { localStorage.setItem('erp_attendanceRecords', JSON.stringify(window.attendanceRecords || [])); } catch(e){}
  }
  function loadAttendanceData(){
    var emp = safeJSON('erp_employees', null);
    if(!Array.isArray(emp) || emp.length === 0) emp = safeJSON('erp_employees_old', null);
    if(!Array.isArray(emp) || emp.length === 0){
      emp = [
        {id:1, name:'عامل 1', job:'عامل', monthlySalary:250},
        {id:2, name:'عامل 2', job:'فني', monthlySalary:300},
        {id:3, name:'عامل 3', job:'مشرف ورشة', monthlySalary:450}
      ];
    }
    window.employees = emp;

    var rec = safeJSON('erp_attendance_records', null);
    if(!Array.isArray(rec)) rec = safeJSON('erp_attendanceRecords', []);
    window.attendanceRecords = Array.isArray(rec) ? rec : [];
    saveAttendanceData();
  }
  function getEmployee(id){
    loadAttendanceData();
    id = String(id);
    return (window.employees || []).find(function(e){ return String(e.id) === id; });
  }
  function recordFor(empId, date){
    loadAttendanceData();
    empId = String(empId);
    var rec = (window.attendanceRecords || []).find(function(r){
      return String(r.employeeId) === empId && r.date === date;
    });
    if(!rec){
      rec = {
        id: Date.now() + Math.floor(Math.random()*9999),
        employeeId: empId,
        date: date,
        status: 'present',
        excuseText: '',
        attachmentName: '',
        attachmentData: '',
        deduction: 0,
        updatedAt: new Date().toISOString()
      };
      window.attendanceRecords.push(rec);
    }
    return rec;
  }
  function calcDeduction(emp, status){
    var salary = num(emp && (emp.monthlySalary || emp.salary));
    var daily = salary / 30;
    if(status === 'absent') return daily;
    if(status === 'half') return daily / 2;
    return 0;
  }
  function statusLabel(s){
    return {present:'حاضر', absent:'غائب', half:'نصف يوم', leave:'إجازة', excused:'عذر بدون خصم'}[s] || s || '-';
  }
  function statusOptions(current){
    var items = [
      ['present','حاضر'],
      ['absent','غائب'],
      ['half','نصف يوم'],
      ['leave','إجازة'],
      ['excused','عذر بدون خصم']
    ];
    return items.map(function(x){
      return '<option value="'+x[0]+'" '+(current===x[0]?'selected':'')+'>'+x[1]+'</option>';
    }).join('');
  }
  function esc(v){
    return String(v == null ? '' : v).replace(/[&<>"']/g, function(ch){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
    });
  }
  function auditAttendance(action, id){
    try { if(typeof addAudit === 'function') addAudit(action, 'monthlyAttendance', id); } catch(e){}
  }

  window.renderMonthlyAttendance = function(){
    loadAttendanceData();

    var selectedMonth = localStorage.getItem('erp_attendance_selected_month') || currentYM();
    var selectedEmployee = localStorage.getItem('erp_attendance_selected_employee') || ((window.employees[0] && window.employees[0].id) || '');
    var emp = getEmployee(selectedEmployee) || window.employees[0];
    if(emp) selectedEmployee = emp.id;

    var monthDays = daysInMonth(selectedMonth);
    var parts = String(selectedMonth).split('-');
    var y = parseInt(parts[0], 10) || new Date().getFullYear();
    var m = parseInt(parts[1], 10) || (new Date().getMonth()+1);

    var rows = '';
    var presentCount = 0, absentCount = 0, halfCount = 0, leaveCount = 0, excusedCount = 0, totalDeduction = 0;

    for(var d=1; d<=monthDays; d++){
      var date = y + '-' + pad(m) + '-' + pad(d);
      var rec = emp ? recordFor(emp.id, date) : null;
      var st = rec ? (rec.status || 'present') : 'present';
      var deduction = emp ? calcDeduction(emp, st) : 0;
      if(rec) rec.deduction = deduction;
      if(st === 'present') presentCount++;
      else if(st === 'absent') absentCount++;
      else if(st === 'half') halfCount++;
      else if(st === 'leave') leaveCount++;
      else if(st === 'excused') excusedCount++;
      totalDeduction += deduction;

      var attachmentCell = '';
      if(rec && rec.attachmentData){
        attachmentCell = '<a class="btn btn-sm btn-secondary" href="'+rec.attachmentData+'" download="'+esc(rec.attachmentName || 'excuse')+'">عرض/تحميل</a>';
      } else {
        attachmentCell = '<span style="color:var(--gray-500)">لا يوجد</span>';
      }

      rows += '<tr>'+
        '<td>'+date+'</td>'+
        '<td><select class="attendanceStatusInput" data-employee="'+esc(selectedEmployee)+'" data-date="'+date+'">'+statusOptions(st)+'</select></td>'+
        '<td><input class="attendanceExcuseInput" data-employee="'+esc(selectedEmployee)+'" data-date="'+date+'" value="'+esc(rec && rec.excuseText)+'" placeholder="سبب العذر أو الملاحظة"></td>'+
        '<td><input type="file" class="attendanceAttachmentInput" data-employee="'+esc(selectedEmployee)+'" data-date="'+date+'" accept="image/*,.pdf,.doc,.docx"></td>'+
        '<td>'+attachmentCell+'</td>'+
        '<td>'+money(deduction)+'</td>'+
      '</tr>';

    }).join('');

    var monthlySalary = emp ? num(emp.monthlySalary || emp.salary) : 0;
    var netSalary = Math.max(0, monthlySalary - totalDeduction);

    var summaryRows = (window.employees || []).map(function(e){
      var sumDed = 0, abs = 0, exc = 0;
      for(var d=1; d<=monthDays; d++){
        var date = y + '-' + pad(m) + '-' + pad(d);
        var rr = (window.attendanceRecords || []).find(function(r){ return String(r.employeeId) === String(e.id) && r.date === date; });
        var ss = rr ? rr.status : 'present';
        if(ss === 'absent') abs++;
        if(ss === 'excused') exc++;
        sumDed += calcDeduction(e, ss);
      }
      var salary = num(e.monthlySalary || e.salary);
      return '<tr><td>'+esc(e.name || e.name_ar || e.name_en || ('عامل '+e.id))+'</td><td>'+money(salary)+'</td><td>'+abs+'</td><td>'+exc+'</td><td>'+money(sumDed)+'</td><td>'+money(Math.max(0, salary - sumDed))+'</td></tr>';
    }).join('');

    return '<div class="section-card">'+
      '<div class="section-header"><h3>📅 كشف حضور شهري لكل عامل</h3><button id="addMonthlyEmployeeBtn" class="btn btn-primary">+ إضافة عامل</button></div>'+
      '<div class="stats-grid">'+
        '<div class="stat-card"><div class="stat-title">الراتب الشهري</div><div class="stat-value">'+money(monthlySalary)+'</div></div>'+
        '<div class="stat-card"><div class="stat-title">أيام الغياب</div><div class="stat-value text-danger">'+absentCount+'</div></div>'+
        '<div class="stat-card"><div class="stat-title">أعذار بدون خصم</div><div class="stat-value">'+excusedCount+'</div></div>'+
        '<div class="stat-card"><div class="stat-title">إجمالي الخصم</div><div class="stat-value text-danger">'+money(totalDeduction)+'</div></div>'+
        '<div class="stat-card"><div class="stat-title">صافي الراتب</div><div class="stat-value text-success">'+money(netSalary)+'</div></div>'+
      '</div>'+
      '<div class="section-card" style="margin-bottom:16px">'+
        '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px">'+
          '<div class="form-group"><label>اختر العامل</label><select id="monthlyAttendanceEmployeeSelect">'+employeesOptions+'</select></div>'+
          '<div class="form-group"><label>اختر الشهر</label><input type="month" id="monthlyAttendanceMonthInput" value="'+esc(selectedMonth)+'"></div>'+
          '<div class="form-group"><label>اسم العامل الجديد</label><input id="newMonthlyEmployeeName" placeholder="مثال: محمد"></div>'+
          '<div class="form-group"><label>راتب العامل الجديد</label><input id="newMonthlyEmployeeSalary" type="number" step="0.01" placeholder="مثال: 300"></div>'+
        '</div>'+
      '</div>'+
      '<div style="overflow-x:auto"><table class="table">'+
        '<thead><tr><th>اليوم</th><th>الحالة</th><th>العذر / الملاحظة</th><th>إرفاق العذر</th><th>المرفق الحالي</th><th>الخصم</th></tr></thead>'+
        '<tbody>'+rows+'</tbody></table></div>'+
      '<div class="section-card" style="margin-top:18px">'+
        '<h3>📊 ملخص شهري لجميع العمال</h3>'+
        '<div style="overflow-x:auto"><table class="table"><thead><tr><th>العامل</th><th>الراتب</th><th>غياب</th><th>أعذار</th><th>الخصم</th><th>الصافي</th></tr></thead><tbody>'+summaryRows+'</tbody></table></div>'+
      '</div>'+
    '</div>';
  };

  document.addEventListener('change', function(ev){
    var el = ev.target;
    if(el && el.id === 'monthlyAttendanceEmployeeSelect'){
      localStorage.setItem('erp_attendance_selected_employee', el.value);
      if(typeof renderCurrentTab === 'function') renderCurrentTab();
      return;
    }
    if(el && el.id === 'monthlyAttendanceMonthInput'){
      localStorage.setItem('erp_attendance_selected_month', el.value || currentYM());
      if(typeof renderCurrentTab === 'function') renderCurrentTab();
      return;
    }
    if(el && el.classList && el.classList.contains('attendanceStatusInput')){
      var emp = getEmployee(el.dataset.employee);
      var rec = recordFor(el.dataset.employee, el.dataset.date);
      rec.status = el.value;
      rec.deduction = calcDeduction(emp, el.value);
      rec.updatedAt = new Date().toISOString();
      saveAttendanceData();
      auditAttendance('تعديل حالة حضور', rec.id);
      if(typeof renderCurrentTab === 'function') renderCurrentTab();
      return;
    }
    if(el && el.classList && el.classList.contains('attendanceAttachmentInput')){
      var file = el.files && el.files[0];
      if(!file) return;
      if(file.size > 1200000){
        alert('حجم المرفق كبير. الرجاء اختيار ملف أقل من 1MB حتى يحفظ داخل النظام.');
        el.value = '';
        return;
      }
      var reader = new FileReader();
      reader.onload = function(){
        var rec = recordFor(el.dataset.employee, el.dataset.date);
        rec.attachmentName = file.name;
        rec.attachmentData = reader.result;
        rec.updatedAt = new Date().toISOString();
        saveAttendanceData();
        auditAttendance('إرفاق عذر حضور', rec.id);
        if(typeof renderCurrentTab === 'function') renderCurrentTab();
      };
      reader.readAsDataURL(file);
    }
  });

  document.addEventListener('input', function(ev){
    var el = ev.target;
    if(el && el.classList && el.classList.contains('attendanceExcuseInput')){
      var rec = recordFor(el.dataset.employee, el.dataset.date);
      rec.excuseText = el.value;
      rec.updatedAt = new Date().toISOString();
      saveAttendanceData();
    }
  });

  document.addEventListener('click', function(ev){
    var btn = ev.target && ev.target.closest ? ev.target.closest('#addMonthlyEmployeeBtn') : null;

    loadAttendanceData();

    localStorage.setItem('erp_attendance_selected_employee', emp.id);
    saveAttendanceData();
    auditAttendance('إضافة عامل لكشف الحضور', emp.id);
    if(typeof renderCurrentTab === 'function') renderCurrentTab();

  function installAttendanceRender(){
    try{
      var oldRender = (typeof renderCurrentTab === 'function') ? renderCurrentTab : window.renderCurrentTab;
      var newRender = function(){
        if(typeof currentTab !== 'undefined' && currentTab === 'monthlyAttendance'){
          var main = document.getElementById('mainContent');
          if(main){ main.innerHTML = window.renderMonthlyAttendance(); }
          return;
        }
        if(oldRender) return oldRender.apply(this, arguments);
      };
      window.renderCurrentTab = newRender;
      if(typeof renderCurrentTab === 'function') renderCurrentTab = newRender;
    }catch(e){}
  }

  function installAttendanceNav(){
    try{
      var oldInit = (typeof initNav === 'function') ? initNav : window.initNav;
      var newInit = function(){
        if(oldInit) oldInit.apply(this, arguments);
        var nav = document.getElementById('navMenu');
        if(!nav || nav.querySelector('[data-tab="monthlyAttendance"]')) return;
        var li = document.createElement('li');

          if(typeof initNav === 'function') initNav();
        });
        nav.appendChild(li);
      };
      window.initNav = newInit;
      if(typeof initNav === 'function') initNav = newInit;
    }catch(e){}
  }

  loadAttendanceData();
  installAttendanceRender();
  installAttendanceNav();

  document.addEventListener('DOMContentLoaded', function(){
    try { if(typeof initNav === 'function') initNav(); } catch(e){}
  });
})();
</script>

<script>
(function(){

function money(v){return n(v).toFixed(2)+' ريال'}
function getJSON(k,f){try{var x=localStorage.getItem(k);return x?JSON.parse(x):f}catch(e){return f}}

function minFromTime(t){var p=String(t||'00:00').split(':');return (parseInt(p[0],10)||0)*60+(parseInt(p[1],10)||0)}
function hoursBetween(start,end){var s=minFromTime(start),e=minFromTime(end);if(e<s)e+=1440;return Math.max(0,(e-s)/60)}
function thresholdForType(type){return type==='factory'?17*60:20*60}
function isFridayDate(date){try{return new Date(String(date)+'T12:00:00').getDay()===5}catch(e){return false}}

  return '<div class="section-card"><div class="section-header"><h2>⏱️ نظام الأوفر تايم وجدولة التركيب والصيانة</h2><button class="btn btn-secondary no-print" onclick="window.print()">🖨️ طباعة</button></div><div class="stats-grid"><div class="stat-card"><div class="stat-title">إجمالي ساعات الأوفر تايم</div><div class="stat-value">'+totalOt.toFixed(2)+'</div></div><div class="stat-card"><div class="stat-title">قيمة الأوفر تايم</div><div class="stat-value text-success">'+money(totalPay)+'</div></div><div class="stat-card"><div class="stat-title">قاعدة المصنع</div><div class="stat-value" style="font-size:14px">بعد 5:00 مساءً</div></div><div class="stat-card"><div class="stat-title">قاعدة الجمعة</div><div class="stat-value" style="font-size:14px">كل ساعات الجمعة أوفر تايم</div></div></div><div class="section-card no-print"><h3>إضافة جدول خروج أو عمل إضافي</h3><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px"><div class="form-group"><label>العامل</label><select id="otEmployee">'+opts+'</select></div><div class="form-group"><label>نوع العمل</label><select id="otType"><option value="factory">عمل داخل المصنع</option><option value="installation">خروج تركيب</option><option value="maintenance">خروج صيانة</option></select></div><div class="form-group"><label>التاريخ</label><input type="date" id="otDate" value="'+today()+'"></div><div class="form-group"><label>بداية العمل</label><input type="time" id="otStart" value="17:00"></div><div class="form-group"><label>نهاية العمل</label><input type="time" id="otEnd" value="19:00"></div><div class="form-group"><label>الموقع / العميل</label><input id="otLocation" placeholder="مثال: موقع العميل"></div><div class="form-group"><label>ملاحظة</label><input id="otNote" placeholder="تفاصيل العمل"></div><div class="form-group"><label>&nbsp;</label><button class="btn btn-primary" onclick="addOvertimeSchedule()">حفظ الجدول</button></div></div></div><div class="section-card no-print"><label>فلترة حسب الشهر</label><input type="month" id="otFilterMonth" value="'+esc(month)+'" onchange="renderCurrentTab()"></div><div style="overflow-x:auto"><table class="table"><thead><tr><th>التاريخ</th><th>العامل</th><th>النوع</th><th>الوقت</th><th>ساعات عادية</th><th>أوفر تايم</th><th>المبلغ</th><th>الموقع</th><th>ملاحظة</th><th>الحالة</th><th class="no-print">إجراء</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
};
function overtimeForEmployeeMonth(empId,month){return getJobs().filter(function(j){return String(j.employeeId)===String(empId)&&String(j.date||'').slice(0,7)===month&&j.status!=='cancelled'}).reduce(function(s,j){return {hours:s.hours+n(j.overtimeHours),pay:s.pay+n(j.overtimePay)}},{hours:0,pay:0})}

<script>
/* ===== نظام دوام ورواتب صارم: 7-1 / 2-5، تأخير دقيقة = نصف يوم، ساعة = يوم كامل ===== */
(function(){
  'use strict';
  function num(v){ return parseFloat(String(v == null ? 0 : v).replace(',', '.')) || 0; }
  function esc(v){ return String(v == null ? '' : v).replace(/[&<>\"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[c]; }); }
  function pad(v){ return String(v).padStart(2,'0'); }
  function today(){ return new Date().toISOString().slice(0,10); }
  function ym(){ return today().slice(0,7); }
  function money(v){ return num(v).toFixed(2) + ' ريال'; }
  function getJSON(k,f){ try{ var x=localStorage.getItem(k); return x ? JSON.parse(x) : f; }catch(e){ return f; } }
  function setJSON(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
  function daysInMonth(month){ var p=String(month || ym()).split('-'); return new Date(parseInt(p[0],10), parseInt(p[1],10), 0).getDate(); }
  function dateOf(month, d){ return month + '-' + pad(d); }
  function weekday(date){ return new Date(date + 'T12:00:00').getDay(); }
  function isFriday(date){ return weekday(date) === 5; }
  function minutes(t){ var p=String(t || '').split(':'); if(p.length < 2) return null; return (parseInt(p[0],10)||0)*60 + (parseInt(p[1],10)||0); }
  function fmtMinutes(m){ if(!m || m <= 0) return '0 دقيقة'; var h=Math.floor(m/60), r=m%60; return (h? h+' ساعة ': '') + (r? r+' دقيقة' : ''); }
  function loadEmployees(){
    var em = getJSON('erp_employees', window.employees || []);
    if(!Array.isArray(em) || !em.length){ em=[{id:1,name:'عامل 1',job:'عامل',monthlySalary:250},{id:2,name:'عامل 2',job:'فني',monthlySalary:300},{id:3,name:'عامل 3',job:'مشرف',monthlySalary:450}]; }
    window.employees = em; setJSON('erp_employees', em); return em;
  }
  function loadRecords(){
    var r = getJSON('erp_attendance_records', null);
    if(!Array.isArray(r)) r = getJSON('erp_attendanceRecords', []);
    window.attendanceRecords = Array.isArray(r) ? r : [];
    return window.attendanceRecords;
  }
  function saveAttendance(){
    setJSON('erp_employees', window.employees || []);
    setJSON('erp_attendance_records', window.attendanceRecords || []);
    setJSON('erp_attendanceRecords', window.attendanceRecords || []);
  }
  function empName(e){ return e ? (e.name || e.name_ar || e.name_en || ('عامل '+e.id)) : '-'; }
  function getEmp(id){ var em=loadEmployees(); return em.find(function(e){ return String(e.id) === String(id); }); }
  function rec(empId, date){
    loadRecords();
    var r=(window.attendanceRecords || []).find(function(x){ return String(x.employeeId)===String(empId) && x.date===date; });
    if(!r){
      var fridayDefault = isFriday(date);
      r={
        id:Date.now()+Math.floor(Math.random()*9999),
        employeeId:String(empId),
        date:date,
        status: fridayDefault ? 'leave' : 'present',
        inMorning: fridayDefault ? '00:00' : '07:00',
        outMorning: fridayDefault ? '00:00' : '13:00',
        inAfternoon: fridayDefault ? '00:00' : '14:00',
        outAfternoon: fridayDefault ? '00:00' : '17:00',
        excuseText:'', attachmentName:'', attachmentData:'', deduction:0, lateMinutes:0,
        autoFridayZero: fridayDefault
      };
      window.attendanceRecords.push(r);
    } else if(isFriday(date) && !r.updatedAt && !r.fridayUserEdited && (r.status==='present' || !r.status) && (r.inMorning||'07:00')==='07:00' && (r.outMorning||'13:00')==='13:00' && (r.inAfternoon||'14:00')==='14:00' && (r.outAfternoon||'17:00')==='17:00'){
      r.status='leave'; r.inMorning='00:00'; r.outMorning='00:00'; r.inAfternoon='00:00'; r.outAfternoon='00:00'; r.autoFridayZero=true;
    }
    return r;
  }
  function dailyDeduction(emp){ return num(emp && (emp.dailyDeduction || (num(emp.monthlySalary || emp.salary)/30))); }
  function hourlyRate(emp){ var salary=num(emp && (emp.monthlySalary || emp.salary)); return num(emp && emp.hourlyRate) || (salary ? salary/30/9 : 0); }
  function spanHours(a,b){ var x=minutes(a), y=minutes(b); if(x==null || y==null) return 0; if(y<x) y+=1440; return Math.max(0,(y-x)/60); }
  function fridayOvertimeHours(r){ return spanHours((r&&r.inMorning)||'00:00',(r&&r.outMorning)||'00:00') + spanHours((r&&r.inAfternoon)||'00:00',(r&&r.outAfternoon)||'00:00'); }
  function fridayOvertimePay(emp,r,date){ return isFriday(date) ? fridayOvertimeHours(r) * hourlyRate(emp) : 0; }
  function calcStrict(emp, r, date){
    var daily = dailyDeduction(emp);
    if(isFriday(date)){
      var stf=(r&&r.status)||'leave';
      var fh=fridayOvertimeHours(r);
      if(fh>0 || stf==='present' || stf==='half') return {late:0,deduction:0,reason:'عمل يوم الجمعة - كل الوقت المسجل أوفر تايم',status:'friday_work'};
      return {late:0, deduction:0, reason:'جمعة - إجازة بدون خصم والتوقيت صفر', status:'friday'};
    }
    var st = r.status || 'present';
    if(st === 'leave' || st === 'excused') return {late:0, deduction:0, reason:st==='excused'?'عذر بدون خصم':'إجازة بدون خصم', status:st};
    if(st === 'absent') return {late:0, deduction:daily, reason:'غياب - خصم يوم كامل', status:'absent'};
    var late1 = Math.max(0, (minutes(r.inMorning) == null ? 7*60 : minutes(r.inMorning)) - 7*60);
    var late2 = Math.max(0, (minutes(r.inAfternoon) == null ? 14*60 : minutes(r.inAfternoon)) - 14*60);
    var late = late1 + late2;
    if(late >= 60) return {late:late, deduction:daily, reason:'تأخير ساعة أو أكثر - خصم يوم كامل', status:'late_full'};
    if(late > 0) return {late:late, deduction:daily/2, reason:'تأخير ولو دقيقة - خصم نصف يوم', status:'late_half'};
    if(st === 'half') return {late:0, deduction:daily/2, reason:'نصف يوم', status:'half'};
    return {late:0, deduction:0, reason:'حاضر بدون خصم', status:'present'};
  }
  function statusOptions(current){
    var opts=[['present','حاضر / عمل جمعة'],['absent','غائب'],['half','نصف يوم'],['leave','إجازة'],['excused','عذر بدون خصم']];
    return opts.map(function(o){ return '<option value="'+o[0]+'" '+(current===o[0]?'selected':'')+'>'+o[1]+'</option>'; }).join('');
  }
  function audit(action, id, details){ try{ if(typeof addAudit === 'function') addAudit(action, 'attendance', id); }catch(e){} }
  function renderSummary(month){
    var em=loadEmployees(), ds=daysInMonth(month), rows='';

      var present=0, absent=0, excused=0, leave=0, lateHalf=0, lateFull=0, friday=0, fridayWork=0, ded=0, lateM=0, otH=0, otPay=0;
      for(var d=1; d<=ds; d++){
        var date=dateOf(month,d), r=rec(e.id,date), c=calcStrict(e,r,date);
        r.deduction=c.deduction; r.lateMinutes=c.late; r.deductionReason=c.reason;
        if(c.status==='friday_work') fridayWork++; else if(c.status==='friday') friday++; else if(c.status==='absent') absent++; else if(c.status==='excused') excused++; else if(c.status==='leave') leave++; else if(c.status==='late_half') lateHalf++; else if(c.status==='late_full') lateFull++; else present++;
        var fp=fridayOvertimePay(e,r,dateOf(month,d)); otH += isFriday(dateOf(month,d)) ? fridayOvertimeHours(r) : 0; otPay += fp; ded += c.deduction; lateM += c.late;
      }
      var salary=num(e.monthlySalary || e.salary);
      rows += '<tr><td><b>'+esc(empName(e))+'</b></td><td>'+money(salary)+'</td><td>'+present+'</td><td>'+friday+'</td><td>'+fridayWork+'</td><td class="text-danger">'+absent+'</td><td>'+lateHalf+'</td><td>'+lateFull+'</td><td>'+excused+'</td><td>'+fmtMinutes(lateM)+'</td><td class="text-danger">'+money(ded)+'</td><td class="text-success">'+money(otPay)+'</td><td class="text-success">'+money(Math.max(0,salary-ded)+otPay)+'</td></tr>'; 
    });
    saveAttendance();
    return '<div class="section-card"><div class="section-header"><h3>📊 التقرير الشهري للحضور والغياب لجميع العمال</h3><button class="btn btn-secondary no-print" onclick="window.print()">🖨️ طباعة التقرير الشهري</button></div><div style="overflow-x:auto"><table class="table"><thead><tr><th>العامل</th><th>الراتب</th><th>حضور</th><th>جمع بدون خصم</th><th>عمل جمعة</th><th>غياب</th><th>تأخير نصف يوم</th><th>تأخير يوم كامل</th><th>أعذار</th><th>دقائق التأخير</th><th>إجمالي الخصم</th><th>أوفر تايم الجمعة</th><th>صافي المستحقات</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
  }
  window.saveStrictAttendanceRow = function(empId, date){
    var emp=getEmp(empId), r=rec(empId,date);
    ['status','workType','inMorning','outMorning','inAfternoon','outAfternoon','excuseText'].forEach(function(k){ var el=document.querySelector('[data-att-field="'+k+'"][data-emp="'+empId+'"][data-date="'+date+'"]'); if(el) r[k]=el.value; });
    var c=calcStrict(emp,r,date); r.deduction=c.deduction; r.lateMinutes=c.late; r.deductionReason=c.reason; r.updatedAt=new Date().toISOString();
    saveAttendance(); audit('حفظ توقيت حضور', r.id, empName(emp));
    if(typeof showNotification==='function') showNotification('تم حفظ توقيت '+empName(emp),'#10b981');
    if(typeof renderCurrentTab==='function') renderCurrentTab();
  };
  window.attachStrictExcuse = function(empId, date){
    var input=document.createElement('input'); input.type='file'; input.accept='image/*,.pdf,.doc,.docx';
    input.onchange=function(){ var f=input.files && input.files[0]; if(!f) return; if(f.size>1200000){ alert('حجم الملف كبير. اختر ملف أقل من 1MB.'); return; } var reader=new FileReader(); reader.onload=function(){ var r=rec(empId,date); r.attachmentName=f.name; r.attachmentData=reader.result; r.status='excused'; r.deduction=0; r.deductionReason='عذر مرفق بدون خصم'; saveAttendance(); audit('إرفاق عذر حضور', r.id, f.name); if(typeof renderCurrentTab==='function') renderCurrentTab(); }; reader.readAsDataURL(f); };
    input.click();
  };
  window.addStrictEmployee = function(){
    loadEmployees(); var name=document.getElementById('strictNewEmpName'); var sal=document.getElementById('strictNewEmpSalary'); var nme=name?name.value.trim():''; var salary=num(sal && sal.value); if(!nme){ alert('اكتب اسم العامل'); return; } var e={id:Date.now(),name:nme,job:'عامل',monthlySalary:salary,dailyDeduction:salary/30}; window.employees.push(e); localStorage.setItem('erp_attendance_selected_employee', String(e.id)); saveAttendance(); if(typeof renderCurrentTab==='function') renderCurrentTab();
  };
  window.renderMonthlyAttendance = function(){
    var em=loadEmployees(); loadRecords();
    var month=localStorage.getItem('erp_attendance_selected_month') || ym();
    var empId=localStorage.getItem('erp_attendance_selected_employee') || (em[0] && em[0].id) || '';
    var emp=getEmp(empId) || em[0]; if(emp) empId=emp.id;
    var ds=daysInMonth(month), detailRows='', totalDed=0, totalLate=0, totalFridayOtHours=0, totalFridayOtPay=0, present=0, absent=0, excused=0, fridays=0, fridayWorkDays=0;
    for(var d=1; d<=ds; d++){
      var date=dateOf(month,d), r=emp?rec(emp.id,date):null, c=emp?calcStrict(emp,r,date):{deduction:0,late:0,reason:'-'};
      if(r){ r.deduction=c.deduction; r.lateMinutes=c.late; r.deductionReason=c.reason; }
      totalDed += c.deduction; totalLate += c.late;
      if(c.status==='friday_work') fridayWorkDays++; else if(c.status==='friday') fridays++; else if(c.status==='absent') absent++; else if(c.status==='excused') excused++; else present++;
      if(isFriday(date)){ totalFridayOtHours += fridayOvertimeHours(r); totalFridayOtPay += fridayOvertimePay(emp,r,date); }
      var readonlyFriday=false, fridayDay=isFriday(date);
      var fridayHint = fridayDay ? 'الجمعة إجازة: التوقيت صفر، وإذا أدخلت وقت عمل يحسب أوفر تايم' : '';
      detailRows += '<tr '+(fridayDay?'style="background:#fff7ed"':(readonlyFriday?'style="background:#f8fafc"':''))+'><td><b>'+date+'</b><br><small>'+fridayHint+'</small></td>'+
        '<td><select data-att-field="status" data-emp="'+esc(empId)+'" data-date="'+date+'" >'+statusOptions(r && r.status)+'</select></td>'+
        '<td><input type="time" data-att-field="inMorning" data-emp="'+esc(empId)+'" data-date="'+date+'" value="'+esc((r&&r.inMorning)||'07:00')+'" ><small>دخول 7:00</small></td>'+
        '<td><input type="time" data-att-field="outMorning" data-emp="'+esc(empId)+'" data-date="'+date+'" value="'+esc((r&&r.outMorning)||'13:00')+'" ><small>خروج 1:00</small></td>'+
        '<td><input type="time" data-att-field="inAfternoon" data-emp="'+esc(empId)+'" data-date="'+date+'" value="'+esc((r&&r.inAfternoon)||'14:00')+'" ><small>دخول 2:00</small></td>'+
        '<td><input type="time" data-att-field="outAfternoon" data-emp="'+esc(empId)+'" data-date="'+date+'" value="'+esc((r&&r.outAfternoon)||'17:00')+'" ><small>خروج 5:00</small></td>'+
        '<td><input data-att-field="excuseText" data-emp="'+esc(empId)+'" data-date="'+date+'" value="'+esc((r&&r.excuseText)||'')+'" placeholder="العذر/ملاحظة"></td>'+
        '<td>'+(r&&r.attachmentData?'<a class="btn btn-sm btn-secondary" href="'+r.attachmentData+'" download="'+esc(r.attachmentName||'excuse')+'">📎 عرض</a>':'<button class="btn btn-sm btn-secondary no-print" onclick="attachStrictExcuse(\''+esc(empId)+'\',\''+date+'\')">إرفاق</button>')+'</td>'+
        '<td>'+fmtMinutes(c.late)+'</td><td>'+esc(c.reason)+'</td><td class="text-danger">'+money(c.deduction)+'</td>'+
        '<td class="no-print"><button class="btn btn-sm btn-primary" onclick="saveStrictAttendanceRow(\''+esc(empId)+'\',\''+date+'\')">حفظ</button></td></tr>';
    }
    saveAttendance();
    var salary=emp?num(emp.monthlySalary || emp.salary):0, net=Math.max(0,salary-totalDed)+totalFridayOtPay;
    var opts=em.map(function(e){ return '<option value="'+esc(e.id)+'" '+(String(e.id)===String(empId)?'selected':'')+'>'+esc(empName(e))+'</option>'; }).join('');
    return '<div class="section-card"><div class="section-header"><h2>📅 نظام الحضور والرواتب الشهري</h2><div class="no-print"><button class="btn btn-secondary" onclick="window.print()">🖨️ طباعة كشف العامل</button></div></div>'+
      '<div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:16px;padding:12px;margin-bottom:14px"><b>نظام الدوام:</b> من 7:00 صباحاً إلى 1:00 ظهراً، استراحة من 1:00 إلى 2:00، ثم من 2:00 إلى 5:00 مساءً. <b>التأخير دقيقة واحدة = خصم نصف يوم</b>، والتأخير ساعة أو أكثر = خصم يوم كامل. <b>الجمعة إجازة:</b> تظهر الأوقات 00:00 افتراضياً، وإذا تم إدخال توقيت عمل في الجمعة تُحسب كل الساعات المسجلة أوفر تايم.</div>'+
      '<div class="stats-grid"><div class="stat-card"><div class="stat-title">الراتب</div><div class="stat-value">'+money(salary)+'</div></div><div class="stat-card"><div class="stat-title">إجمالي الخصم</div><div class="stat-value text-danger">'+money(totalDed)+'</div></div><div class="stat-card"><div class="stat-title">زيادة أوفر تايم الجمعة</div><div class="stat-value text-success">'+money(totalFridayOtPay)+'</div></div><div class="stat-card"><div class="stat-title">صافي المستحقات</div><div class="stat-value text-success">'+money(net)+'</div></div><div class="stat-card"><div class="stat-title">دقائق التأخير</div><div class="stat-value">'+fmtMinutes(totalLate)+'</div></div><div class="stat-card"><div class="stat-title">الغياب</div><div class="stat-value text-danger">'+absent+'</div></div><div class="stat-card"><div class="stat-title">جمع إجازة</div><div class="stat-value">'+fridays+'</div></div><div class="stat-card"><div class="stat-title">أيام عمل الجمعة</div><div class="stat-value text-success">'+fridayWorkDays+'</div></div></div>'+
      '<div class="section-card no-print"><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px"><div class="form-group"><label>العامل</label><select id="strictEmpSelect">'+opts+'</select></div><div class="form-group"><label>الشهر</label><input type="month" id="strictMonthInput" value="'+esc(month)+'"></div><div class="form-group"><label>إضافة عامل</label><input id="strictNewEmpName" placeholder="اسم العامل"></div><div class="form-group"><label>الراتب</label><input id="strictNewEmpSalary" type="number" step="0.01" placeholder="الراتب الشهري"></div><div class="form-group"><label>&nbsp;</label><button class="btn btn-primary" onclick="addStrictEmployee()">+ إضافة عامل</button></div></div></div>'+
      '<div style="overflow-x:auto"><table class="table" style="min-width:1250px"><thead><tr><th>اليوم</th><th>الحالة</th><th>دخول الصباح</th><th>خروج الصباح</th><th>دخول بعد الاستراحة</th><th>خروج نهاية الدوام</th><th>العذر/ملاحظة</th><th>مرفق</th><th>التأخير</th><th>سبب الخصم/الأوفر</th><th>الخصم</th><th class="no-print">حفظ</th></tr></thead><tbody>'+detailRows+'</tbody></table></div>'+renderSummary(month)+'</div>';
  };
  document.addEventListener('change', function(ev){ var el=ev.target; if(!el) return; if(el.id==='strictEmpSelect'){ localStorage.setItem('erp_attendance_selected_employee', el.value); if(typeof renderCurrentTab==='function') renderCurrentTab(); } if(el.id==='strictMonthInput'){ localStorage.setItem('erp_attendance_selected_month', el.value || ym()); if(typeof renderCurrentTab==='function') renderCurrentTab(); } });
  function install(){
    var old=window.renderCurrentTab || (typeof renderCurrentTab==='function' ? renderCurrentTab : null);
    window.renderCurrentTab=function(){ if(typeof currentTab!=='undefined' && currentTab==='monthlyAttendance'){ var main=document.getElementById('mainContent'); if(main) main.innerHTML=window.renderMonthlyAttendance(); return; } if(old) return old.apply(this, arguments); };
    try{ if(typeof renderCurrentTab==='function') renderCurrentTab=window.renderCurrentTab; }catch(e){}
  }
  install();
})();

<style>

<script>
(function(){
'use strict';
function n(v){return parseFloat(String(v==null?0:v).replace(',','.'))||0}
function money(v){return n(v).toFixed(2)+' ريال'}

function getJSON(k,f){try{var x=localStorage.getItem(k);return x?JSON.parse(x):f}catch(e){return f}}
function saveEmployees(){if(!Array.isArray(window.employees))window.employees=[];window.employees.forEach(function(e){e.monthlySalary=n(e.monthlySalary||e.salary);e.salary=e.monthlySalary;e.dailyDeduction=e.monthlySalary/30;if(!e.status)e.status='active'});try{localStorage.setItem('erp_employees',JSON.stringify(window.employees))}catch(e){};try{if(typeof saveAll==='function')saveAll()}catch(e){}}
function loadEmployees(){var a=getJSON('erp_employees',window.employees||[]);if(!Array.isArray(a))a=[];window.employees=a;return a}
function audit(a,id,d){try{if(typeof addAudit==='function')addAudit(a,'employee',id);else{var logs=getJSON('erp_audit',[]);logs.unshift({id:Date.now(),action:a,entity:'employee',entityId:id,details:d||'',timestamp:new Date().toISOString()});localStorage.setItem('erp_audit',JSON.stringify(logs))}}catch(e){}}
function notify(m,b){try{if(typeof showNotification==='function')showNotification(m,b||'#10b981');else alert(m)}catch(e){alert(m)}}

window.addWorkerSafe=function(){loadEmployees();var name=prompt('اسم العامل:');if(!name)return;var job=prompt('وظيفة العامل:','عامل')||'عامل';var sal=n(prompt('الراتب الشهري:','250'));var emp={id:Date.now(),name:name.trim(),job:job.trim(),role:job.trim(),monthlySalary:sal,salary:sal,dailyDeduction:sal/30,status:'active'};window.employees.push(emp);saveEmployees();try{localStorage.setItem('erp_attendance_selected_employee',emp.id)}catch(e){}audit('إضافة عامل',emp.id,emp.name);notify('تمت إضافة العامل');if(typeof renderCurrentTab==='function')renderCurrentTab()};

window.deleteWorkerSafe=function(id){loadEmployees();var e=window.employees.find(function(x){return String(x.id)===String(id)});if(!e){notify('العامل غير موجود','#ef4444');return}var name=e.name||e.name_ar||e.name_en||('عامل '+e.id);if(!confirm('هل تريد حذف العامل "'+name+'" من القائمة؟'))return;window.employees=window.employees.filter(function(x){return String(x.id)!==String(id)});if(String(localStorage.getItem('erp_attendance_selected_employee'))===String(id))localStorage.removeItem('erp_attendance_selected_employee');saveEmployees();audit('حذف عامل من القائمة',id,name);notify('تم حذف العامل','#ef4444');if(typeof renderCurrentTab==='function')renderCurrentTab()};
var oldHR=window.renderHRPayroll;window.renderHRPayroll=function(){var body=typeof oldHR==='function'?oldHR():'<div class="section-card"><h2>رواتب وحضور</h2></div>';return String(body).replace('<div class="section-card">','<div class="section-card">'+workerBox())};

<script>
(function(){
'use strict';
function N(v){ return parseFloat(String(v ?? 0).replace(',', '.')) || 0; }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function moneyOMR(v){ return N(v).toFixed(2) + ' ريال'; }
function saveAutoCostData(){
  try{
    localStorage.setItem('erp_project_labor_allocations', JSON.stringify(window.projectLaborAllocations || []));
    localStorage.setItem('erp_project_operating_expenses', JSON.stringify(window.projectOperatingExpenses || []));
    localStorage.setItem('erp_workshop_material_issues', JSON.stringify(window.workshopMaterialIssues || []));
    if(typeof saveAll === 'function') saveAll();
  }catch(e){ console.error(e); }
}
function loadAutoCostData(){
  window.projectLaborAllocations = window.projectLaborAllocations || [];
  window.projectOperatingExpenses = window.projectOperatingExpenses || [];
  try{ let x=JSON.parse(localStorage.getItem('erp_project_labor_allocations')||'[]'); if(Array.isArray(x)) window.projectLaborAllocations=x; }catch(e){}
  try{ let x=JSON.parse(localStorage.getItem('erp_project_operating_expenses')||'[]'); if(Array.isArray(x)) window.projectOperatingExpenses=x; }catch(e){}
  window.workshopMaterialIssues = Array.isArray(window.workshopMaterialIssues) ? window.workshopMaterialIssues : [];
  window.rawMaterials = Array.isArray(window.rawMaterials) ? window.rawMaterials : (Array.isArray(window.products)?window.products:[]);
  window.contracts = Array.isArray(window.contracts) ? window.contracts : [];
  window.employees = Array.isArray(window.employees) ? window.employees : [];
  window.expenses = Array.isArray(window.expenses) ? window.expenses : [];
  window.workshops = Array.isArray(window.workshops) ? window.workshops : [];
}
function auditAuto(action, entity, detail){
  try{
    if(typeof auditor === 'function') auditor(action, entity, detail || '', '');
    else if(Array.isArray(window.auditLogs)) window.auditLogs.unshift({id:Date.now(),date:todayISO(),user:window.currentUser?.username||'',action,entity,detail});
  }catch(e){}
}
function contractTitle(c){ return c ? (c.contractNumber || '') + ' - ' + (c.projectName || c.name_ar || c.name_en || ('عقد ' + c.id)) : '-'; }
function customerName(id){ let c=(window.customers||[]).find(x=>String(x.id)===String(id)); return c ? (c.name_ar || c.name || c.name_en || '-') : '-'; }
function contractValue(c){ return N(c?.grandTotal || c?.total || c?.amount || c?.contractValue || 0); }
function rawUnitCost(mat){ return N(mat.costPrice || mat.purchasePrice || mat.unitCost || mat.avgCost || mat.price || 0); }
function employeeDailyCost(e){ return N(e.dailyCost || e.dailyDeduction || (N(e.monthlySalary || e.salary) / 26)); }
function employeeHourlyCost(e){ return N(e.hourlyCost || (employeeDailyCost(e) / 8)); }
function materialCostForContract(contractId){
  return (window.workshopMaterialIssues||[]).filter(x=>String(x.contractId||x.sourceContractId||'')===String(contractId)).reduce((sum,x)=>{
    let mat=(window.rawMaterials||[]).find(m=>String(m.id)===String(x.productId || x.materialId));
    let unit=N(x.unitCost || x.costPrice || rawUnitCost(mat));
    let total=N(x.totalCost || x.amount || (N(x.qty)*unit));
    return sum + total;
  },0);
}
function laborCostForContract(contractId){
  return (window.projectLaborAllocations||[]).filter(x=>String(x.contractId)===String(contractId)).reduce((sum,x)=>sum+N(x.amount),0);
}
function operatingCostForContract(contractId){
  let linkedExpenses=(window.expenses||[]).filter(x=>String(x.contractId||x.projectId||x.sourceContractId||'')===String(contractId)).reduce((s,x)=>s+N(x.amount),0);
  let ops=(window.projectOperatingExpenses||[]).filter(x=>String(x.contractId)===String(contractId)).reduce((s,x)=>s+N(x.amount),0);
  let manual=(window.projectCosts||[]).filter(x=>String(x.contractId)===String(contractId) && ['مصروف تشغيلي','مصروفات تشغيلية','تشغيلي','مصروف مباشر','نقل','تركيب'].includes(String(x.type))).reduce((s,x)=>s+N(x.amount),0);
  return linkedExpenses + ops + manual;
}
function manualOtherCost(contractId){
  return (window.projectCosts||[]).filter(x=>String(x.contractId)===String(contractId) && !['تقديري','مصروف تشغيلي','مصروفات تشغيلية','تشغيلي','مصروف مباشر','نقل','تركيب'].includes(String(x.type))).reduce((s,x)=>s+N(x.amount),0);
}
function estimatedCost(c){
  let manual=(window.projectCosts||[]).filter(x=>String(x.contractId)===String(c.id) && String(x.type)==='تقديري').reduce((s,x)=>s+N(x.amount),0);
  return N(c.estimatedCost) || manual;
}
window.calculateProjectCostAuto = function(contractId){
  let materials=materialCostForContract(contractId);
  let labor=laborCostForContract(contractId);
  let operating=operatingCostForContract(contractId);
  let other=manualOtherCost(contractId);
  let total=materials + labor + operating + other;
  return {materials,labor,operating,other,total};
};
window.issueMaterialToWorkshop=function(){
  loadAutoCostData();
  let materialId=document.getElementById('issueProduct')?.value;
  let workshopId=document.getElementById('issueWorkshop')?.value;
  let contractId=document.getElementById('issueContract')?.value;
  let qty=N(document.getElementById('issueQty')?.value);
  let note=document.getElementById('issueNote')?.value||'';
  let mat=(window.rawMaterials||[]).find(x=>String(x.id)===String(materialId));
  if(!mat) return alert('اختر مادة خام صحيحة');
  if(!contractId) return alert('اختر العقد/المشروع حتى تحتسب التكلفة تلقائياً');
  if(qty<=0) return alert('أدخل كمية صحيحة');
  if(N(mat.currentStock) < qty) return alert('الكمية غير كافية في المخزون');
  let unit=rawUnitCost(mat);
  mat.currentStock=N(mat.currentStock)-qty;
  window.warehouseMovements = Array.isArray(window.warehouseMovements)?window.warehouseMovements:[];
  window.warehouseMovements.unshift({id:Date.now(),date:todayISO(),productId:mat.id,productName:mat.name_ar||mat.name_en,type:'out',qty,unitCost:unit,totalCost:qty*unit,ref:'تسليم مواد للورشة - مشروع',workshopId,contractId,accountantSignature:window.currentUser?.name_ar||window.currentUser?.username||'-'});
  window.workshopMaterialIssues.unshift({id:Date.now()+1,date:todayISO(),productId:mat.id,materialId:mat.id,workshopId,contractId,qty,unitCost:unit,totalCost:qty*unit,note,accountantSignature:window.currentUser?.name_ar||window.currentUser?.username||'-'});
  auditAuto('تسليم مادة خام لمشروع','projectMaterials', contractId + ' / ' + (mat.name_ar||mat.name_en) + ' / ' + qty);
  saveAutoCostData();
  if(typeof renderCurrentTab==='function') renderCurrentTab();
};
window.addProjectLaborAuto=function(){
  loadAutoCostData();
  let contractId=document.getElementById('plContract')?.value;
  let empId=document.getElementById('plEmployee')?.value;
  let days=N(document.getElementById('plDays')?.value);
  let hours=N(document.getElementById('plHours')?.value);
  let note=document.getElementById('plNote')?.value||'';
  let e=(window.employees||[]).find(x=>String(x.id)===String(empId));
  if(!contractId || !e) return alert('اختر العقد والعامل');
  if(days<=0 && hours<=0) return alert('أدخل عدد أيام أو ساعات العمل');
  let amount=(days*employeeDailyCost(e)) + (hours*employeeHourlyCost(e));
  window.projectLaborAllocations.unshift({id:Date.now(),date:todayISO(),contractId,employeeId:empId,employeeName:e.name||e.name_ar||'-',days,hours,dailyCost:employeeDailyCost(e),hourlyCost:employeeHourlyCost(e),amount,note,accountantSignature:window.currentUser?.name_ar||window.currentUser?.username||'-'});
  auditAuto('احتساب أجور عامل على مشروع','projectLabor', (e.name||'') + ' / ' + moneyOMR(amount));
  saveAutoCostData();
  if(typeof renderCurrentTab==='function') renderCurrentTab();
};
window.addProjectOperatingExpenseAuto=function(){
  loadAutoCostData();
  let contractId=document.getElementById('poContract')?.value;
  let amount=N(document.getElementById('poAmount')?.value);
  let category=document.getElementById('poCategory')?.value||'مصروف تشغيلي';
  let note=document.getElementById('poNote')?.value||'';
  if(!contractId || amount<=0) return alert('اختر العقد وأدخل مبلغ المصروف');
  window.projectOperatingExpenses.unshift({id:Date.now(),date:todayISO(),contractId,category,amount,note,accountantSignature:window.currentUser?.name_ar||window.currentUser?.username||'-'});
  auditAuto('إضافة مصروف تشغيلي لمشروع','projectOperating', category + ' / ' + moneyOMR(amount));
  saveAutoCostData();
  if(typeof renderCurrentTab==='function') renderCurrentTab();
};

};

  let totalValue=rows.reduce((s,r)=>s+r.value,0), totalCost=rows.reduce((s,r)=>s+r.auto.total,0), totalProfit=totalValue-totalCost;

  <div class="stats-grid"><div class="stat-card"><div class="stat-title">قيمة العقود</div><div class="stat-value">${moneyOMR(totalValue)}</div></div><div class="stat-card"><div class="stat-title">إجمالي التكلفة التلقائية</div><div class="stat-value text-danger">${moneyOMR(totalCost)}</div></div><div class="stat-card"><div class="stat-title">صافي الربح</div><div class="stat-value ${totalProfit>=0?'text-success':'text-danger'}">${moneyOMR(totalProfit)}</div></div></div>

<script>
/* SAFE PATCH: Product raw-material recipe per meter + automatic project material cost */
(function(){
  'use strict';
  function num(v){ v=parseFloat(String(v??0).replace(',', '.')); return isFinite(v)?v:0; }
  function money(v){ return num(v).toFixed(2) + ' ريال'; }
  function getRawMaterials(){
    try{
      if(typeof rawMaterials !== 'undefined' && Array.isArray(rawMaterials)) return rawMaterials;
      if(Array.isArray(window.rawMaterials)) return window.rawMaterials;
    }catch(e){}
    return [];
  }
  function getProducts(){
    try{ if(typeof products !== 'undefined' && Array.isArray(products)) return products; }catch(e){}
    return Array.isArray(window.products)?window.products:[];
  }
  function getContracts(){
    try{ if(typeof contracts !== 'undefined' && Array.isArray(contracts)) return contracts; }catch(e){}
    return Array.isArray(window.contracts)?window.contracts:[];
  }
  function rawCost(mat){ return num(mat?.costPrice || mat?.purchasePrice || mat?.unitCost || mat?.avgCost || mat?.price || 0); }
  function safeAudit(action, entity, id){ try{ if(typeof addAudit==='function') addAudit(action, entity, id); }catch(e){} }
  function safeSave(){ try{ if(typeof saveAll==='function') saveAll(); else localStorage.setItem('erp_products', JSON.stringify(getProducts())); }catch(e){ console.error(e); } }
  function safeNotify(msg, color){ try{ if(typeof showNotification==='function') showNotification(msg, color||'#10b981'); else alert(msg); }catch(e){ alert(msg); } }
  function productName(p){ return p?.name_ar || p?.name || p?.name_en || '-'; }
  function rawName(m){ return m?.name_ar || m?.name || m?.name_en || '-'; }
  function recipeCostPerMeter(recipe){
    const raws=getRawMaterials();
    return (recipe||[]).reduce(function(sum,r){
      const mat=raws.find(m=>String(m.id)===String(r.materialId));
      return sum + num(r.qtyPerMeter) * rawCost(mat);
    },0);
  }
  window.productRecipeCostPerMeter = recipeCostPerMeter;

  window.renderProductsPage = function(){
    if(typeof hasPermission==='function' && !hasPermission('products')) return `<div class="section-card">⛔ ${typeof t==='function'?t('noPermission'):'غير مصرح'}</div>`;
    const list=getProducts();

  function recipeRowHtml(i, row){

    return `<div class="product-recipe-row" data-i="${i}" style="display:grid;grid-template-columns:2fr 1fr auto;gap:8px;margin-bottom:8px;align-items:center;">

    </div>`;
  }
  function renderRecipeEditor(recipe){
    const box=document.getElementById('productRecipeRows'); if(!box) return;
    recipe = Array.isArray(recipe) ? recipe : [];
    box.innerHTML = recipe.map((r,i)=>recipeRowHtml(i,r)).join('') || '<p style="color:var(--gray-500);margin:8px 0;">لم تتم إضافة مواد خام بعد.</p>';
    box.querySelectorAll('.pr-remove').forEach(function(btn){

  }
  function collectRecipe(){

  function updateRecipeCostPreview(){

    document.body.insertAdjacentHTML('beforeend', modalHtml);

      if(materialRecipe.length===0 && !confirm('لم تسجل مواد خام لهذا المنتج. هل تريد الحفظ بدون وصفة مواد؟')) return;
      if(p){ Object.assign(p,{name_ar,name_en,price,unit,unit_en:unit,materialRecipe,recipeCostPerMeter:recipeCostPerMeter(materialRecipe), currentStock:0, minStock:0}); safeAudit('edit','product',p.id); }
      else { const np={id:Date.now(),name_ar,name_en,price,unit,unit_en:unit,materialRecipe,recipeCostPerMeter:recipeCostPerMeter(materialRecipe), currentStock:0, minStock:0}; list.push(np); safeAudit('create','product',np.id); }

  window.recipeMaterialCostForContract = function(contractId){
    const cons=getContracts(); const c=cons.find(x=>String(x.id)===String(contractId)); if(!c) return 0;
    const items = Array.isArray(c.items) ? c.items : [];
    const prods=getProducts(); const raws=getRawMaterials();
    return items.reduce(function(sum,it){
      const prod=prods.find(p=>String(p.id)===String(it.productId));
      const rec=Array.isArray(prod?.materialRecipe) ? prod.materialRecipe : [];
      const meters = num(it.totalArea || (num(it.area || (num(it.length)*num(it.width))) * num(it.qty || 1)) || it.qty || 0);
      const itemCost = rec.reduce(function(s,r){
        const mat=raws.find(m=>String(m.id)===String(r.materialId));
        return s + meters * num(r.qtyPerMeter) * rawCost(mat);
      },0);
      return sum + itemCost;
    },0);
  };

  window.materialCostForContract = function(contractId){
    const issued=(window.workshopMaterialIssues||[]).filter(x=>String(x.contractId||x.sourceContractId||'')===String(contractId)).reduce(function(sum,x){
      const mat=getRawMaterials().find(m=>String(m.id)===String(x.productId || x.materialId));
      const unit=num(x.unitCost || x.costPrice || rawCost(mat));
      return sum + num(x.totalCost || x.amount || (num(x.qty)*unit));
    },0);
    const recipe=window.recipeMaterialCostForContract(contractId);
    return issued + recipe;
  };
  try{ materialCostForContract = window.materialCostForContract; }catch(e){}

  const oldCalc=window.calculateProjectCostAuto;
  window.calculateProjectCostAuto=function(contractId){
    const base = typeof oldCalc==='function' ? oldCalc(contractId) : {labor:0,operating:0,other:0};
    const materials = window.materialCostForContract(contractId);
    const labor = num(base.labor);
    const operating = num(base.operating);
    const other = num(base.other);
    return {materials,labor,operating,other,total:materials+labor+operating+other, recipeMaterials: window.recipeMaterialCostForContract(contractId)};
  };
})();
</script>

<script id="final-unified-supabase-cloud-sync-v2">/* ==========================================================
   FINAL UNIFIED SUPABASE CLOUD SYNC V2 - FAKHR NIZWA ERP
   Supabase is the shared source between devices.
   localStorage remains a local cache only.
========================================================== */
(function(){
  'use strict';
  if(window.__FINAL_UNIFIED_SUPABASE_CLOUD_SYNC_V2__) return;
  window.__FINAL_UNIFIED_SUPABASE_CLOUD_SYNC_V2__ = true;

  const STATE_TABLE = 'erp_cloud_state';
  const STATE_ID = 'main';
  const POLL_MS = 10000;
  const SAVE_DEBOUNCE_MS = 900;
  const GLOBALS = [
    ['products','erp_products'],
    ['rawMaterials','erp_raw_materials'],
    ['customers','erp_customers'],
    ['invoices','erp_invoices'],
    ['contracts','erp_contracts'],
    ['bankAccounts','erp_bank_accounts'],
    ['cashBoxes','erp_cash_boxes'],
    ['expenses','erp_expenses'],
    ['supplierInvoices','erp_supplier_invoices'],
    ['liabilities','erp_liabilities'],
    ['receipts','erp_receipts'],
    ['auditLogs','erp_audit']
  ];

  let bootDone = false;
  let uploading = false;
  let downloading = false;
  let saveTimer = null;
  let lastRemoteUpdatedAt = localStorage.getItem('erp_cloud_state_updated_at') || '';

  function notify(msg, color){
    try{
      if(window.showSupabaseToast) window.showSupabaseToast(msg, color || '#10b981');
      else if(typeof showNotification === 'function') showNotification(msg, color || '#10b981');
      else console.log(msg);
    }catch(e){ console.log(msg); }
  }

  function hasSupabase(){
    return !!(window.supabase && typeof window.supabase.from === 'function' && window.SUPABASE_URL && window.SUPABASE_ANON_KEY);
  }

  function clone(value){
    try{ return JSON.parse(JSON.stringify(value)); }catch(e){ return Array.isArray(value) ? [] : {}; }
  }

  function readStorage(key){
    try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : []; }catch(e){ return []; }
  }

  function writeStorage(key, value){
    try{ localStorage.setItem(key, JSON.stringify(Array.isArray(value) ? value : [])); }catch(e){}
  }

  function readGlobalVar(name){
    try{
      const value = (0, eval)(name);
      if(Array.isArray(value)) return value;
    }catch(e){}
    try{
      const value = window[name];
      if(Array.isArray(value)) return value;
    }catch(e){}
    return null;
  }

  function writeGlobalVar(name, arr){
    arr = Array.isArray(arr) ? arr : [];
    try{
      const current = (0, eval)(name);
      if(Array.isArray(current)){
        current.length = 0;
        arr.forEach(function(item){ current.push(item); });
        return true;
      }
    }catch(e){}
    try{ (0, eval)(name + ' = ' + JSON.stringify(arr)); return true; }catch(e){}
    try{ window[name] = arr; return true; }catch(e){}
    return false;
  }

  function getArray(name, key){
    const globalArray = readGlobalVar(name);
    if(Array.isArray(globalArray)) return clone(globalArray);
    return readStorage(key);
  }

  function setArray(name, key, value){
    const arr = Array.isArray(value) ? value : [];
    writeGlobalVar(name, arr);
    writeStorage(key, arr);
  }

  function sanitizeState(state){
    state = state && typeof state === 'object' ? state : {};
    GLOBALS.forEach(function(pair){ if(!Array.isArray(state[pair[0]])) state[pair[0]] = []; });
    state.meta = Object.assign({}, state.meta || {}, {
      company: 'مؤسسة فخر نزوى',
      savedAt: new Date().toISOString(),
      version: 'final-unified-sync-v2'
    });
    return state;
  }

  function collectState(){
    const state = {};
    GLOBALS.forEach(function(pair){ state[pair[0]] = getArray(pair[0], pair[1]); });
    return sanitizeState(state);
  }

  function applyState(state){
    state = sanitizeState(state);
    GLOBALS.forEach(function(pair){ setArray(pair[0], pair[1], state[pair[0]]); });
    try{ localStorage.setItem('erp_last_cloud_sync', new Date().toLocaleString('ar-OM')); }catch(e){}
    try{ if(typeof updateDashboard === 'function') updateDashboard(); }catch(e){}
    try{ if(typeof renderCurrentTab === 'function') renderCurrentTab(); }catch(e){}
  }

  async function getCloudRow(){
    const res = await window.supabase.from(STATE_TABLE).select('id,data,updated_at').eq('id', STATE_ID).maybeSingle();
    if(res.error) throw res.error;
    return res.data || null;
  }

  function hasUsefulLocalData(){
    try{
      return GLOBALS.some(function(pair){
        const arr = getArray(pair[0], pair[1]);
        return Array.isArray(arr) && arr.length > 0;
      });
    }catch(e){ return false; }
  }

  async function downloadCloud(showToast){
    if(!hasSupabase() || downloading || uploading) return false;
    downloading = true;
    try{
      const row = await getCloudRow();
      if(!row || !row.data){ downloading = false; return null; }
      const remoteTime = String(row.updated_at || '');
      if(remoteTime && remoteTime === lastRemoteUpdatedAt){ downloading = false; return false; }
      applyState(row.data);
      lastRemoteUpdatedAt = remoteTime;
      try{ localStorage.setItem('erp_cloud_state_updated_at', lastRemoteUpdatedAt); }catch(e){}
      if(showToast) notify('✅ تم تنزيل آخر بيانات من السحابة', '#10b981');
      downloading = false;
      return true;
    }catch(err){
      downloading = false;
      const msg = String(err && (err.message || err) || '');
      if(msg.includes(STATE_TABLE) || msg.includes('does not exist') || msg.includes('relation')){
        notify('⚠️ جدول المزامنة غير موجود في Supabase: erp_cloud_state', '#f59e0b');
      }else if(showToast){
        notify('⚠️ تعذر تنزيل البيانات: ' + msg, '#f59e0b');
      }
      console.warn('Cloud download failed:', err);
      return false;
    }
  }

  async function uploadCloud(showToast){
    if(!hasSupabase() || uploading || downloading) return false;
    uploading = true;
    try{
      const state = collectState();
      const payload = { id: STATE_ID, data: state, updated_at: new Date().toISOString() };
      const res = await window.supabase.from(STATE_TABLE).upsert(payload, { onConflict: 'id' }).select('updated_at').maybeSingle();
      if(res.error) throw res.error;
      lastRemoteUpdatedAt = String((res.data && res.data.updated_at) || payload.updated_at);
      try{
        localStorage.setItem('erp_cloud_state_updated_at', lastRemoteUpdatedAt);
        localStorage.setItem('erp_last_cloud_sync', new Date().toLocaleString('ar-OM'));
      }catch(e){}
      if(showToast) notify('✅ تم حفظ البيانات في السحابة', '#10b981');
      uploading = false;
      return true;
    }catch(err){
      uploading = false;
      const msg = String(err && (err.message || err) || '');
      if(msg.includes(STATE_TABLE) || msg.includes('does not exist') || msg.includes('relation')){
        notify('⚠️ تحتاج إنشاء جدول erp_cloud_state في Supabase حتى تعمل المزامنة بين الأجهزة', '#f59e0b');
      }else if(showToast){
        notify('⚠️ تعذر الحفظ السحابي: ' + msg, '#f59e0b');
      }
      console.error('Cloud upload failed:', err);
      return false;
    }
  }

  function queueUpload(showToast){
    if(!bootDone || downloading) return;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function(){ uploadCloud(!!showToast); }, SAVE_DEBOUNCE_MS);
  }

  function patchSaveAll(){
    const oldSaveAll = window.saveAll;
    if(typeof oldSaveAll === 'function' && !oldSaveAll.__finalUnifiedCloudSyncV2){
      window.saveAll = function(){
        const result = oldSaveAll.apply(this, arguments);
        queueUpload(false);
        return result;
      };
      window.saveAll.__finalUnifiedCloudSyncV2 = true;
    }
  }

  function addCloudStatusButton(){
    try{
      document.querySelectorAll('#completeSiteSyncBtn,#manualFullSiteSyncBtn,#forceInvoiceCloudSyncBtn,#finalCloudSyncBtn').forEach(function(x){ x.remove(); });
      const nav = document.querySelector('.top-navbar > div') || document.querySelector('.top-navbar');
      if(!nav || document.getElementById('finalCloudSyncBtnV2')) return;
      const btn = document.createElement('button');
      btn.id = 'finalCloudSyncBtnV2';
      btn.type = 'button';
      btn.className = 'btn btn-secondary';
      btn.innerHTML = '☁️ حفظ/تحديث';
      btn.title = 'حفظ وتنزيل آخر بيانات من Supabase';
      btn.onclick = async function(e){ e.preventDefault(); await uploadCloud(true); await downloadCloud(true); };
      nav.insertBefore(btn, nav.firstChild);
    }catch(e){}
  }

  async function bootSync(){
    if(bootDone) return;
    patchSaveAll();
    addCloudStatusButton();
    if(!hasSupabase()){
      bootDone = true;
      notify('⚠️ Supabase غير جاهز، سيتم الحفظ محلياً مؤقتاً', '#f59e0b');
      return;
    }
    try{
      if(localStorage.getItem('erp_force_empty_cloud_once') === '1'){
        await uploadCloud(true);
        localStorage.removeItem('erp_force_empty_cloud_once');
        notify('✅ تم تجهيز النظام كنسخة جديدة فارغة', '#10b981');
        bootDone = true;
        return;
      }
      const row = await getCloudRow();
      if(row && row.data){
        applyState(row.data);
        lastRemoteUpdatedAt = String(row.updated_at || '');
        try{ localStorage.setItem('erp_cloud_state_updated_at', lastRemoteUpdatedAt); }catch(e){}
        notify('✅ تم تحميل بيانات السحابة', '#10b981');
      }else if(hasUsefulLocalData()){
        await uploadCloud(true);
      }
    }catch(err){
      const msg = String(err && (err.message || err) || '');
      console.warn('Boot cloud sync failed:', err);
      notify('⚠️ فشل فحص المزامنة السحابية: ' + msg, '#f59e0b');
    }
    bootDone = true;
  }

  window.finalCloudSaveNow = function(){ return uploadCloud(true); };
  window.finalCloudLoadNow = function(){ return downloadCloud(true); };
  window.syncCompleteSiteNow = async function(show){ await uploadCloud(!!show); return downloadCloud(!!show); };
  window.syncFullSiteNow = window.syncCompleteSiteNow;
  window.syncInvoicesNow = window.syncCompleteSiteNow;
  window.autoSyncNow = window.syncCompleteSiteNow;

  document.addEventListener('DOMContentLoaded', function(){
    patchSaveAll();
    setTimeout(addCloudStatusButton, 600);
    setTimeout(bootSync, 1800);
  });

  window.addEventListener('load', function(){
    patchSaveAll();
    setTimeout(addCloudStatusButton, 700);
    setTimeout(bootSync, 2200);
  });

  document.addEventListener('visibilitychange', function(){ if(!document.hidden && bootDone) downloadCloud(false); });
  setInterval(function(){ if(bootDone) downloadCloud(false); }, POLL_MS);
})();

<script id="fakhr-nizwa-v19-delete-customer-stability-final">
(function(){

  function isEn(){ try{return currentLang === 'en';}catch(e){return localStorage.getItem('erp_lang') === 'en';} }
  function L(ar,en){ return isEn() ? en : ar; }
  function esc(v){ return String(v == null ? '' : v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  function notify(msg,color){ try{ if(typeof showNotification === 'function') showNotification(msg,color||'#10b981'); else if(window.showSupabaseToast) window.showSupabaseToast(msg,color||'#10b981'); else console.log(msg); }catch(e){ console.log(msg); } }
  function same(a,b){ return String(a) === String(b) || Number(a) === Number(b); }
  function getId(el){ return el && (el.dataset.id || el.getAttribute('data-id') || el.dataset.username || el.getAttribute('data-username') || el.dataset.employeeId || el.getAttribute('data-employee-id') || ''); }
  function readArray(name){ try{ var arr = eval(name); return Array.isArray(arr) ? arr : []; }catch(e){ try{return Array.isArray(window[name]) ? window[name] : [];}catch(_){return [];} } }
  function writeArray(name, arr){ arr = Array.isArray(arr) ? arr : []; try{ eval(name + ' = arr'); }catch(e){ try{ window[name] = arr; }catch(_){} } }
  function saveLocal(){ try{ if(typeof saveAll === 'function') saveAll(); }catch(e){ console.error('saveAll failed:', e); } }
  function rerender(){ try{ if(typeof renderCurrentTab === 'function') renderCurrentTab(); }catch(e){ console.error('render failed:', e); } }
  function storageKey(name){
    return {
      products:'erp_products', rawMaterials:'erp_raw_materials', customers:'erp_customers', invoices:'erp_invoices', contracts:'erp_contracts',
      bankAccounts:'erp_bank_accounts', cashBoxes:'erp_cash_boxes', expenses:'erp_expenses', supplierInvoices:'erp_supplier_invoices',
      liabilities:'erp_liabilities', receipts:'erp_receipts', auditLogs:'erp_audit'
    }[name] || ('erp_' + name);
  }
  function writeLocalArray(name, arr){ try{ localStorage.setItem(storageKey(name), JSON.stringify(Array.isArray(arr)?arr:[])); }catch(e){} }
  function collectState(){
    var names=['products','rawMaterials','customers','invoices','contracts','bankAccounts','cashBoxes','expenses','supplierInvoices','liabilities','receipts','auditLogs'];
    var state={};
    names.forEach(function(n){ state[n] = readArray(n).map(function(x){ return x; }); });
    state.meta = { company:'مؤسسة فخر نزوى', savedAt:new Date().toISOString(), version:'v19-delete-customer-stability-final' };
    return state;
  }
  async function forceSaveCloud(){
    saveLocal();
    try{
      var state = collectState();
      Object.keys(state).forEach(function(k){ if(Array.isArray(state[k])) writeLocalArray(k, state[k]); });
      if(window.supabase && window.supabase.from){
        var now = new Date().toISOString();
        var res = await window.supabase.from('erp_cloud_state').upsert({id:'main', data:state, updated_at:now}, {onConflict:'id'}).select('updated_at').maybeSingle();
        if(res && res.error) throw res.error;
        try{ localStorage.setItem('erp_cloud_state_updated_at', String((res.data && res.data.updated_at) || now)); }catch(e){}
        return true;
      }
    }catch(e){ console.error('Cloud save after delete failed:', e); notify(L('تم الحفظ محليًا لكن فشل الحفظ السحابي','Saved locally, cloud save failed'),'#f59e0b'); }

  var deleteMap = [
    ['deleteProductBtn','products',L('المنتج','product')],
    ['deleteRawMaterialBtn','rawMaterials',L('المادة الخام','raw material')],

    ['deleteCustomerBtn','customers',L('العميل','customer')],
    ['deleteExpenseBtn','expenses',L('المصروف','expense')],
    ['deleteBankBtn','bankAccounts',L('الحساب البنكي','bank account')],
    ['deleteCashBtn','cashBoxes',L('الصندوق النقدي','cash box')],
    ['deleteContractBtn','contracts',L('العقد','contract')],
    ['deleteSupplierInvoiceBtn','supplierInvoices',L('فاتورة المورد','supplier invoice')],
    ['deleteLiabilityBtn','liabilities',L('الدين','liability')],
    ['deleteReceiptBtn','receipts',L('سند القبض','receipt')]

  async function deleteFromArray(arrayName, id, label, silent){

    });
    if(next.length === before){ notify(L('لم يتم العثور على العنصر للحذف','Item was not found'),'#ef4444'); return false; }

    writeLocalArray(arrayName, next);

    rerender();

    modal.innerHTML = '<div class="modal-content" style="max-width:780px">'+

      '<div class="form-group"><label>'+L('اسم العميل بالعربي','Customer name Arabic')+'</label><input id="custNameArV19" value="'+esc(c && (c.name_ar||c.name)||'')+'"></div>'+ 
      '<div class="form-group"><label>'+L('اسم العميل بالإنجليزي','Customer name English')+'</label><input id="custNameEnV19" value="'+esc(c && (c.name_en||c.name)||'')+'"></div>'+

      '<div class="form-group"><label>'+L('البريد الإلكتروني','Email')+'</label><input id="custEmailV19" value="'+esc(c && c.email || '')+'"></div>'+ 
      '<div class="form-group"><label>'+L('عنوان العميل','Customer Address')+'</label><input id="custAddressV19" value="'+esc(c && (c.address||c.customerAddress) || '')+'"></div>'+ 
      '<div class="form-group"><label>'+L('موقع تركيب العمل','Installation / Work Site Location')+'</label><textarea id="custInstallV19" rows="2">'+esc(c && (c.installationLocation||c.workLocation||c.siteLocation) || '')+'</textarea></div>'+ 
      '<div class="form-group"><label>'+L('نوع العميل','Customer Type')+'</label><select id="custTypeV19"><option value="فرد">'+L('فرد','Individual')+'</option><option value="شركة">'+L('شركة','Company')+'</option><option value="مقاول">'+L('مقاول','Contractor')+'</option></select></div>'+ 
      '<div class="form-group"><label>'+L('معلومات العميل / ملاحظات','Customer Info / Notes')+'</label><textarea id="custInfoV19" rows="3">'+esc(c && (c.customerInfo||c.info||c.notes) || '')+'</textarea></div>'+ 
      '<button type="button" class="btn btn-primary" id="saveCustomerV19">'+L('حفظ','Save')+'</button>'+ 
    '</div>';
    document.body.appendChild(modal);
    var type=document.getElementById('custTypeV19'); if(type && c && (c.customerType||c.type)) type.value = c.customerType || c.type;
    document.getElementById('closeCustomerModalV19').onclick=function(){ modal.remove(); };
    document.getElementById('saveCustomerV19').onclick=async function(){
      var name_ar=document.getElementById('custNameArV19').value.trim();

      var row={ id:c?c.id:Date.now(), name_ar:name_ar||name_en, name_en:name_en||name_ar, name:name_ar||name_en,
        phone:document.getElementById('custPhoneV19').value.trim(), email:document.getElementById('custEmailV19').value.trim(),
        address:document.getElementById('custAddressV19').value.trim(), installationLocation:document.getElementById('custInstallV19').value.trim(),
        customerType:document.getElementById('custTypeV19').value, customerInfo:document.getElementById('custInfoV19').value.trim(), notes:document.getElementById('custInfoV19').value.trim() };
      if(c){ Object.assign(c,row); } else { list.unshift(row); }
      writeArray('customers', list); writeLocalArray('customers', list); await forceSaveCloud(); modal.remove(); rerender(); notify(L('تم حفظ بيانات العميل','Customer saved'),'#10b981');
    };
  };
  document.addEventListener('click', function(ev){
    var add = ev.target && ev.target.closest ? ev.target.closest('#addCustomerBtn') : null;
    var edit = ev.target && ev.target.closest ? ev.target.closest('.editCustomerBtn') : null;
    if(!add && !edit) return;
    ev.preventDefault(); ev.stopPropagation(); if(ev.stopImmediatePropagation) ev.stopImmediatePropagation();
    window.openCustomerModal(edit ? getId(edit) : null);
  }, true);

  // تثبيت اللغة في القوائم، ومنها employeePayrollPro.
  var navLabels = {
    employeePayrollPro:[L('الموظفون والرواتب','Employees & Payroll'), 'fas fa-users'],
    smartAlerts:[L('التنبيهات الذكية','Smart Alerts'), 'fas fa-bell']
  };
  function fixNavLabels(){
    try{
      var nav=document.getElementById('navMenu'); if(!nav) return;
      Object.keys(navLabels).forEach(function(tab){
        var li=nav.querySelector('[data-tab="'+tab+'"]'); if(!li) return;
        var span=li.querySelector('span'); if(span) span.textContent=navLabels[tab][0];
      });

  var oldInit = window.initNav || (typeof initNav==='function'?initNav:null);
  if(oldInit && !oldInit.__v19Nav){
    var wrappedInit=function(){ var r=oldInit.apply(this,arguments); fixNavLabels(); return r; };
    wrappedInit.__v19Nav=true; window.initNav=wrappedInit; try{ initNav=wrappedInit; }catch(e){}
  }
  setInterval(fixNavLabels, 1200);
  document.addEventListener('DOMContentLoaded', function(){ setTimeout(fixNavLabels,200); setTimeout(fixNavLabels,900); });

  // منع أي نموذج من إعادة تحميل الصفحة أو الرجوع للوحة المؤشرات بعد الحفظ.

<script>
/* SAFE PATCH: remove HR payroll/attendance menu item only, keep all other features */
(function(){
  'use strict';
  function safeRedirectTab(){

  function install(){

<script>
/* SAFE PATCH: all invoices and converted quotations automatically create/update contracts */
(function(){
  'use strict';
  function n(v){ v=parseFloat(String(v===undefined||v===null?0:v).replace(',', '.')); return isFinite(v)?v:0; }
  function today(){ return new Date().toISOString().slice(0,10); }
  function clone(obj){ try{return JSON.parse(JSON.stringify(obj||{}));}catch(e){return obj;} }
  function notify(msg,color){ try{ if(typeof showNotification==='function') showNotification(msg,color||'#10b981'); }catch(e){} }
  function audit(action, entity, id){ try{ if(typeof addAudit==='function') addAudit(action, entity, id); }catch(e){} }
  function customerOf(inv){ try{ return (customers||[]).find(function(c){return String(c.id)===String(inv.customerId);}); }catch(e){ return null; } }
  function invTotal(inv){ return n(inv.grandTotal!==undefined ? inv.grandTotal : (inv.total!==undefined ? inv.total : inv.amount)); }

  window.ensureContractFromInvoice = function(inv){
    try{
      if(!inv) return null;
      if(String(inv.docType||'invoice') !== 'invoice') return null;
      if(typeof recalcInvoice === 'function') recalcInvoice(inv);
      if(!Array.isArray(contracts)) contracts = [];
      var cust = customerOf(inv);
      var invNo = inv.invoiceNumber || ('INV-' + (inv.id || Date.now()));
      var titleAr = 'عقد تلقائي من الفاتورة ' + invNo;
      var titleEn = 'Auto contract from invoice ' + invNo;
      var existing = contracts.find(function(c){return String(c.sourceInvoiceId||'') === String(inv.id||'');});
      var data = {
        sourceInvoiceId: inv.id,
        sourceType: inv.convertedFromQuotation ? 'quotation_converted_to_invoice' : 'invoice',
        invoiceNumber: invNo,
        customerId: inv.customerId,
        customerName: cust ? (cust.name_ar || cust.name_en || cust.name || '-') : (inv.customerName || '-'),
        projectName: existing && existing.projectName ? existing.projectName : titleAr,
        name_ar: existing && existing.name_ar ? existing.name_ar : titleAr,
        name_en: existing && existing.name_en ? existing.name_en : titleEn,
        date: inv.date || today(),
        total: invTotal(inv),
        paidAmount: n(inv.paidAmount),
        remainingAmount: n(inv.remainingAmount!==undefined ? inv.remainingAmount : Math.max(0, invTotal(inv)-n(inv.paidAmount))),
        status: existing && existing.status ? existing.status : 'active',
        status_ar: existing && existing.status_ar ? existing.status_ar : 'عقد جديد',
        status_en: existing && existing.status_en ? existing.status_en : 'New Contract',
        progress: n(existing && existing.progress),
        items: clone(inv.items || [])
      };
      if(existing){ Object.assign(existing, data); audit('update','contract',existing.id); return existing; }
      var contract = Object.assign({ id: Date.now() + Math.floor(Math.random()*999), contractNumber: 'CTR-' + Date.now(), tasks: [] }, data);
      contracts.unshift(contract);
      audit('create','contract',contract.id);
      return contract;
    }catch(e){ console.error('ensureContractFromInvoice error:', e); return null; }
  };

  window.createContractFromInvoice = window.ensureContractFromInvoice;
  try{ createContractFromInvoice = window.ensureContractFromInvoice; }catch(e){}

  var oldSaveMergedInvoice = window.saveMergedInvoice || (typeof saveMergedInvoice === 'function' ? saveMergedInvoice : null);
  if(oldSaveMergedInvoice && !oldSaveMergedInvoice.__autoContractWrapped){
    var wrappedSave = function(){
      var beforeIds = [];
      try{ beforeIds = (invoices||[]).map(function(i){return String(i.id);}); }catch(e){}
      var result = oldSaveMergedInvoice.apply(this, arguments);
      try{
        var candidate = null;
        if(typeof mergedEditingInvoiceId !== 'undefined' && mergedEditingInvoiceId){
          candidate = (invoices||[]).find(function(i){return String(i.id)===String(mergedEditingInvoiceId);});
        }
        if(!candidate){
          candidate = (invoices||[]).slice().reverse().find(function(i){return beforeIds.indexOf(String(i.id))===-1;}) || (invoices||[]).slice(-1)[0];
        }
        if(candidate && String(candidate.docType||'invoice') === 'invoice'){
          window.ensureContractFromInvoice(candidate);
          if(typeof saveAll === 'function') saveAll();
          notify('تم إرسال الفاتورة إلى العقود تلقائياً', '#10b981');
        }
      }catch(e){ console.error('auto contract after save error:', e); }
      return result;
    };
    wrappedSave.__autoContractWrapped = true;
    window.saveMergedInvoice = wrappedSave;
    try{ saveMergedInvoice = wrappedSave; }catch(e){}
  }

  var oldConvertQuotationToInvoice = window.convertQuotationToInvoice || (typeof convertQuotationToInvoice === 'function' ? convertQuotationToInvoice : null);
  if(oldConvertQuotationToInvoice && !oldConvertQuotationToInvoice.__autoContractWrapped){
    var wrappedConvert = function(id){
      var result = oldConvertQuotationToInvoice.apply(this, arguments);
      try{
        var inv = (invoices||[]).find(function(i){return String(i.id)===String(id);});
        if(inv && String(inv.docType||'') === 'invoice'){
          inv.convertedFromQuotation = inv.convertedFromQuotation || true;
          window.ensureContractFromInvoice(inv);
          if(typeof saveAll === 'function') saveAll();

(function(){

  function today(){ return new Date().toISOString().slice(0,10); }
  function getLS(k, fallback){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):fallback; }catch(e){ return fallback; } }
  function setLS(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

  function setContracts(arr){ try{ contracts = arr; }catch(e){} window.contracts = arr; setLS('erp_contracts', arr); }
  function getWorkshops(){
    var ws=[]; try{ ws = Array.isArray(window.workshops) ? window.workshops : getLS('erp_workshops', []); }catch(e){ ws=[]; }
    if(!ws.length){ ws=[{id:1,name_ar:'ورشة الألمنيوم',name:'ورشة الألمنيوم',managerUsername:'workshop'}]; }

  }
  function getDefaultWorkshop(){
    var ws=getWorkshops();
    return ws.find(function(w){return String(w.managerUsername||w.manager||'')==='workshop';}) || ws[0] || {id:1,name_ar:'ورشة الألمنيوم',managerUsername:'workshop'};
  }
  function customerNameOf(inv){
    try{ var c=(customers||[]).find(function(x){return String(x.id)===String(inv.customerId)}); return c ? (c.name_ar||c.name_en||c.name||'-') : (inv.customerName||'-'); }catch(e){ return inv.customerName||'-'; }
  }

      name_ar: (existing&&existing.name_ar) || ('عقد تلقائي من الفاتورة ' + (inv.invoiceNumber||'')),
      name_en: (existing&&existing.name_en) || ('Auto contract from invoice ' + (inv.invoiceNumber||'')),

      status: existing&&existing.status ? existing.status : 'active',

      status_en: existing&&existing.status_en ? existing.status_en : 'New Contract',
