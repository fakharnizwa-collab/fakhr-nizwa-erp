      '<div class="form-group"><label>'+L('نوع الإجازة','Leave Type')+'</label><select id="hrLeaveType"><option value="annual">'+L('إجازة سنوية','Annual Leave')+'</option><option value="sick">'+L('إجازة مرضية','Sick Leave')+'</option><option value="emergency">'+L('إجازة طارئة','Emergency Leave')+'</option><option value="unpaid">'+L('إجازة بدون راتب','Unpaid Leave')+'</option><option value="other">'+L('إجازة أخرى','Other Leave')+'</option></select></div>'+

  document.head.appendChild(css);
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',ensureHRNav); else ensureHRNav();

})();

<script>

(function(){

  const REMOVED_TABS = ['financialClose','cashierSession'];

        try{ currentTab = 'dashboard'; }catch(e){}
        try{ localStorage.setItem('erp_current_tab','dashboard'); }catch(e){}
      }
    }catch(e){}
  }
  function removeFromArray(arr){
    if(!Array.isArray(arr)) return arr;
    for(let i=arr.length-1;i>=0;i--){
      const item=arr[i]||{};
      const key=item.key||item.id||item.tab||item.name;
      const label=String(item.label||item.title||item.name_ar||item.name_en||'');
      if(REMOVED_TABS.includes(key) || REMOVED_TEXT.some(t=>label.includes(t))){ arr.splice(i,1); }

    return arr;
  }
  function cleanupNav(){
    try{

      ['navItems','menuItems','tabs','NAV_ITEMS','ERP_NAV_ITEMS'].forEach(k=>{ try{ if(Array.isArray(window[k])) removeFromArray(window[k]); }catch(e){} });

  function wrap(name){
    const old=window[name];
    if(typeof old==='function' && !old.__removeCloseCashierWrapped){
      const fn=function(){ safeTab(); const r=old.apply(this,arguments); cleanupNav(); return r; };
      fn.__removeCloseCashierWrapped=true; window[name]=fn; try{ eval(name+' = window["'+name+'"]'); }catch(e){}

  wrap('initNav');

<script>
/* ===== إصلاح الرجوع للوحة المؤشرات بعد حفظ الحضور والأوفر تايم ===== */
(function(){
  'use strict';

  function getActiveTab(){
    try{
      if(typeof currentTab !== 'undefined' && currentTab) return currentTab;
    }catch(e){}
    return window.currentTab || 'dashboard';
  }

  function setActiveTab(tab){
    if(!tab) return;
    window.currentTab = tab;
    try{ currentTab = tab; }catch(e){}
    try{ localStorage.setItem('erp_last_active_tab', tab); }catch(e){}
  }

  document.addEventListener('click', function(ev){
    var item = ev.target && ev.target.closest ? ev.target.closest('.nav-item[data-tab]') : null;
    if(item && item.dataset && item.dataset.tab){
      setActiveTab(item.dataset.tab);
    }
  }, true);

  var oldRender = window.renderCurrentTab || (typeof renderCurrentTab === 'function' ? renderCurrentTab : null);
  window.renderCurrentTab = function(){
    var tab = getActiveTab();
    setActiveTab(tab);
    var main = document.getElementById('mainContent');

    if(tab === 'monthlyAttendance' && typeof window.renderMonthlyAttendance === 'function'){
      if(main){ main.innerHTML = window.renderMonthlyAttendance(); }
      return;
    }

    if(tab === 'overtimeSchedule' && typeof window.renderOvertimeSchedule === 'function'){
      if(main){ main.innerHTML = window.renderOvertimeSchedule(); }
      return;
    }

    if(oldRender) return oldRender.apply(this, arguments);
  };
  try{ renderCurrentTab = window.renderCurrentTab; }catch(e){}

  function keepSameTab(fnName, tabName){
    var oldFn = window[fnName];
    if(typeof oldFn !== 'function' || oldFn.__keepSameTabFixed) return;
    window[fnName] = function(){
      setActiveTab(tabName);
      var result = oldFn.apply(this, arguments);
      setActiveTab(tabName);
      setTimeout(function(){
        setActiveTab(tabName);
        try{ window.renderCurrentTab(); }catch(e){}
      }, 0);
      return result;
    };
    window[fnName].__keepSameTabFixed = true;
  }

  keepSameTab('saveAttendanceDayForEmployee', 'monthlyAttendance');
  keepSameTab('saveSelectedWorkerMonth', 'monthlyAttendance');
  keepSameTab('attachExcuseForEmployeeDay', 'monthlyAttendance');
  keepSameTab('addOvertimeSchedule', 'overtimeSchedule');
  keepSameTab('deleteOvertimeSchedule', 'overtimeSchedule');
  keepSameTab('markOvertimeDone', 'overtimeSchedule');

  try{
    var last = localStorage.getItem('erp_last_active_tab');
    if(last === 'monthlyAttendance' || last === 'overtimeSchedule') setActiveTab(last);
  }catch(e){}
})();
</script>
<script>
/* ===== إصلاح نهائي: منع كشف الحضور الشهري من الرجوع للوحة المؤشرات عند أي اختيار أو إضافة ===== */
(function(){
  'use strict';

  function isMonthlyAttendanceElement(el){
    if(!el || !el.closest) return false;
    return !!el.closest('#monthlyAttendanceEmployeeSelect, #monthlyAttendanceMonthInput, #addMonthlyEmployeeBtn, .attendanceStatusInput, .attendanceAttachmentInput, .attendanceExcuseInput');
  }

  function setMonthlyTab(){
    try{ window.currentTab = 'monthlyAttendance'; }catch(e){}
    try{ currentTab = 'monthlyAttendance'; }catch(e){}
    try{ localStorage.setItem('erp_last_active_tab','monthlyAttendance'); }catch(e){}
    try{ localStorage.setItem('erp_force_monthly_attendance','1'); }catch(e){}
  }

  function setTab(tab){
    try{ window.currentTab = tab; }catch(e){}
    try{ currentTab = tab; }catch(e){}
    try{ localStorage.setItem('erp_last_active_tab',tab); }catch(e){}
    if(tab !== 'monthlyAttendance'){
      try{ localStorage.removeItem('erp_force_monthly_attendance'); }catch(e){}
    }
  }

  function shouldRenderMonthly(){
    try{ if(typeof currentTab !== 'undefined' && currentTab === 'monthlyAttendance') return true; }catch(e){}
    try{ if(window.currentTab === 'monthlyAttendance') return true; }catch(e){}
    try{ if(localStorage.getItem('erp_force_monthly_attendance') === '1') return true; }catch(e){}
    return false;
  }

  function renderMonthlyNow(){
    var main = document.getElementById('mainContent');
    if(main && typeof window.renderMonthlyAttendance === 'function'){
      setMonthlyTab();
      main.innerHTML = window.renderMonthlyAttendance();
      markMonthlyNavActive();
      return true;
    }
    return false;
  }

  function markMonthlyNavActive(){
    try{
      document.querySelectorAll('.nav-item').forEach(function(item){
        item.classList.toggle('active', item.dataset && item.dataset.tab === 'monthlyAttendance');
      });
    }catch(e){}
  }

  // عند الضغط على أي تبويب آخر نلغي تثبيت كشف الحضور، وعند الضغط عليه نثبته
  document.addEventListener('click', function(ev){
    var nav = ev.target && ev.target.closest ? ev.target.closest('.nav-item[data-tab]') : null;
    if(nav && nav.dataset && nav.dataset.tab){
      setTab(nav.dataset.tab);
      return;
    }
    if(isMonthlyAttendanceElement(ev.target)){
      setMonthlyTab();
    }
  }, true);

  // قبل أي تغيير داخل كشف الحضور، ثبت الصفحة الحالية
  document.addEventListener('change', function(ev){
    if(isMonthlyAttendanceElement(ev.target)) setMonthlyTab();
  }, true);
  document.addEventListener('input', function(ev){
    if(isMonthlyAttendanceElement(ev.target)) setMonthlyTab();
  }, true);

  // غلاف قوي للرندر: إذا نحن داخل كشف الحضور، لا يسمح بالرجوع للوحة المؤشرات
  var previousRender = window.renderCurrentTab || (typeof renderCurrentTab === 'function' ? renderCurrentTab : null);
  window.renderCurrentTab = function(){
    if(shouldRenderMonthly()){
      if(renderMonthlyNow()) return;
    }
    if(previousRender) return previousRender.apply(this, arguments);
  };
  try{ renderCurrentTab = window.renderCurrentTab; }catch(e){}

  // إصلاح initNav: بعض نسخ القائمة تحذف monthlyAttendance وتعيد currentTab للوحة المؤشرات
  var previousInitNav = window.initNav || (typeof initNav === 'function' ? initNav : null);
  window.initNav = function(){
    var wasMonthly = shouldRenderMonthly();
    if(previousInitNav) previousInitNav.apply(this, arguments);

    var nav = document.getElementById('navMenu');
    if(nav && !nav.querySelector('[data-tab="monthlyAttendance"]')){
      var li = document.createElement('li');
      li.className = 'nav-item';
      li.dataset.tab = 'monthlyAttendance';
      li.innerHTML = '<i class="fas fa-calendar-check"></i><span>كشف الحضور الشهري</span>';
      li.onclick = function(){ setMonthlyTab(); renderMonthlyNow(); window.initNav(); };
      nav.appendChild(li);
    }

    if(wasMonthly){
      setMonthlyTab();
      markMonthlyNavActive();
    }
  };
  try{ initNav = window.initNav; }catch(e){}

  // إعادة تغليف الدوال التي قد تستدعي renderCurrentTab من الداخل
  ['saveAttendanceDayForEmployee','saveSelectedWorkerMonth','attachExcuseForEmployeeDay','saveMonthlyAttendance'].forEach(function(name){
    var old = window[name];
    if(typeof old === 'function' && !old.__monthlyStayFixed){
      window[name] = function(){
        setMonthlyTab();
        var res = old.apply(this, arguments);
        setMonthlyTab();
        setTimeout(renderMonthlyNow, 0);
        return res;
      };
      window[name].__monthlyStayFixed = true;
    }
  });
})();
</script>

function rec(empId,date){loadRecords();var r=(window.attendanceRecords||[]).find(function(x){return String(x.employeeId)===String(empId)&&x.date===date});if(!r){var fri=isFriday(date);r={id:Date.now()+Math.floor(Math.random()*9999),employeeId:String(empId),date:date,month:dateMonth(date),status:fri?'leave':'present',workType:'normal',inMorning:fri?'00:00':WORK_START_1,outMorning:fri?'00:00':WORK_END_1,inAfternoon:fri?'00:00':WORK_START_2,outAfternoon:fri?'00:00':WORK_END_2,excuseText:'',attachmentName:'',attachmentData:'',deduction:0,overtimeMinutes:0,updatedAt:new Date().toISOString()};window.attendanceRecords.push(r)}if(isFriday(date)){['inMorning','outMorning','inAfternoon','outAfternoon'].forEach(function(k){if(!r[k])r[k]='00:00'});if(fridayWorkedMinutes(r)<=0){r.status='leave';r.deduction=0;r.deductionReason='الجمعة إجازة - وقت الدخول والخروج 00:00';r.overtimeMinutes=0;r.overtimePay=0}}return r}
function dayDed(emp){var salary=n(emp&&(emp.monthlySalary||emp.salary));return n(emp&&emp.dailyDeduction)||(salary?salary/30:0)}

    dashboard:['الرئيسية','Dashboard'], products:['المنتجات المصنعة','Manufactured Products'], inventory:['مخزون المواد الخام','Raw Materials Inventory'], invoices:['الفواتير','Invoices'], contracts:['العقود','Contracts'], customers:['العملاء','Customers'], expenses:['المصروفات','Expenses'], bankAccounts:['الحسابات البنكية','Bank Accounts'], cashBoxes:['الصناديق النقدية','Cash Boxes'], supplierInvoices:['فواتير الموردين','Supplier Invoices'], liabilities:['ديون الشركة','Company Debts'], receipts:['سندات القبض','Receipts'], reports:['التقارير','Reports'], financialReports:['التقارير المالية','Financial Reports'], users:['المستخدمون والصلاحيات','Users & Permissions'], settings:['الإعدادات','Settings'], monthlyAttendance:['كشف الحضور الشهري','Monthly Attendance'], overtimeSchedule:['الأوفر تايم والتركيب','Overtime & Installation'], workshopOrders:['أوامر إدارة الورش','Workshop Orders'], workshopPortal:['لوحة الورشة','Workshop Panel'], workshopsManagement:['إدارة الورش','Workshop Management'], evaluations:['تقييم الموظفين','Employee Evaluations'], advancedWarehouse:['المستودع المتقدم','Advanced Warehouse'], accountingDashboard:['لوحة المحاسب','Accountant Dashboard'], accountingCenter:['مركز القيود المحاسبية','Accounting Entries Center'], taxReport:['تقرير الضريبة','VAT Report'], ledger:['دفتر الحركة','Ledger']
  };
  function en(){ try{return currentLang==='en';}catch(e){return false;} }
  function L(ar,enText){ return en()?enText:ar; }
  function esc(v){ return String(v==null?'':v).replace(/[&<>'"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c];}); }
  function permText(p){ return p==='crud'?L('كامل','Full'):p==='view'?L('مشاهدة','View'):L('لا يوجد','None'); }
  function roleText(role){
    var m={super_admin:['مدير عام','Super Admin'],admin:['مدير النظام','System Admin'],accountant:['محاسب','Accountant'],sales:['مبيعات','Sales'],warehouse:['مستودع','Warehouse'],viewer:['مشاهد','Viewer'],workshop_manager:['مسؤول الورشة','Workshop Manager'],custom:['مخصص','Custom']};
    return (m[role]?(en()?m[role][1]:m[role][0]):role);
  }
  function defaultPerms(role){
    try{ return Object.assign({}, permissions[role] || {}); }catch(e){ return {}; }
  }
  function normalizeUser(u){
    u.id = u.id || Date.now();
    u.username = String(u.username||'').trim();
    u.password = String(u.password||'');
    u.role = u.role || 'viewer';
    u.name_ar = u.name_ar || u.name_en || u.username;
    u.name_en = u.name_en || u.name_ar || u.username;
    u.email = u.email || '';
    u.status = u.status || 'active';
    u.permissions = Object.assign(defaultPerms(u.role), u.permissions || {});
    return u;
  }
  function loadManagedUsers(){
    try{
      var saved = JSON.parse(localStorage.getItem(USER_STORAGE_KEY) || 'null');
      var savedPerms = JSON.parse(localStorage.getItem(PERM_STORAGE_KEY) || '{}');
      if(Array.isArray(saved) && saved.length){
        USERS.splice(0, USERS.length);
        saved.forEach(function(u){ USERS.push(normalizeUser(u)); });
      } else {
        USERS.forEach(normalizeUser);
      }
      USERS.forEach(function(u){ if(savedPerms[u.username]) u.permissions = Object.assign(defaultPerms(u.role), savedPerms[u.username]); });
      if(!USERS.some(function(u){return u.username==='superadmin';})){
        USERS.unshift(normalizeUser({id:1,username:'superadmin',password:'super123',role:'super_admin',name_ar:'المدير العام',name_en:'Super Admin',email:'super@fakhr.com',status:'active'}));
      }
      saveManagedUsers();
    }catch(e){ console.warn('Managed users load failed', e); }
  }
  function saveManagedUsers(){
    try{
      USERS.forEach(normalizeUser);
      localStorage.setItem(USER_STORAGE_KEY, JSON.stringify(USERS));
      var ps={}; USERS.forEach(function(u){ ps[u.username]=u.permissions||defaultPerms(u.role); });
      localStorage.setItem(PERM_STORAGE_KEY, JSON.stringify(ps));
    }catch(e){ console.warn('Managed users save failed', e); }
  }
  loadManagedUsers();

  window.hasPermission = hasPermission = function(module, action){
    action = action || 'view';
    if(!currentUser) return false;
    if(module === 'dashboard') return true;
    var userPerms = currentUser.permissions || {};
    var rolePerms = (permissions[currentUser.role] || {});
    var perm = userPerms[module] || rolePerms[module] || 'none';
    if(perm === 'crud') return true;
    if(perm === 'view' && action === 'view') return true;
    return false;
  };

  window.renderUsersPage = renderUsersPage = function(){
    if(!hasPermission('users')) return '<div class="section-card">⛔ '+L('غير مصرح لك بهذه الصفحة','You are not authorized to view this page')+'</div>';
    var html = '<div class="section-card"><div class="section-header"><h3>👥 '+L('إدارة المستخدمين والصلاحيات','Users & Permissions')+'</h3><button id="addUserBtn" class="btn btn-primary">+ '+L('إضافة مستخدم','Add User')+'</button></div>';
    html += '<p style="color:var(--gray-500);margin-bottom:14px;">'+L('يمكنك إضافة مستخدم جديد، تعديل بياناته، تغيير كلمة المرور، وتحديد صلاحياته لكل قسم.','You can add users, edit their details, change passwords, and set permissions for each module.')+'</p>';
    html += '<div style="overflow-x:auto;"><table class="table"><thead><tr><th>'+L('اسم المستخدم','Username')+'</th><th>'+L('الاسم','Name')+'</th><th>'+L('الصلاحية الأساسية','Base Role')+'</th><th>'+L('الحالة','Status')+'</th><th>'+L('صلاحيات مخصصة','Custom Permissions')+'</th><th>'+L('إجراءات','Actions')+'</th></tr></thead><tbody>';
    USERS.forEach(function(u){
      var active = u.status !== 'inactive';
      var pcount = Object.keys(u.permissions||{}).filter(function(k){return (u.permissions||{})[k] && (u.permissions||{})[k] !== 'none';}).length;
      html += '<tr><td>'+esc(u.username)+'</td><td>'+esc(en()?u.name_en:u.name_ar)+'</td><td>'+roleText(u.role)+'</td><td><span class="badge '+(active?'badge-success':'badge-danger')+'">'+(active?L('نشط','Active'):L('موقوف','Inactive'))+'</span></td><td>'+pcount+' '+L('قسم','modules')+'</td><td><button class="editUserBtn btn btn-sm btn-secondary" data-username="'+esc(u.username)+'">'+L('تعديل','Edit')+'</button> <button class="deleteUserManagedBtn btn btn-sm btn-danger" data-username="'+esc(u.username)+'" '+(u.username==='superadmin'?'disabled':'')+'>'+L('حذف','Delete')+'</button></td></tr>';
    });
    html += '</tbody></table></div></div>';
    return html;
  };

  function permissionSelect(module, value){
    value = value || 'none';
    return '<select class="userPermSelect" data-module="'+module+'"><option value="none" '+(value==='none'?'selected':'')+'>'+L('لا يوجد','None')+'</option><option value="view" '+(value==='view'?'selected':'')+'>'+L('مشاهدة','View')+'</option><option value="crud" '+(value==='crud'?'selected':'')+'>'+L('كامل إضافة/تعديل/حذف','Full Add/Edit/Delete')+'</option></select>';
  }
  function openUserModal(username){
    var old = username ? USERS.find(function(u){return u.username===username;}) : null;
    var u = old ? JSON.parse(JSON.stringify(old)) : normalizeUser({role:'viewer',status:'active',permissions:defaultPerms('viewer')});
    var roleOptions = ['super_admin','admin','accountant','sales','warehouse','viewer','workshop_manager','custom'].map(function(r){return '<option value="'+r+'" '+(u.role===r?'selected':'')+'>'+roleText(r)+'</option>';}).join('');
    var html = '<div id="userModal" class="modal" style="display:flex;"><div class="modal-content" style="max-width:920px;"><h3>'+ (old?L('تعديل مستخدم','Edit User'):L('إضافة مستخدم جديد','Add New User')) +'</h3>';
    html += '<div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;">';
    html += '<div class="form-group"><label>'+L('اسم المستخدم','Username')+'</label><input id="umUsername" value="'+esc(u.username)+'" '+(old?'readonly':'')+'></div>';
    html += '<div class="form-group"><label>'+L('كلمة المرور','Password')+'</label><input id="umPassword" type="text" value="'+esc(u.password)+'"></div>';
    html += '<div class="form-group"><label>'+L('الاسم بالعربي','Arabic Name')+'</label><input id="umNameAr" value="'+esc(u.name_ar)+'"></div>';
    html += '<div class="form-group"><label>'+L('الاسم بالإنجليزي','English Name')+'</label><input id="umNameEn" value="'+esc(u.name_en)+'"></div>';
    html += '<div class="form-group"><label>'+L('البريد الإلكتروني','Email')+'</label><input id="umEmail" value="'+esc(u.email)+'"></div>';
    html += '<div class="form-group"><label>'+L('الصلاحية الأساسية','Base Role')+'</label><select id="umRole">'+roleOptions+'</select></div>';
    html += '<div class="form-group"><label>'+L('الحالة','Status')+'</label><select id="umStatus"><option value="active" '+(u.status!=='inactive'?'selected':'')+'>'+L('نشط','Active')+'</option><option value="inactive" '+(u.status==='inactive'?'selected':'')+'>'+L('موقوف','Inactive')+'</option></select></div>';
    html += '</div>';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin:12px 0;"><h4>'+L('صلاحيات الأقسام','Module Permissions')+'</h4><div><button id="applyRolePermsBtn" class="btn btn-secondary btn-sm">'+L('تطبيق صلاحيات الدور','Apply Role Permissions')+'</button> <button id="clearPermsBtn" class="btn btn-secondary btn-sm">'+L('إلغاء كل الصلاحيات','Clear All')+'</button></div></div>';
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px;max-height:360px;overflow:auto;border:1px solid var(--gray-200);border-radius:18px;padding:12px;">';
    MODULES.forEach(function(m){ var pair=MODULE_NAMES[m]||[m,m]; html += '<div style="background:var(--gray-100);padding:10px;border-radius:14px;"><label style="font-weight:700">'+(en()?pair[1]:pair[0])+'</label>'+permissionSelect(m, (u.permissions||{})[m])+'</div>'; });
    html += '</div>';
    html += '<div style="margin-top:16px;display:flex;gap:10px;justify-content:flex-end;"><button id="saveUserModalBtn" class="btn btn-primary">'+L('حفظ','Save')+'</button><button id="closeUserModalBtn" class="btn btn-secondary">'+L('إلغاء','Cancel')+'</button></div>';
    html += '</div></div>';
    document.body.insertAdjacentHTML('beforeend', html);
    var modal=document.getElementById('userModal');
    function setPerms(p){ modal.querySelectorAll('.userPermSelect').forEach(function(s){s.value=(p||{})[s.dataset.module]||'none';}); }
    modal.querySelector('#applyRolePermsBtn').onclick=function(e){ e.preventDefault(); setPerms(defaultPerms(modal.querySelector('#umRole').value)); };
    modal.querySelector('#clearPermsBtn').onclick=function(e){ e.preventDefault(); setPerms({}); };
    modal.querySelector('#closeUserModalBtn').onclick=function(){ modal.remove(); };
    modal.querySelector('#saveUserModalBtn').onclick=function(){
      var username=modal.querySelector('#umUsername').value.trim();
      var password=modal.querySelector('#umPassword').value.trim();
      if(!username || !password){ showNotification(L('اكتب اسم المستخدم وكلمة المرور','Enter username and password'),'#ef4444'); return; }
      if(!old && USERS.some(function(x){return x.username.toLowerCase()===username.toLowerCase();})){ showNotification(L('اسم المستخدم موجود مسبقاً','Username already exists'),'#ef4444'); return; }
      var perms={}; modal.querySelectorAll('.userPermSelect').forEach(function(s){ perms[s.dataset.module]=s.value; });
      var data=normalizeUser({ id: old?old.id:Date.now(), username:username, password:password, role:modal.querySelector('#umRole').value, name_ar:modal.querySelector('#umNameAr').value.trim()||username, name_en:modal.querySelector('#umNameEn').value.trim()||username, email:modal.querySelector('#umEmail').value.trim(), status:modal.querySelector('#umStatus').value, permissions:perms });
      if(old){ Object.assign(old, data); if(currentUser && currentUser.username===old.username) currentUser=old; }
      else USERS.push(data);
      saveManagedUsers(); modal.remove(); try{ initNav(); }catch(e){} renderCurrentTab(); showNotification(L('تم حفظ المستخدم والصلاحيات','User and permissions saved'),'#10b981');
    };
  }

  document.addEventListener('click', function(e){
    var add=e.target.closest && e.target.closest('#addUserBtn');
    var edit=e.target.closest && e.target.closest('.editUserBtn');
    var del=e.target.closest && e.target.closest('.deleteUserManagedBtn, .deleteUserBtn');
    if(add){ e.preventDefault(); e.stopImmediatePropagation(); openUserModal(); return; }
    if(edit){ e.preventDefault(); e.stopImmediatePropagation(); openUserModal(edit.dataset.username); return; }
    if(del){
      e.preventDefault(); e.stopImmediatePropagation();
      var username=del.dataset.username;
      if(username==='superadmin'){ showNotification(L('لا يمكن حذف المدير العام','Super admin cannot be deleted'),'#ef4444'); return; }
      if(currentUser && currentUser.username===username){ showNotification(L('لا يمكنك حذف المستخدم الحالي','You cannot delete the current user'),'#ef4444'); return; }
      if(confirm(L('هل تريد حذف هذا المستخدم؟','Delete this user?'))){
        var idx=USERS.findIndex(function(u){return u.username===username;}); if(idx>=0) USERS.splice(idx,1);
        saveManagedUsers(); renderCurrentTab(); showNotification(L('تم حذف المستخدم','User deleted'),'#ef4444');
      }
    }
  }, true);

  function managedLogin(){
    var username=(document.getElementById('loginUsername')||{}).value || '';
    var password=(document.getElementById('loginPassword')||{}).value || '';
    username=username.trim().toLowerCase(); password=password.trim();
    loadManagedUsers();
    var user=USERS.find(function(u){return String(u.username).toLowerCase()===username && String(u.password)===password;});
    if(user && user.status === 'inactive'){
      document.getElementById('loginError').innerHTML='<i class="fas fa-exclamation-circle"></i> '+L('هذا المستخدم موقوف','This user is inactive'); return;
    }
    if(user){
      currentUser=user; localStorage.setItem('erp_current_user', JSON.stringify(user));
      document.getElementById('loginScreen').style.display='none'; document.getElementById('app').style.display='block';
      try{ loadData(); initNav(); renderCurrentTab(); }catch(e){ console.error(e); }
      showNotification(L('مرحباً','Welcome')+' '+(en()?user.name_en:user.name_ar),'#10b981');
    }else{
      document.getElementById('loginError').innerHTML='<i class="fas fa-exclamation-circle"></i> '+L('اسم المستخدم أو كلمة المرور غير صحيحة','Invalid username or password');
    }
  }
  window.login = login = managedLogin;
  document.addEventListener('click', function(e){ if(e.target && e.target.id==='doLoginBtn'){ e.preventDefault(); e.stopImmediatePropagation(); managedLogin(); } }, true);
  document.addEventListener('keypress', function(e){ if(e.target && e.target.id==='loginPassword' && e.key==='Enter'){ e.preventDefault(); e.stopImmediatePropagation(); managedLogin(); } }, true);
  var oldInitNav = window.initNav || (typeof initNav==='function'?initNav:null);
  if(oldInitNav){ window.initNav = initNav = function(){ loadManagedUsers(); return oldInitNav.apply(this, arguments); }; }
})();
</script>
<script>
(function(){
  'use strict';
  function lang(){ return window.currentLang || currentLang || 'ar'; }
  function L(ar,en){ return lang()==='en' ? en : ar; }
  function esc(v){ return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  function num(v){ v=parseFloat(String(v||0).replace(',','.')); return isNaN(v)?0:v; }
  function money(v){ return num(v).toFixed(2)+' '+L('ريال','OMR'); }
  function today(){ return new Date().toISOString().slice(0,10); }
  function currentYear(){ return new Date().getFullYear(); }
  function notify(msg,bg){ if(typeof showNotification==='function') showNotification(msg,bg||'#10b981'); else alert(msg); }
  function audit(action, entity, id){ try{ if(typeof addAudit==='function') addAudit(action,entity,id); }catch(e){} }
  function ensureArrays(){
    window.employees = Array.isArray(window.employees) ? window.employees : [];
    window.workshops = Array.isArray(window.workshops) ? window.workshops : [];
    window.employeeLeaves = Array.isArray(window.employeeLeaves) ? window.employeeLeaves : [];
    if(!window.workshops.length){ window.workshops.push({id:1,name:'الورشة الأولى',name_en:'Workshop 1'},{id:2,name:'الورشة الثانية',name_en:'Workshop 2'}); }
    try{
      var leaves=JSON.parse(localStorage.getItem('erp_employee_leaves')||'[]');
      if(Array.isArray(leaves) && leaves.length) window.employeeLeaves=leaves;
    }catch(e){}
    try{
      var stored=JSON.parse(localStorage.getItem('erp_employees')||'[]');
      if(Array.isArray(stored) && stored.length) window.employees=stored;
    }catch(e){}
    try{
      var ws=JSON.parse(localStorage.getItem('erp_workshops')||'[]');
      if(Array.isArray(ws) && ws.length) window.workshops=ws;
    }catch(e){}
    window.employees.forEach(normalizeEmployee);
  }
  function saveEmployeesRegistry(){
    ensureArrays();
    try{ localStorage.setItem('erp_employees', JSON.stringify(window.employees)); }catch(e){}
    try{ localStorage.setItem('erp_workshops', JSON.stringify(window.workshops)); }catch(e){}
    try{ localStorage.setItem('erp_employee_leaves', JSON.stringify(window.employeeLeaves)); }catch(e){}
    try{ if(typeof saveAll==='function') saveAll(); }catch(e){}
  }
  function normalizeEmployee(e){
    if(!e.id) e.id=Date.now()+Math.random();
    if(!e.name) e.name=e.name_ar||e.name_en||L('موظف','Employee');
    if(!e.name_ar) e.name_ar=e.name;
    if(!e.name_en) e.name_en=e.name;
    if(!e.jobTitle) e.jobTitle=e.role||'عامل';
    if(!e.jobTitle_en) e.jobTitle_en=e.jobTitle;
    if(e.monthlySalary==null) e.monthlySalary=0;
    if(e.dailyDeduction==null) e.dailyDeduction=num(e.monthlySalary)/30;
    if(e.hourlyRate==null) e.hourlyRate=num(e.monthlySalary)/30/9;
    if(e.workshopId==null) e.workshopId=(window.workshops&&window.workshops[0]&&window.workshops[0].id)||'';
    if(e.isWorkshopManager==null) e.isWorkshopManager=false;
    if(!Array.isArray(e.managedEmployeeIds)) e.managedEmployeeIds=[];
    if(e.annualLeaveMonths==null) e.annualLeaveMonths=1;
    if(e.plannedLeaveYear==null) e.plannedLeaveYear=currentYear();
    if(!e.leaveStart) e.leaveStart='';
    if(!e.leaveEnd) e.leaveEnd='';
    if(!e.status) e.status='active';
    return e;
  }
  function employeeName(e){ return lang()==='en' ? (e.name_en||e.name_ar||e.name) : (e.name_ar||e.name||e.name_en); }
  function jobName(e){ return lang()==='en' ? (e.jobTitle_en||e.jobTitle||'-') : (e.jobTitle||e.jobTitle_en||'-'); }
  function workshopName(id){
    var w=(window.workshops||[]).find(function(x){return String(x.id)===String(id);});
    return w ? (lang()==='en' ? (w.name_en||w.name) : (w.name||w.name_en)) : '-';
  }
  function managedNames(e){
    return (e.managedEmployeeIds||[]).map(function(id){ var m=(window.employees||[]).find(function(x){return String(x.id)===String(id);}); return m?employeeName(m):''; }).filter(Boolean).join('، ') || '-';
  }
  function calcLeaveEnd(start, months){
    if(!start) return '';
    var d=new Date(start+'T00:00:00');
    if(isNaN(d.getTime())) return '';
    d.setMonth(d.getMonth()+Math.max(0,num(months)));
    d.setDate(d.getDate()-1);
    return d.toISOString().slice(0,10);
  }
  function openEmployeeModal(id){
    ensureArrays();
    var old=(window.employees||[]).find(function(e){return String(e.id)===String(id);});
    var e=old ? JSON.parse(JSON.stringify(old)) : normalizeEmployee({id:Date.now(),monthlySalary:250,dailyDeduction:250/30,hourlyRate:250/30/9,status:'active',plannedLeaveYear:currentYear(),annualLeaveMonths:1});
    var workshopOptions=(window.workshops||[]).map(function(w){return '<option value="'+esc(w.id)+'" '+(String(e.workshopId)===String(w.id)?'selected':'')+'>'+esc(lang()==='en'?(w.name_en||w.name):(w.name||w.name_en))+'</option>';}).join('');
    var empOptions=(window.employees||[]).filter(function(x){return String(x.id)!==String(e.id);}).map(function(x){return '<option value="'+esc(x.id)+'" '+((e.managedEmployeeIds||[]).map(String).includes(String(x.id))?'selected':'')+'>'+esc(employeeName(x))+'</option>';}).join('');
    var html='';
    html+='<div id="employeeRegistryModal" class="modal" style="display:flex;">';
    html+='<div class="modal-content" style="max-width:980px;">';
    html+='<h3>'+ (old?L('تعديل موظف','Edit Employee'):L('إضافة موظف','Add Employee')) +'</h3>';
    html+='<div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;">';
    html+='<div class="form-group"><label>'+L('اسم الموظف بالعربي','Arabic Employee Name')+'</label><input id="erNameAr" value="'+esc(e.name_ar||e.name)+'"></div>';
    html+='<div class="form-group"><label>'+L('اسم الموظف بالإنجليزي','English Employee Name')+'</label><input id="erNameEn" value="'+esc(e.name_en||e.name)+'"></div>';
    html+='<div class="form-group"><label>'+L('الوظيفة بالعربي','Arabic Job Title')+'</label><input id="erJobAr" value="'+esc(e.jobTitle||e.role||'عامل')+'"></div>';
    html+='<div class="form-group"><label>'+L('الوظيفة بالإنجليزي','English Job Title')+'</label><input id="erJobEn" value="'+esc(e.jobTitle_en||e.jobTitle||'Worker')+'"></div>';
    html+='<div class="form-group"><label>'+L('الراتب الشهري','Monthly Salary')+'</label><input id="erSalary" type="number" step="0.001" value="'+esc(e.monthlySalary)+'"></div>';
    html+='<div class="form-group"><label>'+L('الورشة','Workshop')+'</label><select id="erWorkshop">'+workshopOptions+'</select></div>';

    html+='<div class="form-group"><label>'+L('بداية الإجازة المخططة','Planned Leave Start')+'</label><input id="erLeaveStart" type="date" value="'+esc(e.leaveStart)+'"></div>';
    html+='<div class="form-group"><label>'+L('نهاية الإجازة المخططة','Planned Leave End')+'</label><input id="erLeaveEnd" type="date" value="'+esc(e.leaveEnd||calcLeaveEnd(e.leaveStart,e.annualLeaveMonths))+'"></div>';
    html+='</div><p style="color:var(--gray-500);font-size:13px;">'+L('يمكنك تحديد من سيذهب في الإجازة كل سنة من هنا، وسيظهر في جدول خطة الإجازات.','Set who will go on leave each year here; it will appear in the leave plan table.')+'</p></div>';

    html+='</div></div>';

  function deleteEmployee(id){

    }).join('') || '<tr><td colspan="11">'+L('لا يوجد موظفون بعد','No employees yet')+'</td></tr>';
    var leaveRows=leaves.map(function(l){ var emp=(window.employees||[]).find(function(e){return String(e.id)===String(l.employeeId);}); return '<tr><td>'+esc(emp?employeeName(emp):l.employeeName||'-')+'</td><td>'+esc(workshopName(l.workshopId))+'</td><td>'+esc(l.year)+'</td><td>'+esc(l.months)+' '+L('شهر','month(s)')+'</td><td>'+esc(l.start||'-')+'</td><td>'+esc(l.end||'-')+'</td><td><span class="badge badge-info">'+L('مخططة','Planned')+'</span></td></tr>'; }).join('') || '<tr><td colspan="7">'+L('لا توجد إجازات مخططة لهذه السنة','No planned leaves for this year')+'</td></tr>';
    return '<div class="section-card"><div class="section-header"><h2>👥 '+L('الموظفين','Employees')+'</h2><div><button class="btn btn-secondary" onclick="addWorkshopInline()">+ '+L('ورشة','Workshop')+'</button> <button class="btn btn-primary" onclick="openEmployeeModal()">+ '+L('موظف','Employee')+'</button></div></div>'+
      '<div class="stats-grid"><div class="stat-card"><div class="stat-title">'+L('عدد الموظفين النشطين','Active Employees')+'</div><div class="stat-value">'+active+'</div></div><div class="stat-card"><div class="stat-title">'+L('مسؤولو الورش','Workshop Managers')+'</div><div class="stat-value">'+managers+'</div></div><div class="stat-card"><div class="stat-title">'+L('إجمالي الرواتب الشهرية','Total Monthly Salaries')+'</div><div class="stat-value">'+money(salaryTotal)+'</div></div><div class="stat-card"><div class="stat-title">'+L('إجازات مخططة للسنة','Planned Leaves')+'</div><div class="stat-value">'+leaves.length+'</div></div></div>'+
      '<div class="section-card"><h3>📋 '+L('سجل الموظفين','Employee Register')+'</h3><div style="overflow-x:auto"><table class="table"><thead><tr><th>'+L('الموظف','Employee')+'</th><th>'+L('الوظيفة','Job')+'</th><th>'+L('الورشة','Workshop')+'</th><th>'+L('الراتب الشهري','Monthly Salary')+'</th><th>'+L('أجر الساعة','Hourly Rate')+'</th><th>'+L('مسؤول ورشة','Manager')+'</th><th>'+L('يدير الموظفين','Manages')+'</th><th>'+L('مدة الإجازة','Leave Duration')+'</th><th>'+L('السنة','Year')+'</th><th>'+L('موعد الإجازة','Leave Date')+'</th><th>'+L('إجراءات','Actions')+'</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>'+
      '<div class="section-card"><div class="section-header"><h3>🏖️ '+L('خطة الإجازات السنوية','Annual Leave Plan')+'</h3><input type="number" value="'+esc(y)+'" style="max-width:130px" onchange="localStorage.setItem(\'erp_employee_leave_year\',this.value);renderCurrentTab()"></div><p style="color:var(--gray-500)">'+L('هذه الخانة تحدد من سيذهب في الإجازة كل سنة ومدة الإجازة بالشهور.','This section shows who will go on annual leave each year and the duration in months.')+'</p><div style="overflow-x:auto"><table class="table"><thead><tr><th>'+L('الموظف','Employee')+'</th><th>'+L('الورشة','Workshop')+'</th><th>'+L('السنة','Year')+'</th><th>'+L('المدة','Duration')+'</th><th>'+L('البداية','Start')+'</th><th>'+L('النهاية','End')+'</th><th>'+L('الحالة','Status')+'</th></tr></thead><tbody>'+leaveRows+'</tbody></table></div></div></div>';
  };
  var oldRender = window.renderCurrentTab || (typeof renderCurrentTab==='function'?renderCurrentTab:null);
  if(oldRender){
    window.renderCurrentTab = renderCurrentTab = function(){
      if(window.currentTab === 'employeesRegistry' || currentTab === 'employeesRegistry'){
        var main=document.getElementById('mainContent'); if(main) main.innerHTML=window.renderEmployeesRegistry(); return;
      }
      return oldRender.apply(this, arguments);
    };
  }
  var oldInit = window.initNav || (typeof initNav==='function'?initNav:null);
  if(oldInit){
    window.initNav = initNav = function(){
      ensureArrays();
      var res=oldInit.apply(this, arguments);
      var nav=document.getElementById('navMenu');
      if(nav && !nav.querySelector('[data-tab="employeesRegistry"]')){
        var li=document.createElement('li');
        li.className='nav-item '+(currentTab==='employeesRegistry'?'active':'');
        li.dataset.tab='employeesRegistry';
        li.innerHTML='<i class="fas fa-id-card"></i><span>'+L('سجل الموظفين','Employees Registry')+'</span>';
        li.onclick=function(){ currentTab='employeesRegistry'; window.currentTab='employeesRegistry'; renderCurrentTab(); initNav(); };
        var before=nav.querySelector('[data-tab="monthlyAttendance"]') || nav.querySelector('[data-tab="attendance"]');
        if(before) nav.insertBefore(li,before); else nav.appendChild(li);
      }
      return res;
    };
  }
  document.addEventListener('click', function(ev){
    var add=ev.target.closest && ev.target.closest('#addEmployeeRegistryBtn');
    if(add){ ev.preventDefault(); openEmployeeModal(); }
  });
  ensureArrays(); saveEmployeesRegistry();
})();

<script>
/* ===== Professional Workshop Management Add-on: workshops, managers, employees, raw materials delivery ===== */
(function(){
  'use strict';
  var TAB = 'workshopsManagement';
  function isEn(){ try{return currentLang==='en';}catch(e){return false;} }
  function L(ar,en){ return isEn()?en:ar; }
  function N(v){ v=parseFloat(String(v||0).replace(',','.')); return isNaN(v)?0:v; }
  function esc(v){ return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  function today(){ return new Date().toISOString().slice(0,10); }
  function signer(){ try{return (currentUser && (currentUser.name_ar || currentUser.name_en || currentUser.username)) || '-';}catch(e){return '-';} }
  function ensure(){
    window.workshops = Array.isArray(window.workshops) ? window.workshops : JSON.parse(localStorage.getItem('erp_workshops')||'[]');
    window.workshopMaterialIssues = Array.isArray(window.workshopMaterialIssues) ? window.workshopMaterialIssues : JSON.parse(localStorage.getItem('erp_workshopMaterialIssues')||localStorage.getItem('erp_workshop_material_issues')||'[]');
    window.warehouseMovements = Array.isArray(window.warehouseMovements) ? window.warehouseMovements : JSON.parse(localStorage.getItem('erp_warehouseMovements')||'[]');
    window.employees = Array.isArray(window.employees) ? window.employees : JSON.parse(localStorage.getItem('erp_employees')||'[]');
    window.rawMaterials = Array.isArray(window.rawMaterials) ? window.rawMaterials : (Array.isArray(rawMaterials)?rawMaterials:[]);
    window.workshops.forEach(function(w){
      w.employees = Array.isArray(w.employees)?w.employees:[];
      w.materials = Array.isArray(w.materials)?w.materials:[];
      w.managerId = w.managerId || w.manager || '';
      w.name = w.name || w.name_ar || w.name_en || L('ورشة بدون اسم','Unnamed workshop');
    });
  }
  function persist(){
    ensure();
    try{
      localStorage.setItem('erp_workshops', JSON.stringify(window.workshops));
      localStorage.setItem('erp_workshopMaterialIssues', JSON.stringify(window.workshopMaterialIssues));
      localStorage.setItem('erp_workshop_material_issues', JSON.stringify(window.workshopMaterialIssues));
      localStorage.setItem('erp_warehouseMovements', JSON.stringify(window.warehouseMovements));
      localStorage.setItem('erp_raw_materials', JSON.stringify(window.rawMaterials));
      localStorage.setItem('erp_employees', JSON.stringify(window.employees));
      if(typeof saveAll==='function') saveAll();
    }catch(e){ console.warn(e); }
  }
  function canEdit(){ try{return currentUser && ['super_admin','admin','warehouse'].indexOf(currentUser.role)>-1;}catch(e){return true;} }
  function materialName(id){ var p=(window.rawMaterials||[]).find(function(x){return String(x.id)===String(id)}); return p?(p.name_ar||p.name_en||p.name):'-'; }
  function employeeName(id){ var e=(window.employees||[]).find(function(x){return String(x.id)===String(id)}); return e?(e.name||e.name_ar||e.name_en||e.username):'-'; }
  function workshopName(id){ var w=(window.workshops||[]).find(function(x){return String(x.id)===String(id)}); return w?(w.name||w.name_ar||w.name_en):'-'; }
  function materialStockInWorkshop(w, materialId){ var m=(w.materials||[]).find(function(x){return String(x.materialId)===String(materialId)}); return N(m&&m.qty); }
  function addOrSetWorkshopMaterial(w, materialId, qtyToAdd){
    var m=(w.materials||[]).find(function(x){return String(x.materialId)===String(materialId)});
    if(!m){ m={materialId:materialId, qty:0}; w.materials.push(m); }
    m.qty = N(m.qty) + N(qtyToAdd);
  }
  window.openWorkshopManagementModal = function(id){
    ensure();
    if(!canEdit()){ showNotification(L('لا تملك صلاحية تعديل الورش','You do not have permission to edit workshops'),'#ef4444'); return; }
    var w = id ? window.workshops.find(function(x){return String(x.id)===String(id)}) : null;
    var managers = (window.employees||[]).filter(function(e){return e.isWorkshopManager || e.role==='مسؤول ورشة' || e.job==='مسؤول ورشة' || e.role==='Workshop Manager';});
    if(!managers.length) managers = window.employees||[];
    var selectedEmployees = (w&&w.employees)||[];
    var html = '<div id="workshopManagementModal" class="modal" style="display:flex"><div class="modal-content" style="max-width:760px">'+
      '<h3>🛠️ '+(w?L('تعديل ورشة','Edit Workshop'):L('إضافة ورشة جديدة','Add New Workshop'))+'</h3>'+
      '<div class="form-group"><label>'+L('اسم الورشة','Workshop Name')+'</label><input id="wmName" value="'+esc(w&&w.name)+'" placeholder="'+L('مثال: ورشة الألمنيوم','Example: Aluminum Workshop')+'"></div>'+
      '<div class="form-group"><label>'+L('اختيار مسؤول الورشة','Select Workshop Manager')+'</label><select id="wmManager"><option value="">'+L('بدون مسؤول','No manager')+'</option>'+managers.map(function(e){var eid=e.id||e.username;return '<option value="'+esc(eid)+'" '+(String(w&&w.managerId)===String(eid)?'selected':'')+'>'+esc(e.name||e.name_ar||e.name_en||e.username)+'</option>';}).join('')+'</select></div>'+
      '<div class="form-group"><label>'+L('تحديد الموظفين العاملين في الورشة','Select employees working in the workshop')+'</label><select id="wmEmployees" multiple size="6">'+(window.employees||[]).map(function(e){var eid=e.id||e.username;return '<option value="'+esc(eid)+'" '+(selectedEmployees.map(String).indexOf(String(eid))>-1?'selected':'')+'>'+esc(e.name||e.name_ar||e.name_en||e.username)+' - '+esc(e.job||e.role||'')+'</option>';}).join('')+'</select><small>'+L('اضغط Ctrl لاختيار أكثر من موظف','Hold Ctrl to select more than one employee')+'</small></div>'+
      '<div class="form-group"><label>'+L('ملاحظة','Note')+'</label><textarea id="wmNote" rows="2">'+esc(w&&w.note)+'</textarea></div>'+
      '<div style="display:flex;gap:10px;flex-wrap:wrap"><button id="saveWorkshopManagementBtn" class="btn btn-primary">'+L('حفظ الورشة','Save Workshop')+'</button><button onclick="document.getElementById(\'workshopManagementModal\').remove()" class="btn btn-secondary">'+L('إلغاء','Cancel')+'</button></div>'+
      '</div></div>';
    document.body.insertAdjacentHTML('beforeend', html);
    document.getElementById('saveWorkshopManagementBtn').onclick=function(){
      var name=document.getElementById('wmName').value.trim();
      if(!name){ showNotification(L('اكتب اسم الورشة أولاً','Enter workshop name first'),'#ef4444'); return; }
      var empSel=Array.from(document.getElementById('wmEmployees').selectedOptions).map(function(o){return o.value});
      var data={ name:name, name_ar:name, name_en:name, managerId:document.getElementById('wmManager').value, employees:empSel, note:document.getElementById('wmNote').value, status:'active' };
      if(w){ Object.assign(w,data); }
      else { data.id=Date.now(); data.materials=[]; window.workshops.push(data); }
      persist();
      document.getElementById('workshopManagementModal').remove();
      renderCurrentTab();
      showNotification(L('تم حفظ الورشة بنجاح','Workshop saved successfully'),'#10b981');
    };
  };
  window.openWorkshopMaterialDeliveryModal = function(workshopId){
    ensure();
    if(!canEdit()){ showNotification(L('لا تملك صلاحية تسليم المواد','You do not have permission to deliver materials'),'#ef4444'); return; }
    var w=window.workshops.find(function(x){return String(x.id)===String(workshopId)});
    if(!w){ showNotification(L('اختر ورشة أولاً','Select a workshop first'),'#ef4444'); return; }
    var html='<div id="workshopMaterialDeliveryModal" class="modal" style="display:flex"><div class="modal-content" style="max-width:720px">'+
      '<h3>📦 '+L('إضافة مواد خام موجودة في الورشة','Add Raw Materials in Workshop')+' - '+esc(w.name)+'</h3>'+
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px">'+
      '<div class="form-group"><label>'+L('المادة الخام','Raw Material')+'</label><select id="wmdMaterial">'+(window.rawMaterials||[]).map(function(p){return '<option value="'+esc(p.id)+'">'+esc(p.name_ar||p.name_en)+' - '+L('الرصيد','Stock')+': '+N(p.currentStock)+' '+esc(p.unit||'')+'</option>';}).join('')+'</select></div>'+
      '<div class="form-group"><label>'+L('الكمية المسلمة','Delivered Qty')+'</label><input id="wmdQty" type="number" step="any" min="0" placeholder="0"></div>'+
      '<div class="form-group"><label>'+L('مرجع/ملاحظة','Reference/Note')+'</label><input id="wmdNote" placeholder="'+L('مثال: تسليم إنتاج اليوم','Example: Today delivery')+'"></div>'+
      '</div><div style="background:var(--gray-100);border-radius:14px;padding:10px;margin-bottom:12px">'+L('عند الحفظ سيتم خصم الكمية من المخزون الرئيسي وإضافتها لرصيد الورشة تلقائياً.','On save, quantity will be deducted from main inventory and added to workshop stock automatically.')+'</div>'+

<!-- WORKSHOP CONTRACT DEADLINE ORDERS: add order by contract number and one-day target -->
<script>
(function(){
  'use strict';
  function esc(v){return String(v==null?'':v).replace(/[&<>'"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c];});}
  function N(v){v=parseFloat(String(v||0).replace(',','.'));return isNaN(v)?0:v;}
  function today(){return new Date().toISOString().slice(0,10);}
  function addDays(d,days){var x=new Date(d||new Date());x.setDate(x.getDate()+Number(days||0));return x.toISOString().slice(0,10);}
  function getLS(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
  function setLS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
  function getContracts(){var c=[];try{c=Array.isArray(window.contracts)?window.contracts:getLS('erp_contracts',[]);}catch(e){c=[];}return Array.isArray(c)?c:[];}
  function getWorkshops(){var w=[];try{w=Array.isArray(window.workshops)?window.workshops:getLS('erp_workshops',[]);}catch(e){w=[];}return Array.isArray(w)?w:[];}
  function getOrders(){var o=[];try{o=Array.isArray(window.workOrders)?window.workOrders:getLS('erp_workOrders',[]);}catch(e){o=[];}window.workOrders=Array.isArray(o)?o:[];return window.workOrders;}
  function saveOrders(o){window.workOrders=o;setLS('erp_workOrders',o);try{if(typeof saveAll==='function')saveAll();}catch(e){}}
  function workshopName(id){var w=getWorkshops().find(function(x){return String(x.id)===String(id);});return w?(w.name_ar||w.name||w.name_en||'-'):'-';}
  function contractLabel(c){return (c.contractNumber||c.invoiceNumber||('CON-'+c.id))+' - '+(c.projectName||c.customerName||'');}
  function contractNumberOf(c){return c?(c.contractNumber||c.invoiceNumber||('CON-'+c.id)):'-';}
  function badge(st){ if(st==='مكتمل') return 'badge-success'; if(st==='قيد التنفيذ') return 'badge-warning'; if(st==='متأخر') return 'badge-danger'; return 'badge-info'; }
  function calcStatus(o){
    if(N(o.progress)>=100) return 'مكتمل';
    if(o.deadline && today()>o.deadline) return 'متأخر';
    return o.status||'جديد';
  }
  window.openWorkshopContractOrderModal=function(){
    var old=document.getElementById('workshopContractOrderModal'); if(old) old.remove();
    var contracts=getContracts(), workshops=getWorkshops();
    if(!workshops.length){alert('أضف ورشة أولاً من إدارة الورش');return;}
    var contractOptions=contracts.map(function(c){return '<option value="'+esc(c.id)+'">'+esc(contractLabel(c))+'</option>';}).join('');
    if(!contractOptions) contractOptions='<option value="manual">إدخال رقم عقد يدوي</option>';
    var workshopOptions=workshops.map(function(w){return '<option value="'+esc(w.id)+'">'+esc(w.name_ar||w.name||w.name_en||('ورشة '+w.id))+'</option>';}).join('');
    var html='<div id="workshopContractOrderModal" class="modal" style="display:flex">'+
      '<div class="modal-content" style="max-width:760px">'+
      '<div class="section-header"><h3>📨 إضافة أمر للورشة حسب رقم العقد</h3><button class="btn btn-secondary" onclick="document.getElementById(\'workshopContractOrderModal\').remove()">إغلاق</button></div>'+
      '<div class="form-group"><label>اختر العقد</label><select id="wcoContractId">'+contractOptions+'</select></div>'+
      '<div class="form-group"><label>أو اكتب رقم العقد يدوياً</label><input id="wcoManualContract" placeholder="مثال: CON-1005"></div>'+
      '<div class="form-group"><label>اختر الورشة</label><select id="wcoWorkshopId">'+workshopOptions+'</select></div>'+
      '<div class="form-group"><label>الأمر المطلوب</label><textarea id="wcoTitle" rows="3" placeholder="مثال: رقم العقد الفلاني أريده خلال يوم واحد"></textarea></div>'+
      '<div class="form-group"><label>مدة التنفيذ بالأيام</label><input id="wcoDays" type="number" min="1" value="1"></div>'+
      '<div class="form-group"><label>تاريخ التسليم المطلوب</label><input id="wcoDeadline" type="date" value="'+addDays(new Date(),1)+'"></div>'+
      '<div style="background:var(--gray-100);padding:12px;border-radius:14px;margin-bottom:12px">عند اختيار مدة يوم واحد سيتم تسجيل الأمر كأمر عاجل مع تاريخ تسليم الغد، وسيظهر لمسؤول الورشة في أوامر إدارة الورش.</div>'+
      '<button class="btn btn-primary" onclick="saveWorkshopContractOrder()">حفظ وإرسال للورشة</button> '+
      '<button class="btn btn-secondary" onclick="document.getElementById(\'workshopContractOrderModal\').remove()">إلغاء</button>'+
      '</div></div>';
    document.body.insertAdjacentHTML('beforeend',html);
    var days=document.getElementById('wcoDays'), deadline=document.getElementById('wcoDeadline');
    days.oninput=function(){deadline.value=addDays(new Date(),Math.max(1,N(days.value)||1));};
  };
  window.saveWorkshopContractOrder=function(){
    var contracts=getContracts(), orders=getOrders();
    var cid=document.getElementById('wcoContractId')?.value||'';
    var manual=(document.getElementById('wcoManualContract')?.value||'').trim();
    var c=contracts.find(function(x){return String(x.id)===String(cid);});
    var contractNumber=manual || contractNumberOf(c);
    var wid=document.getElementById('wcoWorkshopId')?.value;
    var title=(document.getElementById('wcoTitle')?.value||'').trim();
    var days=Math.max(1,N(document.getElementById('wcoDays')?.value)||1);
    var deadline=document.getElementById('wcoDeadline')?.value||addDays(new Date(),days);
    if(!contractNumber || contractNumber==='-'){alert('اكتب رقم العقد أو اختر عقداً');return;}
    if(!title) title='تنفيذ أعمال العقد رقم '+contractNumber+' خلال '+days+' يوم';
    var order={id:Date.now(),orderNumber:'WO-'+Date.now(),title:title,description:title,contractId:c?c.id:null,contractNumber:contractNumber,projectName:c?(c.projectName||c.customerName||''):'',workshopId:Number(wid),date:today(),requiredDays:days,deadline:deadline,priority:days<=1?'عاجل':'عادي',status:'جديد',progress:0,materials:[],createdBy:(window.currentUser&&(window.currentUser.name_ar||window.currentUser.username))||'إدارة الورش',accountantSignature:(window.currentUser&&(window.currentUser.name_ar||window.currentUser.username))||'إدارة الورش',lastUpdate:'-'};
    orders.unshift(order); saveOrders(orders);
    try{if(typeof addAudit==='function')addAudit('إضافة أمر ورشة مرتبط بعقد','workOrders',order.id);}catch(e){}
    var modal=document.getElementById('workshopContractOrderModal'); if(modal) modal.remove();
    try{renderCurrentTab();}catch(e){}
    alert('تم إرسال أمر الورشة للعقد رقم '+contractNumber+' ومدة التنفيذ '+days+' يوم');
  };
  window.updateWorkshopContractOrderProgress=function(id){
    var orders=getOrders(); var o=orders.find(function(x){return String(x.id)===String(id);}); if(!o)return;
    var p=prompt('نسبة الإنجاز من 0 إلى 100:',o.progress||0); if(p===null)return;
    p=Math.max(0,Math.min(100,N(p))); o.progress=p; o.status=p>=100?'مكتمل':(p>0?'قيد التنفيذ':'جديد'); o.lastUpdate=today(); o.updatedBy=(window.currentUser&&(window.currentUser.name_ar||window.currentUser.username))||'-'; saveOrders(orders); try{renderCurrentTab();}catch(e){}
  };
  window.renderWorkshopContractOrdersTable=function(){
    var orders=getOrders().slice().sort(function(a,b){return String(b.date||'').localeCompare(String(a.date||''));});
    var rows=orders.map(function(o){var p=Math.max(0,Math.min(100,N(o.progress)));var st=calcStatus(o);return '<tr>'+
      '<td><b>'+esc(o.orderNumber||('WO-'+o.id))+'</b></td><td>'+esc(o.contractNumber||'-')+'</td><td>'+esc(o.title||o.description||'-')+'</td><td>'+esc(workshopName(o.workshopId))+'</td><td>'+esc(o.date||'-')+'</td><td>'+esc(o.deadline||'-')+'</td><td><span class="badge '+(o.priority==='عاجل'?'badge-danger':'badge-info')+'">'+esc(o.priority||'عادي')+'</span></td><td><span class="badge '+badge(st)+'">'+esc(st)+'</span></td><td><div class="progress-bar" style="width:120px"><div class="progress-fill" style="width:'+p+'%"></div></div>'+p+'%</td><td><button class="btn btn-sm btn-secondary" onclick="updateWorkshopContractOrderProgress(\''+esc(o.id)+'\')">تحديث</button></td></tr>';}).join('')||'<tr><td colspan="10">لا توجد أوامر للورش.</td></tr>';
    return '<div class="section-card"><div class="section-header"><h3>📨 أوامر الورش المرتبطة بالعقود</h3><button class="btn btn-primary" onclick="openWorkshopContractOrderModal()">+ إضافة أمر للورشة</button></div><div style="overflow-x:auto"><table class="table"><thead><tr><th>رقم الأمر</th><th>رقم العقد</th><th>الأمر</th><th>الورشة</th><th>تاريخ الأمر</th><th>مطلوب قبل</th><th>الأولوية</th><th>الحالة</th><th>الإنجاز</th><th>إجراء</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
  };
  var oldProfessional=window.renderWorkshopsManagementProfessional;
  if(oldProfessional){
    window.renderWorkshopsManagementProfessional=function(){return oldProfessional.apply(this,arguments)+window.renderWorkshopContractOrdersTable();};
  }
  var oldManager=window.renderWorkshopOrdersForManager;
  if(oldManager){
    window.renderWorkshopOrdersForManager=function(){
      var base=oldManager.apply(this,arguments);
      return base.replace('<th>الأمر</th><th>الورشة</th>','<th>رقم العقد</th><th>الأمر</th><th>الورشة</th>').replace(/<td>([^<]*?)<\/td><td>([^<]*?)<\/td><td>([^<]*?)<\/td><td>([^<]*?)<\/td><td><span/g,function(m,a,b,c,d){return '<td>'+a+'</td><td>-</td><td>'+b+'</td><td>'+c+'</td><td>'+d+'</td><td><span';});
    };
  }
})();
</script>

  var latestUpdateUILanguage = window.updateUILanguage || (typeof updateUILanguage === 'function' ? updateUILanguage : null);

      var result = latestUpdateUILanguage.apply(this, arguments);
      setTimeout(fixEmployeeRegistryNav, 0);

    };

  document.addEventListener('DOMContentLoaded', fixEmployeeRegistryNav);

})();
</script>
<script>
/* ===== ربط الحسابات البنكية بالفواتير + المصروفات اليومية والشهرية - نسخة مصححة ===== */
(function(){
  /* تم تعطيل strict هنا لأن الملف القديم يستخدم نمط window.fn = fn = function في عدة إضافات،
     وهذا كان يسبب توقف السكربت في بعض المتصفحات عند فتح الموقع. */
  const moneyFmt = v => (Number(v||0)).toFixed(3) + ' ريال';
  const todayStr = () => new Date().toISOString().slice(0,10);
  const safeNum = v => Number(String(v||0).replace(',','.')) || 0;
  const newId = () => Date.now() + Math.floor(Math.random()*1000);

  function loadFinanceTx(){
    try{ window.bankTransactions = JSON.parse(localStorage.getItem('erp_bank_transactions')||'[]'); }catch(e){ window.bankTransactions=[]; }
    try{ window.cashTransactions = JSON.parse(localStorage.getItem('erp_cash_transactions')||'[]'); }catch(e){ window.cashTransactions=[]; }
    if(!Array.isArray(window.bankTransactions)) window.bankTransactions=[];
    if(!Array.isArray(window.cashTransactions)) window.cashTransactions=[];
    if(!Array.isArray(bankAccounts)) bankAccounts=[];
    if(!Array.isArray(cashBoxes)) cashBoxes=[];
    if(!Array.isArray(receipts)) receipts=[];
    if(!Array.isArray(expenses)) expenses=[];
    if(!Array.isArray(invoices)) invoices=[];
  }
  function saveFinanceTx(){
    try{ localStorage.setItem('erp_bank_transactions', JSON.stringify(window.bankTransactions||[])); }catch(e){}
    try{ localStorage.setItem('erp_cash_transactions', JSON.stringify(window.cashTransactions||[])); }catch(e){}
    try{ saveAll(); }catch(e){}
  }
  function accountLabel(type,id){
    loadFinanceTx();
    if(type==='bank'){
      let b=bankAccounts.find(x=>String(x.id)===String(id));
      return b ? ((b.bankName||'-') + (b.accountNumber ? ' - '+b.accountNumber : '')) : '-';
    }
    let c=cashBoxes.find(x=>String(x.id)===String(id));
    return c ? (c.name_ar||c.name_en||c.name||'-') : '-';
  }
  function accountOptions(prefix,type,selected){
    loadFinanceTx();
    let list = type==='bank' ? bankAccounts : cashBoxes;
    if(!list.length) return `<select id="${prefix}AccountId"><option value="">لا يوجد ${type==='bank'?'حساب بنكي':'صندوق مالي'}</option></select>`;
    return `<select id="${prefix}AccountId">${list.map(a=>`<option value="${a.id}" ${String(selected)===String(a.id)?'selected':''}>${type==='bank'?(a.bankName||'-'):(a.name_ar||a.name_en||a.name||'-')} - الرصيد ${moneyFmt(a.balance)}</option>`).join('')}</select>`;
  }
  function addFinanceMove(type, accountId, direction, amount, note, source, sourceId, date){
    loadFinanceTx(); amount=safeNum(amount); if(amount<=0) return false;
    let list = type==='bank' ? bankAccounts : cashBoxes;
    let acc = list.find(x=>String(x.id)===String(accountId));
    if(!acc){ alert(type==='bank'?'اختر الحساب البنكي':'اختر الصندوق المالي'); return false; }
    if(direction==='withdraw' && safeNum(acc.balance) < amount){ alert('الرصيد غير كافٍ'); return false; }
    acc.balance = safeNum(acc.balance) + (direction==='deposit' ? amount : -amount);
    let tx={id:newId(), accountId:acc.id, type:direction, amount, balanceAfter:acc.balance, date:date||todayStr(), note:note||'', source:source||'manual', sourceId:sourceId||'', user:(window.currentUser||currentUser||{}).username||'-'};
    if(type==='bank') window.bankTransactions.unshift(tx); else window.cashTransactions.unshift(tx);
    saveFinanceTx();
    return true;
  }
  function reverseFinanceMove(type, source, sourceId){
    loadFinanceTx();
    let txs = type==='bank' ? window.bankTransactions : window.cashTransactions;
    let keep=[];
    txs.forEach(t=>{
      if(String(t.source)===String(source) && String(t.sourceId)===String(sourceId)){
        let list=type==='bank'?bankAccounts:cashBoxes;
        let acc=list.find(x=>String(x.id)===String(t.accountId));
        if(acc) acc.balance = safeNum(acc.balance) + (t.type==='deposit' ? -safeNum(t.amount) : safeNum(t.amount));
      } else keep.push(t);
    });
    if(type==='bank') window.bankTransactions=keep; else window.cashTransactions=keep;
    saveFinanceTx();
  }
  function monthKey(d){ return String(d||todayStr()).slice(0,7); }
  function expenseTotals(period){
    let nowMonth=monthKey(todayStr());
    let today=todayStr();
    return (expenses||[]).filter(e=> period==='daily' ? (e.date===today || e.expensePeriod==='يومي') : (monthKey(e.date)===nowMonth || e.expensePeriod==='شهري')).reduce((s,e)=>s+safeNum(e.amount),0);
  }

  window.addPaymentToInvoice = addPaymentToInvoice = function(id){
    loadFinanceTx();
    let inv=(invoices||[]).find(i=>String(i.id)===String(id));
    if(!inv) return;
