<script id="enterprise-responsive-behavior">
(function(){
  'use strict';
  function isSmall(){ return window.matchMedia('(max-width: 768px)').matches; }
  function getSidebar(){ return document.getElementById('sidebar'); }
  function getMain(){ return document.getElementById('mainContent'); }

  function applyResponsiveFixes(){
    var s = getSidebar(), m = getMain();
    if(!s || !m) return;
    if(isSmall()){
      s.classList.remove('collapsed');
      m.style.width = '100%';
      m.style.marginRight = '0';
      m.style.marginLeft = '0';
    } else {
      s.classList.remove('mobile-open');
      m.style.width = '';
      m.style.marginRight = '';
      m.style.marginLeft = '';
    }
    document.querySelectorAll('table').forEach(function(tbl){
      var p = tbl.parentElement;
      if(p && p.tagName !== 'TD' && p.tagName !== 'TH'){
        p.style.overflowX = p.style.overflowX || 'auto';
        p.style.webkitOverflowScrolling = 'touch';
      }
    });
  }

  function toggleMobileSidebar(ev){
    if(!isSmall()) return;
    var s = getSidebar();
    if(!s) return;
    ev.preventDefault();
    ev.stopPropagation();
    s.classList.toggle('mobile-open');
  }

  document.addEventListener('DOMContentLoaded', function(){
    var toggle = document.getElementById('toggleSidebarBtn');
    if(toggle) toggle.addEventListener('click', toggleMobileSidebar, true);

    document.addEventListener('click', function(ev){
      var s = getSidebar();
      var toggleBtn = document.getElementById('toggleSidebarBtn');
      if(!isSmall() || !s || !s.classList.contains('mobile-open')) return;
      if(!s.contains(ev.target) && !(toggleBtn && toggleBtn.contains(ev.target))){
        s.classList.remove('mobile-open');
      }
    }, true);

    document.addEventListener('click', function(ev){
      if(isSmall() && ev.target.closest && ev.target.closest('.nav-item')){
        var s = getSidebar();
        if(s) s.classList.remove('mobile-open');
      }
    }, true);

    applyResponsiveFixes();
    setTimeout(applyResponsiveFixes, 250);
  });

  window.addEventListener('resize', applyResponsiveFixes);
  window.addEventListener('orientationchange', function(){ setTimeout(applyResponsiveFixes, 300); });

  var oldRender = window.renderCurrentTab;
  if(typeof oldRender === 'function' && !oldRender.__responsivePatched){
    var patched = function(){
      var result = oldRender.apply(this, arguments);
      setTimeout(applyResponsiveFixes, 60);
      return result;
    };
    patched.__responsivePatched = true;
    window.renderCurrentTab = patched;
  }
})();
</script>
<script id="contracts-progress-auto-patch">
(function(){
  'use strict';

  function L(ar,en){ return (window.currentLang === 'en') ? en : ar; }
  function esc(v){ return String(v ?? '').replace(/[&<>"']/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  function getContracts(){ return Array.isArray(window.contracts) ? window.contracts : []; }
  function save(){ 
    try{ if(typeof window.saveAll === 'function') window.saveAll(); }catch(e){}
    try{ localStorage.setItem('erp_contracts', JSON.stringify(getContracts())); }catch(e){}
  }
  function findContract(id){ return getContracts().find(function(c){ return String(c.id) === String(id); }); }

  function normalizeContractTasks(c){
    if(!c) return [];
    if(!Array.isArray(c.tasks)) c.tasks = [];
    if(!Array.isArray(c.items)) c.items = [];

    if(c.tasks.length === 0 && c.items.length){
      c.tasks = c.items.map(function(it, idx){
        var title = it.productName_ar || it.productName_en || it.name_ar || it.name_en || it.productName || it.name || (L('بند','Item') + ' ' + (idx+1));
        var qty = it.qty || it.quantity || 1;
        var area = it.totalArea || it.area || '';
        return {
          id: it.id || ('task_' + Date.now() + '_' + idx),
          title_ar: title,
          title_en: it.productName_en || title,
          qty: qty,
          area: area,
          completed: !!it.completed
        };
      });
    }

    if(c.tasks.length === 0){
      c.tasks = [{
        id: 'task_' + Date.now(),
        title_ar: c.projectName || c.contractNumber || 'عمل العقد',
        title_en: c.projectName || c.contractNumber || 'Contract work',
        qty: 1,
        area: '',
        completed: false
      }];
    }

    c.tasks.forEach(function(t, idx){
      if(!t.id) t.id = 'task_' + Date.now() + '_' + idx;
      if(t.completed === undefined) t.completed = false;
    });

    return c.tasks;
  }

  function recalcContractProgress(c){
    var tasks = normalizeContractTasks(c);
    var total = tasks.length;
    var done = tasks.filter(function(t){ return !!t.completed; }).length;
    c.progress = total ? Math.round((done / total) * 100) : 0;
    c.completedTasks = done;
    c.totalTasks = total;
    if(c.progress >= 100){
      c.status_ar = c.status_ar === 'معتمد' ? c.status_ar : 'مكتمل';
      c.status_en = c.status_en === 'Approved' ? c.status_en : 'Completed';
      c.completedAt = c.completedAt || new Date().toISOString();
    } else if(c.progress > 0){
      c.status_ar = 'قيد التنفيذ';
      c.status_en = 'In Progress';
      c.completedAt = null;
    } else {
      c.status_ar = c.status_ar || 'عقد جديد';
      c.status_en = c.status_en || 'New Contract';
      c.completedAt = null;
    }
    return c.progress;
  }

  window.toggleContractTaskDone = function(contractId, taskId, checked){
    var c = findContract(contractId);
    if(!c) return;
    var tasks = normalizeContractTasks(c);
    var t = tasks.find(function(x){ return String(x.id) === String(taskId); });
    if(t) t.completed = !!checked;
    recalcContractProgress(c);
    save();
    if(typeof window.renderCurrentTab === 'function') window.renderCurrentTab();
  };

  window.addContractProgressTask = function(contractId){
    var c = findContract(contractId);
    if(!c) return;
    var name = prompt(L('اكتب اسم العمل أو البند الجديد','Enter the new work item name'));
    if(!name || !String(name).trim()) return;
    var tasks = normalizeContractTasks(c);
    tasks.push({
      id: 'task_' + Date.now(),
      title_ar: String(name).trim(),
      title_en: String(name).trim(),
      qty: 1,
      area: '',
      completed: false
    });
    recalcContractProgress(c);
    save();
    if(typeof window.renderCurrentTab === 'function') window.renderCurrentTab();
  };

  window.markContractAllDone = function(contractId){
    var c = findContract(contractId);
    if(!c) return;
    if(!confirm(L('هل تريد تحديد كل بنود العقد كمكتملة؟','Mark all contract work items as completed?'))) return;
    normalizeContractTasks(c).forEach(function(t){ t.completed = true; });
    recalcContractProgress(c);
    save();
    if(typeof window.renderCurrentTab === 'function') window.renderCurrentTab();
  };

  window.renderContractProgressBox = function(contractId){
    var c = findContract(contractId);
    if(!c) return '';
    var tasks = normalizeContractTasks(c);
    var pct = recalcContractProgress(c);
    var rows = tasks.map(function(t){
      var title = (window.currentLang === 'en') ? (t.title_en || t.title_ar || '-') : (t.title_ar || t.title_en || '-');
      var meta = [];
      if(t.qty) meta.push(L('العدد','Qty') + ': ' + esc(t.qty));
      if(t.area) meta.push(L('المساحة','Area') + ': ' + esc(t.area));
      return '<div class="contract-work-item">'+
        '<input type="checkbox" '+(t.completed?'checked':'')+' onchange="toggleContractTaskDone(\''+esc(contractId)+'\',\''+esc(t.id)+'\',this.checked)">'+
        '<div><div class="contract-work-title">'+esc(title)+'</div><div class="contract-work-meta">'+meta.join(' • ')+'</div></div>'+
        '<span class="badge '+(t.completed?'badge-success':'badge-warning')+'">'+(t.completed?L('مكتمل','Completed'):L('غير مكتمل','Incomplete'))+'</span>'+
      '</div>';
    }).join('');

    return '<div class="contract-progress-box">'+
      '<div class="contract-progress-head">'+
        '<div><b>✅ '+L('إنجاز العقد','Contract Completion')+'</b><div class="contract-work-meta">'+L('يتم حساب النسبة تلقائيًا من البنود المكتملة','Percentage is calculated automatically from completed items')+'</div></div>'+
        '<div class="contract-progress-percent">'+pct+'%</div>'+
      '</div>'+
      '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
      '<div class="contract-work-list">'+rows+'</div>'+
      '<div class="contract-progress-actions" style="margin-top:10px">'+
        '<button class="btn btn-secondary btn-sm" onclick="addContractProgressTask(\''+esc(contractId)+'\')">+ '+L('إضافة بند عمل','Add Work Item')+'</button>'+
        '<button class="btn btn-success btn-sm" onclick="markContractAllDone(\''+esc(contractId)+'\')">✓ '+L('تحديد الكل مكتمل','Mark All Done')+'</button>'+
      '</div>'+
    '</div>';
  };

  function injectProgressIntoContractsHTML(html){
    if(typeof html !== 'string' || html.indexOf('renderContractProgressBox') !== -1) return html;
    var contracts = getContracts();
    contracts.forEach(function(c){
      recalcContractProgress(c);
      var id = c.id;
      var box = window.renderContractProgressBox(id);
      var idText = String(id).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      var markerPatterns = [
        new RegExp('(<tr[^>]*>[\\s\\S]*?'+idText+'[\\s\\S]*?</tr>)', 'g'),
        new RegExp('(<div[^>]*class="[^"]*section-card[^"]*"[^>]*>[\\s\\S]*?'+idText+'[\\s\\S]*?</div>)', 'g')
      ];
      var changed = false;
      for(var i=0;i<markerPatterns.length && !changed;i++){
        html = html.replace(markerPatterns[i], function(m){
          if(m.indexOf('contract-progress-box') !== -1) return m;
          changed = true;
          if(m.trim().startsWith('<tr')){
            return m + '<tr><td colspan="99">'+box+'</td></tr>';
          }
          return m + box;
        });
      }
    });
    return html;
  }

  var oldRenderContractsPage = window.renderContractsPage;
  if(typeof oldRenderContractsPage === 'function' && !oldRenderContractsPage.__progressPatched){
    var patchedContracts = function(){
      var html = oldRenderContractsPage.apply(this, arguments);
      getContracts().forEach(recalcContractProgress);
      save();
      html = injectProgressIntoContractsHTML(html);
      if(html.indexOf('contract-progress-box') === -1 && getContracts().length){
        html += '<div class="section-card"><h3>✅ '+L('إنجاز العقود','Contract Completion')+'</h3>'+
          getContracts().map(function(c){ return '<div style="margin-bottom:12px"><h4>'+esc(c.contractNumber || c.projectName || c.id)+'</h4>'+window.renderContractProgressBox(c.id)+'</div>'; }).join('')+
          '</div>';
      }
      return html;
    };
    patchedContracts.__progressPatched = true;
    window.renderContractsPage = patchedContracts;
  }

  document.addEventListener('DOMContentLoaded', function(){
    getContracts().forEach(recalcContractProgress);
    save();
  });
})();
</script>
<script id="final-contract-progress-everywhere-script">
(function(){
  'use strict';

  function L(ar,en){
    try{return currentLang === 'en' ? en : ar;}catch(e){return ar;}
  }

  function getContracts(){
    try{return Array.isArray(contracts) ? contracts : [];}catch(e){}
    try{return Array.isArray(window.contracts) ? window.contracts : [];}catch(e){}
    return [];
  }

  function getInvoices(){
    try{return Array.isArray(invoices) ? invoices : [];}catch(e){}
    try{return Array.isArray(window.invoices) ? window.invoices : [];}catch(e){}
    return [];
  }

  function getWorkshops(){
    try{return Array.isArray(workshops) ? workshops : [];}catch(e){}
    try{return Array.isArray(window.workshops) ? window.workshops : [];}catch(e){}
    return [];
  }

  function esc(v){
    return String(v ?? '').replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function findContract(id){
    var list = getContracts();
    return list.find(function(c){
      return String(c.id) === String(id) ||
             String(c.contractNumber) === String(id) ||
             String(c.invoiceNumber) === String(id) ||
             String(c.sourceInvoiceId) === String(id);
    });
  }

  function ensureTasks(c){
    if(!c) return [];
    if(!Array.isArray(c.tasks)) c.tasks = [];
    if(!Array.isArray(c.items)) c.items = [];

    if(c.tasks.length === 0 && c.items.length){
      c.tasks = c.items.map(function(it,idx){
        return {
          id: it.id || ('task_' + Date.now() + '_' + idx),
          title_ar: it.productName_ar || it.name_ar || it.productName || ('عمل رقم ' + (idx+1)),
          title_en: it.productName_en || it.name_en || it.productName || ('Work item ' + (idx+1)),
          qty: it.qty || it.quantity || 1,
          area: it.totalArea || it.area || '',
          completed: !!it.completed
        };
      });
    }

    if(c.tasks.length === 0){
      c.tasks = [{
        id:'task_' + Date.now(),
        title_ar:c.projectName || c.contractNumber || 'عمل العقد',
        title_en:c.projectName || c.contractNumber || 'Contract work',
        qty:1,
        area:'',
        completed:false
      }];
    }

    c.tasks.forEach(function(t,i){
      if(!t.id) t.id = 'task_' + Date.now() + '_' + i;
      if(t.completed === undefined) t.completed = false;
    });

    return c.tasks;
  }

  function recalc(c){
    var tasks = ensureTasks(c);
    var done = tasks.filter(function(t){return !!t.completed;}).length;
    var total = tasks.length;
    c.completedTasks = done;
    c.totalTasks = total;
    c.progress = total ? Math.round((done / total) * 100) : 0;

    if(c.progress >= 100){
      c.status_ar = 'مكتمل';
      c.status_en = 'Completed';
      c.completedAt = c.completedAt || new Date().toISOString();
    }else if(c.progress > 0){
      c.status_ar = 'قيد التنفيذ';
      c.status_en = 'In Progress';
      c.completedAt = null;
    }else{
      c.status_ar = c.status_ar || 'عقد جديد';
      c.status_en = c.status_en || 'New Contract';
      c.completedAt = null;
    }

    c.progressUpdatedAt = new Date().toISOString();
    return c.progress;
  }

  function syncContract(c){
    if(!c) return;
    recalc(c);

    getInvoices().forEach(function(inv){
      if(String(inv.id) === String(c.sourceInvoiceId || c.invoiceId) || String(inv.invoiceNumber) === String(c.invoiceNumber)){
        inv.contractId = c.id;
        inv.contractNumber = c.contractNumber;
        inv.contractProgress = c.progress;
        inv.contractStatus_ar = c.status_ar;
        inv.contractStatus_en = c.status_en;
      }
    });

    getWorkshops().forEach(function(w){
      if(String(w.id) === String(c.workshopId) || String(w.name_ar || w.name_en || w.name || '') === String(c.workshopName || '')){
        if(!Array.isArray(w.contracts)) w.contracts = [];
        var row = w.contracts.find(function(x){
          return String(x.contractId) === String(c.id) || String(x.contractNumber) === String(c.contractNumber);
        });
        if(!row){
          row = {contractId:c.id, contractNumber:c.contractNumber};
          w.contracts.push(row);
        }
        row.progress = c.progress;
        row.status_ar = c.status_ar;
        row.status_en = c.status_en;
      }
    });
  }

  function saveReal(){
    getContracts().forEach(syncContract);

    try{localStorage.setItem('erp_contracts', JSON.stringify(getContracts()));}catch(e){}
    try{localStorage.setItem('erp_invoices', JSON.stringify(getInvoices()));}catch(e){}
    try{localStorage.setItem('erp_workshops', JSON.stringify(getWorkshops()));}catch(e){}

    try{if(typeof saveAll === 'function') saveAll();}catch(e){}
    try{if(typeof window.saveAll === 'function') window.saveAll();}catch(e){}
  }

  window.finalMarkContractComplete = function(id){
    var c = findContract(id);
    if(!c){
      alert(L('لم يتم العثور على العقد','Contract not found'));
      return;
    }

    ensureTasks(c).forEach(function(t){t.completed = true;});
    if(Array.isArray(c.items)){
      c.items.forEach(function(it){
        it.completed = true;
        it.status_ar = 'مكتمل';
        it.status_en = 'Completed';
      });
    }

    c.progress = 100;
    c.completedTasks = ensureTasks(c).length;
    c.totalTasks = ensureTasks(c).length;
    c.status_ar = 'مكتمل';
    c.status_en = 'Completed';
    c.completedAt = new Date().toISOString();
    c.progressUpdatedAt = new Date().toISOString();

    syncContract(c);
    saveReal();

    try{
      if(typeof showNotification === 'function'){
        showNotification(L('تم حفظ إنجاز العقد بنسبة 100%','Contract progress saved at 100%'), '#16a34a');
      }
    }catch(e){}

    setTimeout(function(){
      try{if(typeof renderCurrentTab === 'function') renderCurrentTab();}catch(e){}
    }, 80);
  };

  window.finalSetContractTask = function(contractId, taskId, checked){
    var c = findContract(contractId);
    if(!c) return;

    ensureTasks(c).forEach(function(t){
      if(String(t.id) === String(taskId)) t.completed = !!checked;
    });

    syncContract(c);
    saveReal();

    try{
      if(typeof showNotification === 'function'){
        showNotification(L('تم حفظ نسبة الإنجاز','Progress saved'), '#16a34a');
      }
    }catch(e){}

    setTimeout(function(){
      try{if(typeof renderCurrentTab === 'function') renderCurrentTab();}catch(e){}
    }, 80);
  };

  function btn(c){
    recalc(c);
    var done = Number(c.progress || 0) >= 100;
    return '<button class="final-complete-btn '+(done?'done':'')+'" type="button" data-final-contract="'+esc(c.id)+'" onclick="finalMarkContractComplete(\''+esc(c.id)+'\')">'+
      (done ? '✓ '+L('مكتمل','Completed') : '✓ '+L('وضع مكتمل','Mark Complete'))+
    '</button>';
  }

  function progressCell(c){
    recalc(c);
    return '<div class="final-progress-mini"><b>'+Number(c.progress||0)+'%</b><div class="bar"><div class="fill" style="width:'+Number(c.progress||0)+'%"></div></div></div>';
  }

  function rowMatches(row,c){
    var txt = row.textContent || '';
    return [c.id,c.contractNumber,c.invoiceNumber,c.projectName,c.customerName].filter(Boolean).some(function(k){
      return txt.includes(String(k));
    });
  }

  function injectEverywhere(){
    var main = document.getElementById('mainContent');
    if(!main) return;

    var all = getContracts();
    if(!all.length) return;

    var pageText = main.textContent || '';
    var likelyPage =
      String((function(){try{return currentTab}catch(e){return ''}})()).toLowerCase().includes('contract') ||
      pageText.includes('العقود') ||
      pageText.includes('نسبة الإنجاز') ||
      pageText.includes('إدارة الورش') ||
      pageText.includes('مسؤول الورشة') ||
      pageText.includes('تحديث الإنجاز');

    if(!likelyPage) return;

    all.forEach(function(c){
      syncContract(c);

      Array.from(main.querySelectorAll('tr')).forEach(function(row){
        if(!rowMatches(row,c)) return;

        var cells = Array.from(row.children).filter(function(x){return x.tagName === 'TD' || x.tagName === 'TH';});
        if(!cells.length) return;

        var table = row.closest('table');
        var headers = table ? Array.from(table.querySelectorAll('thead th')) : [];

        var actionIndex = -1;
        var progressIndex = -1;

        headers.forEach(function(h,idx){
          var htxt = (h.textContent || '').trim();
          if(['إجراء','إجراءات','Action','Actions'].includes(htxt)) actionIndex = idx;
          if(htxt.includes('نسبة الإنجاز') || htxt.includes('الإنجاز') || htxt.toLowerCase().includes('progress')) progressIndex = idx;
        });

        var actionCell = cells[actionIndex >= 0 && cells[actionIndex] ? actionIndex : cells.length - 1];
        actionCell.classList.add('final-action-cell');
        actionCell.innerHTML = btn(c);

        if(progressIndex >= 0 && cells[progressIndex]){
          cells[progressIndex].innerHTML = progressCell(c);
        }
      });

    });

    saveReal();
  }

  var oldRender = null;
  try{oldRender = renderCurrentTab;}catch(e){oldRender = window.renderCurrentTab;}

  if(typeof oldRender === 'function' && !oldRender.__finalContractProgressEverywhere){
    var patched = function(){
      var r = oldRender.apply(this, arguments);
      setTimeout(injectEverywhere, 100);
      setTimeout(injectEverywhere, 500);
      return r;
    };
    patched.__finalContractProgressEverywhere = true;

    try{renderCurrentTab = patched;}catch(e){}
    window.renderCurrentTab = patched;
  }

  document.addEventListener('DOMContentLoaded', function(){
    setTimeout(injectEverywhere, 700);
  });

  document.addEventListener('click', function(ev){
    var b = ev.target.closest && ev.target.closest('[data-final-contract]');
    if(!b) return;
    ev.preventDefault();
    ev.stopPropagation();
    window.finalMarkContractComplete(b.getAttribute('data-final-contract'));
  }, true);

})();
</script>

<script id="mobile-polish-final-script">
(function(){
  'use strict';

  function isMobile(){ return window.matchMedia('(max-width: 768px)').matches; }

  function enhanceMobile(){
    if(!isMobile()) return;

    document.querySelectorAll('table').forEach(function(tbl){
      var parent = tbl.parentElement;
      if(parent && parent.tagName !== 'TD' && parent.tagName !== 'TH'){
        parent.style.overflowX = 'auto';
        parent.style.webkitOverflowScrolling = 'touch';
        parent.style.maxWidth = '100%';
      }
    });

    document.querySelectorAll('.section-card').forEach(function(card){
      card.style.maxWidth = '100%';
    });

    document.querySelectorAll('button, .btn').forEach(function(btn){
      btn.setAttribute('aria-label', btn.textContent.trim() || 'button');
    });
  }

  document.addEventListener('DOMContentLoaded', function(){
    enhanceMobile();
    setTimeout(enhanceMobile, 300);
    setTimeout(enhanceMobile, 900);
  });

  window.addEventListener('resize', enhanceMobile);
  window.addEventListener('orientationchange', function(){
    setTimeout(enhanceMobile, 300);
  });

  var oldRender = null;
  try{ oldRender = renderCurrentTab; }catch(e){ oldRender = window.renderCurrentTab; }

  if(typeof oldRender === 'function' && !oldRender.__mobilePolishFinal){
    var patched = function(){
      var result = oldRender.apply(this, arguments);
      setTimeout(enhanceMobile, 120);
      setTimeout(enhanceMobile, 500);
      return result;
    };
    patched.__mobilePolishFinal = true;
    try{ renderCurrentTab = patched; }catch(e){}
    window.renderCurrentTab = patched;
  }
})();
</script>

<script id="invoice-items-contract-progress-final-patch">
/* ==========================================================
   ربط منتجات الفاتورة بالعقود ونسبة الإنجاز لكل بند مصنع
   - كل منتج في الفاتورة يتحول إلى بند/مهمة داخل العقد.
   - إذا الكمية 2 يتم إنشاء بندين مستقلين حتى تكون النسبة دقيقة.
   - مسؤول الورشة يضغط "وضع مكتمل" لكل بند، والنسبة تحسب تلقائياً.
   - يحفظ محلياً وسحابياً عبر saveAll() الموجود في النظام.
========================================================== */
(function(){
  'use strict';
  if(window.__invoiceItemsContractProgressPatch) return;
  window.__invoiceItemsContractProgressPatch = true;

  function N(v){ v = parseFloat(String(v ?? 0).replace(',', '.')); return isFinite(v) ? v : 0; }
  function today(){ return new Date().toISOString().slice(0,10); }
  function lang(){ try{return currentLang === 'en' ? 'en' : 'ar';}catch(e){return localStorage.getItem('erp_lang') === 'en' ? 'en' : 'ar';} }
  function L(ar,en){ return lang()==='ar' ? ar : en; }
  function safeCopy(x){ try{return JSON.parse(JSON.stringify(x||{}));}catch(e){return x||{};} }
  function arr(name){
    try{
      if(!Array.isArray(window[name]) && typeof eval(name) !== 'undefined') window[name] = eval(name);
    }catch(e){}
    if(!Array.isArray(window[name])) window[name] = [];
    try{ eval(name+' = window[name]'); }catch(e){}
    return window[name];
  }
  function getInvoices(){ return arr('invoices'); }
  function getContracts(){ return arr('contracts'); }
  function getCustomers(){ return arr('customers'); }

  function customerName(id){
    var c = getCustomers().find(function(x){return String(x.id)===String(id);});
    if(!c) return '-';
    return lang()==='ar' ? (c.name_ar||c.name||c.name_en||'-') : (c.name_en||c.name||c.name_ar||'-');
  }

  function itemName(it){
    return lang()==='ar'
      ? (it.productName_ar || it.name_ar || it.productName || it.name || it.productName_en || 'منتج')
      : (it.productName_en || it.name_en || it.productName || it.name || it.productName_ar || 'Product');
  }

  function buildWorkItemsFromInvoice(inv, oldItems){
    oldItems = Array.isArray(oldItems) ? oldItems : [];
    var result = [];
    (inv.items || []).forEach(function(it, itemIndex){
      var qty = Math.max(1, Math.round(N(it.qty || it.quantity || 1)));
      for(var unitIndex=1; unitIndex<=qty; unitIndex++){
        var key = 'inv_' + inv.id + '_item_' + itemIndex + '_unit_' + unitIndex;
        var old = oldItems.find(function(x){return x.key===key;}) || oldItems.find(function(x){return String(x.invoiceItemIndex)===String(itemIndex) && String(x.unitIndex)===String(unitIndex);});
        result.push({
          key:key,
          id: old?.id || (Date.now() + '_' + itemIndex + '_' + unitIndex + '_' + Math.floor(Math.random()*9999)),
          sourceInvoiceId: inv.id,
          invoiceNumber: inv.invoiceNumber || '',
          invoiceItemIndex:itemIndex,
          unitIndex:unitIndex,
          productId: it.productId || it.id || '',
          productName_ar: it.productName_ar || it.name_ar || it.productName || it.name || '',
          productName_en: it.productName_en || it.name_en || it.productName || it.name || '',
          title_ar: (it.productName_ar || it.name_ar || it.productName || it.name || 'منتج') + (qty>1 ? ' رقم ' + unitIndex + ' من ' + qty : ''),
          title_en: (it.productName_en || it.name_en || it.productName || it.name || 'Product') + (qty>1 ? ' No. ' + unitIndex + ' of ' + qty : ''),
          length: it.length || 0,
          width: it.width || 0,
          area: it.area || it.totalArea || 0,
          rate: it.rate || 0,
          completed: !!old?.completed,
          completedAt: old?.completedAt || '',
          completedBy: old?.completedBy || '',
          status_ar: old?.completed ? 'مكتمل' : 'غير مكتمل',
          status_en: old?.completed ? 'Completed' : 'Incomplete'
        });
      }
    });
    return result;
  }

  function recalcContractProgress(c){
    if(!c) return c;
    var tasks = Array.isArray(c.workItems) ? c.workItems : (Array.isArray(c.itemsProgress) ? c.itemsProgress : []);
    if(!tasks.length && Array.isArray(c.items)){
      // عقود قديمة فيها items فقط: نحول كل item إلى مهمة واحدة أو أكثر
      var fakeInv = {id:c.sourceInvoiceId||c.id, invoiceNumber:c.invoiceNumber||c.contractNumber, items:c.items};
      tasks = buildWorkItemsFromInvoice(fakeInv, []);
      c.workItems = tasks;
    }
    var total = tasks.length;
    var done = tasks.filter(function(x){return !!x.completed;}).length;
    c.progress = total ? Math.round((done / total) * 100) : N(c.progress || 0);
    c.completedItems = done;
    c.totalItems = total;
    c.status_ar = c.progress >= 100 ? 'مكتمل' : (c.progress > 0 ? 'قيد التنفيذ' : (c.status_ar || 'عقد جديد'));
    c.status_en = c.progress >= 100 ? 'Completed' : (c.progress > 0 ? 'In Progress' : (c.status_en || 'New Contract'));
    c.lastProgressUpdate = new Date().toISOString();
    return c;
  }

  window.ensureContractWorkItemsFromInvoice = function(c){
    if(!c) return c;
    var inv = getInvoices().find(function(i){return String(i.id)===String(c.sourceInvoiceId) || String(i.invoiceNumber)===String(c.invoiceNumber);});
    if(inv && Array.isArray(inv.items)){
      c.items = safeCopy(inv.items);
      c.workItems = buildWorkItemsFromInvoice(inv, c.workItems || c.itemsProgress || []);
    }else if(!Array.isArray(c.workItems) || !c.workItems.length){
      c.workItems = buildWorkItemsFromInvoice({id:c.sourceInvoiceId||c.id, invoiceNumber:c.invoiceNumber||c.contractNumber, items:c.items||[]}, c.workItems || []);
    }
    return recalcContractProgress(c);
  };

  window.normalizeAllContractProgressItems = function(){
    getContracts().forEach(function(c){ window.ensureContractWorkItemsFromInvoice(c); });
  };

  function saveAndRefresh(){
    try{ window.normalizeAllContractProgressItems(); }catch(e){}
    if(typeof saveAll === 'function') saveAll();
    if(typeof renderCurrentTab === 'function') renderCurrentTab();
  }

  window.toggleContractWorkItemComplete = function(contractId, key){
    var c = getContracts().find(function(x){return String(x.id)===String(contractId);});
    if(!c) return;
    window.ensureContractWorkItemsFromInvoice(c);
    var it = (c.workItems || []).find(function(x){return String(x.key)===String(key) || String(x.id)===String(key);});
    if(!it) return;
    it.completed = !it.completed;
    it.completedAt = it.completed ? new Date().toISOString() : '';
    it.completedBy = it.completed ? ((window.currentUser && (window.currentUser.name_ar || window.currentUser.username)) || 'مسؤول الورشة') : '';
    it.status_ar = it.completed ? 'مكتمل' : 'غير مكتمل';
    it.status_en = it.completed ? 'Completed' : 'Incomplete';
    recalcContractProgress(c);
    saveAndRefresh();
    if(typeof showNotification === 'function') showNotification(L('تم تحديث إنجاز البند وحساب نسبة العقد','Item progress updated'), it.completed ? '#10b981' : '#f59e0b');
  };

  function renderWorkItems(c){
    window.ensureContractWorkItemsFromInvoice(c);
    var items = c.workItems || [];
    if(!items.length) return `<div class="contract-item-empty">${L('لا توجد منتجات مرتبطة بهذا العقد. أنشئ العقد من فاتورة تحتوي منتجات.','No invoice products linked to this contract.')}</div>`;
    return `<div class="contract-products-progress-box">
      <div class="contract-products-head">
        <strong>${L('بنود التصنيع من الفاتورة','Manufacturing items from invoice')}</strong>
        <span class="contract-products-percent">${c.completedItems||0}/${c.totalItems||items.length} — ${N(c.progress).toFixed(0)}%</span>
      </div>
      <div class="contract-products-list">
        ${items.map(function(it){
          var done = !!it.completed;
          var title = lang()==='ar' ? (it.title_ar || it.productName_ar || itemName(it)) : (it.title_en || it.productName_en || itemName(it));
          var meta = [it.length&&it.width ? L('المقاس: ','Size: ')+it.length+' × '+it.width : '', it.area ? L('المساحة: ','Area: ')+it.area : ''].filter(Boolean).join(' | ');
          return `<div class="contract-product-row ${done?'done':''}">
            <div class="contract-product-title"><i class="fas ${done?'fa-check-circle':'fa-circle'}"></i> ${title}<div class="contract-product-meta">${meta}</div></div>
            <span class="badge ${done?'badge-success':'badge-warning'}">${done?L('مكتمل','Completed'):L('غير مكتمل','Incomplete')}</span>
            <button type="button" class="btn btn-sm ${done?'btn-secondary':'btn-success'} contractItemDoneBtn" data-cid="${c.id}" data-key="${it.key||it.id}">${done?L('إلغاء المكتمل','Undo'):L('وضع مكتمل','Mark completed')}</button>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  window.renderContractsWithInvoiceItemsProgress = function(){
    window.normalizeAllContractProgressItems();
    var contracts = getContracts();
    var canAdd = !(window.currentUser && window.currentUser.role === 'workshop_manager');
    var html = `<div class="section-card"><div class="section-header"><h3>🤝 ${L('العقود ونسبة الإنجاز','Contracts & Progress')}</h3>${canAdd?`<button id="newContractBtn" class="btn btn-primary">+ ${L('إضافة','Add')}</button>`:''}</div>`;
    if(!contracts.length){
      html += `<p>${L('لا توجد عقود. حوّل عرض السعر إلى فاتورة أو أنشئ فاتورة لإنشاء عقد.','No contracts. Convert a quotation or create an invoice to generate a contract.')}</p>`;
    }else{
      html += contracts.map(function(c){
        var name = c.projectName || (lang()==='ar' ? c.name_ar : c.name_en) || c.name_ar || c.name_en || '-';
        var cust = c.customerName || customerName(c.customerId);
        var p = N(c.progress).toFixed(0);
        return `<div class="section-card contract-progress-card">
          <div class="contract-main-line">
            <div><b>${c.contractNumber || '-'}</b><br><small>${L('العميل','Customer')}: ${cust}</small><br><small>${L('الفاتورة','Invoice')}: ${c.invoiceNumber || '-'}</small></div>
            <div><b>${name}</b><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div><strong>${p}%</strong></div>
            <div><span class="badge ${p>=100?'badge-success':(p>0?'badge-info':'badge-warning')}">${lang()==='ar'?(c.status_ar||'-'):(c.status_en||'-')}</span></div>
          </div>
          ${renderWorkItems(c)}
        </div>`;
      }).join('');
    }
    html += `</div>`;
    setTimeout(function(){
      document.querySelectorAll('.contractItemDoneBtn').forEach(function(btn){
        btn.onclick = function(ev){ ev.preventDefault(); ev.stopPropagation(); window.toggleContractWorkItemComplete(btn.dataset.cid, btn.dataset.key); return false; };
      });
      document.getElementById('newContractBtn')?.addEventListener('click', function(){
        var name_ar = prompt('اسم المشروع (بالعربية):');
        if(!name_ar) return;
        var name_en = prompt('Project name (English):') || name_ar;
        getContracts().push({id:Date.now(), contractNumber:'CTR-'+Date.now(), name_ar:name_ar, name_en:name_en, customerId:getCustomers()[0]?.id, progress:0, status:'active', status_ar:'عقد جديد', status_en:'New Contract', items:[], workItems:[]});
        saveAndRefresh();
      });
    },0);
    return html;
  };

  // إنشاء/تحديث العقد من الفاتورة مع بنود الإنجاز لكل منتج
  window.createContractFromInvoice = function(inv){
    if(!inv || inv.docType !== 'invoice') return null;
    var contracts = getContracts();
    var existing = contracts.find(function(c){return String(c.sourceInvoiceId)===String(inv.id);});
    var cust = getCustomers().find(function(c){return String(c.id)===String(inv.customerId);});
    var base = {
      sourceInvoiceId: inv.id,
      invoiceNumber: inv.invoiceNumber,
      customerId: inv.customerId,
      customerName: cust ? (cust.name_ar || cust.name_en || cust.name || '-') : (inv.customerName || '-'),
      projectName: 'عقد تلقائي من الفاتورة ' + (inv.invoiceNumber||''),
      name_ar: 'عقد تلقائي من الفاتورة ' + (inv.invoiceNumber||''),
      name_en: 'Auto contract from invoice ' + (inv.invoiceNumber||''),
      date: inv.date || today(),
      total: N(inv.grandTotal || inv.total || 0),
      paidAmount: N(inv.paidAmount || 0),
      remainingAmount: N(inv.remainingAmount || 0),
      status:'active',
      status_ar:'عقد جديد',
      status_en:'New Contract',
      items: safeCopy(inv.items || [])
    };
    if(existing){ Object.assign(existing, base); existing.workItems = buildWorkItemsFromInvoice(inv, existing.workItems || []); recalcContractProgress(existing); return existing; }
    var c = Object.assign({id:Date.now(), contractNumber:'CTR-'+Date.now(), tasks:[]}, base);
    c.workItems = buildWorkItemsFromInvoice(inv, []);
    recalcContractProgress(c);
    contracts.unshift(c);
    return c;
  };
  try{ createContractFromInvoice = window.createContractFromInvoice; }catch(e){}

  // إصلاح عروض الأسعار المحولة والعقود القديمة
  window.rebuildContractsFromInvoices = function(){
    getInvoices().forEach(function(inv){ if(inv && inv.docType === 'invoice') window.createContractFromInvoice(inv); });
    window.normalizeAllContractProgressItems();
    if(typeof saveAll === 'function') saveAll();
  };

  // اعتراض العرض النهائي لصفحة العقود حتى تظهر بنود الفاتورة في كل مكان، خاصة مسؤول الورشة
  var oldRender = window.renderCurrentTab;
  window.renderCurrentTab = function(){
    try{
      if(String(window.currentTab || currentTab) === 'contracts'){
        document.getElementById('mainContent').innerHTML = window.renderContractsWithInvoiceItemsProgress();
        return;
      }
    }catch(e){ console.error(e); }
    return typeof oldRender === 'function' ? oldRender.apply(this, arguments) : undefined;
  };
  try{ renderCurrentTab = window.renderCurrentTab; }catch(e){}

  document.addEventListener('DOMContentLoaded', function(){
    setTimeout(function(){
      try{ window.rebuildContractsFromInvoices(); }catch(e){ try{ window.normalizeAllContractProgressItems(); }catch(_e){} }
    }, 1200);
  });
})();
</script>

<script id="invoice-due-date-safe-optional-patch">
(function(){
  'use strict';

  function isEnglish(){
    try { return typeof currentLang !== 'undefined' && currentLang === 'en'; } catch(e){ return false; }
  }

  function labelText(){
    return isEnglish() ? 'Due Date (optional)' : 'تاريخ الاستحقاق (اختياري)';
  }

  function noteText(){
    return isEnglish() ? 'Leave empty if there is no due date.' : 'اتركه فارغًا إذا لا يوجد تاريخ استحقاق.';
  }

  function getInvoiceObject(){
    try {
      if (typeof currentInvoice !== 'undefined' && currentInvoice) return currentInvoice;
      if (typeof editingInvoice !== 'undefined' && editingInvoice) return editingInvoice;
      if (typeof selectedInvoice !== 'undefined' && selectedInvoice) return selectedInvoice;
    } catch(e){}
    return null;
  }

  function normalize(inv){
    if(!inv || typeof inv !== 'object') return inv;
    if(inv.due_date && !inv.dueDate) inv.dueDate = inv.due_date;
    if(inv.dueDate === undefined || inv.dueDate === null) inv.dueDate = '';
    inv.due_date = inv.dueDate || '';
    return inv;
  }

  function visibleInvoiceArea(root){
    if(!root) return false;
    var txt = root.innerText || '';
    return /فاتورة|الفواتير|Invoice|Quotation|عرض أسعار|مستند/.test(txt) ||
           !!(root.querySelector && root.querySelector('[id*="invoice"], [name*="invoice"]'));
  }

  function addField(){
    if(document.getElementById('invoiceDueDate')) return;

    var scopes = Array.prototype.slice.call(document.querySelectorAll('.modal-content, #mainContent, .section-card'));
    var scope = scopes.find(visibleInvoiceArea);
    if(!scope) return;

    var anchor = scope.querySelector('#invoiceDate, [name="invoiceDate"], [name="date"], input[type="date"], #invoiceNumber, [name="invoiceNumber"]');
    if(!anchor) return;

    var inv = normalize(getInvoiceObject());
    var value = inv && inv.dueDate ? inv.dueDate : '';

    var wrapper = document.createElement('div');
    wrapper.className = 'form-group invoice-due-date-field';

    var label = document.createElement('label');
    label.setAttribute('for', 'invoiceDueDate');
    label.textContent = labelText();

    var input = document.createElement('input');
    input.type = 'date';
    input.id = 'invoiceDueDate';
    input.name = 'dueDate';
    input.value = value;

    var small = document.createElement('small');
    small.style.display = 'block';
    small.style.marginTop = '5px';
    small.style.color = 'var(--gray-500)';
    small.style.fontSize = '12px';
    small.textContent = noteText();

    wrapper.appendChild(label);
    wrapper.appendChild(input);
    wrapper.appendChild(small);

    var parent = anchor.closest('.form-group') || anchor.parentElement;
    if(parent && parent.parentElement){
      parent.parentElement.insertBefore(wrapper, parent.nextSibling);
    }else{
      anchor.insertAdjacentElement('afterend', wrapper);
    }
  }

  function capture(){
    var field = document.getElementById('invoiceDueDate') || document.querySelector('[name="dueDate"]');
    if(!field) return;
    var value = field.value || '';

    var inv = normalize(getInvoiceObject());
    if(inv){
      inv.dueDate = value;
      inv.due_date = value;
    }

    try{
      if(typeof invoices !== 'undefined' && Array.isArray(invoices)){
        var noField = document.querySelector('#invoiceNumber, [name="invoiceNumber"], [name="invoice_no"]');
        var no = noField ? noField.value : '';
        if(no){
          invoices.forEach(function(x){
            if((x.invoiceNumber || x.invoice_number) == no){
              x.dueDate = value;
              x.due_date = value;
            }
          });
        }
      }
    }catch(e){}
  }

  function showInInvoice(){
    var roots = Array.prototype.slice.call(document.querySelectorAll('.invoice-print, .invoice-preview, #invoicePrint, #invoicePreview, .print-area, .modal-content, #mainContent'));
    roots.forEach(function(root){
      if(!visibleInvoiceArea(root)) return;
      root.querySelectorAll('.invoice-due-date-display').forEach(function(el){ el.remove(); });

      var value = '';
      var inv = normalize(getInvoiceObject());
      if(inv) value = inv.dueDate || inv.due_date || '';

      var field = document.getElementById('invoiceDueDate') || document.querySelector('[name="dueDate"]');
      if(field && field.value) value = field.value;

      if(!value) return;

      var box = document.createElement('div');
      box.className = 'invoice-due-date-display';
      box.style.margin = '6px 0';
      box.style.fontWeight = '700';
      box.textContent = (isEnglish() ? 'Due Date: ' : 'تاريخ الاستحقاق: ') + value;

      var anchor = Array.prototype.slice.call(root.querySelectorAll('td, div, span, p, strong')).find(function(el){
        return /التاريخ|Date/.test(el.textContent || '');
      });

      if(anchor && anchor.parentElement){
        anchor.parentElement.insertAdjacentElement('afterend', box);
      }else{
        root.insertBefore(box, root.firstChild);
      }
    });
  }

  function normalizeInvoices(){
    try{
      if(typeof invoices !== 'undefined' && Array.isArray(invoices)){
        invoices.forEach(normalize);
      }
    }catch(e){}
  }

  var oldSaveAll = window.saveAll;
  if(typeof oldSaveAll === 'function' && !oldSaveAll.__dueDateSafeOptional){
    window.saveAll = function(){
      capture();
      normalizeInvoices();
      return oldSaveAll.apply(this, arguments);
    };
    window.saveAll.__dueDateSafeOptional = true;
  }

  ['saveInvoice','saveDocument','printInvoice','generateInvoicePDF','renderInvoices','renderInvoicePreview','openInvoiceModal','editInvoice','createInvoice','addInvoice'].forEach(function(name){
    var old = window[name];
    if(typeof old === 'function' && !old.__dueDateSafeOptional){
      window[name] = function(){
        addField();
        capture();
        normalizeInvoices();
        var res = old.apply(this, arguments);
        setTimeout(function(){ addField(); capture(); showInInvoice(); }, 80);
        return res;
      };
      window[name].__dueDateSafeOptional = true;
    }
  });

  document.addEventListener('DOMContentLoaded', function(){
    normalizeInvoices();
    setTimeout(function(){ addField(); showInInvoice(); }, 300);

    var observer = new MutationObserver(function(){
      addField();
      showInInvoice();
    });
    observer.observe(document.body, {childList:true, subtree:true});
  });

  document.addEventListener('input', function(e){
    if(e.target && (e.target.id === 'invoiceDueDate' || e.target.name === 'dueDate')){
      capture();
      showInInvoice();
    }
  }, true);

  document.addEventListener('click', function(e){
    var btn = e.target && e.target.closest ? e.target.closest('button, .btn, a') : null;
    if(!btn) return;
    var tx = btn.innerText || btn.textContent || '';
    if(/حفظ|طباعة|PDF|فاتورة|Invoice|Save|Print|إنشاء|Create/.test(tx)){
      addField();
      capture();
      setTimeout(showInInvoice, 120);
    }
  }, true);
})();
</script>

<script id="nan-dashboard-fix-patch">
(function(){
  'use strict';

  function safeNum(value){
    if(value === null || value === undefined || value === '' || value === 'NaN') return 0;
    if(typeof value === 'string') value = value.replace(/[^\d.-]/g, '');
    const n = Number(value);
    return Number.isFinite(n) ? n : 0;
  }

  window.erpSafeNumber = safeNum;

  function sanitizeData(){
    try{
      if(typeof bankAccounts !== 'undefined' && Array.isArray(bankAccounts)){
        bankAccounts.forEach(function(b){
          b.balance = safeNum(b.balance);
          if(b.bank_name && !b.bankName) b.bankName = b.bank_name;
          if(b.account_number && !b.accountNumber) b.accountNumber = b.account_number;
        });
      }
    }catch(e){}

    try{
      if(typeof cashBoxes !== 'undefined' && Array.isArray(cashBoxes)){
        cashBoxes.forEach(function(c){ c.balance = safeNum(c.balance); });
      }
    }catch(e){}

    try{
      if(typeof invoices !== 'undefined' && Array.isArray(invoices)){
        invoices.forEach(function(inv){
          inv.total = safeNum(inv.total || inv.grandTotal);
          inv.grandTotal = safeNum(inv.grandTotal || inv.total);
          inv.paidAmount = safeNum(inv.paidAmount || inv.paid_amount);
          inv.remainingAmount = safeNum(inv.remainingAmount || inv.remaining_amount);
          inv.advancePayment = safeNum(inv.advancePayment || inv.advance_payment);
          inv.subtotal = safeNum(inv.subtotal);
          inv.taxAmount = safeNum(inv.taxAmount || inv.tax_amount);
        });
      }
    }catch(e){}

    try{
      if(typeof expenses !== 'undefined' && Array.isArray(expenses)){
        expenses.forEach(function(e){ e.amount = safeNum(e.amount); });
      }
    }catch(e){}

    try{
      if(typeof products !== 'undefined' && Array.isArray(products)){
        products.forEach(function(p){
          p.price = safeNum(p.price);
          p.currentStock = safeNum(p.currentStock ?? p.current_stock);
          p.minStock = safeNum(p.minStock ?? p.min_stock);
        });
      }
    }catch(e){}

    try{
      if(typeof rawMaterials !== 'undefined' && Array.isArray(rawMaterials)){
        rawMaterials.forEach(function(p){
          p.price = safeNum(p.price);
          p.currentStock = safeNum(p.currentStock ?? p.current_stock);
          p.minStock = safeNum(p.minStock ?? p.min_stock);
        });
      }
    }catch(e){}
  }

  function fixTextNaN(){
    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
    const nodes = [];
    while(walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(function(node){
      if(node.nodeValue && node.nodeValue.indexOf('NaN') !== -1){
        node.nodeValue = node.nodeValue.replace(/NaN/g, '0.00');
      }
    });
  }

  ['updateDashboard','renderDashboard','renderCurrentTab','renderFinancialReports','renderBankAccounts'].forEach(function(name){
    const old = window[name];
    if(typeof old === 'function' && !old.__nanPatch){
      window[name] = function(){

        const result = old.apply(this, arguments);
        setTimeout(function(){
          sanitizeData();
          fixTextNaN();
        }, 60);
        return result;
      };
      window[name].__nanPatch = true;
    }
  });

  ['loadData','saveAll','syncCompleteSiteNow','syncFullSiteNow'].forEach(function(name){
    const old = window[name];
    if(typeof old === 'function' && !old.__nanPatch){
      window[name] = function(){
        const result = old.apply(this, arguments);
        sanitizeData();
        setTimeout(fixTextNaN, 100);
        return result;
      };
      window[name].__nanPatch = true;
    }
  });

  document.addEventListener('DOMContentLoaded', function(){
    sanitizeData();
    setTimeout(fixTextNaN, 300);
    setTimeout(fixTextNaN, 1200);

    const observer = new MutationObserver(function(){
      sanitizeData();
      fixTextNaN();
    });

    observer.observe(document.body, { childList:true, subtree:true, characterData:true });
  });

  window.addEventListener('load', function(){
    sanitizeData();
    setTimeout(fixTextNaN, 800);
  });
})();

<script id="receipt-delete-repair-v5-final">
(function(){
  'use strict';
  window.__receiptDeleteRepairV5 = true;
  function same(a,b){ return String(a) === String(b); }
  function getArr(name){

    try{ var v=(0,eval)(name); if(Array.isArray(v)) return v; }catch(e){}
    return [];
  }
  function setArr(name, arr){
    arr = Array.isArray(arr) ? arr : [];

    try{ (0,eval)(name + ' = window["' + name + '"]'); }catch(e){}
  }
  function keyMap(name){
    return {products:'erp_products',rawMaterials:'erp_raw_materials',customers:'erp_customers',invoices:'erp_invoices',contracts:'erp_contracts',bankAccounts:'erp_bank_accounts',cashBoxes:'erp_cash_boxes',expenses:'erp_expenses',supplierInvoices:'erp_supplier_invoices',liabilities:'erp_liabilities',receipts:'erp_receipts',auditLogs:'erp_audit',bankTransactions:'erp_bank_transactions'}[name];
  }
  function saveOne(name){
    try{ var k=keyMap(name); if(k) localStorage.setItem(k, JSON.stringify(getArr(name))); }catch(e){}
  }
  function saveAllStrong(){
    ['receipts','invoices','bankAccounts','cashBoxes','auditLogs','bankTransactions'].forEach(saveOne);
    try{ if(typeof saveAll === 'function') saveAll(); }catch(e){ console.warn('saveAll failed after receipt delete', e); }
  }
  function findReceipt(id){ return getArr('receipts').find(function(r){ return same(r.id,id); }); }
  function recalcLinkedInvoice(receipt){
    var invoices = getArr('invoices');
    invoices.forEach(function(inv){
      var linked = same(inv.id, receipt.invoiceId) || same(inv.id, receipt.sourceInvoiceId) || (receipt.invoiceNumber && same(inv.invoiceNumber, receipt.invoiceNumber));
      if(!linked) return;
      if(Array.isArray(inv.payments)){
        inv.payments = inv.payments.filter(function(p){
          return !same(p.receiptId, receipt.id) && !same(p.sourceReceiptId, receipt.id) && !same(p.id, receipt.id);
        });
      }
      if(receipt.type === 'advance' || receipt.isAdvance || same(receipt.sourceInvoiceId, inv.id)){
        inv.advancePayment = 0;
      }
      try{ if(typeof recalcInvoice === 'function') recalcInvoice(inv); }catch(e){}
    });
    setArr('invoices', invoices);
  }
  function reverseBankOrCash(receipt){
    var amount = Number(receipt.amount || 0) || 0;
    if(amount <= 0) return;
    var accountId = receipt.accountId || receipt.bankAccountId || receipt.cashBoxId || '';
    var bankName = receipt.bankName || receipt.accountName || receipt.bank || '';
    var method = receipt.method || receipt.paymentType || receipt.payment_type || '';
    var isBank = !!bankName || same(receipt.accountType,'bank') || method.indexOf('بنك') >= 0 || method.indexOf('شيك') >= 0 || method.toLowerCase().indexOf('bank') >= 0;
    var arrName = isBank ? 'bankAccounts' : 'cashBoxes';

  }

      if(typeof window.autoSyncNow === 'function') return await window.autoSyncNow(true);
    }catch(e){ console.warn('receipt delete cloud save failed', e); }
    return false;
  }
  window.deleteReceipt = async function(id){
    id = String(id || '');
    var receipt = findReceipt(id);
    if(!receipt){
      if(typeof showNotification === 'function') showNotification('لم يتم العثور على سند القبض للحذف', '#ef4444');
      return false;
    }
    if(typeof hasPermission === 'function' && !hasPermission('receipts','crud')){
      if(typeof showNotification === 'function') showNotification('لا تملك صلاحية حذف سندات القبض', '#ef4444');
      return false;
    }
    if(!confirm('هل تريد حذف سند القبض؟')) return false;
    reverseBankOrCash(receipt);
    recalcLinkedInvoice(receipt);
    var before = getArr('receipts');
    var after = before.filter(function(r){ return !same(r.id, id); });
    setArr('receipts', after);
    saveAllStrong();
    try{ if(typeof addAudit === 'function') addAudit('delete', 'receipt', id); }catch(e){}
    try{ if(typeof renderCurrentTab === 'function') renderCurrentTab(); }catch(e){}
    if(after.length === before.length){
      if(typeof showNotification === 'function') showNotification('لم يتم حذف السند: رقم السند غير مطابق', '#ef4444');
      return false;
    }

  };
  function bind(){

})();

<script id="final-safe-login-and-alerts-v8">
(function(){
  'use strict';
  function byId(id){ return document.getElementById(id); }
  function lang(){ try { return currentLang === 'en' ? 'en' : 'ar'; } catch(e){ return localStorage.getItem('erp_lang') === 'en' ? 'en' : 'ar'; } }

  function notify(msg,color){ try { if(typeof showNotification === 'function') showNotification(msg,color||'#2563eb'); else alert(msg); } catch(e){ try{ alert(msg); }catch(_){ } } }
  function num(v){ var n = Number(String(v == null ? 0 : v).replace(',', '.')); return isFinite(n) ? n : 0; }
  function today(){ return new Date().toISOString().slice(0,10); }
  function daysUntil(dateText){ var d = new Date(String(dateText||'').slice(0,10) + 'T00:00:00'); if(isNaN(d.getTime())) return 999999; var now = new Date(today() + 'T00:00:00'); return Math.ceil((d - now) / 86400000); }
