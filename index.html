<script>
/* ===== Employee salary entitlement upgrade: monthly salary, absence deductions, overtime increase, final dues ===== */
(function(){
  'use strict';
  function num(v){ return parseFloat(String(v ?? 0).replace(',', '.')) || 0; }
  function today(){ return new Date().toISOString().slice(0,10); }
  function ym(){ return new Date().toISOString().slice(0,7); }
  function money(v){ return num(v).toFixed(2) + (window.currentLang === 'en' ? ' OMR' : ' ريال'); }
  function label(ar,en){ return window.currentLang === 'en' ? en : ar; }
  function savePayrollData(){
    try { localStorage.setItem('erp_employees', JSON.stringify(window.employees || [])); } catch(e){}
    try { localStorage.setItem('erp_attendanceRecords', JSON.stringify(window.attendanceRecords || [])); } catch(e){}
    try { localStorage.setItem('erp_attendance_records', JSON.stringify(window.attendanceRecords || [])); } catch(e){}
    try { localStorage.setItem('erp_payrollRuns', JSON.stringify(window.payrollRuns || [])); } catch(e){}
    try { if(typeof saveAll === 'function') saveAll(); } catch(e){}
  }
  function audit(action, entity, id, details){
    try { if(typeof auditor === 'function') { auditor(action, entity, id, details || ''); return; } } catch(e){}
    try { if(typeof addAudit === 'function') { addAudit(action, entity, id); return; } } catch(e){}
  }
  function workDays(emp){ return Math.max(1, num(emp.workDays || emp.salaryDays || 30)); }
  function dailyHours(emp){ return Math.max(1, num(emp.dailyHours || emp.workHours || 9)); }
  function hourlyRate(emp){ return num(emp.monthlySalary) / workDays(emp) / dailyHours(emp); }
  function dailyDeduction(emp){ return num(emp.dailyDeduction || (num(emp.monthlySalary) / workDays(emp))); }
  function recordsForMonth(empId, month){
    window.attendanceRecords = window.attendanceRecords || [];
    return attendanceRecords.filter(r => String(r.employeeId) === String(empId) && String(r.date || '').startsWith(month));
  }
  function payrollRow(emp, month){
    const recs = recordsForMonth(emp.id, month);
    const absenceDeduction = recs.reduce((s,r) => s + num(r.deduction), 0);
    const overtimeHours = recs.reduce((s,r) => s + num(r.overtimeHours), 0);
    const overtimeIncrease = overtimeHours * hourlyRate(emp);
    const monthlySalary = num(emp.monthlySalary);
    return {
      employeeId: emp.id,
      name: emp.name || emp.name_ar || emp.name_en || '-',
      monthlySalary,
      absenceDeduction,
      overtimeHours,
      hourlyRate: hourlyRate(emp),
      overtimeIncrease,
      finalDues: Math.max(0, monthlySalary - absenceDeduction + overtimeIncrease)
    };
  }
  window.addEmployeePayroll = function(){
    window.employees = window.employees || [];
    const name = prompt(label('اسم الموظف / العامل:', 'Employee name:'));
    if(!name) return;
    const salary = num(prompt(label('الراتب الشهري:', 'Monthly salary:'), '250'));
    const days = num(prompt(label('أيام العمل المعتمدة لحساب الراتب:', 'Salary work days:'), '30')) || 30;
    const hours = num(prompt(label('ساعات العمل اليومية:', 'Daily work hours:'), '9')) || 9;
    const role = prompt(label('المسمى الوظيفي:', 'Job title:'), label('عامل', 'Worker')) || label('عامل','Worker');
    const wid = prompt(label('رقم الورشة إن وجد:', 'Workshop ID if any:'), (window.workshops && workshops[0] ? workshops[0].id : '')) || '';
    employees.push({ id: Date.now(), name, role, workshopId: wid, monthlySalary: salary, workDays: days, dailyHours: hours, dailyDeduction: salary / days, status: 'active' });
    savePayrollData(); audit('إضافة موظف للرواتب','employees',name,'');
    if(typeof renderCurrentTab === 'function') renderCurrentTab();
  };
  window.editEmployeePayroll = function(id){
    const emp = (window.employees || []).find(e => String(e.id) === String(id));
    if(!emp) return;
    emp.name = prompt(label('اسم الموظف:', 'Employee name:'), emp.name || '') || emp.name;
    emp.role = prompt(label('المسمى الوظيفي:', 'Job title:'), emp.role || '') || emp.role;
    emp.monthlySalary = num(prompt(label('الراتب الشهري:', 'Monthly salary:'), emp.monthlySalary || 0));
    emp.workDays = num(prompt(label('أيام العمل المعتمدة:', 'Salary work days:'), emp.workDays || 30)) || 30;
    emp.dailyHours = num(prompt(label('ساعات العمل اليومية:', 'Daily work hours:'), emp.dailyHours || 9)) || 9;
    emp.dailyDeduction = emp.monthlySalary / emp.workDays;
    savePayrollData(); audit('تعديل موظف للرواتب','employees',emp.name,'');
    renderCurrentTab();
  };
  window.deleteEmployeePayroll = function(id){
    const emp = (window.employees || []).find(e => String(e.id) === String(id));
    if(!emp || !confirm(label('هل تريد حذف هذا الموظف؟', 'Delete this employee?'))) return;
    window.employees = employees.filter(e => String(e.id) !== String(id));
    savePayrollData(); audit('حذف موظف','employees',emp.name,'');
    renderCurrentTab();
  };
  window.savePayrollAttendance = function(){
    const date = document.getElementById('payrollAttDate')?.value || today();
    window.attendanceRecords = window.attendanceRecords || [];
    (window.employees || []).forEach(emp => {
      const st = document.getElementById('payrollStatus_' + emp.id)?.value || 'present';
      const overtimeHours = num(document.getElementById('payrollOvertime_' + emp.id)?.value || 0);
      let deduction = 0;
      if(st === 'absent') deduction = dailyDeduction(emp);
      if(st === 'half') deduction = dailyDeduction(emp) / 2;
      let rec = attendanceRecords.find(r => String(r.employeeId) === String(emp.id) && r.date === date);
      if(!rec){ rec = { id: Date.now() + Math.random(), employeeId: emp.id, date, month: date.slice(0,7) }; attendanceRecords.push(rec); }
      Object.assign(rec, { status: st, deduction, overtimeHours, overtimeAmount: overtimeHours * hourlyRate(emp), hourlyRate: hourlyRate(emp), month: date.slice(0,7) });
    });
    savePayrollData(); audit('حفظ حضور ورواتب يومية','attendance',date,'');
    showNotification && showNotification(label('تم حفظ الحضور والأوفر تايم', 'Attendance and overtime saved'), '#10b981');
    renderCurrentTab();
  };
  window.generatePayroll = function(){
    const month = document.getElementById('payrollMonth')?.value || prompt(label('الشهر بصيغة YYYY-MM:', 'Month YYYY-MM:'), ym());
    if(!month) return;
    const rows = (window.employees || []).map(e => payrollRow(e, month));
    const netTotal = rows.reduce((s,r) => s + r.finalDues, 0);
    window.payrollRuns = window.payrollRuns || [];
    payrollRuns.unshift({ id: Date.now(), month, rows, netTotal, accountantSignature: window.currentUser?.name_ar || window.currentUser?.username || '-', signedAt: new Date().toISOString() });
    savePayrollData(); audit('إنشاء مسير رواتب مفصل','payroll',month,money(netTotal));
    showNotification && showNotification(label('تم إنشاء مسير الرواتب', 'Payroll run created'), '#10b981');
    renderCurrentTab();
  };
  window.renderHRPayrollEnhanced = function(){
    const month = document.getElementById('payrollMonth')?.value || ym();
    const date = document.getElementById('payrollAttDate')?.value || today();
    window.employees = window.employees || [];
    window.attendanceRecords = window.attendanceRecords || [];
    window.payrollRuns = window.payrollRuns || [];
    const rows = employees.map(e => payrollRow(e, month));
    const totals = rows.reduce((a,r)=>({salary:a.salary+r.monthlySalary,ded:a.ded+r.absenceDeduction,ot:a.ot+r.overtimeIncrease,net:a.net+r.finalDues,hours:a.hours+r.overtimeHours}), {salary:0,ded:0,ot:0,net:0,hours:0});
    const empRows = rows.map(r => {
      const emp = employees.find(e => String(e.id) === String(r.employeeId)) || {};
      const w = (window.workshops || []).find(x => String(x.id) === String(emp.workshopId));
      return `<tr>

      <div class="section-card"><h3>${label('مسيرات الرواتب المحفوظة','Saved Payroll Runs')}</h3><div style="overflow-x:auto"><table class="table"><thead><tr><th>${label('الشهر','Month')}</th><th>${label('صافي الرواتب','Net Payroll')}</th><th>${label('توقيع المحاسب','Accountant Signature')}</th><th>${label('التفاصيل','Details')}</th></tr></thead><tbody>${runRows}</tbody></table></div></div>
    </div>`;
  };
  const previousRender = window.renderCurrentTab;
  window.renderCurrentTab = function(){
    if(window.currentTab === 'hrPayroll' || (typeof currentTab !== 'undefined' && currentTab === 'hrPayroll')){
      const main = document.getElementById('mainContent') || window.mainContent;
      if(main){ main.innerHTML = window.renderHRPayrollEnhanced(); return; }

<style>
.payroll-kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:18px}.payroll-mini{background:var(--gray-100);border:1px solid var(--gray-200);border-radius:18px;padding:14px}.payroll-mini b{display:block;font-size:1.25rem;color:var(--primary);margin-top:6px}.payroll-form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;align-items:end}.payroll-table input,.payroll-table select{min-width:95px}.payroll-actions{display:flex;gap:6px;flex-wrap:wrap}.payroll-note{background:#eff6ff;border:1px solid #bfdbfe;border-radius:16px;padding:12px;margin:12px 0;color:#1e40af}body.dark .payroll-note{background:#172554;color:#bfdbfe;border-color:#1e3a8a}
</style>
<script>
(function(){
'use strict';
const TAB='employeePayrollPro';
function lang(){return window.currentLang==='en'?'en':'ar'}
function L(ar,en){return lang()==='en'?en:ar}
function n(v){return parseFloat(String(v??0).replace(',','.'))||0}
function money(v){return n(v).toFixed(2)+' '+L('ريال','OMR')}
function today(){return new Date().toISOString().slice(0,10)}
function ym(){return today().slice(0,7)}
function load(){
  try{window.employees=JSON.parse(localStorage.getItem('erp_employees')||'[]')}catch(e){window.employees=[]}
  try{window.payrollRuns=JSON.parse(localStorage.getItem('erp_payrollRuns')||'[]')}catch(e){window.payrollRuns=[]}
  try{window.attendanceRecords=JSON.parse(localStorage.getItem('erp_attendanceRecords')||localStorage.getItem('erp_attendance_records')||'[]')}catch(e){window.attendanceRecords=[]}
  if(!Array.isArray(window.employees)) window.employees=[];
  if(!Array.isArray(window.payrollRuns)) window.payrollRuns=[];
  if(!Array.isArray(window.attendanceRecords)) window.attendanceRecords=[];
  if(!window.employees.length){
    window.employees=[
      {id:Date.now()+1,name_ar:'عامل 1',name_en:'Worker 1',name:'عامل 1',job_ar:'عامل',job_en:'Worker',monthlySalary:250,workDays:30,dailyHours:9,status:'active'},
      {id:Date.now()+2,name_ar:'عامل 2',name_en:'Worker 2',name:'عامل 2',job_ar:'فني',job_en:'Technician',monthlySalary:300,workDays:30,dailyHours:9,status:'active'}
    ];
    save();
  }
  normalizeEmployees();
}
function save(){
  localStorage.setItem('erp_employees',JSON.stringify(window.employees||[]));
  localStorage.setItem('erp_payrollRuns',JSON.stringify(window.payrollRuns||[]));
  localStorage.setItem('erp_attendanceRecords',JSON.stringify(window.attendanceRecords||[]));
  try{if(typeof window.saveAll==='function') window.saveAll()}catch(e){}
}
function normalizeEmployees(){
  (window.employees||[]).forEach(e=>{
    e.id=e.id||Date.now()+Math.random();
    e.name_ar=e.name_ar||e.name||e.name_en||'';
    e.name_en=e.name_en||e.name||e.name_ar||'';
    e.name=e.name_ar||e.name_en||e.name||'';
    e.job_ar=e.job_ar||e.role||e.job_en||'';
    e.job_en=e.job_en||e.role||e.job_ar||'';
    e.monthlySalary=n(e.monthlySalary);
    e.workDays=n(e.workDays||30)||30;
    e.dailyHours=n(e.dailyHours||9)||9;
    e.status=e.status||'active';
  });
}
function empName(e){return lang()==='en'?(e.name_en||e.name_ar||e.name||'-'):(e.name_ar||e.name||e.name_en||'-')}
function empJob(e){return lang()==='en'?(e.job_en||e.job_ar||'-'):(e.job_ar||e.job_en||'-')}
function hourly(e){return n(e.monthlySalary)/(n(e.workDays||30)*n(e.dailyHours||9)||1)}
function dayRate(e){return n(e.monthlySalary)/(n(e.workDays||30)||30)}
function calcRow(e,month){
  const rows=(window.attendanceRecords||[]).filter(r=>String(r.employeeId)===String(e.id)&&String(r.date||'').startsWith(month));
  let absentDays=0, halfDays=0, absenceDeduction=0, overtimeHours=0, manualBonus=0, manualDeduction=0;
  rows.forEach(r=>{ if(r.status==='absent') absentDays += 1; if(r.status==='half') halfDays += .5; absenceDeduction += n(r.deduction); overtimeHours += n(r.overtimeHours); manualBonus += n(r.manualBonus); manualDeduction += n(r.manualDeduction); });
  if(absenceDeduction<=0) absenceDeduction=(absentDays+halfDays)*dayRate(e);
  const overtimeAmount=overtimeHours*hourly(e);
  const finalDue=Math.max(0,n(e.monthlySalary)-absenceDeduction-manualDeduction+overtimeAmount+manualBonus);
  return {employeeId:e.id,name:empName(e),job:empJob(e),monthlySalary:n(e.monthlySalary),hourlyRate:hourly(e),absentDays,halfDays,absenceDeduction,overtimeHours,overtimeAmount,manualBonus,manualDeduction,finalDue};
}
function ensurePermission(){
  try{
    if(window.permissions){['super_admin','admin','accountant'].forEach(r=>{window.permissions[r]=window.permissions[r]||{};window.permissions[r].employeePayrollPro='crud';window.permissions[r].employees='crud';});}
  }catch(e){}
}
function canUse(){
  if(!window.currentUser) return false;
  if(['super_admin','admin','accountant'].includes(window.currentUser.role)) return true;
  try{return typeof window.hasPermission==='function' && (window.hasPermission('employeePayrollPro')||window.hasPermission('employees'))}catch(e){return false}
}
window.openEmployeePayrollModal=function(id){
  load();
  const e=id?(window.employees||[]).find(x=>String(x.id)===String(id)):null;
  const html=`<div id="employeePayrollModal" class="modal" style="display:flex"><div class="modal-content"><h3>${e?L('تعديل موظف','Edit Employee'):L('إضافة موظف','Add Employee')}</h3>
    <div class="payroll-form-grid">
      <div><label>${L('الاسم بالعربي','Arabic Name')}</label><input id="empNameAr" value="${e?.name_ar||''}"></div>
      <div><label>${L('الاسم بالإنجليزي','English Name')}</label><input id="empNameEn" value="${e?.name_en||''}"></div>
      <div><label>${L('الوظيفة بالعربي','Arabic Job')}</label><input id="empJobAr" value="${e?.job_ar||e?.role||''}"></div>
      <div><label>${L('الوظيفة بالإنجليزي','English Job')}</label><input id="empJobEn" value="${e?.job_en||e?.role||''}"></div>
      <div><label>${L('الراتب الشهري','Monthly Salary')}</label><input id="empSalary" type="number" step="0.01" value="${e?.monthlySalary||250}"></div>
      <div><label>${L('أيام العمل الشهرية','Monthly Work Days')}</label><input id="empWorkDays" type="number" step="0.01" value="${e?.workDays||30}"></div>
      <div><label>${L('ساعات العمل اليومية','Daily Work Hours')}</label><input id="empDailyHours" type="number" step="0.01" value="${e?.dailyHours||9}"></div>
      <div><label>${L('الحالة','Status')}</label><select id="empStatus"><option value="active" ${e?.status!=='inactive'?'selected':''}>${L('نشط','Active')}</option><option value="inactive" ${e?.status==='inactive'?'selected':''}>${L('موقوف','Inactive')}</option></select></div>
    </div><div style="margin-top:14px"><button class="btn btn-primary" onclick="saveEmployeePayroll('${id||''}')">${L('حفظ','Save')}</button> <button class="btn btn-secondary" onclick="document.getElementById('employeePayrollModal').remove()">${L('إلغاء','Cancel')}</button></div></div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}
window.saveEmployeePayroll=function(id){
  load();
  let e=id?(window.employees||[]).find(x=>String(x.id)===String(id)):null;
  if(!e){e={id:Date.now()};window.employees.push(e)}
  e.name_ar=document.getElementById('empNameAr').value.trim();
  e.name_en=document.getElementById('empNameEn').value.trim();
  e.name=e.name_ar||e.name_en;
  e.job_ar=document.getElementById('empJobAr').value.trim();
  e.job_en=document.getElementById('empJobEn').value.trim();
  e.role=e.job_ar||e.job_en;
  e.monthlySalary=n(document.getElementById('empSalary').value);
  e.workDays=n(document.getElementById('empWorkDays').value)||30;
  e.dailyHours=n(document.getElementById('empDailyHours').value)||9;
  e.dailyDeduction=dayRate(e);
  e.status=document.getElementById('empStatus').value;
  if(!e.name_ar&&!e.name_en){alert(L('اكتب اسم الموظف','Enter employee name'));return;}
  save();document.getElementById('employeePayrollModal')?.remove();window.renderCurrentTab();
}
window.deleteEmployeePayroll=function(id){
  if(!confirm(L('هل تريد حذف الموظف؟','Delete this employee?'))) return;
  load();window.employees=(window.employees||[]).filter(e=>String(e.id)!==String(id));save();window.renderCurrentTab();
}
window.savePayrollAttendance=function(){
  load();
  const date=document.getElementById('payrollDate')?.value||today();
  (window.employees||[]).forEach(e=>{
    const st=document.getElementById('pay_st_'+e.id)?.value||'present';
    const ot=n(document.getElementById('pay_ot_'+e.id)?.value);
    const md=n(document.getElementById('pay_md_'+e.id)?.value);
    const mb=n(document.getElementById('pay_mb_'+e.id)?.value);
    const note=document.getElementById('pay_note_'+e.id)?.value||'';
    const ded=st==='absent'?dayRate(e):(st==='half'?dayRate(e)/2:0);
    let rec=(window.attendanceRecords||[]).find(r=>String(r.employeeId)===String(e.id)&&r.date===date);
    if(!rec){rec={id:Date.now()+Math.random(),employeeId:e.id,date};window.attendanceRecords.push(rec)}
    Object.assign(rec,{status:st,deduction:ded,overtimeHours:ot,manualDeduction:md,manualBonus:mb,note,month:date.slice(0,7)});
  });
  save();window.renderCurrentTab();
  try{showNotification(L('تم حفظ بيانات الرواتب لهذا اليوم','Payroll day saved'),'#10b981')}catch(e){}
}
window.createPayrollRunPro=function(){
  load();
  const month=document.getElementById('payrollMonth')?.value||ym();
  const rows=(window.employees||[]).filter(e=>e.status!=='inactive').map(e=>calcRow(e,month));
  const totalBasic=rows.reduce((a,r)=>a+r.monthlySalary,0), totalDed=rows.reduce((a,r)=>a+r.absenceDeduction+r.manualDeduction,0), totalOt=rows.reduce((a,r)=>a+r.overtimeAmount,0), netTotal=rows.reduce((a,r)=>a+r.finalDue,0);
  window.payrollRuns.unshift({id:Date.now(),month,rows,totalBasic,totalDed,totalOt,netTotal,createdAt:new Date().toISOString(),createdBy:window.currentUser?.username||''});
  save();window.renderCurrentTab();
  try{showNotification(L('تم إنشاء مسير الرواتب','Payroll run created'),'#10b981')}catch(e){}
}
window.renderEmployeePayrollPro=function(){

  return `<div class="section-card"><div class="section-header"><h2>👷 ${L('الموظفين والرواتب','Employees & Payroll')}</h2><div class="payroll-actions no-print"><button class="btn btn-primary" onclick="openEmployeePayrollModal()">+ ${L('إضافة موظف','Add Employee')}</button><button class="btn btn-success" onclick="createPayrollRunPro()">${L('إنشاء مسير رواتب','Create Payroll Run')}</button><button class="btn btn-secondary" onclick="window.print()">${L('طباعة','Print')}</button></div></div>
  <div class="payroll-note">${L('طريقة الحساب: أجر الساعة = الراتب الشهري ÷ أيام العمل ÷ ساعات العمل اليومية. زيادة الأوفر تايم = ساعات الأوفر × أجر الساعة العادية لكل موظف. المستحق النهائي = الراتب الشهري - خصم الغياب - الخصومات اليدوية + الأوفر تايم + الزيادات اليدوية.','Formula: Hourly rate = monthly salary ÷ work days ÷ daily work hours. Overtime increase = overtime hours × normal hourly rate for each employee. Final due = monthly salary - absence deduction - manual deductions + overtime + manual bonuses.')}</div>

<script>
/* ===== PATCH: Friday attendance zero by default + automatic overtime when edited ===== */
(function(){
  'use strict';
  function getJSON(k, fallback){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):fallback; }catch(e){ return fallback; } }
  function setJSON(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
  function isFriday(date){ try{ return new Date(String(date)+'T12:00:00').getDay() === 5; }catch(e){ return false; } }
  function minutes(t){ var p=String(t||'00:00').split(':'); return (parseInt(p[0],10)||0)*60 + (parseInt(p[1],10)||0); }
  function hoursBetween(a,b){ var x=minutes(a), y=minutes(b); if(y < x) y += 1440; return Math.max(0,(y-x)/60); }
  function n(v){ return parseFloat(String(v==null?0:v).replace(',','.')) || 0; }
  function employeeRate(emp){ var salary=n(emp && (emp.monthlySalary || emp.salary)); return n(emp && emp.hourlyRate) || (salary ? salary / 30 / 9 : 0); }
  function findEmp(id){ var list=Array.isArray(window.employees)?window.employees:getJSON('erp_employees',[]); return (list||[]).find(function(e){ return String(e.id)===String(id); }) || {}; }
  function loadRecords(){ var r=getJSON('erp_attendance_records', null); if(!Array.isArray(r)) r=getJSON('erp_attendanceRecords', []); return Array.isArray(r)?r:[]; }
  function saveRecords(records){ window.attendanceRecords=records; setJSON('erp_attendance_records', records); setJSON('erp_attendanceRecords', records); try{ if(typeof saveAll==='function') saveAll(); }catch(e){} }
  function getRecord(records, empId, date){
    var rec=(records||[]).find(function(r){ return String(r.employeeId)===String(empId) && r.date===date; });
    if(!rec){ rec={id:Date.now()+Math.random(),employeeId:String(empId),date:date}; records.push(rec); }
    return rec;
  }
  function enforceFridayRecord(rec, emp){
    if(!isFriday(rec.date)) return rec;
    ['inMorning','outMorning','inAfternoon','outAfternoon'].forEach(function(k){ if(!rec[k]) rec[k]='00:00'; });
    var worked = hoursBetween(rec.inMorning, rec.outMorning) + hoursBetween(rec.inAfternoon, rec.outAfternoon);
    if(worked <= 0){
      rec.status='leave'; rec.normalHours=0; rec.overtimeHours=0; rec.overtimeAmount=0; rec.deduction=0;
      rec.deductionReason='الجمعة إجازة - الدخول والخروج 00:00'; rec.autoFridayZero=true;
    } else {
      rec.status='present'; rec.normalHours=0; rec.overtimeHours=worked; rec.overtimeAmount=worked * employeeRate(emp); rec.deduction=0;
      rec.deductionReason='عمل يوم الجمعة - كل الوقت المسجل أوفر تايم'; rec.fridayUserEdited=true; rec.autoFridayZero=false;
    }
    return rec;
  }
  function enforceAllFridayZeros(){
    var records=loadRecords(); var employees=Array.isArray(window.employees)?window.employees:getJSON('erp_employees',[]);
    records.forEach(function(rec){ if(isFriday(rec.date)){ enforceFridayRecord(rec, (employees||[]).find(function(e){return String(e.id)===String(rec.employeeId);}) || {}); } });
    saveRecords(records);
  }
  document.addEventListener('change', function(ev){
    var el=ev.target;
    if(!el || !el.matches || !el.matches('input[type="time"][data-att-field]')) return;
    var date=el.getAttribute('data-date'), empId=el.getAttribute('data-emp'), field=el.getAttribute('data-att-field');
    if(!date || !empId || !isFriday(date)) return;
    var records=loadRecords(); var emp=findEmp(empId); var rec=getRecord(records, empId, date);
    rec[field]=el.value || '00:00'; enforceFridayRecord(rec, emp); rec.updatedAt=new Date().toISOString(); saveRecords(records);
    if(typeof showNotification==='function'){
      if(rec.overtimeHours>0) showNotification('تم حساب عمل الجمعة أوفر تايم: '+rec.overtimeHours.toFixed(2)+' ساعة','#10b981');
      else showNotification('تم ضبط الجمعة كإجازة بتوقيت 00:00','#06b6d4');
    }
    if(typeof renderCurrentTab==='function') renderCurrentTab();
  }, true);
  var oldRender = window.renderMonthlyAttendance;
  if(typeof oldRender === 'function' && !window.__fridayZeroAutoOvertimePatch){
    window.__fridayZeroAutoOvertimePatch = true;
    window.renderMonthlyAttendance = function(){
      enforceAllFridayZeros();
      var html = oldRender.apply(this, arguments);
      html = String(html).replace('الجمعة إجازة:</b> تظهر الأوقات 00:00 افتراضياً، وإذا تم إدخال توقيت عمل في الجمعة تُحسب كل الساعات المسجلة أوفر تايم.', 'الجمعة إجازة:</b> يكون وقت الدخول والخروج 00:00 افتراضياً، وإذا عدّلت أي وقت إلى رقم آخر يتم حساب كامل الوقت المسجل أوفر تايم.');
      return html;
    };
    try{ if(typeof renderMonthlyAttendance==='function') renderMonthlyAttendance=window.renderMonthlyAttendance; }catch(e){}
  }
  enforceAllFridayZeros();
})();
</script>
<script>
/* FINAL PATCH: force every Friday attendance time to 00:00 unless user enters another time */
(function(){
  function g(k,f){try{var v=localStorage.getItem(k);return v?JSON.parse(v):f}catch(e){return f}}
  function s(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
  function isFri(d){try{return new Date(String(d)+'T12:00:00').getDay()===5}catch(e){return false}}
  function mins(t){var p=String(t||'00:00').split(':');return (parseInt(p[0],10)||0)*60+(parseInt(p[1],10)||0)}
  function diff(a,b){var x=mins(a),y=mins(b);if(y<x)y+=1440;return Math.max(0,y-x)}
  function rate(emp){var sal=parseFloat(String((emp&& (emp.monthlySalary||emp.salary))||0).replace(',','.'))||0;return (parseFloat(emp&&emp.hourlyRate)||0)||(sal?sal/30/9:0)}
  function normalize(rec, emp){if(!rec||!isFri(rec.date))return rec;['inMorning','outMorning','inAfternoon','outAfternoon'].forEach(function(k){if(!rec[k])rec[k]='00:00'});var worked=diff(rec.inMorning,rec.outMorning)+diff(rec.inAfternoon,rec.outAfternoon);rec.normalHours=0;rec.overtimeMinutes=worked;rec.overtimeHours=worked/60;rec.overtimePay=(worked/60)*rate(emp||{});rec.deduction=0;rec.lateMinutes=0;if(worked>0){rec.status='present';rec.deductionReason='عمل يوم الجمعة - كل الوقت المسجل أوفر تايم'}else{rec.status='leave';rec.deductionReason='الجمعة إجازة - وقت الدخول والخروج 00:00'}return rec}
  function normalizeAll(){var recs=g('erp_attendance_records',null);if(!Array.isArray(recs))recs=g('erp_attendanceRecords',[]);var em=g('erp_employees',window.employees||[]);if(!Array.isArray(recs))recs=[];recs.forEach(function(r){var emp=(em||[]).find(function(e){return String(e.id)===String(r.employeeId)});normalize(r,emp)});window.attendanceRecords=recs;s('erp_attendance_records',recs);s('erp_attendanceRecords',recs)}
  var oldRender=window.renderMonthlyAttendance;
  if(typeof oldRender==='function'){window.renderMonthlyAttendance=function(){normalizeAll();var out=oldRender.apply(this,arguments);setTimeout(normalizeAll,0);return out};try{renderMonthlyAttendance=window.renderMonthlyAttendance}catch(e){}}
  var oldSave=window.attProSaveDay;
  if(typeof oldSave==='function'){window.attProSaveDay=function(){oldSave.apply(this,arguments);normalizeAll();}}
  document.addEventListener('change',function(ev){var el=ev.target;if(el&&el.matches&&el.matches('input[type="time"][data-att-pro-field], input[type="time"][data-att-field]')){setTimeout(function(){normalizeAll();},0)}},true);
  normalizeAll();
})();
</script>
<script>
/* ===== تطوير الصناديق والبنوك والمصروفات وربط سندات القبض بالفواتير ===== */
(function(){
'use strict';
function num(v){ return parseFloat(String(v ?? 0).replace(',', '.')) || 0; }
function today(){ return new Date().toISOString().slice(0,10); }
function monthOf(d){ return String(d || today()).slice(0,7); }
function money(v){ return num(v).toFixed(3) + ' ريال'; }
function safeId(){ return Date.now() + Math.floor(Math.random()*999); }
function arrLoad(key){ try { let v=JSON.parse(localStorage.getItem(key)||'[]'); return Array.isArray(v)?v:[]; } catch(e){ return []; } }
function persistFinance(){
  try { localStorage.setItem('erp_bank_accounts', JSON.stringify(bankAccounts||[])); } catch(e){}
  try { localStorage.setItem('erp_cash_boxes', JSON.stringify(cashBoxes||[])); } catch(e){}
  try { localStorage.setItem('erp_expenses', JSON.stringify(expenses||[])); } catch(e){}
  try { localStorage.setItem('erp_invoices', JSON.stringify(invoices||[])); } catch(e){}
  try { localStorage.setItem('erp_receipts', JSON.stringify(receipts||[])); } catch(e){}
  try { localStorage.setItem('erp_bank_transactions', JSON.stringify(window.bankTransactions||[])); } catch(e){}
  try { localStorage.setItem('erp_cash_transactions', JSON.stringify(window.cashTransactions||[])); } catch(e){}
  try { if(typeof saveAll==='function') saveAll(); } catch(e){}
}
function ensureFinanceData(){
  if(!Array.isArray(bankAccounts)) bankAccounts=[];
  if(!Array.isArray(cashBoxes)) cashBoxes=[];
  if(!Array.isArray(expenses)) expenses=[];
  if(!Array.isArray(receipts)) receipts=[];
  if(!Array.isArray(invoices)) invoices=[];
  window.bankTransactions = arrLoad('erp_bank_transactions');
  window.cashTransactions = arrLoad('erp_cash_transactions');
  bankAccounts.forEach(b=>b.balance=num(b.balance));
  cashBoxes.forEach(c=>c.balance=num(c.balance));
}
function accountName(type,id){
  if(type==='bank'){ let b=(bankAccounts||[]).find(x=>String(x.id)===String(id)); return b ? (b.bankName||'-') : '-'; }
  let c=(cashBoxes||[]).find(x=>String(x.id)===String(id)); return c ? (c.name_ar||c.name_en||c.name||'-') : '-';
}
function addMove(type, accountId, moveType, amount, note, source, sourceId, date){
  ensureFinanceData(); amount=num(amount); if(amount<=0) return false;
  let list = type==='bank' ? bankAccounts : cashBoxes;
  let acc = (list||[]).find(x=>String(x.id)===String(accountId)); if(!acc) return false;
  if(moveType==='withdraw' && num(acc.balance) < amount){ alert('الرصيد غير كافٍ'); return false; }
  acc.balance = num(acc.balance) + (moveType==='deposit' ? amount : -amount);
  let tx = {id:safeId(), accountId:acc.id, type:moveType, amount, balanceAfter:acc.balance, date:date||today(), note:note||'', source:source||'manual', sourceId:sourceId||'', user:currentUser?.username||'-'};
  if(type==='bank') window.bankTransactions.unshift(tx); else window.cashTransactions.unshift(tx);
  return true;
}
function reverseMove(type, source, sourceId){
  ensureFinanceData();
  let txs = type==='bank' ? window.bankTransactions : window.cashTransactions;
  let found = txs.filter(t=>String(t.source)===String(source) && String(t.sourceId)===String(sourceId));
  found.forEach(t=>{
    let list = type==='bank' ? bankAccounts : cashBoxes;
    let acc = (list||[]).find(x=>String(x.id)===String(t.accountId));
    if(acc) acc.balance = num(acc.balance) + (t.type==='deposit' ? -num(t.amount) : num(t.amount));
  });
  if(type==='bank') window.bankTransactions = txs.filter(t=>!(String(t.source)===String(source) && String(t.sourceId)===String(sourceId)));
  else window.cashTransactions = txs.filter(t=>!(String(t.source)===String(source) && String(t.sourceId)===String(sourceId)));
}
function sourceSelect(prefix, type='cash', selected=''){
  let list = type==='bank' ? bankAccounts : cashBoxes;
  return `<select id="${prefix}AccountId">${(list||[]).map(a=>`<option value="${a.id}" ${String(selected)===String(a.id)?'selected':''}>${type==='bank'?(a.bankName||'-'):(a.name_ar||a.name_en||a.name||'-')} - ${money(a.balance)}</option>`).join('')}</select>`;
}
function monthlySummary(transactions){
  let map={}; (transactions||[]).forEach(t=>{let m=monthOf(t.date); if(!map[m]) map[m]={deposit:0,withdraw:0}; map[m][t.type]+=num(t.amount);});
  return Object.keys(map).sort().reverse().slice(0,12).map(m=>`<tr><td>${m}</td><td class="text-success">${money(map[m].deposit)}</td><td class="text-danger">${money(map[m].withdraw)}</td><td>${money(map[m].deposit-map[m].withdraw)}</td></tr>`).join('') || '<tr><td colspan="4">لا توجد حركات شهرية</td></tr>';
}

window.renderBankAccountsPage = renderBankAccountsPage = function(){
  if(typeof hasPermission==='function' && !hasPermission('bankAccounts')) return `<div class="section-card">⛔ ${t('noPermission')}</div>`;

  let rows=(bankAccounts||[]).map(b=>`<tr><td>${b.bankName||'-'}</td><td>${b.accountNumber||'-'}</td><td class="text-success"><b>${money(b.balance)}</b></td><td><button class="bankDepositBtn btn btn-sm btn-success" data-id="${b.id}">إيداع</button> <button class="bankWithdrawBtn btn btn-sm btn-danger" data-id="${b.id}">سحب</button> <button class="editBankBtn btn btn-sm btn-secondary" data-id="${b.id}">تعديل</button> <button class="deleteBankBtn btn btn-sm btn-danger" data-id="${b.id}">حذف</button></td></tr>`).join('') || '<tr><td colspan="4">لا توجد حسابات بنكية</td></tr>';
  let linked=(receipts||[]).filter(r=>r.accountType==='bank'||r.method==='تحويل بنكي'||r.method==='شيك').slice(0,50).map(r=>`<tr><td>${r.receiptNumber}</td><td>${r.invoiceNumber||'-'}</td><td>${r.customerName||'-'}</td><td>${r.bankName||accountName('bank',r.accountId)}</td><td>${money(r.amount)}</td><td>${r.date||'-'}</td></tr>`).join('') || '<tr><td colspan="6">لا توجد سندات قبض مرتبطة بالبنوك</td></tr>';
  let tx=(window.bankTransactions||[]).slice(0,100).map(t=>`<tr><td>${t.date}</td><td>${accountName('bank',t.accountId)}</td><td><span class="badge ${t.type==='deposit'?'badge-success':'badge-danger'}">${t.type==='deposit'?'إيداع':'سحب'}</span></td><td>${money(t.amount)}</td><td>${money(t.balanceAfter)}</td><td>${t.note||'-'}</td><td>${t.source||'-'}</td></tr>`).join('') || '<tr><td colspan="7">لا توجد حركات</td></tr>';
  return `<div class="section-card"><div class="section-header"><h3>🏦 الحسابات البنكية — الإجمالي: ${money(total)}</h3><button id="addBankBtn" class="btn btn-primary">+ إضافة حساب بنكي</button></div><div style="overflow-x:auto"><table class="table"><thead><tr><th>اسم البنك</th><th>رقم الحساب</th><th>الرصيد الحالي</th><th>إجراءات</th></tr></thead><tbody>${rows}</tbody></table></div></div><div class="section-card"><h3>🔗 سندات قبض مرتبطة بالفواتير والبنوك</h3><table class="table"><thead><tr><th>السند</th><th>الفاتورة</th><th>العميل</th><th>البنك</th><th>المبلغ</th><th>التاريخ</th></tr></thead><tbody>${linked}</tbody></table></div><div class="section-card"><h3>📅 ملخص شهري للبنوك</h3><table class="table"><thead><tr><th>الشهر</th><th>إيداع</th><th>سحب</th><th>الصافي</th></tr></thead><tbody>${monthlySummary(window.bankTransactions)}</tbody></table></div><div class="section-card"><h3>📒 سجل حركات البنوك</h3><div style="overflow-x:auto"><table class="table"><thead><tr><th>التاريخ</th><th>البنك</th><th>النوع</th><th>المبلغ</th><th>الرصيد بعد الحركة</th><th>البيان</th><th>المصدر</th></tr></thead><tbody>${tx}</tbody></table></div></div>`;
};
function upsertAccount(kind,id){ ensureFinanceData(); let isBank=kind==='bank'; let list=isBank?bankAccounts:cashBoxes; let acc=id?list.find(x=>String(x.id)===String(id)):null; let name=prompt(isBank?'اسم البنك:':'اسم الصندوق:', isBank?(acc?.bankName||''):(acc?.name_ar||acc?.name_en||'')); if(!name) return; let number=isBank?(prompt('رقم الحساب:', acc?.accountNumber||'')||''):''; let opening=num(prompt(acc?'الرصيد الحالي:':'الرصيد الافتتاحي:', acc?.balance||0)); if(acc){ acc.balance=opening; if(isBank){acc.bankName=name;acc.accountNumber=number}else{acc.name_ar=name;acc.name_en=name} } else { acc=isBank?{id:safeId(),bankName:name,accountNumber:number,balance:opening}:{id:safeId(),name_ar:name,name_en:name,balance:opening}; list.push(acc); if(opening>0) addMove(kind,acc.id,'deposit',opening,'رصيد افتتاحي','opening',acc.id,today()); } persistFinance(); renderCurrentTab(); }
function accountMove(kind,id,type){ let title=(type==='deposit'?'إيداع':'سحب')+' '+(kind==='bank'?'بنكي':'من الصندوق'); let amount=num(prompt(title+' - أدخل المبلغ:','0')); if(amount<=0) return alert('أدخل مبلغ صحيح'); let note=prompt('البيان / السبب:','')||''; if(addMove(kind,id,type,amount,note,'manual',safeId(),today())){ persistFinance(); renderCurrentTab(); showNotification(type==='deposit'?'تم الإيداع':'تم السحب', type==='deposit'?'#10b981':'#ef4444'); } }
function deleteAccount(kind,id){ ensureFinanceData(); if(!confirm('حذف الحساب/الصندوق؟')) return; if(kind==='bank') bankAccounts=bankAccounts.filter(x=>String(x.id)!==String(id)); else cashBoxes=cashBoxes.filter(x=>String(x.id)!==String(id)); persistFinance(); renderCurrentTab(); }

window.renderExpensesPage = renderExpensesPage = function(){
  if(typeof hasPermission==='function' && !hasPermission('expenses')) return `<div class="section-card">⛔ ${t('noPermission')}</div>`;
  ensureFinanceData();
  let total=(expenses||[]).reduce((s,e)=>s+num(e.amount),0), m=monthOf(today());
  let monthTotal=(expenses||[]).filter(e=>monthOf(e.date)===m).reduce((s,e)=>s+num(e.amount),0);
  let rows=(expenses||[]).slice().sort((a,b)=>String(b.date).localeCompare(String(a.date))).map(e=>`<tr><td>${e.date||'-'}</td><td>${e.expensePeriod||'يومي'}</td><td>${e.category_ar||e.category_en||e.category||'-'}</td><td>${money(e.amount)}</td><td>${e.accountType==='bank'?'بنك':'صندوق'} - ${accountName(e.accountType||'cash',e.accountId)}</td><td>${e.note||'-'}</td><td><button class="editExpenseBtn btn btn-sm btn-secondary" data-id="${e.id}">تعديل</button> <button class="deleteExpenseBtn btn btn-sm btn-danger" data-id="${e.id}">حذف</button></td></tr>`).join('') || '<tr><td colspan="7">لا توجد مصروفات</td></tr>';
  let byMonth={}; (expenses||[]).forEach(e=>{let mm=monthOf(e.date); byMonth[mm]=(byMonth[mm]||0)+num(e.amount);});
  let ms=Object.keys(byMonth).sort().reverse().slice(0,12).map(mm=>`<tr><td>${mm}</td><td>${money(byMonth[mm])}</td></tr>`).join('')||'<tr><td colspan="2">لا توجد بيانات شهرية</td></tr>';
  return `<div class="stats-grid"><div class="stat-card"><div class="stat-title">إجمالي المصروفات</div><div class="stat-value text-danger">${money(total)}</div></div><div class="stat-card"><div class="stat-title">مصروفات الشهر الحالي</div><div class="stat-value text-danger">${money(monthTotal)}</div></div></div><div class="section-card"><div class="section-header"><h3>💸 المصروفات اليومية والشهرية</h3><button id="addExpenseBtn" class="btn btn-primary">+ إضافة مصروف</button></div><div style="overflow-x:auto"><table class="table"><thead><tr><th>التاريخ</th><th>النوع</th><th>الفئة</th><th>المبلغ</th><th>مصروف من</th><th>ملاحظة</th><th>إجراءات</th></tr></thead><tbody>${rows}</tbody></table></div></div><div class="section-card"><h3>📅 ملخص المصروفات الشهرية</h3><table class="table"><thead><tr><th>الشهر</th><th>الإجمالي</th></tr></thead><tbody>${ms}</tbody></table></div>`;
};
function openExpenseModal(id){ ensureFinanceData(); let e=id?(expenses||[]).find(x=>String(x.id)===String(id)):null; let accountType=e?.accountType||'cash'; let modal=document.createElement('div'); modal.className='modal'; modal.style.display='flex'; modal.innerHTML=`<div class="modal-content" style="max-width:760px"><div class="section-header"><h3>${e?'تعديل مصروف':'إضافة مصروف'}</h3><button class="btn btn-secondary" id="closeExp">إغلاق</button></div><div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px"><div class="form-group"><label>التاريخ</label><input id="expDate" type="date" value="${e?.date||today()}"></div><div class="form-group"><label>نوع المصروف</label><select id="expPeriod"><option value="يومي" ${e?.expensePeriod==='يومي'?'selected':''}>يومي</option><option value="شهري" ${e?.expensePeriod==='شهري'?'selected':''}>شهري</option></select></div><div class="form-group"><label>الفئة</label><input id="expCat" value="${e?.category_ar||e?.category||''}"></div><div class="form-group"><label>المبلغ</label><input id="expAmount" type="number" step="0.001" value="${num(e?.amount)}"></div><div class="form-group"><label>الدفع من</label><select id="expAccountType"><option value="cash" ${accountType==='cash'?'selected':''}>صندوق مالي</option><option value="bank" ${accountType==='bank'?'selected':''}>حساب بنكي</option></select></div><div class="form-group"><label>الحساب / الصندوق</label><span id="expAccountWrap">${sourceSelect('exp',accountType,e?.accountId)}</span></div></div><div class="form-group"><label>ملاحظة</label><textarea id="expNote" rows="3">${e?.note||''}</textarea></div><button id="saveExp" class="btn btn-primary">حفظ</button></div>`; document.body.appendChild(modal); expAccountType.onchange=()=>{expAccountWrap.innerHTML=sourceSelect('exp',expAccountType.value,e?.accountId)}; closeExp.onclick=()=>modal.remove(); saveExp.onclick=()=>{let amount=num(expAmount.value); if(amount<=0) return alert('أدخل مبلغ صحيح'); let data={id:e?.id||safeId(),date:expDate.value||today(),expensePeriod:expPeriod.value,category_ar:expCat.value.trim(),category_en:expCat.value.trim(),amount,note:expNote.value.trim(),accountType:expAccountType.value,accountId:document.getElementById('expAccountId')?.value,updatedAt:new Date().toISOString()}; if(e){ reverseMove(e.accountType||'cash','expense',e.id); Object.assign(e,data); } else { expenses.unshift(data); } if(!addMove(data.accountType,data.accountId,'withdraw',amount,'مصروف: '+data.category_ar,'expense',data.id,data.date)) return; persistFinance(); modal.remove(); renderCurrentTab(); showNotification('تم حفظ المصروف وتحديث الرصيد','#10b981'); }; }
function deleteExpense(id){ let e=(expenses||[]).find(x=>String(x.id)===String(id)); if(!e||!confirm('حذف المصروف؟')) return; reverseMove(e.accountType||'cash','expense',e.id); expenses=expenses.filter(x=>String(x.id)!==String(id)); persistFinance(); renderCurrentTab(); }

window.openReceiptModal = openReceiptModal = function(receiptId=null){
  if(typeof hasPermission==='function' && !hasPermission('receipts','crud')){ showNotification('لا تملك صلاحية تعديل سندات القبض','#ef4444'); return; }

  let invOpts='<option value="">بدون ربط فاتورة</option>'+((invoices||[]).filter(i=>i.docType!=='quotation').map(i=>{ if(typeof recalcInvoice==='function') recalcInvoice(i); let cust=(customers||[]).find(c=>String(c.id)===String(i.customerId)); return `<option value="${i.id}" ${String(r?.invoiceId)===String(i.id)?'selected':''}>${i.invoiceNumber} - ${(cust&&(cust.name_ar||cust.name_en))||'-'} - المتبقي ${money(i.remainingAmount)}</option>`; }).join(''));

  let modal=document.createElement('div'); modal.className='modal'; modal.style.display='flex'; modal.innerHTML=`<div class="modal-content" style="max-width:820px"><div class="section-header"><h3>${r?'تعديل سند قبض':'إضافة سند قبض'}</h3><button id="closeRc" class="btn btn-secondary">إغلاق</button></div><div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px"><div class="form-group"><label>ربط بالفاتورة</label><select id="rcInvoiceId">${invOpts}</select></div><div class="form-group"><label>رقم السند</label><input id="rcNo" value="${r?.receiptNumber||('RCPT-'+Date.now())}"></div><div class="form-group"><label>التاريخ</label><input id="rcDate" type="date" value="${r?.date||today()}"></div><div class="form-group"><label>استلمنا من</label><input id="rcCustomer" value="${r?.customerName||''}"></div><div class="form-group"><label>رقم الفاتورة / العرض</label><input id="rcInvNo" value="${r?.invoiceNumber||''}"></div><div class="form-group"><label>المبلغ المقبوض</label><input id="rcAmount" type="number" step="0.001" value="${num(r?.amount)}"></div><div class="form-group"><label>إجمالي الفاتورة</label><input id="rcTotal" type="number" step="0.001" value="${num(r?.totalAmount)}"></div><div class="form-group"><label>المبلغ المتبقي</label><input id="rcRemaining" type="number" step="0.001" value="${num(r?.remainingAmount)}"></div><div class="form-group"><label>طريقة القبض</label><select id="rcMethod"><option value="نقداً" ${accountType==='cash'?'selected':''}>نقداً</option><option value="شيك" ${r?.method==='شيك'?'selected':''}>شيك</option><option value="تحويل بنكي" ${r?.method==='تحويل بنكي'?'selected':''}>تحويل بنكي</option></select></div><div class="form-group"><label>الصندوق / البنك</label><span id="rcAccountWrap">${sourceSelect('rc',accountType,r?.accountId)}</span></div><div class="form-group" id="rcChequeWrap"><label>رقم الشيك</label><input id="rcCheque" value="${r?.chequeNumber||''}"></div></div><div class="form-group"><label>البيان</label><textarea id="rcNote" rows="3">${r?.note||''}</textarea></div><div style="display:flex;gap:10px;justify-content:flex-end"><button id="saveRc" class="btn btn-primary">حفظ</button><button id="printRc" class="btn btn-secondary">معاينة / طباعة</button></div></div>`; document.body.appendChild(modal);

  closeRc.onclick=()=>modal.remove();
  function formData(){ return {id:r?.id||safeId(),receiptNumber:rcNo.value.trim()||('RCPT-'+Date.now()),invoiceId:rcInvoiceId.value||'',invoiceNumber:rcInvNo.value.trim(),customerName:rcCustomer.value.trim(),date:rcDate.value||today(),amount:num(rcAmount.value),totalAmount:num(rcTotal.value),remainingAmount:num(rcRemaining.value),paidAmount:num(rcAmount.value),method:rcMethod.value,accountType:methodType(),accountId:document.getElementById('rcAccountId')?.value,bankName:methodType()==='bank'?accountName('bank',document.getElementById('rcAccountId')?.value):'',chequeNumber:rcCheque.value.trim(),note:rcNote.value.trim(),type:r?.type||'manual',updatedAt:new Date().toISOString(),createdAt:r?.createdAt||new Date().toISOString()}; }
  saveRc.onclick=()=>{let data=formData(); if(data.amount<=0) return alert('أدخل مبلغ صحيح'); if(r){ reverseMove(r.accountType||((r.method==='نقداً')?'cash':'bank'),'receipt',r.id); if(r.invoiceId){ let inv=(invoices||[]).find(i=>String(i.id)===String(r.invoiceId)); if(inv&&Array.isArray(inv.payments)) inv.payments=inv.payments.filter(p=>String(p.receiptId)!==String(r.id)); }} let inv=data.invoiceId?(invoices||[]).find(i=>String(i.id)===String(data.invoiceId)):null; if(inv){ inv.payments=Array.isArray(inv.payments)?inv.payments:[]; inv.payments.push({id:safeId(),receiptId:data.id,amount:data.amount,date:data.date,method:data.method,note:data.note}); if(typeof recalcInvoice==='function') recalcInvoice(inv); data.invoiceNumber=inv.invoiceNumber||data.invoiceNumber; data.totalAmount=num(inv.grandTotal||inv.total); data.remainingAmount=num(inv.remainingAmount); }
    if(!addMove(data.accountType,data.accountId,'deposit',data.amount,'سند قبض '+data.receiptNumber+' / '+(data.invoiceNumber||''),'receipt',data.id,data.date)) return;
    if(r) Object.assign(r,data); else receipts.unshift(data); persistFinance(); modal.remove(); renderCurrentTab(); showNotification('تم حفظ سند القبض وربطه بالحساب المالي','#10b981'); };
  printRc.onclick=()=>{let tmp=formData(); let win=window.open('','_blank'); win.document.write(generateReceiptHTML(tmp)); win.document.close(); setTimeout(()=>win.print(),300); };

function attachFinanceEvents(){
  document.getElementById('addCashBtn')?.addEventListener('click',()=>upsertAccount('cash'));
  document.querySelectorAll('.editCashBtn').forEach(b=>b.onclick=()=>upsertAccount('cash',b.dataset.id));
  document.querySelectorAll('.deleteCashBtn').forEach(b=>b.onclick=()=>deleteAccount('cash',b.dataset.id));
  document.querySelectorAll('.cashDepositBtn').forEach(b=>b.onclick=()=>accountMove('cash',b.dataset.id,'deposit'));
  document.querySelectorAll('.cashWithdrawBtn').forEach(b=>b.onclick=()=>accountMove('cash',b.dataset.id,'withdraw'));
  document.getElementById('addBankBtn')?.addEventListener('click',()=>upsertAccount('bank'));
  document.querySelectorAll('.editBankBtn').forEach(b=>b.onclick=()=>upsertAccount('bank',b.dataset.id));
  document.querySelectorAll('.deleteBankBtn').forEach(b=>b.onclick=()=>deleteAccount('bank',b.dataset.id));
  document.querySelectorAll('.bankDepositBtn').forEach(b=>b.onclick=()=>accountMove('bank',b.dataset.id,'deposit'));
  document.querySelectorAll('.bankWithdrawBtn').forEach(b=>b.onclick=()=>accountMove('bank',b.dataset.id,'withdraw'));
  document.getElementById('addExpenseBtn')?.addEventListener('click',()=>openExpenseModal());
  document.querySelectorAll('.editExpenseBtn').forEach(b=>b.onclick=()=>openExpenseModal(b.dataset.id));
  document.querySelectorAll('.deleteExpenseBtn').forEach(b=>b.onclick=()=>deleteExpense(b.dataset.id));
  document.getElementById('addManualReceiptBtn')?.addEventListener('click',()=>openReceiptModal());
  document.querySelectorAll('.editReceiptBtn').forEach(b=>b.onclick=()=>openReceiptModal(b.dataset.id));
}
let oldAttachFinance = window.attachEvents || (typeof attachEvents==='function'?attachEvents:null);
if(oldAttachFinance){ window.attachEvents = attachEvents = function(){ oldAttachFinance.apply(this,arguments); attachFinanceEvents(); }; }
let oldRenderFinance = window.renderCurrentTab || (typeof renderCurrentTab==='function'?renderCurrentTab:null);
if(oldRenderFinance){ window.renderCurrentTab = renderCurrentTab = function(){ oldRenderFinance.apply(this,arguments); setTimeout(attachFinanceEvents,0); }; }
document.addEventListener('DOMContentLoaded',()=>setTimeout(attachFinanceEvents,200));
})();
</script>
<script>
/* ===== إصلاح نهائي لحفظ المصروفات اليومية والشهرية وربطها بالحساب البنكي ===== */
(function(){
  function n(v){ return parseFloat(String(v == null ? 0 : v).replace(',', '.')) || 0; }
  function today(){ return new Date().toISOString().slice(0,10); }
  function id(){ return Date.now() + Math.floor(Math.random()*100000); }
  function money(v){ return n(v).toFixed(3) + ' ريال'; }
  function ensureExpenseFinance(){
    if(!Array.isArray(expenses)) expenses = [];
    if(!Array.isArray(bankAccounts)) bankAccounts = [];
    try{
      if(!Array.isArray(window.bankTransactions)) window.bankTransactions = JSON.parse(localStorage.getItem('erp_bank_transactions') || '[]');
      if(!Array.isArray(window.bankTransactions)) window.bankTransactions = [];
    }catch(e){ window.bankTransactions = []; }
    bankAccounts.forEach(function(b){ b.balance = n(b.balance); });
  }
  function saveExpenseFinance(){
    ensureExpenseFinance();
    localStorage.setItem('erp_expenses', JSON.stringify(expenses));
    localStorage.setItem('erp_bank_accounts', JSON.stringify(bankAccounts));
    localStorage.setItem('erp_bank_transactions', JSON.stringify(window.bankTransactions));
    if(typeof saveAll === 'function') saveAll();
  }
  function bankById(bankId){ ensureExpenseFinance(); return bankAccounts.find(function(b){ return String(b.id) === String(bankId); }); }
  function bankName(bankId){ var b = bankById(bankId); return b ? ((b.bankName || '-') + (b.accountNumber ? ' - ' + b.accountNumber : '')) : '-'; }
  function bankOptions(selected){
    ensureExpenseFinance();
    if(!bankAccounts.length) return '<option value="">لا توجد حسابات بنكية</option>';
    return bankAccounts.map(function(b){ return '<option value="'+b.id+'" '+(String(selected||'')===String(b.id)?'selected':'')+'>'+(b.bankName||'-')+(b.accountNumber?' - '+b.accountNumber:'')+' — الرصيد: '+money(b.balance)+'</option>'; }).join('');
  }
  function reverseExpenseBank(expenseId){
    ensureExpenseFinance();
    var keep = [];
    window.bankTransactions.forEach(function(t){
      if(String(t.source) === 'expense' && String(t.sourceId) === String(expenseId)){
        var b = bankById(t.accountId);
        if(b){
          // المصروف حركة سحب؛ عند عكسها نرجع المبلغ للبنك
          b.balance = n(b.balance) + n(t.amount);
          if(b.balance < 0 && b.balance > -0.0001) b.balance = 0;
        }
      } else keep.push(t);
    });
    window.bankTransactions = keep;
  }
  function applyExpenseBank(exp){
    ensureExpenseFinance();
    var amount = n(exp.amount);
    var b = bankById(exp.bankId || exp.accountId);
    if(amount <= 0){ alert('أدخل مبلغ صحيح'); return false; }
    if(!b){ alert('اختر الحساب البنكي'); return false; }
    if(n(b.balance) < amount){
      if(!confirm('رصيد البنك أقل من مبلغ المصروف. هل تريد الحفظ والسحب رغم ذلك؟')) return false;
    }
    b.balance = n(b.balance) - amount;
    window.bankTransactions.unshift({
      id: id(), accountId: b.id, type: 'withdraw', amount: amount, balanceAfter: b.balance,
      date: exp.date || today(), note: 'مصروف: ' + (exp.category_ar || exp.category_en || exp.category || ''),
      source: 'expense', sourceId: exp.id, user: (currentUser && currentUser.username) || '-'
    });
    exp.accountType = 'bank';
    exp.accountId = b.id;
    exp.bankId = b.id;
    exp.bankName = bankName(b.id);
    return true;
  }
  function expenseTotals(kind){
    ensureExpenseFinance();
    var now = new Date();
    var ym = now.toISOString().slice(0,7);
    var d = today();
    return expenses.reduce(function(s,e){
      var per = e.expensePeriod || e.period || 'يومي';
      var ok = kind === 'daily' ? (per === 'يومي' && String(e.date || '').slice(0,10) === d) : (per === 'شهري' && String(e.date || '').slice(0,7) === ym);
      return ok ? s + n(e.amount) : s;
    },0);
  }
  window.renderExpensesPage = renderExpensesPage = function(){
    if(!hasPermission('expenses')) return '<div class="section-card">⛔ '+t('noPermission')+'</div>';
    ensureExpenseFinance();
    var daily = expenses.filter(function(e){ return (e.expensePeriod || e.period || 'يومي') === 'يومي'; });
    var monthly = expenses.filter(function(e){ return (e.expensePeriod || e.period || 'يومي') === 'شهري'; });
    function rows(list){
      return list.map(function(e){
        return '<tr><td>'+ (e.date || '-') +'</td><td><span class="badge '+(((e.expensePeriod||'يومي')==='شهري')?'badge-info':'badge-warning')+'">'+(e.expensePeriod || 'يومي')+'</span></td><td>'+((currentLang==='ar' ? (e.category_ar || e.category_en) : (e.category_en || e.category_ar)) || '-')+'</td><td>'+money(e.amount)+'</td><td>'+bankName(e.bankId || e.accountId)+'</td><td>'+(e.note || '-')+'</td><td><button class="editExpenseBtn btn btn-sm btn-secondary" data-id="'+e.id+'">تعديل</button> <button class="deleteExpenseBtn btn btn-sm btn-danger" data-id="'+e.id+'">حذف</button></td></tr>';
      }).join('') || '<tr><td colspan="7">لا توجد مصروفات</td></tr>';
    }
    var total = expenses.reduce(function(s,e){ return s + n(e.amount); },0);
    return '<div class="stats-grid">\
      <div class="stat-card"><div class="stat-title">مصروفات اليوم</div><div class="stat-value text-danger">'+money(expenseTotals('daily'))+'</div></div>\
      <div class="stat-card"><div class="stat-title">مصروفات الشهر</div><div class="stat-value text-danger">'+money(expenseTotals('monthly'))+'</div></div>\
      <div class="stat-card"><div class="stat-title">إجمالي المصروفات</div><div class="stat-value text-danger">'+money(total)+'</div></div>\
    </div>\
    <div class="section-card"><div class="section-header"><h3>💸 المصروفات اليومية والشهرية</h3><button id="addExpenseBtn" class="btn btn-primary">+ إضافة مصروف</button></div>\
      <p style="color:var(--gray-500);margin-bottom:12px">كل مصروف يتم سحبه تلقائياً من الحساب البنكي المختار، وعند التعديل يتم عكس الحركة القديمة ثم تسجيل الحركة الجديدة.</p>\
      <h4>مصروفات يومية</h4><div style="overflow-x:auto"><table class="table"><thead><tr><th>التاريخ</th><th>النوع</th><th>الفئة</th><th>المبلغ</th><th>الحساب البنكي</th><th>ملاحظة</th><th>إجراءات</th></tr></thead><tbody>'+rows(daily)+'</tbody></table></div>\
      <h4 style="margin-top:24px">مصروفات شهرية</h4><div style="overflow-x:auto"><table class="table"><thead><tr><th>التاريخ</th><th>النوع</th><th>الفئة</th><th>المبلغ</th><th>الحساب البنكي</th><th>ملاحظة</th><th>إجراءات</th></tr></thead><tbody>'+rows(monthly)+'</tbody></table></div>\
    </div>';
  };
  window.openExpenseModal = function(expenseId){
    ensureExpenseFinance();
    var e = expenseId ? expenses.find(function(x){ return String(x.id) === String(expenseId); }) : null;
    var modal = document.createElement('div');
    modal.className = 'modal'; modal.style.display = 'flex'; modal.style.zIndex = '4000';
    modal.innerHTML = '<div class="modal-content" style="max-width:760px">\
      <div class="section-header"><h3>'+(e?'تعديل مصروف':'إضافة مصروف')+'</h3><button id="closeExpenseModalFixed" class="btn btn-secondary">إغلاق</button></div>\
      <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px">\
        <div class="form-group"><label>نوع المصروف</label><select id="fxPeriod"><option value="يومي" '+((e && e.expensePeriod==='يومي')?'selected':'')+'>يومي</option><option value="شهري" '+((e && e.expensePeriod==='شهري')?'selected':'')+'>شهري</option></select></div>\
        <div class="form-group"><label>التاريخ</label><input id="fxDate" type="date" value="'+(e && e.date || today())+'"></div>\
        <div class="form-group"><label>الفئة بالعربية</label><input id="fxCatAr" value="'+(e && (e.category_ar || e.category) || '')+'" placeholder="مثال: وقود / كهرباء / إيجار"></div>\
        <div class="form-group"><label>Category English</label><input id="fxCatEn" value="'+(e && e.category_en || '')+'" placeholder="Fuel / Electricity / Rent"></div>\
        <div class="form-group"><label>المبلغ</label><input id="fxAmount" type="number" step="0.001" value="'+n(e && e.amount)+'"></div>\
        <div class="form-group"><label>الحساب البنكي</label><select id="fxBankId">'+bankOptions(e && (e.bankId || e.accountId))+'</select></div>\
      </div>\
      <div class="form-group"><label>ملاحظة</label><textarea id="fxNote" rows="3">'+(e && e.note || '')+'</textarea></div>\
      <button id="saveExpenseFixed" class="btn btn-primary">حفظ المصروف وسحبه من البنك</button>\
    </div>';
    document.body.appendChild(modal);
    document.getElementById('closeExpenseModalFixed').onclick = function(){ modal.remove(); };
    var saving = false;
    document.getElementById('saveExpenseFixed').onclick = function(){
      if(saving) return; saving = true;
      var data = {
        id: e ? e.id : id(),
        expensePeriod: document.getElementById('fxPeriod').value,
        date: document.getElementById('fxDate').value || today(),
        category_ar: document.getElementById('fxCatAr').value.trim(),
        category_en: document.getElementById('fxCatEn').value.trim(),
        amount: n(document.getElementById('fxAmount').value),
        bankId: document.getElementById('fxBankId').value,
        accountType: 'bank',
        accountId: document.getElementById('fxBankId').value,
        note: document.getElementById('fxNote').value.trim(),
        updatedAt: new Date().toISOString(),
        createdAt: e && e.createdAt || new Date().toISOString()
      };
      if(!data.category_ar && !data.category_en){ saving = false; return alert('اكتب فئة المصروف'); }
      if(data.amount <= 0){ saving = false; return alert('أدخل مبلغ صحيح'); }
      if(!data.bankId){ saving = false; return alert('اختر الحساب البنكي'); }
      if(e) reverseExpenseBank(e.id);
      if(!applyExpenseBank(data)){ saving = false; if(e) applyExpenseBank(e); return; }
      if(e) Object.assign(e, data); else expenses.unshift(data);
      saveExpenseFinance();
      modal.remove();
      if(typeof renderCurrentTab === 'function') renderCurrentTab();
      if(typeof showNotification === 'function') showNotification('تم حفظ المصروف وسحبه من الحساب البنكي', '#10b981');
    };
  };
  window.deleteExpense = function(expenseId){
    ensureExpenseFinance();
    var e = expenses.find(function(x){ return String(x.id) === String(expenseId); });
    if(!e) return;
    if(!confirm('حذف المصروف وإرجاع المبلغ للحساب البنكي؟')) return;
    reverseExpenseBank(e.id);
    expenses = expenses.filter(function(x){ return String(x.id) !== String(expenseId); });
    saveExpenseFinance();
    if(typeof renderCurrentTab === 'function') renderCurrentTab();
    if(typeof showNotification === 'function') showNotification('تم حذف المصروف وإرجاع المبلغ للبنك', '#ef4444');
  };
  function clean(selector, handler){
    document.querySelectorAll(selector).forEach(function(old){
      var b = old.cloneNode(true);
      old.parentNode.replaceChild(b, old);
      b.addEventListener('click', handler);
    });
  }
  function attachFixedExpenses(){
    var add = document.getElementById('addExpenseBtn');
    if(add){ var nadd = add.cloneNode(true); add.parentNode.replaceChild(nadd, add); nadd.addEventListener('click', function(){ openExpenseModal(); }); }
    clean('.editExpenseBtn', function(ev){ openExpenseModal(ev.currentTarget.dataset.id); });
    clean('.deleteExpenseBtn', function(ev){ deleteExpense(ev.currentTarget.dataset.id); });
  }
  var oldAttach = window.attachEvents || (typeof attachEvents === 'function' ? attachEvents : null);
  if(oldAttach){ window.attachEvents = attachEvents = function(){ oldAttach.apply(this, arguments); setTimeout(attachFixedExpenses, 20); }; }
  var oldRender = window.renderCurrentTab || (typeof renderCurrentTab === 'function' ? renderCurrentTab : null);
  if(oldRender){ window.renderCurrentTab = renderCurrentTab = function(){ oldRender.apply(this, arguments); setTimeout(attachFixedExpenses, 20); }; }
  document.addEventListener('DOMContentLoaded', function(){ setTimeout(attachFixedExpenses, 800); });
})();
</script>
<!-- ============================================================
     FINAL HR MODULE PATCH - Employees, Payroll, Daily/Annual Leaves
     تمت إضافته بدون حذف أي ميزة سابقة
============================================================ -->
<script>
(function(){
  'use strict';
  const HR_TAB = 'hrManagement';
  const lang = () => (typeof currentLang !== 'undefined' ? currentLang : (localStorage.getItem('erp_lang') || 'ar'));
  const L = (ar,en) => lang()==='ar' ? ar : en;
  const $ = id => document.getElementById(id);
  const today = () => new Date().toISOString().slice(0,10);
  const ym = () => new Date().toISOString().slice(0,7);
  const num = v => Number(String(v ?? 0).replace(',','.')) || 0;
  const money = v => num(v).toFixed(3) + ' ' + L('ر.ع','OMR');
  function get(k,d){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch(e){ return d; } }
  function set(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
  function toast(m,b){ if(typeof showNotification==='function') showNotification(m,b||'#2563eb'); else alert(m); }
  function audit(action, entity, id, oldVal, newVal){
    try{
      window.auditLogs = window.auditLogs || get('erp_audit',[]);
      auditLogs.unshift({id:Date.now()+Math.random(), user:(window.currentUser&&currentUser.username)||'system', action, entity, entityId:id||'', oldValue:oldVal||null, newValue:newVal||null, timestamp:new Date().toISOString()});
      set('erp_audit', auditLogs);
    }catch(e){}
  }
  function loadHR(){
    window.employees = Array.isArray(window.employees) ? window.employees : get('erp_employees',[]);
    window.hrDailyLeaves = get('erp_hr_daily_leaves',[]);
    window.hrAnnualLeaves = get('erp_hr_annual_leaves',[]);
    window.attendanceRecords = Array.isArray(window.attendanceRecords) ? window.attendanceRecords : get('erp_attendanceRecords',[]);
    window.payrollRuns = Array.isArray(window.payrollRuns) ? window.payrollRuns : get('erp_payrollRuns',[]);
    window.hrAdvances = get('erp_hr_employee_advances',[]);
  }
  function saveHR(){
    set('erp_employees', window.employees||[]);
    set('erp_hr_daily_leaves', window.hrDailyLeaves||[]);
    set('erp_hr_annual_leaves', window.hrAnnualLeaves||[]);
    set('erp_attendanceRecords', window.attendanceRecords||[]);
    set('erp_payrollRuns', window.payrollRuns||[]);
    set('erp_hr_employee_advances', window.hrAdvances||[]);
    try{ if(typeof saveAll==='function') saveAll(); }catch(e){}
  }
  function empName(e){ return lang()==='ar' ? (e.name_ar||e.name||e.name_en||'-') : (e.name_en||e.name||e.name_ar||'-'); }
  function empWorkshop(e){ const w=(window.workshops||[]).find(x=>String(x.id)===String(e.workshopId)); return w ? (lang()==='ar' ? (w.name_ar||w.name||w.name_en) : (w.name_en||w.name||w.name_ar)) : '-'; }
  function hourlyRate(e){ return num(e.salary||e.monthlySalary||0) / Math.max(1,num(e.workDays||26)) / Math.max(1,num(e.dailyHours||9)); }
  function monthRecords(empId, month){ return (window.attendanceRecords||[]).filter(r=>String(r.employeeId)===String(empId) && String(r.date||'').startsWith(month)); }
  function payrollCalc(e, month){
    const salary=num(e.salary||e.monthlySalary||0), daily=salary/Math.max(1,num(e.workDays||26)), hr=hourlyRate(e);
    const recs=monthRecords(e.id,month);
    const absent=recs.filter(r=>r.status==='absent').length;
    const half=recs.filter(r=>r.status==='half').length;
    const ot=recs.reduce((s,r)=>s+num(r.overtimeHours),0);
    const manualDed=recs.reduce((s,r)=>s+num(r.manualDeduction),0);
    const manualBonus=recs.reduce((s,r)=>s+num(r.manualBonus),0);
    const leaveNoDed=recs.filter(r=>r.status==='leave').length;
    const ded=absent*daily + half*daily/2 + manualDed;
    const otAmount=ot*hr;
    const advances=(window.hrAdvances||[]).filter(a=>String(a.employeeId)===String(e.id)&&String(a.month||'').slice(0,7)===month).reduce((s,a)=>s+num(a.amount),0);
    const net=Math.max(0, salary - ded - advances + otAmount + manualBonus);
    return {employeeId:e.id,name:empName(e),salary,daily,hr,absent,half,leaveNoDed,ot,otAmount,manualDed,manualBonus,advances,ded,net};
  }
  function ensureHRNav(){
    const nav=$('navMenu'); if(!nav) return;
    let li=nav.querySelector('[data-tab="'+HR_TAB+'"]');
    if(!li){
      li=document.createElement('li'); li.className='nav-item'; li.dataset.tab=HR_TAB;
      li.onclick=function(){ try{currentTab=HR_TAB;}catch(e){} window.currentTab=HR_TAB; if(typeof renderCurrentTab==='function') renderCurrentTab(); if(typeof initNav==='function') initNav(); };
      const firstFinancial = nav.querySelector('[data-tab="financialClose"]');
      if(firstFinancial) nav.insertBefore(li, firstFinancial); else nav.appendChild(li);
    }
    li.className='nav-item '+(((window.currentTab||currentTab)===HR_TAB)?'active':'');
    li.innerHTML='<i class="fas fa-users-gear"></i><span>'+L('الموارد البشرية','HR Management')+'</span>';
  }
  const oldInit = window.initNav || (typeof initNav==='function' ? initNav : null);
  if(oldInit){ window.initNav = initNav = function(){ const r=oldInit.apply(this,arguments); ensureHRNav(); return r; }; }
  else setTimeout(ensureHRNav,100);

  window.hrAddEmployeeFull=function(){
    loadHR();
    const name=prompt(L('اسم الموظف','Employee name'), ''); if(!name) return;
    const job=prompt(L('الوظيفة','Job title'), L('عامل','Worker'))||'';
    const salary=num(prompt(L('الراتب الشهري','Monthly salary'),'250'));
    const workshopId=prompt(L('رقم/اسم الورشة أو اتركه فارغ','Workshop ID/name or empty'),'')||'';
    const annualDays=num(prompt(L('رصيد الإجازة السنوية بالأيام','Annual leave balance in days'),'30'));
    const emp={id:Date.now(), name, name_ar:name, name_en:name, job, salary, monthlySalary:salary, workshopId, annualLeaveDays:annualDays, usedAnnualLeave:0, workDays:26, dailyHours:9, status:'active', createdAt:new Date().toISOString()};
    employees.unshift(emp); saveHR(); audit('add_hr_employee','employee',emp.id,null,emp); renderCurrentTab(); toast(L('تمت إضافة الموظف','Employee added'),'#10b981');
  };
  window.hrEditEmployeeFull=function(id){
    loadHR(); const e=employees.find(x=>String(x.id)===String(id)); if(!e) return;
    const old=JSON.parse(JSON.stringify(e));
    e.name=e.name_ar=prompt(L('اسم الموظف','Employee name'), empName(e))||empName(e);
    e.job=prompt(L('الوظيفة','Job title'), e.job||'')||e.job||'';
    e.salary=e.monthlySalary=num(prompt(L('الراتب الشهري','Monthly salary'), e.salary||e.monthlySalary||0));
    e.annualLeaveDays=num(prompt(L('رصيد الإجازة السنوية بالأيام','Annual leave balance in days'), e.annualLeaveDays||30));
    e.status=prompt(L('الحالة active/stopped','Status active/stopped'), e.status||'active')||e.status||'active';
    saveHR(); audit('edit_hr_employee','employee',id,old,e); renderCurrentTab();
  };
  window.hrSaveDailyAttendance=function(){
    loadHR(); const date=$('hrAttDate')?.value||today();
    (employees||[]).forEach(e=>{
      const status=$('hrStatus_'+e.id)?.value||'present';
      const overtimeHours=num($('hrOT_'+e.id)?.value||0);
      const manualDeduction=num($('hrDed_'+e.id)?.value||0);
      const manualBonus=num($('hrBonus_'+e.id)?.value||0);
      const note=$('hrNote_'+e.id)?.value||'';
      let old=(attendanceRecords||[]).find(r=>String(r.employeeId)===String(e.id)&&r.date===date);
      const row={id:old?old.id:Date.now()+Math.random(), employeeId:e.id, date, status, overtimeHours, manualDeduction, manualBonus, note, savedBy:(currentUser&&currentUser.username)||'system', savedAt:new Date().toISOString()};
      if(old) Object.assign(old,row); else attendanceRecords.unshift(row);
    });
    saveHR(); audit('save_hr_daily_attendance','attendance',date,null,{date}); renderCurrentTab(); toast(L('تم حفظ الحضور والإضافات اليومية','Daily attendance saved'),'#10b981');
  };
  window.hrAddDailyLeave=function(){
    loadHR(); const empId=prompt(L('رقم الموظف','Employee ID'),''); if(!empId) return;
    const date=prompt(L('تاريخ الإجازة اليومية YYYY-MM-DD','Daily leave date YYYY-MM-DD'),today())||today();
    const type=prompt(L('نوع الإجازة: إذن/طارئة/مرضية/بدون راتب','Leave type: permission/emergency/sick/unpaid'),L('إذن','Permission'))||'';
    const paid=confirm(L('هل الإجازة بدون خصم؟','Is this leave paid / without deduction?'));
    const row={id:Date.now(),employeeId:empId,date,type,paid,note:prompt(L('ملاحظة','Note'),'')||'',createdBy:(currentUser&&currentUser.username)||'system'};
    hrDailyLeaves.unshift(row);
    let old=attendanceRecords.find(r=>String(r.employeeId)===String(empId)&&r.date===date);
    const att={id:old?old.id:Date.now()+Math.random(), employeeId:empId, date, status:paid?'leave':'absent', overtimeHours:0, manualDeduction:0, manualBonus:0, note:type};
    if(old) Object.assign(old,att); else attendanceRecords.unshift(att);
    saveHR(); audit('add_daily_leave','daily_leave',row.id,null,row); renderCurrentTab();
  };
  window.hrAddAnnualLeave=function(){
    loadHR(); const empId=prompt(L('رقم الموظف','Employee ID'),''); if(!empId) return;
    const from=prompt(L('بداية الإجازة YYYY-MM-DD','Leave start YYYY-MM-DD'),today())||today();
    const to=prompt(L('نهاية الإجازة YYYY-MM-DD','Leave end YYYY-MM-DD'),from)||from;
    const days=num(prompt(L('عدد الأيام','Number of days'),'1'));
    const row={id:Date.now(),employeeId:empId,from,to,days,status:'approved',note:prompt(L('ملاحظة','Note'),'')||'',createdBy:(currentUser&&currentUser.username)||'system'};
    hrAnnualLeaves.unshift(row);
    const e=employees.find(x=>String(x.id)===String(empId)); if(e) e.usedAnnualLeave=num(e.usedAnnualLeave)+days;
    saveHR(); audit('add_annual_leave','annual_leave',row.id,null,row); renderCurrentTab();
  };
  window.hrAddAdvance=function(){
    loadHR(); const empId=prompt(L('رقم الموظف','Employee ID'),''); if(!empId) return;
    const amount=num(prompt(L('مبلغ السلفة','Loan amount'),'0'));
    const month=prompt(L('شهر الخصم YYYY-MM','Deduction month YYYY-MM'),ym())||ym();
    const row={id:Date.now(),employeeId:empId,amount,month,date:today(),note:prompt(L('ملاحظة','Note'),'')||'',createdBy:(currentUser&&currentUser.username)||'system'};
    hrAdvances.unshift(row); saveHR(); audit('add_employee_advance','employee_advance',row.id,null,row); renderCurrentTab();
  };
  window.hrCreatePayrollRun=function(){
    loadHR(); const month=$('hrPayrollMonth')?.value||ym();
    const rows=(employees||[]).filter(e=>e.status!=='stopped').map(e=>payrollCalc(e,month));
    const netTotal=rows.reduce((s,r)=>s+r.net,0), totalDed=rows.reduce((s,r)=>s+r.ded+r.advances,0), totalOt=rows.reduce((s,r)=>s+r.otAmount,0);
    const run={id:Date.now(),month,rows,netTotal,totalDed,totalOt,createdBy:(currentUser&&currentUser.username)||'system',createdAt:new Date().toISOString(),electronicSignature:(currentUser&&currentUser.username||'system')+' - '+new Date().toLocaleString()};
    payrollRuns.unshift(run); saveHR(); audit('create_hr_payroll_run','payroll',month,null,run); renderCurrentTab(); toast(L('تم إنشاء مسير الرواتب مع التوقيع الإلكتروني','Payroll run created with electronic signature'),'#10b981');
  };
  function renderHR(){
    loadHR(); const month=$('hrPayrollMonth')?.value||ym(); const date=$('hrAttDate')?.value||today();
    const active=(employees||[]).filter(e=>e.status!=='stopped');
    const calcs=active.map(e=>payrollCalc(e,month));
    const totals={salary:calcs.reduce((s,r)=>s+r.salary,0), ded:calcs.reduce((s,r)=>s+r.ded,0), adv:calcs.reduce((s,r)=>s+r.advances,0), ot:calcs.reduce((s,r)=>s+r.otAmount,0), net:calcs.reduce((s,r)=>s+r.net,0)};
    const attRows=active.map(e=>{
      const rec=(attendanceRecords||[]).find(r=>String(r.employeeId)===String(e.id)&&r.date===date)||{};
      return `<tr><td><b>${empName(e)}</b><br><small>ID: ${e.id}</small></td><td>${empWorkshop(e)}</td><td><select id="hrStatus_${e.id}"><option value="present" ${rec.status==='present'?'selected':''}>${L('حاضر','Present')}</option><option value="absent" ${rec.status==='absent'?'selected':''}>${L('غائب','Absent')}</option><option value="half" ${rec.status==='half'?'selected':''}>${L('نصف يوم','Half Day')}</option><option value="leave" ${rec.status==='leave'?'selected':''}>${L('إجازة بدون خصم','Paid Leave')}</option></select></td><td><input id="hrOT_${e.id}" type="number" step="0.25" value="${num(rec.overtimeHours).toFixed(2)}"></td><td><input id="hrDed_${e.id}" type="number" step="0.001" value="${num(rec.manualDeduction).toFixed(3)}"></td><td><input id="hrBonus_${e.id}" type="number" step="0.001" value="${num(rec.manualBonus).toFixed(3)}"></td><td><input id="hrNote_${e.id}" value="${rec.note||''}" placeholder="${L('ملاحظة','Note')}"></td></tr>`;

<script>
(function(){
  'use strict';
  function removeDuplicateInvoiceModals(){
    const modals = Array.from(document.querySelectorAll('#invoiceModal'));
    if(modals.length <= 1) return;
    modals.slice(0, -1).forEach(m => m.remove());
  }
  function clearInvoiceModals(){
    document.querySelectorAll('#invoiceModal').forEach(m => m.remove());
  }

  // حماية دالة فتح الفاتورة: قبل فتح أي نافذة جديدة نحذف القديمة حتى لا تظهر نافذتان فوق بعض.
  function wrapOpenInvoiceModal(){
    if(typeof window.openInvoiceModal === 'function' && !window.openInvoiceModal.__singleModalGuard){
      const originalOpenInvoiceModal = window.openInvoiceModal;
      window.openInvoiceModal = function(){
        clearInvoiceModals();
        const result = originalOpenInvoiceModal.apply(this, arguments);
        setTimeout(removeDuplicateInvoiceModals, 0);
        setTimeout(removeDuplicateInvoiceModals, 80);
        return result;
      };
      window.openInvoiceModal.__singleModalGuard = true;
    }
  }

  // بعض النسخ فيها أكثر من مستمع زر للفواتير، لذلك ننظف التكرار بعد أي ضغطة على زر إنشاء/تعديل مستند.
  document.addEventListener('click', function(e){
    const target = e.target && e.target.closest ? e.target.closest('#newInvoiceBtn,.editInvoiceBtn,[data-action="openInvoice"],[data-action="editInvoice"]') : null;
    if(!target) return;
    setTimeout(removeDuplicateInvoiceModals, 0);
    setTimeout(removeDuplicateInvoiceModals, 120);
  }, true);

  // منع تكرار نفس المعرف داخل الصفحة بعد أي تحديث للواجهة.
  const observer = new MutationObserver(function(){ removeDuplicateInvoiceModals(); });
  document.addEventListener('DOMContentLoaded', function(){
    wrapOpenInvoiceModal();
    observer.observe(document.body, { childList:true, subtree:true });
    removeDuplicateInvoiceModals();
  });
  wrapOpenInvoiceModal();
})();
</script>

<script>
/* ==================== PROFESSIONAL HR LEAVES - ERROR FIXED SAFE PATCH ==================== */
(function(){
  'use strict';
  var HR_TAB = 'hrManagement';
  var LEAVES_KEY = 'erp_hr_leaves';

  function ar(){ try{return (window.currentLang || currentLang || 'ar') === 'ar';}catch(e){return true;} }
  function L(a,e){ return ar()?a:e; }
  function esc(v){ return String(v == null ? '' : v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  function n(v){ return Number(String(v == null ? 0 : v).replace(',','.')) || 0; }
  function getJSON(k, fallback){ try{ var v=localStorage.getItem(k); return v ? JSON.parse(v) : fallback; }catch(e){ return fallback; } }
  function setJSON(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
  function today(){ return new Date().toISOString().slice(0,10); }
  function daysBetween(from,to){
    if(!from || !to) return 0;
    var a=new Date(from+'T00:00:00'); var b=new Date(to+'T00:00:00');
    if(isNaN(a.getTime()) || isNaN(b.getTime())) return 0;

  }
  function yearOf(d){ return String(d || today()).slice(0,4); }

    var list = Array.isArray(window.employees) ? window.employees : getJSON(EMP_KEY, []);
    if(!Array.isArray(list)) list=[];
    window.employees = list;
    return list;
  }
  function saveEmployees(list){ window.employees=list||employees(); setJSON(EMP_KEY, window.employees); }
  function leaves(){
    var list = getJSON(LEAVES_KEY, []);

  function typeLabel(type){

    return '<div class="section-card hr-leaves-professional"><div class="section-header"><h2>👥 '+L('الموارد البشرية','HR Management')+'</h2><div class="no-print" style="display:flex;gap:8px;flex-wrap:wrap"><button type="button" class="btn btn-primary" id="hrAddEmployeeProBtn">+ '+L('إضافة موظف','Add Employee')+'</button><button type="button" class="btn btn-success hr-leave-open">+ '+L('طلب إجازة','New Leave')+'</button><button type="button" class="btn btn-secondary" onclick="window.print()">'+L('طباعة','Print')+'</button></div></div>'+
      '<p style="color:var(--gray-500);margin-bottom:12px">'+L('نظام إجازات احترافي داخل صفحة موارد بشرية واحدة: سنوية، مرضية، طارئة، بدون راتب، مع الاعتماد والحساب التلقائي للأيام.','Professional leave system inside one HR page: annual, sick, emergency, unpaid, with approval and automatic days calculation.')+'</p>'+
      '<div class="stats-grid"><div class="stat-card"><div class="stat-title">'+L('عدد الموظفين','Employees')+'</div><div class="stat-value">'+emps.length+'</div></div><div class="stat-card"><div class="stat-title">'+L('طلبات قيد المراجعة','Pending Requests')+'</div><div class="stat-value text-danger">'+pending+'</div></div><div class="stat-card"><div class="stat-title">'+L('أيام الإجازات المعتمدة هذه السنة','Approved Days This Year')+'</div><div class="stat-value">'+approved+'</div></div><div class="stat-card"><div class="stat-title">'+L('أيام بدون راتب','Unpaid Days')+'</div><div class="stat-value text-danger">'+unpaid+'</div></div></div>'+
      '<div class="section-card"><div class="section-header"><h3>📋 '+L('رصيد الإجازات السنوية','Annual Leave Balance')+'</h3></div><div style="overflow-x:auto"><table class="table"><thead><tr><th>'+L('الموظف','Employee')+'</th><th>'+L('الرصيد السنوي','Annual Balance')+'</th><th>'+L('المستخدم','Used')+'</th><th>'+L('المتبقي','Remaining')+'</th><th>'+L('مرضية','Sick')+'</th><th class="no-print">'+L('إجراء','Action')+'</th></tr></thead><tbody>'+empRows+'</tbody></table></div></div>'+
      '<div class="section-card"><div class="section-header"><h3>📅 '+L('طلبات الإجازات','Leave Requests')+'</h3><button type="button" class="btn btn-primary no-print hr-leave-open">+ '+L('طلب إجازة','New Leave')+'</button></div><div style="overflow-x:auto"><table class="table"><thead><tr><th>#</th><th>'+L('الموظف','Employee')+'</th><th>'+L('نوع الإجازة','Leave Type')+'</th><th>'+L('من','From')+'</th><th>'+L('إلى','To')+'</th><th>'+L('الأيام','Days')+'</th><th>'+L('الأثر المالي','Financial Effect')+'</th><th>'+L('الحالة','Status')+'</th><th>'+L('ملاحظة','Note')+'</th><th class="no-print">'+L('إجراءات','Actions')+'</th></tr></thead><tbody>'+leaveRows+'</tbody></table></div></div>'+
      '<div class="section-card"><h3>⚙️ '+L('سياسة الإجازات','Leave Policy')+'</h3><div class="stats-grid"><div class="stat-card"><b>'+L('الإجازة السنوية','Annual Leave')+'</b><p>'+L('رصيد افتراضي 30 يوم لكل موظف، ويتم خصم المعتمد فقط.','Default 30 days per employee; only approved days are deducted.')+'</p></div><div class="stat-card"><b>'+L('الإجازة المرضية والطارئة','Sick & Emergency')+'</b><p>'+L('تسجل منفصلة للمراجعة ولا تخصم من الرصيد السنوي.','Tracked separately for review and does not deduct annual balance.')+'</p></div><div class="stat-card"><b>'+L('إجازة بدون راتب','Unpaid Leave')+'</b><p>'+L('تحسب الأثر المالي للمراجعة عند مسير الرواتب.','Calculates financial effect for payroll review.')+'</p></div></div></div></div>';
  }

  function openLeaveModal(id, empId){
