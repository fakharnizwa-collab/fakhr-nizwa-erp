<script>
/* ==================== FINAL FORCE LANGUAGE REPAIR FOR ENTERPRISE NAV ==================== */
(function(){
  'use strict';
  const MAP={
    financialClose:['إغلاق الفترات المالية','Financial Closing'],
    bankReconciliation:['تسوية البنوك','Bank Reconciliation'],
    purchaseCycle:['دورة المشتريات','Purchase Cycle'],
    fixedAssets:['الأصول الثابتة والإهلاك','Fixed Assets & Depreciation'],
    financialStatements:['القوائم المالية الثلاثة','Financial Statements'],
    recurringInvoices:['الفواتير الدورية','Recurring Invoices'],
    approvalWorkflow:['الموافقات والصلاحيات','Approvals & Permissions'],
    cashierSession:['جلسة نهاية اليوم','Cashier Session'],
    smartAlerts:['التنبيهات الذكية','Smart Alerts'],
    fullAuditTrail:['سجل التدقيق الكامل','Full Audit Trail']
  };
  function lang(){try{return currentLang==='en'?'en':'ar'}catch(e){return localStorage.getItem('erp_lang')==='en'?'en':'ar'}}
  function label(tab){return MAP[tab] ? MAP[tab][lang()==='ar'?0:1] : null;}
  function fixEnterpriseNav(){
    const nav=document.getElementById('navMenu'); if(!nav) return;
    nav.querySelectorAll('.nav-item[data-tab]').forEach(function(li){
      const tab=li.getAttribute('data-tab'), sp=li.querySelector('span'), lb=label(tab);
      if(sp && lb) sp.textContent=lb;
    });
  }
  function patchTranslations(){
    try{
      if(typeof translations!=='undefined'){
        translations.ar=Object.assign(translations.ar||{}, Object.fromEntries(Object.entries(MAP).map(([k,v])=>[k,v[0]])));
        translations.en=Object.assign(translations.en||{}, Object.fromEntries(Object.entries(MAP).map(([k,v])=>[k,v[1]])));
      }
      if(typeof I18N!=='undefined'){
        I18N.ar=Object.assign(I18N.ar||{}, Object.fromEntries(Object.entries(MAP).map(([k,v])=>[k,v[0]])));
        I18N.en=Object.assign(I18N.en||{}, Object.fromEntries(Object.entries(MAP).map(([k,v])=>[k,v[1]])));
      }
    }catch(e){}
  }
  patchTranslations();
  const oldInit=window.initNav; if(typeof oldInit==='function') window.initNav=initNav=function(){const r=oldInit.apply(this,arguments); patchTranslations(); fixEnterpriseNav(); return r;};
  const oldRender=window.renderCurrentTab; if(typeof oldRender==='function') window.renderCurrentTab=renderCurrentTab=function(){const r=oldRender.apply(this,arguments); patchTranslations(); fixEnterpriseNav(); return r;};
  const oldSet=window.setLanguage; if(typeof oldSet==='function') window.setLanguage=setLanguage=function(l){const r=oldSet.apply(this,arguments); patchTranslations(); fixEnterpriseNav(); return r;};
  document.addEventListener('DOMContentLoaded',function(){patchTranslations(); fixEnterpriseNav(); setTimeout(fixEnterpriseNav,100); setTimeout(fixEnterpriseNav,500);});
})();

</script>

window.showSupabaseToast = function(message, color = '#10b981'){

    const toast = document.createElement('div')
    toast.className = 'supabase-connection-toast'
    toast.textContent = message
    Object.assign(toast.style, {
      position:'fixed', top:'18px', left:'50%', transform:'translateX(-50%)',
      background:color, color:'#fff', padding:'14px 22px', borderRadius:'18px',

      fontSize:'14px', maxWidth:'calc(100vw - 24px)', textAlign:'center', direction:'rtl'
    })
    document.body.appendChild(toast)
    setTimeout(()=>toast.remove(), 4500)
  }catch(e){ console.warn('Toast error', e) }
}

window.testSupabaseConnection = async function(){
  try{
    const { data, error } = await window.supabase.from('erp_cloud_state').select('id').limit(1)
    if(error){
      console.error('Supabase connection error:', error)
      window.showSupabaseToast('❌ فشل الاتصال: ' + error.message, '#ef4444')
      return false
    }
    console.log('Supabase connected:', data)
    window.showSupabaseToast('✅ تم الاتصال بقاعدة بيانات Supabase بنجاح', '#10b981')

    window.showSupabaseToast('❌ خطأ اتصال: ' + (err.message || err), '#ef4444')

    // ==================== دوال الفواتير ====================
    function recalcInvoice(inv) {
        inv.items = inv.items || [];
        let subtotal = 0;

        inv.items.forEach(it => {
            let length = parseFloat(String(it.length || 0).replace(',', '.')) || 0;
            let width = parseFloat(String(it.width || 0).replace(',', '.')) || 0;
            let qty = parseFloat(String(it.qty || 1).replace(',', '.')) || 1;
            let rate = parseFloat(String(it.rate || 0).replace(',', '.')) || 0;

            let autoArea = length * width;
            let area = it.areaManual ? (parseFloat(String(it.area || 0).replace(',', '.')) || 0) : autoArea;

            it.length = length;
            it.width = width;
            it.qty = qty;
            it.rate = rate;
            it.area = area;
            it.totalArea = area * qty;
            it.total = it.totalArea * rate;
            subtotal += it.total;
        });

        let taxRate = parseFloat(String(inv.taxRate || 0).replace(',', '.')) || 0;
        let discountValue = parseFloat(String(inv.discountValue ?? inv.discount ?? 0).replace(',', '.')) || 0;
        let discountType = inv.discountType || 'fixed';

        inv.subtotal = subtotal;
        inv.taxAmount = subtotal * taxRate / 100;
        inv.totalAfterTax = subtotal + inv.taxAmount;

        if(discountType === 'percent') {
            inv.finalDiscount = inv.totalAfterTax * discountValue / 100;
        } else {
            inv.finalDiscount = discountValue;
        }

        if(inv.finalDiscount < 0) inv.finalDiscount = 0;
        if(inv.finalDiscount > inv.totalAfterTax) inv.finalDiscount = inv.totalAfterTax;

        inv.grandTotal = Math.max(0, inv.totalAfterTax - inv.finalDiscount);
        inv.total = inv.grandTotal;

        let advancePayment = parseFloat(String(inv.advancePayment || 0).replace(',', '.')) || 0;
        if(advancePayment < 0) advancePayment = 0;
        if(advancePayment > inv.grandTotal) advancePayment = inv.grandTotal;
        inv.advancePayment = advancePayment;

        let otherPayments = (inv.payments || []).reduce((s, p) => s + (parseFloat(String(p.amount || 0).replace(',', '.')) || 0), 0);
        inv.otherPayments = otherPayments;

        // المعادلة الأساسية:
        // المتبقي = الإجمالي النهائي - المبلغ المدفوع مقدماً - أي دفعات أخرى
        inv.paidAmount = advancePayment + otherPayments;
        inv.remainingAmount = Math.max(0, inv.grandTotal - inv.paidAmount);

        if(inv.docType === 'quotation') {
            inv.status_ar = 'عرض أسعار';
            inv.status_en = 'Quotation';
        } else if(inv.remainingAmount <= 0 && inv.grandTotal > 0) {
            inv.status_ar = 'مدفوعة بالكامل';
            inv.status_en = 'Fully Paid';
        } else if(inv.paidAmount > 0) {

        } else {

function replaceFromDictionary(text, dict) {
    if(text == null) return text;
    let out = String(text);
    const entries = Object.entries(dict).sort((a,b) => b[0].length - a[0].length);
    for(const [from, to] of entries) {
        if(!from) continue;
        out = out.split(from).join(to);
    }
    return out;
}
function translateMixedTextToEnglish(text) { return replaceFromDictionary(text, UI_TRANSLATE_EN); }
function translateMixedTextToArabic(text) { return replaceFromDictionary(text, UI_TRANSLATE_AR); }
function translateByCurrentLanguage(text) { return currentLang === 'en' ? translateMixedTextToEnglish(text) : translateMixedTextToArabic(text); }

const _oldT = t;
t = function(key) {
    const val = (translations[currentLang] && translations[currentLang][key]) || key;
    return translateByCurrentLanguage(val);
};

function localizeDynamicDom(root = document.body) {
    if(!root) return;
    const skip = new Set(['SCRIPT','STYLE','NOSCRIPT','CANVAS']);
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
            if(!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
            let p = node.parentElement;
            while(p) { if(skip.has(p.tagName)) return NodeFilter.FILTER_REJECT; p = p.parentElement; }
            return NodeFilter.FILTER_ACCEPT;
        }
    });
    const nodes = [];
    while(walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(n => { n.nodeValue = translateByCurrentLanguage(n.nodeValue); });
    root.querySelectorAll?.('input, textarea, select, option, button, [title], [aria-label], [data-label]').forEach(el => {
        ['placeholder','title','aria-label','data-label'].forEach(attr => {
            const v = el.getAttribute(attr);
            if(v) el.setAttribute(attr, translateByCurrentLanguage(v));
        });
        if(el.tagName === 'OPTION' || el.tagName === 'BUTTON') el.textContent = translateByCurrentLanguage(el.textContent || '');
    });
}

function convertQuotationToInvoice(id) {
    let inv = invoices.find(i => i.id === id);
    if(!inv) return;
    if(inv.docType !== 'quotation') {
        showNotification('هذا المستند فاتورة بالفعل', '#f59e0b');
        return;
    }
    if(!confirm('هل تريد تحويل عرض الأسعار إلى فاتورة وإنشاء عقد تلقائياً؟')) return;

    inv.docType = 'invoice';
    inv.invoiceNumber = inv.invoiceNumber.replace('QUO-', 'INV-');
    inv.convertedFromQuotation = true;
    inv.convertedAt = new Date().toISOString();
    recalcInvoice(inv);
    createOrUpdateAdvanceReceipt(inv);

    if(!Array.isArray(contracts)) contracts = [];
    let exists = contracts.find(c => c.sourceInvoiceId === inv.id);
    if(!exists) {
        let cust = customers.find(c => c.id === inv.customerId);
        contracts.push({
            id: Date.now(),
            contractNumber: 'CON-' + Date.now(),
            sourceInvoiceId: inv.id,
            invoiceNumber: inv.invoiceNumber,
            customerId: inv.customerId,
            customerName: cust ? (cust.name_ar || cust.name || cust.name_en) : '-',
            projectName: 'عقد تلقائي من ' + inv.invoiceNumber,
            date: new Date().toISOString().slice(0,10),
            total: inv.grandTotal || inv.total || 0,
            paidAmount: inv.paidAmount || 0,
            remainingAmount: inv.remainingAmount || 0,
            status_ar: 'عقد جديد',
            status_en: 'New Contract',
            progress: 0,
            items: JSON.parse(JSON.stringify(inv.items || []))
        });
    }
    saveAll();
    renderCurrentTab();
    showNotification('تم تحويل عرض الأسعار إلى فاتورة وإنشاء عقد تلقائياً', '#10b981');
}


function createOrUpdateAdvanceReceipt(inv) {
    let advance = Number(inv.advancePayment || 0);
    if(!Array.isArray(receipts)) receipts = [];
    let existing = receipts.find(r => r.sourceInvoiceId === inv.id && r.type === 'advance');

    if(advance <= 0) {
        if(existing) receipts = receipts.filter(r => r.id !== existing.id);
        return null;
    }

    let cust = customers.find(c => c.id === inv.customerId);
    let customerName = cust ? (cust.name_ar || cust.name || cust.name_en) : (inv.customerName || '-');

    let data = {
        id: existing ? existing.id : Date.now(),
        receiptNumber: existing ? existing.receiptNumber : 'RCPT-' + Date.now(),
        sourceInvoiceId: inv.id,
        invoiceNumber: inv.invoiceNumber,
        type: 'advance',
        customerId: inv.customerId,
        customerName,
        amount: advance,
        remainingAmount: Number(inv.remainingAmount || 0),
        totalAmount: Number(inv.grandTotal || inv.total || 0),
        paidAmount: Number(inv.paidAmount || 0),
        date: inv.date || new Date().toISOString().slice(0,10),
        method: 'دفعة مقدمة',
        note: 'سند قبض تلقائي للمبلغ المدفوع مقدماً',
        createdAt: existing ? existing.createdAt : new Date().toISOString()
    };

    if(existing) Object.assign(existing, data);
    else receipts.unshift(data);

    return data;
}

function getBankOptions(selectedBankName = '') {
    let banks = Array.isArray(bankAccounts) ? bankAccounts : [];
    let opts = `<option value="">بدون بنك / نقداً</option>`;
    banks.forEach(b => {
        let name = b.bankName || b.name || '';
        opts += `<option value="${name}" ${name === selectedBankName ? 'selected' : ''}>${name}${b.accountNumber ? ' - ' + b.accountNumber : ''}</option>`;
    });
    return opts;
}

        };
        if(r) Object.assign(r, data); else receipts.unshift(data);
        saveAll();
        showNotification('تم حفظ سند القبض', '#10b981');
        close();
        renderCurrentTab();
    };
    document.getElementById('previewReceiptBtn').onclick = () => {
        let temp = {
            ...receipt,
            receiptNumber: document.getElementById('receiptNumberInput').value.trim() || receipt.receiptNumber,
            customerName: document.getElementById('receiptCustomerInput').value.trim(),
            invoiceNumber: document.getElementById('receiptInvoiceInput').value.trim(),
            date: document.getElementById('receiptDateInput').value || today,
            amount: Number(document.getElementById('receiptAmountInput').value || 0),
            totalAmount: Number(document.getElementById('receiptTotalInput').value || 0),
            remainingAmount: Number(document.getElementById('receiptRemainingInput').value || 0),
            method: document.getElementById('receiptMethodInput').value,
            bankName: document.getElementById('receiptBankInput').value,
            chequeNumber: document.getElementById('receiptChequeInput')?.value.trim() || '',
            note: document.getElementById('receiptNoteInput').value.trim()
        };
        let win = window.open('', '_blank');
        win.document.write(generateReceiptHTML(temp));
        win.document.close();
        setTimeout(() => win.print(), 300);
    };
}

function attachReceiptEvents() {
    document.getElementById('addManualReceiptBtn')?.addEventListener('click', () => openReceiptModal());
    document.querySelectorAll('.editReceiptBtn').forEach(btn => btn.addEventListener('click', () => openReceiptModal(Number(btn.dataset.id))));
    document.querySelectorAll('.printReceiptBtn').forEach(btn => btn.addEventListener('click', () => printReceipt(Number(btn.dataset.id))));
    document.querySelectorAll('.deleteReceiptBtn').forEach(btn => btn.addEventListener('click', (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        const receiptId = btn.dataset.id || btn.getAttribute('data-id');
        if(typeof window.deleteReceipt === 'function') {
            window.deleteReceipt(receiptId);
            return;
        }
        if(confirm('حذف سند القبض؟')) {
            receipts = receipts.filter(r => String(r.id) !== String(receiptId));
            if(window.receipts) window.receipts = receipts;
            saveAll();
            renderCurrentTab();
            showNotification('تم حذف سند القبض', '#10b981');
        }
    }));
}

function printReceipt(id) {
    let receipt = receipts.find(r => r.id === id);
    if(!receipt) return;
    let win = window.open('', '_blank');
    win.document.write(generateReceiptHTML(receipt));
    win.document.close();
    setTimeout(() => win.print(), 300);
}

    function normalizeSupplierInvoice(si) {
        si.amount = Number(si.amount || 0);
        si.taxRate = Number(si.taxRate || 0);
        si.taxAmount = Number(si.taxAmount || (si.amount * si.taxRate / 100));
        si.totalAmount = Number(si.totalAmount || (si.amount + si.taxAmount));
        if(!Array.isArray(si.payments)) si.payments = [];
        let paymentsTotal = si.payments.reduce((sum, p) => sum + Number(p.amount || 0), 0);
        si.paidAmount = Math.min(si.totalAmount, Math.max(0, paymentsTotal || Number(si.paidAmount || 0)));
        si.remainingAmount = Math.max(0, si.totalAmount - si.paidAmount);
        si.status = si.remainingAmount <= 0 && si.totalAmount > 0 ? 'paid' : (si.paidAmount > 0 ? 'partial' : 'unpaid');
        si.status_ar = si.status === 'paid' ? 'مدفوعة بالكامل' : (si.status === 'partial' ? 'مدفوعة جزئياً' : 'غير مدفوعة');
        si.status_en = si.status === 'paid' ? 'Fully Paid' : (si.status === 'partial' ? 'Partially Paid' : 'Unpaid');
        return si;
    }

    function normalizeLiability(l) {
        l.amount = Number(l.amount || 0);
        l.paidAmount = Number(l.paidAmount || 0);
        if(!Array.isArray(l.payments)) l.payments = [];
        let paymentsTotal = l.payments.reduce((sum, p) => sum + Number(p.amount || 0), 0);
        if(paymentsTotal > 0) l.paidAmount = paymentsTotal;
        if(l.paidAmount < 0) l.paidAmount = 0;
        if(l.paidAmount > l.amount) l.paidAmount = l.amount;
        l.remainingAmount = Math.max(0, l.amount - l.paidAmount);
        l.status = l.remainingAmount <= 0 && l.amount > 0 ? 'paid' : (l.paidAmount > 0 ? 'partial' : 'unpaid');
        l.status_ar = l.status === 'paid' ? 'مسدد بالكامل' : (l.status === 'partial' ? 'مسدد جزئياً' : 'غير مسدد');
        l.status_en = l.status === 'paid' ? 'Fully Paid' : (l.status === 'partial' ? 'Partially Paid' : 'Unpaid');
        return l;
    }

function normalizeInvoice(inv) {
    inv.items = inv.items || [];
    inv.payments = inv.payments || [];
    inv.taxRate = Number(inv.taxRate ?? 5);
    inv.discountType = inv.discountType || (inv.discountPercent ? 'percent' : 'fixed');
    inv.discountValue = Number(inv.discountValue ?? inv.discount ?? 0);
    inv.customerId = inv.customerId ? Number(inv.customerId) : (customers[0]?.id || null);
    let c = customers.find(x => x.id === inv.customerId);
    inv.customerName = inv.customerName || inv.customerName_ar || c?.name_ar || '-';
    inv.customerPhone = inv.customerPhone || c?.phone || '';
    return recalcInvoice(inv);
}

function safeAttr(value) { return String(value ?? '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function toMoney(value) {
    let n = parseFloat(String(value ?? 0).replace(',', '.'));
    return Number.isFinite(n) ? n : 0;
}

function recalcInvoice(inv) {
    inv = inv || {};
    inv.items = Array.isArray(inv.items) ? inv.items : [];
    inv.payments = Array.isArray(inv.payments) ? inv.payments : [];

    let subtotal = 0;
    inv.items = inv.items.map(it => {
        let length = Math.max(0, toMoney(it.length));
        let width = Math.max(0, toMoney(it.width));
        let qty = Math.max(0, toMoney(it.qty || 1));
        let rate = Math.max(0, toMoney(it.rate));
        let calculatedArea = length * width;
        let area = it.areaManual ? Math.max(0, toMoney(it.area)) : calculatedArea;
        let totalArea = area * qty;
        let total = totalArea * rate;
        subtotal += total;
        return { ...it, length, width, qty, rate, area, calculatedArea, areaManual: !!it.areaManual, totalArea, total,
            productName: it.productName || it.productName_ar || it.name_ar || 'منتج',
            productName_ar: it.productName_ar || it.productName || it.name_ar || 'منتج',
            productName_en: it.productName_en || it.productName || it.name_en || 'Product' };
    });

    let taxRate = Math.max(0, toMoney(inv.taxRate ?? 5));
    let discountType = inv.discountType || (inv.discountPercent ? 'percent' : 'fixed');
    let discountValue = Math.max(0, toMoney(inv.discountValue ?? inv.discount ?? 0));

    inv.taxRate = taxRate;
    inv.discountType = discountType;
    inv.discountValue = discountValue;
    inv.subtotal = subtotal;
    inv.taxAmount = subtotal * taxRate / 100;
    inv.totalAfterTax = subtotal + inv.taxAmount;

    let finalDiscount = discountType === 'percent' ? inv.totalAfterTax * discountValue / 100 : discountValue;
    inv.finalDiscount = Math.max(0, Math.min(finalDiscount, inv.totalAfterTax));

    // الإجمالي النهائي هو إجمالي الفاتورة قبل الدفعات، ولا يتم إنقاصه بالمقدم حتى تبقى قيمة العقد/الفاتورة صحيحة.
    inv.grandTotal = Math.max(0, inv.totalAfterTax - inv.finalDiscount);
    inv.total = inv.grandTotal;

    // الدفعة المقدمة تُعامل كمدفوع فعلي، ثم تخصم من المتبقي.
    let advancePayment = Math.max(0, toMoney(inv.advancePayment));
    if(advancePayment > inv.grandTotal) advancePayment = inv.grandTotal;
    inv.advancePayment = advancePayment;

    // الدفعات الأخرى لا تشمل الدفعة المقدمة حتى لا يتم احتسابها مرتين.
    let otherPayments = inv.payments.reduce((s, p) => s + Math.max(0, toMoney(p.amount)), 0);
    inv.otherPayments = otherPayments;
    inv.paidAmount = Math.min(inv.grandTotal, advancePayment + otherPayments);
    inv.remainingAmount = Math.max(0, inv.grandTotal - inv.paidAmount);

    if(inv.manualStatus === 'ملغاة') { inv.status_ar = 'ملغاة'; inv.status_en = 'Cancelled'; }
    else if(inv.docType === 'quotation') { inv.status_ar = 'عرض سعر'; inv.status_en = 'Quotation'; }
    else if(inv.remainingAmount <= 0 && inv.grandTotal > 0) { inv.status_ar = 'مدفوعة بالكامل'; inv.status_en = 'Fully Paid'; }
    else if(inv.paidAmount > 0) { inv.status_ar = 'مدفوعة جزئياً'; inv.status_en = 'Partially Paid'; }
    else { inv.status_ar = 'غير مدفوعة'; inv.status_en = 'Unpaid'; }
    inv.status = inv.status_ar;
    return inv;
}

        let width = parseFloat(String(row.querySelector('.mi-width').value || '0').replace(',', '.')) || 0;
        let autoArea = length * width;
        let areaInput = row.querySelector('.mi-area');
        let area = parseFloat(String(areaInput?.value || '0').replace(',', '.')) || 0;
        let areaManual = !!old.areaManual;
        if(areaChanged && document.activeElement === areaInput) areaManual = true;
        if(!areaManual) area = autoArea;
        mergedInvoiceItems[idx] = {
            ...old,
            productId: product ? product.id : (old.productId || ''),
            productName: product ? (product.name_ar || product.name || product.productName || '') : (old.productName || ''),
            productName_ar: product ? (product.name_ar || product.name || product.productName || '') : (old.productName_ar || old.productName || ''),
            productName_en: product ? (product.name_en || product.name_ar || product.name || '') : (old.productName_en || old.productName || ''),
            unit: product ? (product.unit || product.unit_ar || product.unit_en || '') : (old.unit || ''),
            length, width, area, calculatedArea: autoArea, areaManual,
            qty: parseFloat(String(row.querySelector('.mi-qty').value || '1').replace(',', '.')) || 1,
            rate: parseFloat(String(row.querySelector('.mi-rate').value || '0').replace(',', '.')) || 0
        };
    });
    if(!silent) updateMergedTotals();
}
function updateMergedTotals() {

        docType: document.getElementById('invoiceDocType')?.value || 'invoice'
    };

function saveMergedInvoice() {
    syncMergedItemsFromInputs();
    let customerId = Number(document.getElementById('invoiceCustomer').value);
    let c = customers.find(x => x.id === customerId);
    let old = mergedEditingInvoiceId ? invoices.find(i => i.id === mergedEditingInvoiceId) : null;
    let docType = document.getElementById('invoiceDocType')?.value || 'invoice';
    let wantedPrefix = docType === 'quotation' ? 'QUO-' : 'INV-';
    let invoiceNumber = old?.invoiceNumber || (wantedPrefix + Date.now());
    if(old && old.docType !== docType) invoiceNumber = invoiceNumber.replace(/^QUO-/, 'INV-').replace(/^INV-/, wantedPrefix);
    let inv = normalizeInvoice({
        id: old?.id || Date.now(), invoiceNumber, customerId,
        customerName: c?.name_ar || '', customerPhone: c?.phone || '', date: document.getElementById('invoiceDate').value,
        dueDate: document.getElementById('invoiceDueDate')?.value || old?.dueDate || new Date(Date.now()+30*86400000).toISOString().slice(0,10), items: mergedInvoiceItems, taxRate: Number(document.getElementById('invoiceTaxRate').value || 5),
        discountType: document.getElementById('invoiceDiscountType').value, discountValue: Number(document.getElementById('invoiceDiscountValue').value || 0),
        advancePayment: Number(document.getElementById('mergedInvoiceAdvancePayment')?.value || 0),
        manualStatus: document.getElementById('invoiceManualStatus').value || null, docType, payments: old?.payments || []
    });
    if(!inv.items.length) { alert('أضف صنف واحد على الأقل'); return; }
    recalcInvoice(inv);
    createOrUpdateAdvanceReceipt(inv);
    if(old) invoices[invoices.findIndex(i => i.id === old.id)] = inv; else invoices.push(inv);
    saveAll(); document.getElementById('invoiceModal').remove(); renderCurrentTab(); showNotification(docType === 'quotation' ? 'تم حفظ عرض الأسعار بنجاح' : 'تم حفظ الفاتورة بنجاح', '#10b981');

function addPaymentToInvoice(id) {

function printInvoice(id) { let inv = invoices.find(i => i.id === id); if(!inv) return; let w = window.open('', '_blank'); w.document.write(generateInvoiceHTML(inv)); w.document.close(); setTimeout(()=>w.print(), 300); }
async function downloadPDFInvoice(id) { let inv = invoices.find(i => i.id === id); if(!inv) return; let el = document.createElement('div'); el.innerHTML = generateInvoiceHTML(inv); document.body.appendChild(el); await html2pdf().set({ margin:0.12, filename:`فاتورة_${inv.invoiceNumber}.pdf`, image:{type:'jpeg', quality:0.98}, html2canvas:{scale:2, useCORS:true}, pagebreak:{mode:['avoid-all','css','legacy']}, jsPDF:{unit:'in', format:'a4', orientation:'portrait'} }).from(el).save(); el.remove(); }


function openProductModal(productId = null) {
    if(!hasPermission('products', 'crud')) { showNotification('لا تملك صلاحية إضافة أو تعديل المنتجات', '#ef4444'); return; }
    let p = productId ? products.find(x => x.id === productId) : null;
    let modalHtml = `
    <div id="productModal" class="modal" style="display:flex;">
        <div class="modal-content">
            <h3>${p ? 'تعديل منتج' : 'إضافة منتج جديد'}</h3>
            <div class="form-group"><label>اسم المنتج بالعربي</label><input id="prodNameAr" value="${p?.name_ar || ''}" placeholder="مثال: باب ألمنيوم"></div>
            <div class="form-group"><label>اسم المنتج بالإنجليزي</label><input id="prodNameEn" value="${p?.name_en || ''}" placeholder="Example: Aluminum Door"></div>
            <div class="form-group"><label>السعر</label><input type="number" step="any" id="prodPrice" value="${p?.price ?? 0}"></div>
            <div class="form-group"><label>الكمية الحالية في المخزون</label><input type="number" step="any" id="prodStock" value="${p?.currentStock ?? 0}"></div>
            <div class="form-group"><label>الحد الأدنى للمخزون</label><input type="number" step="any" id="prodMinStock" value="${p?.minStock ?? 0}"></div>
            <div class="form-group"><label>الوحدة</label><input id="prodUnit" value="${p?.unit || 'م²'}" placeholder="م² / قطعة / متر"></div>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <button id="saveProductBtn" class="btn btn-primary">حفظ</button>
                <button id="closeProductModalBtn" class="btn btn-secondary">إلغاء</button>
            </div>
        </div>
    </div>`;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    document.getElementById('closeProductModalBtn').onclick = () => document.getElementById('productModal').remove();
    document.getElementById('saveProductBtn').onclick = () => {
        let name_ar = document.getElementById('prodNameAr').value.trim();
        let name_en = document.getElementById('prodNameEn').value.trim() || name_ar;
        let price = parseFloat(document.getElementById('prodPrice').value) || 0;
        let currentStock = parseFloat(document.getElementById('prodStock').value) || 0;
        let minStock = parseFloat(document.getElementById('prodMinStock').value) || 0;
        let unit = document.getElementById('prodUnit').value.trim() || 'م²';
        if(!name_ar) { showNotification('اكتب اسم المنتج أولاً', '#ef4444'); return; }
        if(p) {
            Object.assign(p, { name_ar, name_en, price, currentStock, minStock, unit, unit_en: unit });
            addAudit('edit', 'product', p.id);
        } else {
            let newProduct = { id: Date.now(), name_ar, name_en, price, currentStock, minStock, unit, unit_en: unit };
            products.push(newProduct);
            addAudit('create', 'product', newProduct.id);
        }
        saveAll();
        document.getElementById('productModal').remove();
        renderCurrentTab();
        showNotification('تم حفظ المنتج بنجاح', '#10b981');
    };
}

function addStockToProduct(productId) {
    if(!hasPermission('inventory', 'crud') && !hasPermission('products', 'crud')) { showNotification('لا تملك صلاحية تعديل المخزون', '#ef4444'); return; }
    let p = products.find(x => x.id === productId);
    if(!p) return;
    let amount = parseFloat(prompt('أدخل الكمية التي تريد إضافتها إلى المخزون:'));
    if(isNaN(amount) || amount <= 0) { showNotification('الكمية غير صحيحة', '#ef4444'); return; }
    p.currentStock = Number(p.currentStock || 0) + amount;
    addAudit('stock_in', 'product', p.id);
    saveAll();
    renderCurrentTab();
    showNotification('تمت إضافة الكمية للمخزون', '#10b981');
}

function adjustRawMaterialStock(materialId, mode = 'in') {
    if(!hasPermission('inventory', 'crud')) { showNotification('لا تملك صلاحية تعديل مخزون المواد الخام', '#ef4444'); return; }
    rawMaterials = Array.isArray(rawMaterials) ? rawMaterials : [];
    let p = rawMaterials.find(x => Number(x.id) === Number(materialId));
    if(!p) return;
    let amount = parseFloat(prompt(mode === 'in' ? 'أدخل كمية الإدخال:' : 'أدخل كمية الصرف:'));
    if(isNaN(amount) || amount <= 0) { showNotification('الكمية غير صحيحة', '#ef4444'); return; }
    if(mode === 'out' && Number(p.currentStock || 0) < amount) { showNotification('الرصيد غير كافٍ لصرف هذه المادة', '#ef4444'); return; }
    p.currentStock = Number(p.currentStock || 0) + (mode === 'in' ? amount : -amount);
    addAudit(mode === 'in' ? 'raw_stock_in' : 'raw_stock_out', 'raw_material', p.id);
    saveAll();
    renderCurrentTab();
    showNotification(mode === 'in' ? 'تم إدخال المادة للمخزون' : 'تم صرف المادة من المخزون', '#10b981');
}

function createContractFromInvoice(inv) {
    if(!inv || inv.docType !== 'invoice') return null;
    if(!Array.isArray(contracts)) contracts = [];
    let existing = contracts.find(c => c.sourceInvoiceId === inv.id);
    let cust = customers.find(c => c.id === inv.customerId);
    let contractData = {
        sourceInvoiceId: inv.id,
        invoiceNumber: inv.invoiceNumber,
        customerId: inv.customerId,
        customerName: cust ? (cust.name_ar || cust.name_en || cust.name || '-') : (inv.customerName || '-'),
        projectName: 'عقد تلقائي من الفاتورة ' + inv.invoiceNumber,
        name_ar: 'عقد تلقائي من الفاتورة ' + inv.invoiceNumber,
        name_en: 'Auto contract from invoice ' + inv.invoiceNumber,
        date: inv.date || new Date().toISOString().slice(0,10),
        total: Number(inv.grandTotal || inv.total || 0),
        paidAmount: Number(inv.paidAmount || 0),
        remainingAmount: Number(inv.remainingAmount || 0),
        status: 'active',
        status_ar: 'عقد جديد',
        status_en: 'New Contract',
        progress: 0,
        items: JSON.parse(JSON.stringify(inv.items || []))
    };
    if(existing) { Object.assign(existing, contractData); return existing; }
    let contract = { id: Date.now(), contractNumber: 'CTR-' + Date.now(), ...contractData, tasks: [] };
    contracts.unshift(contract);
    return contract;
}

function convertQuotationToInvoice(id) {
    let inv = invoices.find(i => Number(i.id) === Number(id));
    if(!inv) return;
    inv = normalizeInvoice(inv);
    if(inv.docType !== 'quotation') { showNotification('هذا المستند فاتورة بالفعل', '#f59e0b'); return; }
    if(!confirm('هل تريد تحويل عرض الأسعار إلى فاتورة وإنشاء عقد تلقائياً؟')) return;
    inv.docType = 'invoice';
    inv.invoiceNumber = String(inv.invoiceNumber || ('INV-' + Date.now())).replace(/^QUO-/, 'INV-');
    if(!/^INV-/.test(inv.invoiceNumber)) inv.invoiceNumber = 'INV-' + inv.invoiceNumber;
    inv.convertedFromQuotation = true;
    inv.convertedAt = new Date().toISOString();
    recalcInvoice(inv);
    createOrUpdateAdvanceReceipt(inv);
    createContractFromInvoice(inv);
    let idx = invoices.findIndex(i => Number(i.id) === Number(id));
    if(idx >= 0) invoices[idx] = inv;
    saveAll();
    renderCurrentTab();
    showNotification('تم تحويل عرض الأسعار إلى فاتورة وتم إرسالها إلى العقود', '#10b981');
}

function syncAdvanceReceiptsFromInvoices() {
    if(!Array.isArray(receipts)) receipts = [];
    (invoices || []).forEach(inv => {
        recalcInvoice(inv);
        if(Number(inv.advancePayment || 0) > 0) createOrUpdateAdvanceReceipt(inv);
    });
    saveAll();
}

function runInvoiceMathSelfTest() {
    let test = { docType:'invoice', taxRate:5, discountType:'fixed', discountValue:0, advancePayment:100, payments:[], items:[{ length:2, width:2, qty:1, rate:100 }] };
    recalcInvoice(test);
    console.assert(test.subtotal === 400, 'subtotal should be 400');
    console.assert(test.taxAmount === 20, 'tax should be 20');
    console.assert(test.grandTotal === 420, 'grand total should be 420');
    console.assert(test.paidAmount === 100, 'paid should include advance payment');
    console.assert(test.remainingAmount === 320, 'remaining should be 320 after advance payment');
    return test;
}

<script>
// ==================== تخصيص دور المحاسب كنظام محاسبي متطور ====================
(function(){
    // صلاحيات المحاسب: إظهار النوافذ المحاسبية فقط
    if(typeof permissions !== 'undefined') {
        permissions.accountant = {
            products: 'none', inventory: 'none', contracts: 'none', users: 'none', settings: 'none', reports: 'view',
            invoices: 'crud', customers: 'crud', expenses: 'crud', bankAccounts: 'crud', cashBoxes: 'crud',
            supplierInvoices: 'crud', liabilities: 'crud', receipts: 'crud',
            accountingDashboard: 'view', taxReport: 'view', receivablesAging: 'view', ledger: 'view'
        };
    }

    function money(v){ return (Number(v || 0)).toFixed(2) + ' ' + (currentLang === 'ar' ? 'ريال' : 'OMR'); }
    function customerName(id){ let c = customers.find(x => Number(x.id) === Number(id)); return c ? (currentLang === 'ar' ? (c.name_ar || c.name_en) : (c.name_en || c.name_ar)) : '-'; }
    function invoiceTotal(inv){ recalcInvoice(inv); return Number(inv.grandTotal ?? inv.total ?? 0); }
    function invoicePaid(inv){ recalcInvoice(inv); return Number(inv.paidAmount || 0); }
    function invoiceRemaining(inv){ recalcInvoice(inv); return Number(inv.remainingAmount ?? Math.max(0, invoiceTotal(inv)-invoicePaid(inv))); }

    window.renderAccountingDashboardPage = function(){
        (invoices || []).forEach(i => recalcInvoice(i));
        let sales = invoices.filter(i => i.docType !== 'quotation').reduce((s,i)=>s+invoiceTotal(i),0);
        let paid = invoices.filter(i => i.docType !== 'quotation').reduce((s,i)=>s+invoicePaid(i),0);
        let receivable = invoices.filter(i => i.docType !== 'quotation').reduce((s,i)=>s+invoiceRemaining(i),0);
        let quotationValue = invoices.filter(i => i.docType === 'quotation').reduce((s,i)=>s+invoiceTotal(i),0);
        let expenseTotal = (expenses || []).reduce((s,e)=>s+Number(e.amount||0),0);
        let supplierDue = (supplierInvoices || []).filter(i=>i.status !== 'paid').reduce((s,i)=>s+Number(i.amount||0),0);
        let liabilitiesDue = (liabilities || []).filter(l=>l.status !== 'paid').reduce((s,l)=>s+Number(l.amount||0),0);
        let bank = (bankAccounts || []).reduce((s,b)=>s+Number(b.balance||0),0);
        let cash = (cashBoxes || []).reduce((s,c)=>s+Number(c.balance||0),0);
        let vat = invoices.filter(i => i.docType !== 'quotation').reduce((s,i)=>s+Number(i.taxAmount||0),0);
        let profit = paid - expenseTotal;
        return `
        <div class="section-card" style="margin-bottom:20px"><h2>📊 لوحة المحاسب</h2><p>هذه الواجهة خاصة بالمحاسبة فقط: مبيعات، سندات قبض، مصروفات، بنوك، صناديق، موردين، ديون، ضريبة وتقارير.</p></div>

            <div class="stat-card"><div class="stat-title">إجمالي الفواتير</div><div class="stat-value">${money(sales)}</div></div>

    function renderReceivableTable(limit){
        let rows = invoices.filter(i => i.docType !== 'quotation').map(i => ({...i, rem: invoiceRemaining(i)})).filter(i=>i.rem>0).slice(0, limit || 999);

        invoices.filter(i=>i.docType !== 'quotation').forEach(i=>{ let rem = invoiceRemaining(i); if(rem>0){ byCustomer[i.customerId] = (byCustomer[i.customerId]||0)+rem; }});

        return `<div class="section-card"><h3>📌 الذمم المدينة وكشف العملاء</h3><div style="overflow-x:auto"><table class="table"><thead><tr><th>العميل</th><th>المبلغ المتبقي</th></tr></thead><tbody>${summary}</tbody></table></div></div><div class="section-card" style="margin-top:20px"><h3>تفاصيل الفواتير غير المسددة</h3>${renderReceivableTable()}</div>`;
    };

    window.renderTaxReportPage = function(){
        (invoices||[]).forEach(i=>recalcInvoice(i));
        let taxableSales = invoices.filter(i=>i.docType !== 'quotation').reduce((s,i)=>s+Number(i.subtotal||0),0);
        let outputVat = invoices.filter(i=>i.docType !== 'quotation').reduce((s,i)=>s+Number(i.taxAmount||0),0);
        let inputVat = (supplierInvoices||[]).reduce((s,i)=>s+Number(i.taxAmount||0),0);
        let netVat = outputVat - inputVat;
        return `<div class="section-card"><h3>🧾 تقرير الضريبة</h3><div class="stats-grid"><div class="stat-card"><div class="stat-title">المبيعات الخاضعة للضريبة</div><div class="stat-value">${money(taxableSales)}</div></div><div class="stat-card"><div class="stat-title">ضريبة المخرجات</div><div class="stat-value">${money(outputVat)}</div></div><div class="stat-card"><div class="stat-title">ضريبة المدخلات</div><div class="stat-value">${money(inputVat)}</div></div><div class="stat-card"><div class="stat-title">صافي الضريبة المستحقة</div><div class="stat-value ${netVat>=0?'text-danger':'text-success'}">${money(netVat)}</div></div></div><p>ملاحظة: ضريبة المدخلات ستظهر عند إضافة taxAmount لفواتير الموردين.</p></div>`;
    };

    window.renderLedgerPage = function(){
        let rows = [];
        invoices.filter(i=>i.docType !== 'quotation').forEach(i=>{ recalcInvoice(i); rows.push({date:i.date, type:'فاتورة مبيعات', ref:i.invoiceNumber, debit:invoiceRemaining(i), credit:invoicePaid(i), note:customerName(i.customerId)}); });
        (receipts||[]).forEach(r=>rows.push({date:r.date, type:'سند قبض', ref:r.receiptNumber, debit:0, credit:Number(r.amount||0), note:r.customerName||'-'}));
        (expenses||[]).forEach(e=>rows.push({date:e.date, type:'مصروف', ref:'EXP-'+e.id, debit:Number(e.amount||0), credit:0, note:e.category_ar||e.category_en||'-'}));
        (supplierInvoices||[]).forEach(s=>rows.push({date:s.dueDate, type:'فاتورة مورد', ref:s.invoiceNumber, debit:Number(s.amount||0), credit:0, note:s.supplier_ar||s.supplier_en||'-'}));
        rows.sort((a,b)=>String(b.date||'').localeCompare(String(a.date||'')));
        return `<div class="section-card"><h3>📚 دفتر الحركة المحاسبية</h3><div style="overflow-x:auto"><table class="table"><thead><tr><th>التاريخ</th><th>النوع</th><th>المرجع</th><th>مدين</th><th>دائن</th><th>البيان</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.date||'-'}</td><td>${r.type}</td><td>${r.ref}</td><td>${money(r.debit)}</td><td>${money(r.credit)}</td><td>${r.note}</td></tr>`).join('') || '<tr><td colspan="6">لا توجد حركات.</td></tr>'}</tbody></table></div></div>`;
    };

    const oldRenderCurrentTab = window.renderCurrentTab || renderCurrentTab;
    window.renderCurrentTab = function(){
        if(!currentUser) return;
        if(currentUser.role === 'accountant') {
            const allowed = ['accountingDashboard','invoices','receipts','expenses','bankAccounts','cashBoxes','supplierInvoices','liabilities','customers','financialReports','taxReport','receivablesAging','ledger'];
            if(!allowed.includes(currentTab)) currentTab = 'accountingDashboard';
        }
        let content = '';
        if(currentTab === 'accountingDashboard') content = renderAccountingDashboardPage();
        else if(currentTab === 'taxReport') content = renderTaxReportPage();
        else if(currentTab === 'receivablesAging') content = renderReceivablesAgingPage();
        else if(currentTab === 'ledger') content = renderLedgerPage();
        else return oldRenderCurrentTab();
        document.getElementById('mainContent').innerHTML = content;
        attachEvents();
    };

    const oldInitNav = window.initNav || initNav;
    window.initNav = function(){
        if(currentUser && currentUser.role === 'accountant') {
            const modules = ['accountingDashboard','invoices','receipts','expenses','bankAccounts','cashBoxes','supplierInvoices','liabilities','customers','financialReports','taxReport','receivablesAging','ledger'];
            const labels = { accountingDashboard:'لوحة المحاسب', invoices:'الفواتير', receipts:'سندات القبض', expenses:'المصروفات', bankAccounts:'الحسابات البنكية', cashBoxes:'الصناديق النقدية', supplierInvoices:'فواتير الموردين', liabilities:'ديون الشركة', customers:'حسابات العملاء', financialReports:'التقارير المالية', taxReport:'تقرير الضريبة', receivablesAging:'الذمم المدينة', ledger:'دفتر الحركة' };
            const icons = { accountingDashboard:'fa-calculator', invoices:'fa-file-invoice', receipts:'fa-receipt', expenses:'fa-chart-line', bankAccounts:'fa-university', cashBoxes:'fa-money-bill', supplierInvoices:'fa-truck', liabilities:'fa-hand-holding-usd', customers:'fa-users', financialReports:'fa-chart-pie', taxReport:'fa-percent', receivablesAging:'fa-user-clock', ledger:'fa-book' };
            if(!modules.includes(currentTab)) currentTab = 'accountingDashboard';
            document.getElementById('navMenu').innerHTML = modules.map(m=>`<li class="nav-item ${currentTab===m?'active':''}" data-tab="${m}"><i class="fas ${icons[m]}"></i><span>${labels[m]}</span></li>`).join('');
            document.querySelectorAll('.nav-item').forEach(el=>el.addEventListener('click',()=>{ currentTab=el.dataset.tab; renderCurrentTab(); initNav(); }));
            return;
        }
        return oldInitNav();
    };

    // بعد تسجيل الدخول كمحاسب اجعله يدخل مباشرة إلى لوحة المحاسب
    document.getElementById('doLoginBtn')?.addEventListener('click', function(){
        setTimeout(function(){ if(currentUser && currentUser.role === 'accountant'){ currentTab='accountingDashboard'; renderCurrentTab(); initNav(); } }, 0);
    });
    document.getElementById('loginPassword')?.addEventListener('keypress', function(e){
        if(e.key === 'Enter') setTimeout(function(){ if(currentUser && currentUser.role === 'accountant'){ currentTab='accountingDashboard'; renderCurrentTab(); initNav(); } }, 0);
    });
})();
</script>
<script>
// ===== تقرير مالي مفصل مع طباعة وحفظ PDF =====
(function(){
function num(v){return parseFloat(String(v??0).replace(',','.'))||0}
function money(v){return num(v).toFixed(2)+' ريال'}
function cName(id){let c=(customers||[]).find(x=>String(x.id)===String(id));return c?(c.name_ar||c.name||c.name_en||'-'):'-'}
function sName(s){return s.supplier_ar||s.supplier||s.supplier_en||'-'}
function calcInv(i){if(typeof recalcInvoice==='function')recalcInvoice(i);return i}
function invTotal(i){calcInv(i);return num(i.grandTotal??i.total)}
function invPaid(i){calcInv(i);return num(i.paidAmount)}
function invRem(i){calcInv(i);return num(i.remainingAmount??Math.max(0,invTotal(i)-invPaid(i)))}
function supTotal(s){return num(s.grandTotal??s.total??s.amount)}
function supPaid(s){return num(s.paidAmount??s.paid)}
function supRem(s){return num(s.remainingAmount??Math.max(0,supTotal(s)-supPaid(s)))}
function liabPaid(l){return num(l.paidAmount)}
function liabRem(l){return num(l.remainingAmount??Math.max(0,num(l.amount)-liabPaid(l)))}
function expenseCats(){let map={};(expenses||[]).forEach(e=>{let k=e.category_ar||e.category||e.category_en||'مصروفات أخرى';map[k]=(map[k]||0)+num(e.amount)});return map}
function months(){let map={};function add(d,k,v){let m=String(d||'غير محدد').slice(0,7);if(!map[m])map[m]={sales:0,paid:0,exp:0};map[m][k]+=num(v)};(invoices||[]).filter(i=>i.docType!=='quotation').forEach(i=>{calcInv(i);add(i.date,'sales',invTotal(i));add(i.date,'paid',invPaid(i))});(expenses||[]).forEach(e=>add(e.date,'exp',e.amount));return map}
function data(){(invoices||[]).forEach(calcInv);let sales=(invoices||[]).filter(i=>i.docType!=='quotation'), quotes=(invoices||[]).filter(i=>i.docType==='quotation');let d={};d.sales=sales;d.salesTotal=sales.reduce((a,i)=>a+invTotal(i),0);d.paid=sales.reduce((a,i)=>a+invPaid(i),0);d.receivables=sales.reduce((a,i)=>a+invRem(i),0);d.quotes=quotes.reduce((a,i)=>a+invTotal(i),0);d.exp=(expenses||[]).reduce((a,e)=>a+num(e.amount),0);d.supTotal=(supplierInvoices||[]).reduce((a,s)=>a+supTotal(s),0);d.supPaid=(supplierInvoices||[]).reduce((a,s)=>a+supPaid(s),0);d.supRem=(supplierInvoices||[]).reduce((a,s)=>a+supRem(s),0);d.liabTotal=(liabilities||[]).reduce((a,l)=>a+num(l.amount),0);d.liabPaid=(liabilities||[]).reduce((a,l)=>a+liabPaid(l),0);d.liabRem=(liabilities||[]).reduce((a,l)=>a+liabRem(l),0);d.bank=(bankAccounts||[]).reduce((a,b)=>a+num(b.balance),0);d.cash=(cashBoxes||[]).reduce((a,c)=>a+num(c.balance),0);d.outVat=sales.reduce((a,i)=>a+num(i.taxAmount),0);d.inVat=(supplierInvoices||[]).reduce((a,s)=>a+num(s.taxAmount),0);d.netVat=d.outVat-d.inVat;d.net=d.paid-d.exp-d.supPaid-d.liabPaid;return d}
function tables(d){let rec=d.sales.filter(i=>invRem(i)>0).map(i=>`<tr><td>${i.date||'-'}</td><td>${i.invoiceNumber}</td><td>${cName(i.customerId)}</td><td>${money(invTotal(i))}</td><td>${money(invPaid(i))}</td><td class="text-danger">${money(invRem(i))}</td></tr>`).join('')||'<tr><td colspan="6">لا توجد ذمم مدينة.</td></tr>';let sups=(supplierInvoices||[]).map(s=>`<tr><td>${s.date||s.dueDate||'-'}</td><td>${s.invoiceNumber||'-'}</td><td>${sName(s)}</td><td>${money(supTotal(s))}</td><td>${money(supPaid(s))}</td><td class="text-danger">${money(supRem(s))}</td></tr>`).join('')||'<tr><td colspan="6">لا توجد فواتير موردين.</td></tr>';let lis=(liabilities||[]).map(l=>`<tr><td>${l.dueDate||'-'}</td><td>${l.creditor_ar||l.creditor||'-'}</td><td>${money(l.amount)}</td><td>${money(liabPaid(l))}</td><td class="text-danger">${money(liabRem(l))}</td><td>${l.status_ar||'-'}</td></tr>`).join('')||'<tr><td colspan="6">لا توجد ديون.</td></tr>';let cats=expenseCats();let catRows=Object.keys(cats).map(k=>`<tr><td>${k}</td><td>${money(cats[k])}</td></tr>`).join('')||'<tr><td colspan="2">لا توجد مصروفات.</td></tr>';return `<div class="section-card report-card"><h3>📌 الذمم المدينة على العملاء</h3><div style="overflow-x:auto"><table class="table"><thead><tr><th>التاريخ</th><th>الفاتورة</th><th>العميل</th><th>الإجمالي</th><th>المدفوع</th><th>المتبقي</th></tr></thead><tbody>${rec}</tbody></table></div></div><div class="section-card report-card"><h3>🚚 فواتير الموردين</h3><div style="overflow-x:auto"><table class="table"><thead><tr><th>التاريخ</th><th>الفاتورة</th><th>المورد</th><th>الإجمالي</th><th>المدفوع</th><th>المتبقي</th></tr></thead><tbody>${sups}</tbody></table></div></div><div class="section-card report-card"><h3>🏦 ديون الشركة</h3><div style="overflow-x:auto"><table class="table"><thead><tr><th>الاستحقاق</th><th>الدائن</th><th>أصل الدين</th><th>المسدد</th><th>المتبقي</th><th>الحالة</th></tr></thead><tbody>${lis}</tbody></table></div></div><div class="section-card report-card"><h3>📉 المصروفات حسب الفئة</h3><table class="table"><tbody>${catRows}</tbody></table></div>`}
function draw(){if(typeof Chart==='undefined')return;let d=data(),cats=expenseCats(),mo=months(),labels=Object.keys(mo).sort();let c1=document.getElementById('finOverviewChart')?.getContext('2d');if(c1){if(window.finOverviewChartObj)window.finOverviewChartObj.destroy();window.finOverviewChartObj=new Chart(c1,{type:'bar',data:{labels:['المقبوضات','المصروفات','الموردين','الديون','صافي الربح'],datasets:[{label:'ريال',data:[d.paid,d.exp,d.supPaid,d.liabPaid,d.net]}]},options:{responsive:true,maintainAspectRatio:false}})}let c2=document.getElementById('finExpenseChart')?.getContext('2d');if(c2){if(window.finExpenseChartObj)window.finExpenseChartObj.destroy();window.finExpenseChartObj=new Chart(c2,{type:'pie',data:{labels:Object.keys(cats).length?Object.keys(cats):['لا توجد'],datasets:[{data:Object.keys(cats).length?Object.values(cats):[1]}]},options:{responsive:true,maintainAspectRatio:false}})}let c3=document.getElementById('finMonthlyChart')?.getContext('2d');if(c3){if(window.finMonthlyChartObj)window.finMonthlyChartObj.destroy();window.finMonthlyChartObj=new Chart(c3,{type:'line',data:{labels:labels.length?labels:['الشهر الحالي'],datasets:[{label:'المبيعات',data:labels.length?labels.map(x=>mo[x].sales):[0]},{label:'المقبوضات',data:labels.length?labels.map(x=>mo[x].paid):[0]},{label:'المصروفات',data:labels.length?labels.map(x=>mo[x].exp):[0]}]},options:{responsive:true,maintainAspectRatio:false}})}}
window.renderFinancialReportsPage=function(){if(!hasPermission('reports'))return `<div class="section-card">⛔ ${t('noPermission')}</div>`;let d=data();setTimeout(draw,150);return `<div id="financialReportPrintable"><div class="section-card"><div class="section-header no-print"><h2>📊 التقرير المالي المفصل</h2><div><button onclick="printFinancialReport()" class="btn btn-secondary">🖨️ طباعة</button> <button onclick="downloadFinancialReportPDF()" class="btn btn-primary">💾 حفظ PDF</button></div></div><div class="print-only" style="display:none;text-align:center"><h1>التقرير المالي المفصل</h1><p>مؤسسة فخر نزوى - ${new Date().toLocaleDateString('ar-OM')}</p></div><p>تقرير شامل للمبيعات، المقبوضات، المصروفات، الموردين، الديون، الذمم والضريبة.</p></div><div class="stats-grid"><div class="stat-card"><div class="stat-title">إجمالي الفواتير</div><div class="stat-value">${money(d.salesTotal)}</div></div><div class="stat-card"><div class="stat-title">المقبوض من العملاء</div><div class="stat-value text-success">${money(d.paid)}</div></div><div class="stat-card"><div class="stat-title">الذمم المدينة</div><div class="stat-value text-danger">${money(d.receivables)}</div></div><div class="stat-card"><div class="stat-title">عروض الأسعار</div><div class="stat-value">${money(d.quotes)}</div></div><div class="stat-card"><div class="stat-title">المصروفات</div><div class="stat-value text-danger">${money(d.exp)}</div></div><div class="stat-card"><div class="stat-title">مدفوعات الموردين</div><div class="stat-value text-danger">${money(d.supPaid)}</div></div><div class="stat-card"><div class="stat-title">متبقي الموردين</div><div class="stat-value text-danger">${money(d.supRem)}</div></div><div class="stat-card"><div class="stat-title">متبقي ديون الشركة</div><div class="stat-value text-danger">${money(d.liabRem)}</div></div><div class="stat-card"><div class="stat-title">النقد والبنوك</div><div class="stat-value">${money(d.bank+d.cash)}</div></div><div class="stat-card"><div class="stat-title">صافي الضريبة</div><div class="stat-value ${d.netVat>=0?'text-danger':'text-success'}">${money(d.netVat)}</div></div><div class="stat-card"><div class="stat-title">صافي الربح النقدي</div><div class="stat-value ${d.net>=0?'text-success':'text-danger'}">${money(d.net)}</div></div></div><div class="section-card report-card"><h3>📈 الرسوم البيانية</h3><div class="report-chart-grid"><div><h4>ملخص مالي</h4><canvas id="finOverviewChart"></canvas></div><div><h4>المصروفات حسب الفئة</h4><canvas id="finExpenseChart"></canvas></div><div class="wide-chart"><h4>الحركة الشهرية</h4><canvas id="finMonthlyChart"></canvas></div></div></div><div class="section-card report-card"><h3>🧮 ملخص تفصيلي</h3><table class="table"><tbody><tr><th>إجمالي فواتير المبيعات</th><td>${money(d.salesTotal)}</td><th>المقبوض من العملاء</th><td>${money(d.paid)}</td></tr><tr><th>المتبقي على العملاء</th><td>${money(d.receivables)}</td><th>إجمالي عروض الأسعار</th><td>${money(d.quotes)}</td></tr><tr><th>إجمالي المصروفات</th><td>${money(d.exp)}</td><th>إجمالي فواتير الموردين</th><td>${money(d.supTotal)}</td></tr><tr><th>المسدد للموردين</th><td>${money(d.supPaid)}</td><th>المتبقي للموردين</th><td>${money(d.supRem)}</td></tr><tr><th>أصل ديون الشركة</th><td>${money(d.liabTotal)}</td><th>المتبقي من ديون الشركة</th><td>${money(d.liabRem)}</td></tr><tr><th>رصيد البنوك</th><td>${money(d.bank)}</td><th>رصيد الصناديق</th><td>${money(d.cash)}</td></tr><tr><th>ضريبة المخرجات</th><td>${money(d.outVat)}</td><th>ضريبة المدخلات</th><td>${money(d.inVat)}</td></tr></tbody></table></div>${tables(d)}</div>`}

function auditor(action,entity,id,details){ auditLogs = auditLogs || []; auditLogs.unshift({id:Date.now(),user:currentUser?.username||'system',action,entity,entityId:id,details:details||'',timestamp:new Date().toISOString()}); localStorage.setItem('erp_audit',JSON.stringify(auditLogs)); }
function signer(){ return {accountantSignature:(currentUser?.name_ar||currentUser?.username||'غير محدد'),accountantUser:(currentUser?.username||''),signedAt:new Date().toISOString()}; }
function addEntry(sourceType,sourceId,desc,debitAccount,creditAccount,amount){ amount=n(amount); if(amount<=0) return; let existing=accountingEntries.find(e=>e.sourceType===sourceType && String(e.sourceId)===String(sourceId) && e.description===desc); let row={id: existing?existing.id:Date.now()+Math.random(),entryNumber: existing?existing.entryNumber:'JE-'+String(Date.now()).slice(-8),date:today(),sourceType,sourceId,description:desc,debitAccount,creditAccount,amount,...signer()}; if(existing) Object.assign(existing,row); else accountingEntries.unshift(row); persistAdvanced(); }
function rebuildAccountingEntries(){
 accountingEntries=[];
 (invoices||[]).forEach(inv=>{ if(typeof recalcInvoice==='function') recalcInvoice(inv); if(inv.docType!=='quotation'){ addEntry('invoice',inv.id,'إثبات فاتورة مبيعات '+inv.invoiceNumber,'العملاء / الذمم المدينة','إيرادات المبيعات',n(inv.grandTotal||inv.total)); if(n(inv.taxAmount)>0) addEntry('invoice-vat',inv.id,'ضريبة مخرجات '+inv.invoiceNumber,'العملاء / الذمم المدينة','ضريبة القيمة المضافة - مخرجات',n(inv.taxAmount)); if(n(inv.paidAmount)>0) addEntry('receipt',inv.id,'قبض من العميل '+inv.invoiceNumber,'الصندوق / البنك','العملاء / الذمم المدينة',n(inv.paidAmount)); }});
 (expenses||[]).forEach(e=>addEntry('expense',e.id,'مصروف: '+(e.category_ar||e.category||'مصروف'),'المصروفات','الصندوق / البنك',n(e.amount)));
 (supplierInvoices||[]).forEach(s=>{ let total=n(s.grandTotal||s.total||s.amount); addEntry('supplierInvoice',s.id,'فاتورة مورد '+(s.invoiceNumber||''),'المشتريات / المخزون','الموردون / الذمم الدائنة',total); if(n(s.paidAmount||s.paid)>0) addEntry('supplierPayment',s.id,'سداد مورد '+(s.invoiceNumber||''),'الموردون / الذمم الدائنة','الصندوق / البنك',n(s.paidAmount||s.paid)); });
 (liabilities||[]).forEach(l=>{ addEntry('liability',l.id,'إثبات دين: '+(l.creditor_ar||l.creditor||''),'التزامات / مصروفات','ديون الشركة',n(l.amount)); if(n(l.paidAmount)>0) addEntry('liabilityPayment',l.id,'سداد دين: '+(l.creditor_ar||l.creditor||''),'ديون الشركة','الصندوق / البنك',n(l.paidAmount)); });
 (payrollRuns||[]).forEach(p=>addEntry('payroll',p.id,'رواتب شهر '+p.month,'مصروف الرواتب','الصندوق / البنك',n(p.netTotal)));
 persistAdvanced(); auditor('إعادة بناء القيود','accountingEntries','all','تم توليد القيود من العمليات المالية');
}
window.rebuildAccountingEntries=rebuildAccountingEntries;
const oldSaveAllAdv = window.saveAll || saveAll;
window.saveAll=function(){ oldSaveAllAdv(); persistAdvanced(); autoBackup(false); };
function backupPayload(){ return {createdAt:new Date().toISOString(),products,rawMaterials,customers,invoices,contracts,bankAccounts,cashBoxes,expenses,supplierInvoices,liabilities,receipts,auditLogs,accountingEntries,warehouseMovements,workshops,workOrders,workshopMaterialIssues,employees,attendanceRecords,payrollRuns}; }
window.autoBackup=function(force){ let last=localStorage.getItem('erp_last_auto_backup_at'); if(!force && last && Date.now()-Number(last)<10*60*1000) return; backups.unshift({id:Date.now(),createdAt:new Date().toISOString(),type:force?'manual':'auto',payload:backupPayload()}); backups=backups.slice(0,20); localStorage.setItem('erp_backups',JSON.stringify(backups)); localStorage.setItem('erp_last_auto_backup_at',String(Date.now())); };
window.downloadBackup=function(){ autoBackup(true); let blob=new Blob([JSON.stringify(backupPayload(),null,2)],{type:'application/json'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='fakhr-nizwa-backup-'+today()+'.json'; a.click(); URL.revokeObjectURL(a.href); auditor('تصدير نسخة احتياطية','backup','manual',''); };
function addMovement(productId,type,qty,ref,workshopId){ let p=(rawMaterials||[]).find(x=>String(x.id)===String(productId)); qty=n(qty); if(!p||qty<=0)return false; if(type==='out' && n(p.currentStock)<qty){ showNotification('الكمية غير كافية في مخزون المواد الخام','#ef4444'); return false; } p.currentStock=n(p.currentStock)+(type==='in'?qty:-qty); warehouseMovements.unshift({id:Date.now(),date:today(),productId:p.id,productName:p.name_ar||p.name_en,type,qty,ref:ref||'',workshopId:workshopId||'',...signer()}); persistAdvanced(); if(typeof saveAll==='function') saveAll(); auditor(type==='in'?'إدخال مادة خام':'إخراج مادة خام','inventory',p.id,qty+' '+(p.unit||'')); return true; }
window.issueMaterialToWorkshop=function(){ let productId=document.getElementById('issueProduct')?.value, workshopId=document.getElementById('issueWorkshop')?.value, qty=n(document.getElementById('issueQty')?.value), note=document.getElementById('issueNote')?.value||''; if(addMovement(productId,'out',qty,'تسليم مواد للورشة',workshopId)){ workshopMaterialIssues.unshift({id:Date.now(),date:today(),productId,workshopId,qty,note,...signer()}); persistAdvanced(); renderCurrentTab(); showNotification('تم تسليم المادة للورشة وخصمها من المخزون','#10b981'); }};
function renderAccountingCenter(){ rebuildAccountingEntries(); let total=accountingEntries.reduce((a,e)=>a+n(e.amount),0); return `<div class="section-card"><div class="section-header"><h2>🧾 مركز القيود المحاسبية</h2><button class="btn btn-primary" onclick="rebuildAccountingEntries();renderCurrentTab()">تحديث القيود</button></div><p>كل أمر مالي يتم توقيعه باسم المستخدم الذي نفذه، ويظهر في خانة توقيع المحاسب.</p><div class="stats-grid"><div class="stat-card"><div class="stat-title">عدد القيود</div><div class="stat-value">${accountingEntries.length}</div></div><div class="stat-card"><div class="stat-title">إجمالي حركة القيود</div><div class="stat-value">${money(total)}</div></div></div><div style="overflow-x:auto"><table class="table"><thead><tr><th>رقم القيد</th><th>التاريخ</th><th>البيان</th><th>مدين</th><th>دائن</th><th>المبلغ</th><th>توقيع المحاسب</th></tr></thead><tbody>${accountingEntries.map(e=>`<tr><td>${e.entryNumber}</td><td>${e.date}</td><td>${e.description}</td><td>${e.debitAccount}</td><td>${e.creditAccount}</td><td>${money(e.amount)}</td><td>${e.accountantSignature||'-'}<br><small>${e.signedAt?new Date(e.signedAt).toLocaleString('ar-OM'):''}</small></td></tr>`).join('')||'<tr><td colspan="7">لا توجد قيود.</td></tr>'}</tbody></table></div></div>`; }
function renderAdvancedWarehouse(){ rawMaterials=Array.isArray(rawMaterials)?rawMaterials:[]; return `<div class="section-card"><div class="section-header"><h2>🏭 المستودع المتقدم للمواد الخام</h2></div><div class="stats-grid"><div class="stat-card"><div class="stat-title">إجمالي المواد الخام</div><div class="stat-value">${rawMaterials.length}</div></div><div class="stat-card"><div class="stat-title">حركات المواد</div><div class="stat-value">${warehouseMovements.length}</div></div><div class="stat-card"><div class="stat-title">مواد مسلمة للورش</div><div class="stat-value">${workshopMaterialIssues.length}</div></div></div><div class="section-card"><h3>تسليم مادة خام إلى ورشة</h3><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px"><select id="issueProduct">${rawMaterials.map(p=>`<option value="${p.id}">${p.name_ar||p.name_en} - رصيد: ${n(p.currentStock)} ${p.unit||''}</option>`).join('')}</select><select id="issueWorkshop">${workshops.map(w=>`<option value="${w.id}">${w.name}</option>`).join('')}</select><input id="issueQty" type="number" placeholder="الكمية"><input id="issueNote" placeholder="ملاحظة / رقم أمر العمل"><button class="btn btn-primary" onclick="issueMaterialToWorkshop()">تسليم وخصم من مخزون المواد الخام</button></div></div><div style="overflow-x:auto"><table class="table"><thead><tr><th>التاريخ</th><th>المادة الخام</th><th>الحركة</th><th>الكمية</th><th>الورشة</th><th>المرجع</th><th>توقيع</th></tr></thead><tbody>${warehouseMovements.map(m=>{let p=(rawMaterials||[]).find(x=>String(x.id)===String(m.productId));let w=workshops.find(x=>String(x.id)===String(m.workshopId));return `<tr><td>${m.date}</td><td>${p?.name_ar||m.productName||'-'}</td><td>${m.type==='in'?'دخول':'خروج'}</td><td>${m.qty}</td><td>${w?.name||'-'}</td><td>${m.ref||'-'}</td><td>${m.accountantSignature||'-'}</td></tr>`}).join('')||'<tr><td colspan="7">لا توجد حركات.</td></tr>'}</tbody></table></div></div>`; }
window.addWorkshop=function(){ let name=prompt('اسم الورشة:'); if(name){workshops.push({id:Date.now(),name,manager:'',status:'active'}); saveAll(); auditor('إضافة ورشة','workshop',name,''); renderCurrentTab();}};
window.addWorkOrder=function(){ let title=prompt('اسم/وصف أمر العمل:'); if(!title)return; let wid=prompt('رقم الورشة: '+workshops.map(w=>w.id+'='+w.name).join(' | '),workshops[0]?.id||''); workOrders.unshift({id:Date.now(),orderNumber:'WO-'+Date.now(),title,workshopId:Number(wid),date:today(),status:'جديد',progress:0,materials:[],...signer()}); saveAll(); auditor('إضافة أمر عمل','workOrder',title,''); renderCurrentTab(); };
window.updateWorkOrderProgress=function(id){ let wo=workOrders.find(x=>String(x.id)===String(id)); if(!wo)return; let p=n(prompt('نسبة الإنجاز %:',wo.progress||0)); wo.progress=Math.max(0,Math.min(100,p)); wo.status=wo.progress>=100?'مكتمل':(wo.progress>0?'قيد التنفيذ':'جديد'); saveAll(); auditor('تحديث أمر عمل','workOrder',id,'إنجاز '+wo.progress+'%'); renderCurrentTab(); };
function renderWorkshops(){ return `<div class="section-card"><div class="section-header"><h2>🛠️ إدارة الورش وأوامر العمل</h2><div><button class="btn btn-secondary" onclick="addWorkshop()">+ ورشة</button> <button class="btn btn-primary" onclick="addWorkOrder()">+ أمر عمل</button></div></div><div class="stats-grid">${workshops.map(w=>`<div class="stat-card"><div class="stat-title">${w.name}</div><div class="stat-value">${workOrders.filter(o=>String(o.workshopId)===String(w.id)).length} أمر</div></div>`).join('')}</div><div style="overflow-x:auto"><table class="table"><thead><tr><th>رقم الأمر</th><th>الوصف</th><th>الورشة</th><th>التاريخ</th><th>الحالة</th><th>الإنجاز</th><th>توقيع</th><th>إجراء</th></tr></thead><tbody>${workOrders.map(o=>{let w=workshops.find(x=>String(x.id)===String(o.workshopId));return `<tr><td>${o.orderNumber}</td><td>${o.title}</td><td>${w?.name||'-'}</td><td>${o.date}</td><td>${o.status}</td><td><div class="progress-bar" style="width:120px"><div class="progress-fill" style="width:${o.progress}%"></div></div>${o.progress}%</td><td>${o.accountantSignature||'-'}</td><td><button class="btn btn-sm btn-secondary" onclick="updateWorkOrderProgress('${o.id}')">تحديث</button></td></tr>`}).join('')||'<tr><td colspan="8">لا توجد أوامر عمل.</td></tr>'}</tbody></table></div></div>`; }
window.addEmployee=function(){ let name=prompt('اسم العامل:'); if(!name)return; let sal=n(prompt('الراتب الشهري:',250)); let wid=prompt('رقم الورشة: '+workshops.map(w=>w.id+'='+w.name).join(' | '),workshops[0]?.id||''); employees.push({id:Date.now(),name,role:'عامل',workshopId:Number(wid),monthlySalary:sal,dailyDeduction:sal/30,status:'active'}); saveAll(); auditor('إضافة عامل','employee',name,''); renderCurrentTab(); };
window.recordAttendance=function(){ let date=document.getElementById('attDate')?.value||today(); employees.forEach(e=>{let val=document.getElementById('att_'+e.id)?.value||'present'; let existing=attendanceRecords.find(r=>String(r.employeeId)===String(e.id)&&r.date===date); let row={id:existing?existing.id:Date.now()+Math.random(),employeeId:e.id,date,status:val,deduction:val==='absent'?n(e.dailyDeduction):val==='half'?n(e.dailyDeduction)/2:0}; if(existing)Object.assign(existing,row); else attendanceRecords.push(row); }); saveAll(); auditor('تسجيل حضور يومي','attendance',date,''); renderCurrentTab(); showNotification('تم تسجيل الحضور والخصم التلقائي','#10b981'); };
window.generatePayroll=function(){ let month=prompt('الشهر بصيغة YYYY-MM:',today().slice(0,7)); if(!month)return; let rows=employees.map(e=>{let abs=attendanceRecords.filter(r=>String(r.employeeId)===String(e.id)&&String(r.date).startsWith(month));let deductions=abs.reduce((a,r)=>a+n(r.deduction),0);return {employeeId:e.id,name:e.name,basic:n(e.monthlySalary),deductions,net:Math.max(0,n(e.monthlySalary)-deductions)} }); let netTotal=rows.reduce((a,r)=>a+r.net,0); payrollRuns.unshift({id:Date.now(),month,rows,netTotal,...signer()}); saveAll(); auditor('إنشاء مسير رواتب','payroll',month,money(netTotal)); renderCurrentTab(); };
function renderHRPayroll(){ let date=today(); return `<div class="section-card"><div class="section-header"><h2>👷 رواتب العمال والحضور والانصراف</h2><div><button class="btn btn-secondary" onclick="addEmployee()">+ عامل</button> <button class="btn btn-primary" onclick="generatePayroll()">إنشاء مسير رواتب</button></div></div><div class="section-card"><h3>تسجيل حضور يومي</h3><input type="date" id="attDate" value="${date}" style="max-width:220px;margin-bottom:10px"><div style="overflow-x:auto"><table class="table"><thead><tr><th>العامل</th><th>الورشة</th><th>الراتب</th><th>خصم يوم غياب</th><th>حالة اليوم</th></tr></thead><tbody>${employees.map(e=>{let w=workshops.find(x=>String(x.id)===String(e.workshopId));return `<tr><td>${e.name}</td><td>${w?.name||'-'}</td><td>${money(e.monthlySalary)}</td><td>${money(e.dailyDeduction)}</td><td><select id="att_${e.id}"><option value="present">حاضر</option><option value="absent">غائب - خصم يوم</option><option value="half">نصف يوم - خصم نصف</option><option value="leave">إجازة بدون خصم</option></select></td></tr>`}).join('')}</tbody></table></div><button class="btn btn-success" onclick="recordAttendance()">حفظ حضور اليوم</button></div><div class="section-card"><h3>مسيرات الرواتب</h3><div style="overflow-x:auto"><table class="table"><thead><tr><th>الشهر</th><th>صافي الرواتب</th><th>توقيع المحاسب</th><th>التفاصيل</th></tr></thead><tbody>${payrollRuns.map(p=>`<tr><td>${p.month}</td><td>${money(p.netTotal)}</td><td>${p.accountantSignature||'-'}</td><td>${(p.rows||[]).map(r=>r.name+': '+money(r.net)).join('<br>')}</td></tr>`).join('')||'<tr><td colspan="4">لا توجد مسيرات.</td></tr>'}</tbody></table></div></div></div>`; }
function renderManagementDashboard(){ let receivables=(invoices||[]).reduce((a,i)=>{if(typeof recalcInvoice==='function')recalcInvoice(i);return a+n(i.remainingAmount)},0); let stockValue=(rawMaterials||[]).reduce((a,p)=>a+n(p.currentStock)*n(p.price),0); let activeWO=workOrders.filter(w=>w.status!=='مكتمل').length; let net=(invoices||[]).reduce((a,i)=>a+n(i.paidAmount),0)-(expenses||[]).reduce((a,e)=>a+n(e.amount),0); setTimeout(()=>{if(typeof Chart==='undefined')return;let c=document.getElementById('adminKpiChart')?.getContext('2d');if(c){if(window.adminKpiChartObj)window.adminKpiChartObj.destroy();window.adminKpiChartObj=new Chart(c,{type:'bar',data:{labels:['التحصيل','الذمم','المخزون','أوامر العمل','صافي نقدي'],datasets:[{label:'مؤشرات',data:[(invoices||[]).reduce((a,i)=>a+n(i.paidAmount),0),receivables,stockValue,activeWO,net]}]},options:{responsive:true,maintainAspectRatio:false}})}},100); return `<div class="section-card"><h2>📊 لوحة المؤشرات الإدارية</h2><div class="stats-grid"><div class="stat-card"><div class="stat-title">الذمم المدينة</div><div class="stat-value text-danger">${money(receivables)}</div></div><div class="stat-card"><div class="stat-title">قيمة المواد الخام</div><div class="stat-value">${money(stockValue)}</div></div><div class="stat-card"><div class="stat-title">أوامر عمل نشطة</div><div class="stat-value">${activeWO}</div></div><div class="stat-card"><div class="stat-title">صافي النقد</div><div class="stat-value ${net>=0?'text-success':'text-danger'}">${money(net)}</div></div></div><canvas id="adminKpiChart" style="height:300px!important;max-height:300px!important"></canvas></div>`; }

<script>
(function(){
const n=v=>parseFloat(String(v??0).replace(',','.'))||0, money=v=>n(v).toFixed(2)+' ريال', today=()=>new Date().toISOString().slice(0,10), ym=()=>new Date().toISOString().slice(0,7);

<script>
(function(){
'use strict';
function num(v){ return parseFloat(String(v ?? 0).replace(',', '.')) || 0; }
function today(){ return new Date().toISOString().slice(0,10); }
function fmt(v){ return num(v).toFixed(2) + ' ريال'; }
function ensureBankTx(){
  window.bankTransactions = window.bankTransactions || [];
  try { window.bankTransactions = JSON.parse(localStorage.getItem('erp_bank_transactions') || '[]'); } catch(e){ window.bankTransactions = []; }
  (window.bankAccounts || []).forEach(b => { b.balance = num(b.balance); });
}
function persistBankTx(){
  localStorage.setItem('erp_bank_transactions', JSON.stringify(window.bankTransactions || []));
  localStorage.setItem('erp_bank_accounts', JSON.stringify(window.bankAccounts || []));
  try { if(typeof auditor === 'function') auditor('تحديث حركة بنك','bankAccounts','bankTransactions',''); } catch(e){}
  try { if(typeof saveAll === 'function') saveAll(); } catch(e){}
}
function bankName(id){ let b=(window.bankAccounts||[]).find(x=>String(x.id)===String(id)); return b ? (b.bankName || '-') : '-'; }
window.renderBankAccountsPage = function(){
  if(typeof hasPermission === 'function' && !hasPermission('bankAccounts')) return `<div class="section-card">⛔ ${typeof t==='function'?t('noPermission'):'غير مصرح'}</div>`;
  ensureBankTx();
  let total=(window.bankAccounts||[]).reduce((s,b)=>s+num(b.balance),0);
  let rows=(window.bankAccounts||[]).map(acc=>`
    <tr>
      <td>${acc.bankName||'-'}</td>
      <td>${acc.accountNumber||'-'}</td>
      <td class="text-success"><b>${fmt(acc.balance)}</b></td>
      <td>
        <button class="bankDepositBtn btn btn-sm btn-success" data-id="${acc.id}">إيداع</button>
        <button class="bankWithdrawBtn btn btn-sm btn-danger" data-id="${acc.id}">سحب</button>
        <button class="deleteBankBtn btn btn-sm btn-secondary" data-id="${acc.id}">حذف</button>
      </td>
    </tr>`).join('') || '<tr><td colspan="4">لا توجد حسابات بنكية.</td></tr>';
  let tx=(window.bankTransactions||[]).slice(0,80).map(m=>`
    <tr>
      <td>${m.date||'-'}</td>
      <td>${bankName(m.bankId)}</td>
      <td><span class="badge ${m.type==='deposit'?'badge-success':'badge-danger'}">${m.type==='deposit'?'إيداع':'سحب'}</span></td>
      <td>${fmt(m.amount)}</td>
      <td>${fmt(m.balanceAfter)}</td>
      <td>${m.note||'-'}</td>
      <td>${m.user||'-'}</td>
    </tr>`).join('') || '<tr><td colspan="7">لا توجد حركات بنكية.</td></tr>';
  return `<div class="section-card">
    <div class="section-header">
      <h3>🏦 الحسابات البنكية — إجمالي الأرصدة: ${fmt(total)}</h3>
      <button id="addBankBtn" class="btn btn-primary">+ إضافة حساب بنكي</button>
    </div>
    <div style="overflow-x:auto"><table class="table"><thead><tr><th>اسم البنك</th><th>رقم الحساب</th><th>الرصيد الحالي</th><th>إجراءات</th></tr></thead><tbody>${rows}</tbody></table></div>
  </div>
  <div class="section-card">
    <div class="section-header"><h3>📒 سجل الإيداع والسحب</h3></div>
    <div style="overflow-x:auto"><table class="table"><thead><tr><th>التاريخ</th><th>البنك</th><th>النوع</th><th>المبلغ</th><th>الرصيد بعد الحركة</th><th>البيان</th><th>المستخدم</th></tr></thead><tbody>${tx}</tbody></table></div>
  </div>`;
};
function openBankAccountModal(){
  let name=prompt('اسم البنك:'); if(!name) return;
  let acc=prompt('رقم الحساب:') || '';
  let bal=num(prompt('الرصيد الافتتاحي:', '0'));
  let bank={id:Date.now(),bankName:name,accountNumber:acc,balance:bal};
  window.bankAccounts = window.bankAccounts || [];
  window.bankAccounts.push(bank);
  window.bankTransactions = window.bankTransactions || [];
  if(bal>0){ window.bankTransactions.unshift({id:Date.now()+1,bankId:bank.id,type:'deposit',amount:bal,balanceAfter:bal,date:today(),note:'رصيد افتتاحي',user:window.currentUser?.username||'-'}); }
  persistBankTx();
  if(typeof renderCurrentTab==='function') renderCurrentTab();
  if(typeof showNotification==='function') showNotification('تمت إضافة الحساب البنكي','#10b981');
}
function bankMove(id,type){
  ensureBankTx();
  let b=(window.bankAccounts||[]).find(x=>String(x.id)===String(id)); if(!b) return;
  let title=type==='deposit'?'إيداع مبلغ في البنك':'سحب مبلغ من البنك';
  let amount=num(prompt(title+'\nأدخل المبلغ:','0'));
  if(amount<=0){ alert('أدخل مبلغ صحيح'); return; }
  if(type==='withdraw' && amount>num(b.balance)){ alert('لا يمكن السحب: الرصيد غير كافٍ'); return; }
  let note=prompt('البيان / سبب الحركة:','') || '';
  b.balance = num(b.balance) + (type==='deposit'?amount:-amount);
  window.bankTransactions.unshift({id:Date.now(),bankId:b.id,type,amount,balanceAfter:b.balance,date:today(),note,user:window.currentUser?.username||'-'});
  try { if(typeof addEntry==='function') addEntry(type==='deposit'?'bankDeposit':'bankWithdraw', Date.now(), (type==='deposit'?'إيداع بنكي: ':'سحب بنكي: ')+(b.bankName||''), type==='deposit'?'البنك':'الصندوق / مصروفات', type==='deposit'?'الصندوق / رأس المال':'البنك', amount); } catch(e){}
  try { if(typeof auditor==='function') auditor(type==='deposit'?'إيداع بنكي':'سحب بنكي','bankAccounts',b.id, amount+' ريال - '+note); } catch(e){}
  persistBankTx();
  if(typeof renderCurrentTab==='function') renderCurrentTab();
  if(typeof showNotification==='function') showNotification(type==='deposit'?'تم الإيداع وتحديث الرصيد':'تم السحب وتحديث الرصيد', type==='deposit'?'#10b981':'#ef4444');
}
function attachBankEvents(){
  document.getElementById('addBankBtn')?.addEventListener('click', openBankAccountModal);
  document.querySelectorAll('.bankDepositBtn').forEach(btn=>btn.addEventListener('click',()=>bankMove(btn.dataset.id,'deposit')));
  document.querySelectorAll('.bankWithdrawBtn').forEach(btn=>btn.addEventListener('click',()=>bankMove(btn.dataset.id,'withdraw')));
}
const oldRender = window.renderCurrentTab || (typeof renderCurrentTab==='function'?renderCurrentTab:null);
if(oldRender){ window.renderCurrentTab = function(){ oldRender.apply(this, arguments); attachBankEvents(); }; }
const oldAttach = window.attachEvents || (typeof attachEvents==='function'?attachEvents:null);
if(oldAttach){ window.attachEvents = function(){ oldAttach.apply(this, arguments); attachBankEvents(); }; }
window.openBankAccountModal = openBankAccountModal;
window.bankMove = bankMove;
document.addEventListener('DOMContentLoaded', attachBankEvents);
})();
</script>
<script>

/* ===== تحسين كشف الحضور الشهري لكل عامل مع العذر والمرفق لكل يوم ===== */
(function(){
  function _num(v){ return Number(v||0)||0; }
  function _today(){ return new Date().toISOString().slice(0,10); }
  function _ym(){ return _today().slice(0,7); }
  function _days(month){ var p=String(month||_ym()).split('-').map(Number); return new Date(p[0],p[1],0).getDate(); }
  function _pad(n){ return String(n).padStart(2,'0'); }
  function _money(v){ return (typeof money==='function') ? money(v) : (_num(v).toFixed(2)+' ريال'); }
  function _saveAll(){
    try{ if(typeof saveAll==='function') saveAll(); }catch(e){}
    try{ localStorage.setItem('erp_attendanceRecords', JSON.stringify(window.attendanceRecords||[])); }catch(e){}
    try{ localStorage.setItem('erp_attendance_records', JSON.stringify(window.attendanceRecords||[])); }catch(e){}
    try{ localStorage.setItem('erp_employees', JSON.stringify(window.employees||[])); }catch(e){}
  }
  function _audit(action, entity, id, val){
    try{ if(typeof auditor==='function') return auditor(action,entity,id,val||''); }catch(e){}
    try{ if(typeof au==='function') return au(action,entity,id,val||''); }catch(e){}
    try{ if(typeof addAudit==='function') return addAudit(action,entity,id); }catch(e){}
  }
  function _statusLabel(s){
    return {present:'حاضر', absent:'غائب', half:'نصف يوم', leave:'إجازة', excused:'عذر'}[s] || '-';
  }
  function _deduction(emp,status){
    if(status==='absent') return _num(emp.dailyDeduction);
    if(status==='half') return _num(emp.dailyDeduction)/2;
    return 0;
  }
  function _rec(empId,date){
    window.attendanceRecords = window.attendanceRecords || [];
    return attendanceRecords.find(function(r){ return String(r.employeeId)===String(empId) && r.date===date; });
  }
  function _upsert(empId,date,data){
    window.attendanceRecords = window.attendanceRecords || [];
    var r=_rec(empId,date);
    if(!r){ r={id:Date.now()+Math.random(), employeeId:empId, date:date, month:date.slice(0,7)}; attendanceRecords.push(r); }
    Object.assign(r,data,{month:date.slice(0,7), updatedAt:new Date().toISOString(), accountantSignature:(window.currentUser && (currentUser.name_ar||currentUser.username)) || '-'});
    return r;
  }

  window.saveAttendanceDayForEmployee = function(empId, date){
    var emp=(window.employees||[]).find(function(e){return String(e.id)===String(empId)});
    if(!emp) return;
    var key=String(empId)+'_'+date;
    var st=document.getElementById('att_status_'+key)?.value || 'present';
    var note=document.getElementById('att_note_'+key)?.value || '';
    _upsert(empId,date,{status:st, excuseNote:note, deduction:_deduction(emp,st)});
    _saveAll(); _audit('تعديل حضور عامل','attendance',date, emp.name);
    if(typeof showNotification==='function') showNotification('تم حفظ حضور '+emp.name+' ليوم '+date,'#10b981');
    if(typeof renderCurrentTab==='function') renderCurrentTab();
  };

  window.attachExcuseForEmployeeDay = function(empId, date){
    var emp=(window.employees||[]).find(function(e){return String(e.id)===String(empId)});
    if(!emp) return;
    var inp=document.createElement('input');
    inp.type='file'; inp.accept='image/*,.pdf,.doc,.docx';
    inp.onchange=function(){
      var f=inp.files && inp.files[0]; if(!f) return;
      var reader=new FileReader();
      reader.onload=function(){
        var note=prompt('اكتب سبب العذر لهذا اليوم:', (_rec(empId,date)?.excuseNote)||'') || 'عذر مرفق';
        _upsert(empId,date,{status:'excused', deduction:0, excuseNote:note, attachmentName:f.name, attachmentData:reader.result});
        _saveAll(); _audit('إرفاق عذر حضور','attendance',date, emp.name+' - '+f.name);
        if(typeof showNotification==='function') showNotification('تم إرفاق العذر بدون خصم','#10b981');
        if(typeof renderCurrentTab==='function') renderCurrentTab();
      };
      reader.readAsDataURL(f);
    };
    inp.click();
