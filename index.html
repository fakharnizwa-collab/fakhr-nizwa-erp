    let cust=(customers||[]).find(c=>String(c.id)===String(inv.customerId));
    let modal=document.createElement('div');
    modal.className='modal'; modal.style.display='flex'; modal.style.zIndex='1600';
    modal.innerHTML=`<div class="modal-content" style="max-width:760px">
      <div class="section-header"><h3>إضافة مبلغ داخل على الفاتورة</h3><button id="closePayModal" class="btn btn-secondary">إغلاق</button></div>
      <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px">
        <div class="form-group"><label>رقم الفاتورة</label><input value="${inv.invoiceNumber||''}" disabled></div>
        <div class="form-group"><label>العميل</label><input value="${(cust&&(cust.name_ar||cust.name_en))||inv.customerName||''}" disabled></div>
        <div class="form-group"><label>المتبقي الحالي</label><input value="${safeNum(inv.remainingAmount).toFixed(3)}" disabled></div>
        <div class="form-group"><label>التاريخ</label><input id="payDate" type="date" value="${todayStr()}"></div>
        <div class="form-group"><label>المبلغ الداخل</label><input id="payAmount" type="number" step="0.001" value="${safeNum(inv.remainingAmount).toFixed(3)}"></div>
        <div class="form-group"><label>طريقة القبض</label><select id="payMethod"><option value="نقداً">نقد</option><option value="شيك">شيك</option><option value="تحويل بنكي">البنك / تحويل بنكي</option></select></div>
        <div class="form-group"><label>الصندوق / الحساب البنكي</label><span id="payAccountWrap">${accountOptions('pay','cash','')}</span></div>
        <div class="form-group" id="payChequeWrap" style="display:none"><label>رقم الشيك</label><input id="payCheque" placeholder="رقم الشيك"></div>
      </div>
      <div class="form-group"><label>البيان</label><textarea id="payNote" rows="3">دفعة على الفاتورة ${inv.invoiceNumber||''}</textarea></div>
      <button id="savePayModal" class="btn btn-primary">حفظ وربط المبلغ بالحساب والفاتورة</button>
    </div>`;
    document.body.appendChild(modal);
    function payType(){ return payMethod.value==='نقداً' ? 'cash' : 'bank'; }
    function refresh(){ payAccountWrap.innerHTML=accountOptions('pay',payType(),''); payChequeWrap.style.display=payMethod.value==='شيك'?'block':'none'; }
    payMethod.onchange=refresh;
    closePayModal.onclick=()=>modal.remove();
    savePayModal.onclick=()=>{
      let amount=safeNum(payAmount.value); if(amount<=0) return alert('أدخل مبلغ صحيح');
      let type=payType(), accId=document.getElementById('payAccountId')?.value;
      let receiptId=newId();
      if(!addFinanceMove(type, accId, 'deposit', amount, 'قبض فاتورة '+(inv.invoiceNumber||''), 'receipt', receiptId, payDate.value)) return;
      inv.payments=Array.isArray(inv.payments)?inv.payments:[];
      inv.payments.push({id:newId(), receiptId, amount, date:payDate.value||todayStr(), method:payMethod.value, accountType:type, accountId:accId, note:payNote.value.trim()});
      if(typeof recalcInvoice==='function') recalcInvoice(inv);
      let receipt={id:receiptId, receiptNumber:'RCPT-'+receiptId, invoiceId:inv.id, invoiceNumber:inv.invoiceNumber, customerId:inv.customerId, customerName:(cust&&(cust.name_ar||cust.name_en))||inv.customerName||'', date:payDate.value||todayStr(), amount, totalAmount:safeNum(inv.grandTotal||inv.total), remainingAmount:safeNum(inv.remainingAmount), paidAmount:safeNum(inv.paidAmount), method:payMethod.value, accountType:type, accountId:accId, bankName:type==='bank'?accountLabel('bank',accId):'', chequeNumber:document.getElementById('payCheque')?.value.trim()||'', note:payNote.value.trim(), type:'invoice_payment', createdAt:new Date().toISOString()};
      receipts.unshift(receipt);
      saveFinanceTx();
      modal.remove(); renderCurrentTab(); showNotification('تم إضافة المبلغ وربطه بالفاتورة والحساب المالي','#10b981');
    };
  };

  window.openExpenseModal = openExpenseModal = function(id){
    loadFinanceTx();
    let e=id?(expenses||[]).find(x=>String(x.id)===String(id)):null;
    let accountType=e?.accountType||'cash';
    let modal=document.createElement('div'); modal.className='modal'; modal.style.display='flex'; modal.style.zIndex='1600';
    modal.innerHTML=`<div class="modal-content" style="max-width:780px">
      <div class="section-header"><h3>${e?'تعديل مصروف':'إضافة مصروف'}</h3><button id="closeExpenseModal" class="btn btn-secondary">إغلاق</button></div>
      <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px">
        <div class="form-group"><label>التاريخ</label><input id="expDate2" type="date" value="${e?.date||todayStr()}"></div>
        <div class="form-group"><label>نوع المصروف</label><select id="expPeriod2"><option value="يومي" ${e?.expensePeriod==='يومي'?'selected':''}>مصروف يومي</option><option value="شهري" ${e?.expensePeriod==='شهري'?'selected':''}>مصروف شهري</option></select></div>
        <div class="form-group"><label>الفئة / البيان</label><input id="expCat2" value="${e?.category_ar||e?.category||''}" placeholder="مثال: وقود / كهرباء / رواتب"></div>
        <div class="form-group"><label>المبلغ المصروف</label><input id="expAmount2" type="number" step="0.001" value="${safeNum(e?.amount)}"></div>
        <div class="form-group"><label>الصرف من</label><select id="expAccountType2"><option value="cash" ${accountType==='cash'?'selected':''}>صندوق مالي</option><option value="bank" ${accountType==='bank'?'selected':''}>حساب بنكي</option></select></div>
        <div class="form-group"><label>الحساب / الصندوق</label><span id="expAccountWrap2">${accountOptions('exp2',accountType,e?.accountId)}</span></div>
      </div>
      <div class="form-group"><label>ملاحظة</label><textarea id="expNote2" rows="3">${e?.note||''}</textarea></div>
      <button id="saveExpenseModal" class="btn btn-primary">حفظ وسحب المبلغ من الحساب</button>
    </div>`;
    document.body.appendChild(modal);
    expAccountType2.onchange=()=>{ expAccountWrap2.innerHTML=accountOptions('exp2',expAccountType2.value,e?.accountId); };
    closeExpenseModal.onclick=()=>modal.remove();
    saveExpenseModal.onclick=()=>{
      let amount=safeNum(expAmount2.value); if(amount<=0) return alert('أدخل مبلغ صحيح');
      let data={id:e?.id||newId(), date:expDate2.value||todayStr(), expensePeriod:expPeriod2.value, category_ar:expCat2.value.trim(), category_en:expCat2.value.trim(), amount, note:expNote2.value.trim(), accountType:expAccountType2.value, accountId:document.getElementById('exp2AccountId')?.value, updatedAt:new Date().toISOString(), createdAt:e?.createdAt||new Date().toISOString()};
      if(e){ reverseFinanceMove(e.accountType||'cash','expense',e.id); Object.assign(e,data); }
      else expenses.unshift(data);
      if(!addFinanceMove(data.accountType,data.accountId,'withdraw',amount,(data.expensePeriod||'')+' - مصروف: '+data.category_ar,'expense',data.id,data.date)) return;
      saveFinanceTx(); modal.remove(); renderCurrentTab(); showNotification('تم حفظ المصروف وسحبه من الحساب المالي','#10b981');
    };
  };

  window.deleteExpense = deleteExpense = function(id){
    let e=(expenses||[]).find(x=>String(x.id)===String(id)); if(!e || !confirm('حذف المصروف؟')) return;
    reverseFinanceMove(e.accountType||'cash','expense',e.id);
    expenses=expenses.filter(x=>String(x.id)!==String(id));
    saveFinanceTx(); renderCurrentTab(); showNotification('تم حذف المصروف وإرجاع المبلغ للحساب','#10b981');
  };

  const oldReceipts = window.renderReceiptsPage || renderReceiptsPage;
  window.renderExpensesPage = renderExpensesPage = function(){
    if(typeof hasPermission==='function' && !hasPermission('expenses')) return `<div class="section-card">⛔ ${t('noPermission')}</div>`;
    loadFinanceTx();
    let daily=(expenses||[]).filter(e=>e.expensePeriod==='يومي');
    let monthly=(expenses||[]).filter(e=>e.expensePeriod==='شهري');
    let rows=(list)=>list.map(e=>`<tr><td>${e.date||'-'}</td><td><span class="badge ${e.expensePeriod==='شهري'?'badge-info':'badge-warning'}">${e.expensePeriod||'يومي'}</span></td><td>${e.category_ar||e.category||'-'}</td><td>${moneyFmt(e.amount)}</td><td>${e.accountType==='bank'?'بنك':'صندوق'}</td><td>${accountLabel(e.accountType||'cash',e.accountId)}</td><td>${e.note||'-'}</td><td><button class="editExpenseBtn btn btn-sm btn-secondary" data-id="${e.id}">تعديل</button> <button class="deleteExpenseBtn btn btn-sm btn-danger" data-id="${e.id}">حذف</button></td></tr>`).join('') || '<tr><td colspan="8">لا توجد مصروفات</td></tr>';
    return `<div class="stats-grid"><div class="stat-card"><div class="stat-title">مصروفات اليوم</div><div class="stat-value text-danger">${moneyFmt(expenseTotals('daily'))}</div></div><div class="stat-card"><div class="stat-title">مصروفات الشهر</div><div class="stat-value text-danger">${moneyFmt(expenseTotals('monthly'))}</div></div><div class="stat-card"><div class="stat-title">إجمالي المصروفات</div><div class="stat-value text-danger">${moneyFmt((expenses||[]).reduce((s,e)=>s+safeNum(e.amount),0))}</div></div></div><div class="section-card"><div class="section-header"><h3>💸 المصروفات اليومية والشهرية</h3><button id="addExpenseBtn" class="btn btn-primary">+ إضافة مصروف</button></div><h4>مصروفات يومية</h4><div style="overflow-x:auto"><table class="table"><thead><tr><th>التاريخ</th><th>النوع</th><th>الفئة</th><th>المبلغ</th><th>من</th><th>الحساب</th><th>ملاحظة</th><th>إجراءات</th></tr></thead><tbody>${rows(daily)}</tbody></table></div><h4 style="margin-top:24px">مصروفات شهرية</h4><div style="overflow-x:auto"><table class="table"><thead><tr><th>التاريخ</th><th>النوع</th><th>الفئة</th><th>المبلغ</th><th>من</th><th>الحساب</th><th>ملاحظة</th><th>إجراءات</th></tr></thead><tbody>${rows(monthly)}</tbody></table></div></div>`;
  };

  function attachMoreFinance(){
    document.querySelectorAll('.addPaymentInvoiceBtn').forEach(b=>b.onclick=()=>addPaymentToInvoice(b.dataset.id));
    document.getElementById('addExpenseBtn')?.addEventListener('click',()=>openExpenseModal());
    document.querySelectorAll('.editExpenseBtn').forEach(b=>b.onclick=()=>openExpenseModal(b.dataset.id));
    document.querySelectorAll('.deleteExpenseBtn').forEach(b=>b.onclick=()=>deleteExpense(b.dataset.id));
  }
  let prevAttach=window.attachEvents || (typeof attachEvents==='function'?attachEvents:null);
  if(prevAttach){ window.attachEvents=attachEvents=function(){ prevAttach.apply(this,arguments); attachMoreFinance(); }; }
  let prevRender=window.renderCurrentTab || (typeof renderCurrentTab==='function'?renderCurrentTab:null);
  if(prevRender){ window.renderCurrentTab=renderCurrentTab=function(){ prevRender.apply(this,arguments); setTimeout(attachMoreFinance,0); }; }
  document.addEventListener('DOMContentLoaded',()=>setTimeout(attachMoreFinance,300));
})();
</script>
<script>
/* ===== إصلاح حفظ دفعات الفواتير وربطها بالحساب البنكي فقط - نسخة مستقرة ===== */
(function(){
  function n(v){ return parseFloat(String(v == null ? 0 : v).replace(',', '.')) || 0; }
  function today(){ return new Date().toISOString().slice(0,10); }
  function makeId(){ return Date.now() + Math.floor(Math.random()*100000); }
  function money(v){ return n(v).toFixed(3) + ' ريال'; }
  function ensureArrays(){
    if(!Array.isArray(window.bankTransactions)){
      try{ window.bankTransactions = JSON.parse(localStorage.getItem('erp_bank_transactions') || '[]'); }catch(e){ window.bankTransactions = []; }
      if(!Array.isArray(window.bankTransactions)) window.bankTransactions = [];
    }
    if(!Array.isArray(bankAccounts)) bankAccounts = [];
    if(!Array.isArray(invoices)) invoices = [];
    if(!Array.isArray(receipts)) receipts = [];
  }
  function saveBankData(){
    ensureArrays();
    localStorage.setItem('erp_bank_transactions', JSON.stringify(window.bankTransactions));
    localStorage.setItem('erp_bank_accounts', JSON.stringify(bankAccounts));
    localStorage.setItem('erp_invoices', JSON.stringify(invoices));
    localStorage.setItem('erp_receipts', JSON.stringify(receipts));
    if(typeof saveAll === 'function') saveAll();
  }
  function banks(){ ensureArrays(); bankAccounts.forEach(function(b){ b.balance = n(b.balance); }); return bankAccounts; }
  function bankLabel(bankId){
    var b = banks().find(function(x){ return String(x.id) === String(bankId); });
    return b ? ((b.bankName || '-') + (b.accountNumber ? ' - ' + b.accountNumber : '')) : '-';
  }
  function bankOptions(selected){
    var list = banks();
    if(!list.length) return '<option value="">لا توجد حسابات بنكية — أضف حساباً من صفحة الحسابات البنكية</option>';
    return list.map(function(b){
      return '<option value="'+b.id+'" '+(String(selected || '') === String(b.id) ? 'selected' : '')+'>'+(b.bankName || '-')+(b.accountNumber ? ' - '+b.accountNumber : '')+' — الرصيد: '+money(b.balance)+'</option>';
    }).join('');
  }
  function reverseBankBySource(source, sourceId){
    ensureArrays();
    var keep = [];
    window.bankTransactions.forEach(function(t){
      if(String(t.source) === String(source) && String(t.sourceId) === String(sourceId)){
        var b = banks().find(function(x){ return String(x.id) === String(t.accountId); });
        if(b){
          b.balance = n(b.balance) + (t.type === 'deposit' ? -n(t.amount) : n(t.amount));
          if(b.balance < 0 && b.balance > -0.0001) b.balance = 0;
        }
      } else keep.push(t);
    });
    window.bankTransactions = keep;
  }
  function addBankDeposit(bankId, amount, note, sourceId, date){
    ensureArrays();
    amount = n(amount);
    if(amount <= 0){ alert('أدخل مبلغ صحيح'); return false; }
    var b = banks().find(function(x){ return String(x.id) === String(bankId); });
    if(!b){ alert('اختر الحساب البنكي أولاً'); return false; }
    // منع تكرار نفس الحركة إذا ضغط المستخدم مرتين بسرعة
    var duplicate = window.bankTransactions.some(function(t){ return String(t.source) === 'receipt' && String(t.sourceId) === String(sourceId); });
    if(duplicate) reverseBankBySource('receipt', sourceId);
    b.balance = n(b.balance) + amount;
    window.bankTransactions.unshift({ id: makeId(), accountId: b.id, type: 'deposit', amount: amount, balanceAfter: b.balance, date: date || today(), note: note || '', source: 'receipt', sourceId: sourceId, user: (currentUser && currentUser.username) || '-' });
    return true;
  }
  function removeInvoicePaymentByReceipt(receiptId){
    ensureArrays();
    invoices.forEach(function(inv){
      if(Array.isArray(inv.payments)) inv.payments = inv.payments.filter(function(p){ return String(p.receiptId) !== String(receiptId); });
      if(typeof recalcInvoice === 'function') recalcInvoice(inv);
    });
  }
  function applyReceiptToInvoice(receipt){
    if(!receipt.invoiceId) return;
    var inv = invoices.find(function(i){ return String(i.id) === String(receipt.invoiceId); });
    if(!inv) return;
    inv.payments = Array.isArray(inv.payments) ? inv.payments : [];
    inv.payments = inv.payments.filter(function(p){ return String(p.receiptId) !== String(receipt.id); });
    inv.payments.push({ id: makeId(), receiptId: receipt.id, amount: n(receipt.amount), date: receipt.date || today(), method: receipt.method, accountType: 'bank', accountId: receipt.accountId, bankName: receipt.bankName, note: receipt.note || '' });
    if(typeof recalcInvoice === 'function') recalcInvoice(inv);
    receipt.invoiceNumber = inv.invoiceNumber || receipt.invoiceNumber;
    receipt.customerId = inv.customerId;
    var cust = (customers || []).find(function(c){ return String(c.id) === String(inv.customerId); });
    receipt.customerName = receipt.customerName || ((cust && (cust.name_ar || cust.name_en)) || inv.customerName || '');
    receipt.totalAmount = n(inv.grandTotal || inv.total);
    receipt.remainingAmount = n(inv.remainingAmount);
    receipt.paidAmount = n(inv.paidAmount);
  }

  window.addPaymentToInvoice = function(invoiceId){
    ensureArrays();
    var inv = invoices.find(function(i){ return String(i.id) === String(invoiceId); });
    if(!inv) return alert('الفاتورة غير موجودة');
    if(typeof recalcInvoice === 'function') recalcInvoice(inv);
    var cust = (customers || []).find(function(c){ return String(c.id) === String(inv.customerId); });
    var modal = document.createElement('div');
    modal.className = 'modal'; modal.style.display = 'flex'; modal.style.zIndex = '3000';
    modal.innerHTML = '<div class="modal-content" style="max-width:760px">\
      <div class="section-header"><h3>إضافة دفعة للفاتورة — الحساب البنكي فقط</h3><button id="closeBankPayModal" class="btn btn-secondary">إغلاق</button></div>\
      <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px">\
        <div class="form-group"><label>رقم الفاتورة</label><input value="'+(inv.invoiceNumber || '')+'" disabled></div>\
        <div class="form-group"><label>العميل</label><input value="'+(((cust && (cust.name_ar || cust.name_en)) || inv.customerName || ''))+'" disabled></div>\
        <div class="form-group"><label>المتبقي الحالي</label><input value="'+n(inv.remainingAmount).toFixed(3)+'" disabled></div>\
        <div class="form-group"><label>التاريخ</label><input id="bankPayDate" type="date" value="'+today()+'"></div>\
        <div class="form-group"><label>المبلغ الداخل</label><input id="bankPayAmount" type="number" step="0.001" value="'+n(inv.remainingAmount).toFixed(3)+'"></div>\
        <div class="form-group"><label>طريقة القبض</label><select id="bankPayMethod"><option value="نقداً">نقد</option><option value="شيك">شيك</option><option value="تحويل بنكي">تحويل بنكي</option></select></div>\
        <div class="form-group"><label>الحساب البنكي</label><select id="bankPayAccountId">'+bankOptions('')+'</select></div>\
        <div class="form-group" id="bankPayChequeWrap" style="display:none"><label>رقم الشيك</label><input id="bankPayCheque" placeholder="رقم الشيك"></div>\
      </div>\
      <div class="form-group"><label>البيان</label><textarea id="bankPayNote" rows="3">دفعة على الفاتورة '+(inv.invoiceNumber || '')+'</textarea></div>\
      <p style="color:var(--gray-500);font-size:13px;margin-bottom:10px">كل دفعة تحفظ داخل الفاتورة وتضاف إلى الحساب البنكي المختار فقط.</p>\
      <button id="saveBankPayModal" class="btn btn-primary">حفظ وربط الدفعة بالحساب البنكي والفاتورة</button>\
    </div>';
    document.body.appendChild(modal);
    var methodEl = document.getElementById('bankPayMethod');
    methodEl.onchange = function(){ document.getElementById('bankPayChequeWrap').style.display = methodEl.value === 'شيك' ? 'block' : 'none'; };
    document.getElementById('closeBankPayModal').onclick = function(){ modal.remove(); };
    var saving = false;
    document.getElementById('saveBankPayModal').onclick = function(){
      if(saving) return; saving = true;
      var amount = n(document.getElementById('bankPayAmount').value);
      var bankId = document.getElementById('bankPayAccountId').value;
      if(amount <= 0){ saving = false; return alert('أدخل مبلغ صحيح'); }
      if(!bankId){ saving = false; return alert('اختر الحساب البنكي'); }
      var receiptId = makeId(), date = document.getElementById('bankPayDate').value || today(), method = methodEl.value;
      var receipt = { id: receiptId, receiptNumber: 'RCPT-' + receiptId, invoiceId: inv.id, invoiceNumber: inv.invoiceNumber, customerId: inv.customerId, customerName: ((cust && (cust.name_ar || cust.name_en)) || inv.customerName || ''), date: date, amount: amount, method: method, accountType: 'bank', accountId: bankId, bankName: bankLabel(bankId), chequeNumber: (document.getElementById('bankPayCheque') || {}).value || '', note: document.getElementById('bankPayNote').value.trim(), type: 'invoice_payment', createdAt: new Date().toISOString() };
      applyReceiptToInvoice(receipt);
      if(!addBankDeposit(bankId, amount, 'قبض فاتورة ' + (inv.invoiceNumber || ''), receiptId, date)){ saving = false; return; }
      receipts.unshift(receipt);
      saveBankData();
      modal.remove();
      if(typeof renderCurrentTab === 'function') renderCurrentTab();
      if(typeof showNotification === 'function') showNotification('تم حفظ الدفعة وربطها بالحساب البنكي بنجاح', '#10b981');
    };
  };

  window.openReceiptModal = function(receiptId){
    ensureArrays();
    var r = receiptId ? receipts.find(function(x){ return String(x.id) === String(receiptId); }) : null;
    var invoiceOptions = '<option value="">سند يدوي بدون فاتورة</option>' + invoices.map(function(inv){ if(typeof recalcInvoice === 'function') recalcInvoice(inv); return '<option value="'+inv.id+'" '+(String(r && r.invoiceId || '') === String(inv.id) ? 'selected' : '')+'>'+(inv.invoiceNumber || '-')+' - المتبقي '+money(inv.remainingAmount || 0)+'</option>'; }).join('');
    var modal = document.createElement('div'); modal.className = 'modal'; modal.style.display = 'flex'; modal.style.zIndex = '3000';
    modal.innerHTML = '<div class="modal-content" style="max-width:820px">\
      <div class="section-header"><h3>'+(r ? 'تعديل سند قبض' : 'إضافة سند قبض')+' — حساب بنكي فقط</h3><button id="closeBankReceiptModal" class="btn btn-secondary">إغلاق</button></div>\
      <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px">\
        <div class="form-group"><label>رقم السند</label><input id="brNo" value="'+(r && r.receiptNumber || ('RCPT-' + Date.now()))+'"></div>\
        <div class="form-group"><label>ربط بفاتورة</label><select id="brInvoiceId">'+invoiceOptions+'</select></div>\
        <div class="form-group"><label>العميل</label><input id="brCustomer" value="'+(r && r.customerName || '')+'"></div>\
        <div class="form-group"><label>رقم الفاتورة</label><input id="brInvNo" value="'+(r && r.invoiceNumber || '')+'"></div>\
        <div class="form-group"><label>التاريخ</label><input id="brDate" type="date" value="'+(r && r.date || today())+'"></div>\
        <div class="form-group"><label>المبلغ المقبوض</label><input id="brAmount" type="number" step="0.001" value="'+n(r && r.amount)+'"></div>\
        <div class="form-group"><label>إجمالي الفاتورة</label><input id="brTotal" type="number" step="0.001" value="'+n(r && r.totalAmount)+'"></div>\
        <div class="form-group"><label>المبلغ المتبقي</label><input id="brRemaining" type="number" step="0.001" value="'+n(r && r.remainingAmount)+'"></div>\
        <div class="form-group"><label>طريقة القبض</label><select id="brMethod"><option value="نقداً" '+(r && r.method === 'نقداً' ? 'selected' : '')+'>نقد</option><option value="شيك" '+(r && r.method === 'شيك' ? 'selected' : '')+'>شيك</option><option value="تحويل بنكي" '+(r && r.method === 'تحويل بنكي' ? 'selected' : '')+'>تحويل بنكي</option></select></div>\
        <div class="form-group"><label>الحساب البنكي</label><select id="brBankId">'+bankOptions(r && r.accountId)+'</select></div>\
        <div class="form-group" id="brChequeWrap" style="display:'+(r && r.method === 'شيك' ? 'block' : 'none')+'"><label>رقم الشيك</label><input id="brCheque" value="'+(r && r.chequeNumber || '')+'"></div>\
      </div>\
      <div class="form-group"><label>البيان</label><textarea id="brNote" rows="3">'+(r && r.note || '')+'</textarea></div>\
      <div style="display:flex;gap:10px;justify-content:flex-end"><button id="saveBankReceipt" class="btn btn-primary">حفظ</button><button id="printBankReceipt" class="btn btn-secondary">معاينة / طباعة</button></div>\
    </div>';
    document.body.appendChild(modal);
    document.getElementById('brMethod').onchange = function(){ document.getElementById('brChequeWrap').style.display = document.getElementById('brMethod').value === 'شيك' ? 'block' : 'none'; };
    document.getElementById('brInvoiceId').onchange = function(){
      var inv = invoices.find(function(i){ return String(i.id) === String(document.getElementById('brInvoiceId').value); });
      if(inv){ if(typeof recalcInvoice === 'function') recalcInvoice(inv); var c=(customers || []).find(function(x){ return String(x.id) === String(inv.customerId); }); document.getElementById('brCustomer').value = (c && (c.name_ar || c.name_en)) || inv.customerName || ''; document.getElementById('brInvNo').value = inv.invoiceNumber || ''; document.getElementById('brTotal').value = n(inv.grandTotal || inv.total).toFixed(3); document.getElementById('brRemaining').value = n(inv.remainingAmount).toFixed(3); document.getElementById('brAmount').value = n(inv.remainingAmount).toFixed(3); }
    };
    document.getElementById('closeBankReceiptModal').onclick = function(){ modal.remove(); };
    function formData(){ return { id: r && r.id || makeId(), receiptNumber: document.getElementById('brNo').value.trim() || ('RCPT-' + Date.now()), invoiceId: document.getElementById('brInvoiceId').value || '', invoiceNumber: document.getElementById('brInvNo').value.trim(), customerName: document.getElementById('brCustomer').value.trim(), date: document.getElementById('brDate').value || today(), amount: n(document.getElementById('brAmount').value), totalAmount: n(document.getElementById('brTotal').value), remainingAmount: n(document.getElementById('brRemaining').value), method: document.getElementById('brMethod').value, accountType: 'bank', accountId: document.getElementById('brBankId').value, bankName: bankLabel(document.getElementById('brBankId').value), chequeNumber: document.getElementById('brCheque').value.trim(), note: document.getElementById('brNote').value.trim(), type: r && r.type || (document.getElementById('brInvoiceId').value ? 'invoice_payment' : 'manual'), updatedAt: new Date().toISOString(), createdAt: r && r.createdAt || new Date().toISOString() }; }
    document.getElementById('saveBankReceipt').onclick = function(){
      var d = formData();
      if(d.amount <= 0) return alert('أدخل مبلغ صحيح');
      if(!d.accountId) return alert('اختر الحساب البنكي');
      if(r){ reverseBankBySource('receipt', r.id); removeInvoicePaymentByReceipt(r.id); }
      applyReceiptToInvoice(d);
      if(!addBankDeposit(d.accountId, d.amount, 'سند قبض ' + d.receiptNumber + ' / ' + (d.invoiceNumber || ''), d.id, d.date)) return;
      if(r) Object.assign(r, d); else receipts.unshift(d);
      saveBankData(); modal.remove(); if(typeof renderCurrentTab === 'function') renderCurrentTab(); if(typeof showNotification === 'function') showNotification('تم حفظ سند القبض وربطه بالبنك والفاتورة', '#10b981');
    };
    document.getElementById('printBankReceipt').onclick = function(){ var tmp = formData(); var w = window.open('', '_blank'); w.document.write(typeof generateReceiptHTML === 'function' ? generateReceiptHTML(tmp) : '<pre>'+JSON.stringify(tmp,null,2)+'</pre>'); w.document.close(); setTimeout(function(){ w.print(); }, 300); };
  };

  function cleanBind(selector, handler){
    document.querySelectorAll(selector).forEach(function(oldBtn){
      var btn = oldBtn.cloneNode(true);
      oldBtn.parentNode.replaceChild(btn, oldBtn);
      btn.addEventListener('click', handler);
    });
  }
  function attachBankInvoiceEvents(){
    cleanBind('.addPaymentInvoiceBtn', function(e){ window.addPaymentToInvoice(e.currentTarget.dataset.id); });
    cleanBind('.editReceiptBtn', function(e){ window.openReceiptModal(e.currentTarget.dataset.id); });
    var addBtn = document.getElementById('addManualReceiptBtn');
    if(addBtn){ var nbtn = addBtn.cloneNode(true); addBtn.parentNode.replaceChild(nbtn, addBtn); nbtn.addEventListener('click', function(){ window.openReceiptModal(); }); }
  }
  var oldAttach = window.attachEvents || (typeof attachEvents === 'function' ? attachEvents : null);
  if(oldAttach){ window.attachEvents = attachEvents = function(){ oldAttach.apply(this, arguments); setTimeout(attachBankInvoiceEvents, 0); }; }
  var oldRender = window.renderCurrentTab || (typeof renderCurrentTab === 'function' ? renderCurrentTab : null);
  if(oldRender){ window.renderCurrentTab = renderCurrentTab = function(){ oldRender.apply(this, arguments); setTimeout(attachBankInvoiceEvents, 0); }; }
  document.addEventListener('DOMContentLoaded', function(){ setTimeout(attachBankInvoiceEvents, 500); });
})();
</script>
<script>
/* PROFESSIONAL PATCH: Workshop-based project costing
   يحسب تكلفة المشروع من المواد + ورشة التنفيذ + عمال الورشة + كهرباء/ماء/إيجار/تكاليف أخرى */
(function(){
  'use strict';
  function N(v){ v=parseFloat(String(v==null?0:v).replace(',', '.')); return isFinite(v)?v:0; }
  function money(v){ return N(v).toFixed(3) + ' ريال'; }
  function today(){ return new Date().toISOString().slice(0,10); }
  function arr(v){ return Array.isArray(v) ? v : []; }
  function esc(v){ return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  function loadJSON(k,d){ try{ var x=localStorage.getItem(k); return x?JSON.parse(x):d; }catch(e){ return d; } }
  function saveJSON(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
  function notify(m,b){ try{ if(typeof showNotification==='function') showNotification(m,b||'#10b981'); else alert(m); }catch(e){ alert(m); } }
  function saveAllSafe(){ try{ if(typeof saveAll==='function') saveAll(); }catch(e){} }
  function ensureData(){
    window.contracts = arr(window.contracts);
    window.rawMaterials = arr(window.rawMaterials);
    window.workshopMaterialIssues = arr(window.workshopMaterialIssues || loadJSON('erp_workshop_material_issues', []));
    window.projectLaborAllocations = arr(window.projectLaborAllocations || loadJSON('erp_project_labor_allocations', []));
    window.projectOperatingExpenses = arr(window.projectOperatingExpenses || loadJSON('erp_project_operating_expenses', []));
    window.projectCosts = arr(window.projectCosts || loadJSON('erp_project_costs', []));
    window.projectWorkshopAssignments = arr(window.projectWorkshopAssignments || loadJSON('erp_project_workshop_assignments', []));
    window.workshops = arr(window.workshops || loadJSON('erp_workshops', []));
    window.employees = arr(window.employees || loadJSON('erp_employees', []));
    window.expenses = arr(window.expenses);
    if(!window.workshops.length){
      window.workshops = [
        {id:'doors', name_ar:'ورشة الأبواب', name_en:'Doors Workshop', electricity:0, water:0, rent:0, otherCosts:0},
        {id:'windows', name_ar:'ورشة النوافذ', name_en:'Windows Workshop', electricity:0, water:0, rent:0, otherCosts:0},
        {id:'kitchens', name_ar:'ورشة المطابخ', name_en:'Kitchens Workshop', electricity:0, water:0, rent:0, otherCosts:0}
      ];
      saveJSON('erp_workshops', window.workshops);
    }
  }
  function saveCostData(){
    saveJSON('erp_workshops', window.workshops);
    saveJSON('erp_project_workshop_assignments', window.projectWorkshopAssignments);
    saveJSON('erp_project_labor_allocations', window.projectLaborAllocations);
    saveJSON('erp_project_operating_expenses', window.projectOperatingExpenses);
    saveJSON('erp_workshop_material_issues', window.workshopMaterialIssues);
    saveJSON('erp_project_costs', window.projectCosts);
    saveAllSafe();
  }
  function contractTitle(c){ return esc((c&&c.contractNumber?c.contractNumber+' - ':'') + (c&&(c.projectName||c.name_ar||c.name_en)||('مشروع '+(c&&c.id||'')))); }
  function customerName(id){ var c=arr(window.customers).find(function(x){return String(x.id)===String(id);}); return esc(c?(c.name_ar||c.name||c.name_en||'-'):'-'); }
  function workshopName(w){ return esc(w?(w.name_ar||w.name||w.name_en||('ورشة '+w.id)):'-'); }
  function contractValue(c){ return N(c && (c.grandTotal || c.total || c.amount || c.contractValue)); }
  function unitCost(m){ return N(m && (m.costPrice || m.purchasePrice || m.unitCost || m.avgCost || m.price)); }
  function empDaily(e){ return N(e && (e.dailyCost || e.dailyWage || e.dayRate || e.dailyDeduction || (N(e.monthlySalary || e.salary)/26))); }
  function empName(e){ return esc(e?(e.name||e.name_ar||e.name_en||('عامل '+e.id)):'-'); }
  function employeesForWorkshop(workshopId){
    return arr(window.employees).filter(function(e){
      var ws = e.workshopId || e.workshop || e.assignedWorkshopId || e.currentWorkshopId;
      if(String(ws)===String(workshopId)) return true;
      var list = arr(e.workshops || e.workshopIds || e.assignedWorkshops).map(String);
      if(list.indexOf(String(workshopId))>-1) return true;
      var w = arr(window.workshops).find(function(x){return String(x.id)===String(workshopId);});
      var empIds = arr(w && (w.employeeIds || w.employees || w.workers)).map(function(x){ return String(x.id || x); });
      return empIds.indexOf(String(e.id))>-1;
    });
  }
  function assignmentFor(contractId){ return arr(window.projectWorkshopAssignments).find(function(x){return String(x.contractId)===String(contractId);}); }
  function monthlyOverhead(w){ return N(w && w.electricity) + N(w && w.water) + N(w && w.rent) + N(w && w.otherCosts); }
  function workshopOverheadCost(contractId){
    var a=assignmentFor(contractId); if(!a) return 0;
    var w=arr(window.workshops).find(function(x){return String(x.id)===String(a.workshopId);});
    return (monthlyOverhead(w)/30) * Math.max(0,N(a.days));
  }
  function workshopLaborCost(contractId){
    var a=assignmentFor(contractId); if(!a) return 0;
    var emps = employeesForWorkshop(a.workshopId);
    var workerIds = arr(a.workerIds).map(String);
    if(workerIds.length) emps = emps.filter(function(e){ return workerIds.indexOf(String(e.id))>-1; });
    return emps.reduce(function(s,e){ return s + empDaily(e)*Math.max(0,N(a.days)); },0);
  }
  function materialCost(contractId){
    var issues = arr(window.workshopMaterialIssues).filter(function(x){return String(x.contractId||x.sourceContractId||'')===String(contractId);}).reduce(function(s,x){
      var m=arr(window.rawMaterials).find(function(r){return String(r.id)===String(x.materialId||x.productId);});
      var u=N(x.unitCost || x.costPrice || unitCost(m));
      return s + N(x.totalCost || x.amount || (N(x.qty)*u));
    },0);
    var recipe = 0;
    try{ if(typeof window.recipeMaterialCostForContract==='function') recipe=N(window.recipeMaterialCostForContract(contractId)); }catch(e){}
    return issues + recipe;
  }
  function manualLabor(contractId){ return arr(window.projectLaborAllocations).filter(function(x){return String(x.contractId)===String(contractId);}).reduce(function(s,x){return s+N(x.amount);},0); }
  function operatingCost(contractId){
    var linked = arr(window.expenses).filter(function(x){return String(x.contractId||x.projectId||x.sourceContractId||'')===String(contractId);}).reduce(function(s,x){return s+N(x.amount);},0);
    var ops = arr(window.projectOperatingExpenses).filter(function(x){return String(x.contractId)===String(contractId);}).reduce(function(s,x){return s+N(x.amount);},0);
    return linked + ops + workshopOverheadCost(contractId);
  }
  function otherCost(contractId){ return arr(window.projectCosts).filter(function(x){return String(x.contractId)===String(contractId) && !['تقديري','مواد','أجور عمال','مصروف تشغيلي','مصروفات تشغيلية','تشغيلي','مصروف مباشر'].includes(String(x.type));}).reduce(function(s,x){return s+N(x.amount);},0); }

  window.calculateProjectCostAuto = function(contractId){
    ensureData();
    var materials=materialCost(contractId);
    var labor=manualLabor(contractId) + workshopLaborCost(contractId);
    var operating=operatingCost(contractId);
    var other=otherCost(contractId);
    var workshopOverhead=workshopOverheadCost(contractId);
    var workshopLabor=workshopLaborCost(contractId);
    return {materials:materials,labor:labor,operating:operating,other:other,total:materials+labor+operating+other,workshopLabor:workshopLabor,workshopOverhead:workshopOverhead};
  };

  window.saveWorkshopCosts = function(){
    ensureData();
    arr(window.workshops).forEach(function(w){
      w.electricity = N(document.getElementById('ws_e_'+w.id)?.value);
      w.water = N(document.getElementById('ws_w_'+w.id)?.value);
      w.rent = N(document.getElementById('ws_r_'+w.id)?.value);
      w.otherCosts = N(document.getElementById('ws_o_'+w.id)?.value);
    });
    saveCostData(); notify('تم حفظ تكاليف الورش الشهرية'); if(typeof renderCurrentTab==='function') renderCurrentTab();
  };
  window.linkProjectWorkshop = function(){
    ensureData();
    var contractId=document.getElementById('pcWorkshopContract')?.value;
    var workshopId=document.getElementById('pcWorkshopId')?.value;
    var days=N(document.getElementById('pcWorkshopDays')?.value);
    if(!contractId || !workshopId) return alert('اختر المشروع والورشة');
    if(days<=0) return alert('أدخل عدد أيام عمل المشروع داخل الورشة');
    var emps=employeesForWorkshop(workshopId).map(function(e){return String(e.id);});
    var old=assignmentFor(contractId);
    var data={id:old?old.id:Date.now(), contractId:contractId, workshopId:workshopId, days:days, workerIds:emps, date:today(), updatedAt:new Date().toISOString()};
    if(old) Object.assign(old,data); else window.projectWorkshopAssignments.unshift(data);
    saveCostData(); notify('تم ربط المشروع بالورشة واحتساب عمال الورشة'); if(typeof renderCurrentTab==='function') renderCurrentTab();
  };
  window.addProjectOperatingExpenseAuto = window.addProjectOperatingExpenseAuto || function(){
    ensureData();
    var contractId=document.getElementById('poContract')?.value;
    var category=(document.getElementById('poCategory')?.value||'مصروف تشغيلي').trim();
    var amount=N(document.getElementById('poAmount')?.value);
    var note=(document.getElementById('poNote')?.value||'').trim();
    if(!contractId) return alert('اختر المشروع');
    if(amount<=0) return alert('أدخل مبلغ صحيح');
    window.projectOperatingExpenses.unshift({id:Date.now(),contractId:contractId,category:category,amount:amount,note:note,date:today()});
    saveCostData(); notify('تمت إضافة المصروف للمشروع'); if(typeof renderCurrentTab==='function') renderCurrentTab();
  };

  window.renderProjectCosting = function(){
    ensureData();
    var rows=arr(window.contracts).map(function(c){ var cost=window.calculateProjectCostAuto(c.id); var value=contractValue(c); return {c:c,cost:cost,value:value,profit:value-cost.total,margin:value?((value-cost.total)/value*100):0}; });
    setTimeout(function(){ try{ if(typeof Chart==='undefined') return; var ctx=document.getElementById('projectWorkshopCostChart')?.getContext('2d'); if(ctx){ if(window.projectWorkshopCostChartObj) window.projectWorkshopCostChartObj.destroy(); window.projectWorkshopCostChartObj=new Chart(ctx,{type:'bar',data:{labels:rows.slice(0,8).map(function(r){return r.c.contractNumber||r.c.projectName||'مشروع';}),datasets:[{label:'قيمة المشروع',data:rows.slice(0,8).map(function(r){return r.value;})},{label:'التكلفة',data:rows.slice(0,8).map(function(r){return r.cost.total;})},{label:'الربح',data:rows.slice(0,8).map(function(r){return r.profit;})}]},options:{responsive:true,maintainAspectRatio:false}}); } }catch(e){} },150);
    var contractOptions=arr(window.contracts).map(function(c){return '<option value="'+esc(c.id)+'">'+contractTitle(c)+'</option>';}).join('');
    var workshopOptions=arr(window.workshops).map(function(w){return '<option value="'+esc(w.id)+'">'+workshopName(w)+' - عمال: '+employeesForWorkshop(w.id).length+'</option>';}).join('');
    var workshopRows=arr(window.workshops).map(function(w){return '<tr><td><b>'+workshopName(w)+'</b><br><small>عدد العمال: '+employeesForWorkshop(w.id).length+'</small></td><td><input id="ws_e_'+esc(w.id)+'" type="number" step="0.001" value="'+N(w.electricity)+'"></td><td><input id="ws_w_'+esc(w.id)+'" type="number" step="0.001" value="'+N(w.water)+'"></td><td><input id="ws_r_'+esc(w.id)+'" type="number" step="0.001" value="'+N(w.rent)+'"></td><td><input id="ws_o_'+esc(w.id)+'" type="number" step="0.001" value="'+N(w.otherCosts)+'"></td><td>'+money(monthlyOverhead(w))+'</td></tr>';}).join('');
    var resultRows=rows.map(function(r){
      var a=assignmentFor(r.c.id); var w=a?arr(window.workshops).find(function(x){return String(x.id)===String(a.workshopId);}):null;
      return '<tr><td>'+contractTitle(r.c)+'</td><td>'+customerName(r.c.customerId)+'</td><td>'+(w?workshopName(w):'<span class="badge badge-warning">غير مربوط</span>')+'</td><td>'+N(a&&a.days).toFixed(1)+'</td><td>'+money(r.value)+'</td><td>'+money(r.cost.materials)+'</td><td>'+money(r.cost.workshopLabor)+'</td><td>'+money(r.cost.workshopOverhead)+'</td><td>'+money(r.cost.other)+'</td><td class="text-danger"><b>'+money(r.cost.total)+'</b></td><td class="'+(r.profit>=0?'text-success':'text-danger')+'"><b>'+money(r.profit)+'</b></td><td>'+r.margin.toFixed(1)+'%</td></tr>';
    }).join('') || '<tr><td colspan="12">لا توجد مشاريع أو عقود.</td></tr>';
    return '<div class="section-card">\
      <div class="section-header"><h2>💰 تكلفة المشاريع حسب الورشة</h2><button type="button" class="btn btn-secondary" onclick="window.print();return false;">طباعة</button></div>\
      <div class="stats-grid">\
        <div class="stat-card"><div class="stat-title">قيمة المشاريع</div><div class="stat-value">'+money(rows.reduce(function(s,r){return s+r.value;},0))+'</div></div>\
        <div class="stat-card"><div class="stat-title">إجمالي التكلفة</div><div class="stat-value text-danger">'+money(rows.reduce(function(s,r){return s+r.cost.total;},0))+'</div></div>\
        <div class="stat-card"><div class="stat-title">صافي الربح</div><div class="stat-value">'+money(rows.reduce(function(s,r){return s+r.profit;},0))+'</div></div>\
        <div class="stat-card"><div class="stat-title">عدد الورش</div><div class="stat-value">'+arr(window.workshops).length+'</div></div>\

<script>
/* FIX: keep Project Costing tab active after clicking any button inside it.
   السبب كان أن initNav يعيد currentTab إلى لوحة المؤشرات لأن projectCosting غير موجود في قائمة base. */
(function(){
  'use strict';
  function setProjectTab(){ try{ currentTab='projectCosting'; }catch(e){} try{ window.currentTab='projectCosting'; }catch(e){} }
  function markProjectNavActive(){
    var nav=document.getElementById('navMenu'); if(!nav) return;
    var item=nav.querySelector('[data-tab="projectCosting"]');
    if(!item){
      item=document.createElement('li');
      item.className='nav-item';
      item.dataset.tab='projectCosting';
      item.innerHTML='<i class="fas fa-coins"></i><span>تكلفة المشاريع</span>';
      item.onclick=function(ev){ ev.preventDefault(); setProjectTab(); if(typeof renderCurrentTab==='function') renderCurrentTab(); if(typeof initNav==='function') initNav(); };
      nav.insertBefore(item, nav.children[Math.min(5, nav.children.length)] || null);
    }
    nav.querySelectorAll('.nav-item').forEach(function(el){ el.classList.toggle('active', el.dataset.tab==='projectCosting'); });
  }

  var oldInit = window.initNav || (typeof initNav==='function' ? initNav : null);
  if(oldInit){
    window.initNav = initNav = function(){
      var wasProject = false;
      try{ wasProject = (currentTab==='projectCosting' || window.currentTab==='projectCosting'); }catch(e){ wasProject = window.currentTab==='projectCosting'; }
      oldInit.apply(this, arguments);
      if(wasProject){ setProjectTab(); markProjectNavActive(); }
    };
  }

  ['saveWorkshopCosts','linkProjectWorkshop','addProjectOperatingExpenseAuto'].forEach(function(fn){
    var old=window[fn];
    if(typeof old==='function' && !old.__projectTabFixed){
      var wrapped=function(){ setProjectTab(); var r=old.apply(this, arguments); setProjectTab(); markProjectNavActive(); return r; };
      wrapped.__projectTabFixed=true;
      window[fn]=wrapped;
      try{ eval(fn+'=window[fn]'); }catch(e){}
    }
  });

  document.addEventListener('click', function(ev){
    var btn=ev.target && ev.target.closest ? ev.target.closest('#mainContent button') : null;
    if(!btn) return;
    var inProject = false;
    try{ inProject = (currentTab==='projectCosting' || window.currentTab==='projectCosting' || !!btn.closest('[id^="projectWorkshopCostChart"], .section-card')); }catch(e){}
    if(inProject && document.getElementById('projectWorkshopCostChart')){
      if(!btn.getAttribute('type')) btn.setAttribute('type','button');
      setProjectTab();
    }
  }, true);
})();

/* old duplicate quality module removed; enterprise qualityInspection remains */

      '<div class="form-group"><label>'+L('موعد إعادة العمل','Rework Due Date')+'</label><input type="date" id="qi_reworkDueDate" value="'+esc((row&&row.reworkDueDate)||'')+'"></div>'+ 
      '</div>'+ 
      '<div class="form-group"><label>'+L('العمال المشاركون','Workers Involved')+'</label><select id="qi_workerIds" multiple size="5">'+employees().map(function(e){ var sel=(row&&row.workerIds||[]).map(String).indexOf(String(e.id))>-1?'selected':''; return '<option value="'+esc(e.id)+'" '+sel+'>'+esc(e.name_ar||e.name_en||e.name||('#'+e.id))+'</option>'; }).join('')+'</select></div>'+ 
      '<div id="qi_checklist" class="section-card" style="margin:12px 0"><h4>✅ '+L('نقاط الفحص','Checklist')+'</h4>'+checklistHtml(row,type)+'</div>'+ 
      '<div class="form-group"><label>'+L('الإجراء التصحيحي','Corrective Action')+'</label><textarea id="qi_correctiveAction" rows="2" placeholder="'+L('مثال: إعادة ضبط المقاسات أو إعادة تركيب القطعة','Example: adjust dimensions or reinstall item')+'">'+esc((row&&row.correctiveAction)||'')+'</textarea></div>'+ 
      '<div class="form-group"><label>'+L('ملاحظات وعيوب','Notes and Defects')+'</label><textarea id="qi_notes" rows="3">'+esc((row&&row.notes)||'')+'</textarea></div>'+ 
      '<div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap"><button type="button" class="btn btn-secondary" onclick="document.getElementById(\'qualityInspectionModal\').remove()">'+L('إلغاء','Cancel')+'</button><button type="button" class="btn btn-success" onclick="saveQualityInspection('+(row?Number(row.id):0)+')">'+L('حفظ وربط بالنظام','Save & Sync')+'</button></div></div>';
    document.body.appendChild(modal); document.getElementById('qi_type').value=type;
  };
  window.__qualityChecklistHtml=function(row,type){ return '<h4>✅ '+L('نقاط الفحص','Checklist')+'</h4>'+checklistHtml(row,type); };
  window.saveQualityInspection=function(id){
    var all=inspections(); var old=id?all.find(function(x){return Number(x.id)===Number(id);}):null; var type=document.getElementById('qi_type').value; var cl={}; checklistDefs(type).forEach(function(d){ var el=document.getElementById('qc_'+d[0]); cl[d[0]]=el?el.value:'na'; });
    var r={ id:old?old.id:Date.now(), inspectionNo:old?old.inspectionNo:('QC-'+Date.now()), type:type, date:document.getElementById('qi_date').value||today(), contractId:document.getElementById('qi_contractId').value||'', workshopId:document.getElementById('qi_workshopId').value||'', inspectorId:document.getElementById('qi_inspectorId').value||'', workerIds:Array.from(document.getElementById('qi_workerIds').selectedOptions).map(function(o){return o.value;}), reworkDueDate:document.getElementById('qi_reworkDueDate').value||'', correctiveAction:document.getElementById('qi_correctiveAction').value||'', notes:document.getElementById('qi_notes').value||'', checklist:cl, updatedAt:new Date().toISOString(), createdAt:old?old.createdAt:new Date().toISOString(), createdBy:(window.currentUser&&window.currentUser.username)||'system' };
    r.status=calcStatus(r); var c=contractById(r.contractId); r.customerName=customerFromContract(c);
    if(old) Object.assign(old,r); else all.unshift(r); saveInspections(all); syncContractQuality(r); audit('save_integrated_quality_inspection',r.id);
    var m=document.getElementById('qualityInspectionModal'); if(m) m.remove(); if(typeof window.renderCurrentTab==='function') window.renderCurrentTab(); notify(L('تم حفظ فحص الجودة وربطه بالنظام','Quality inspection saved and synced'),'#10b981');
  };
  window.approveQualityInspection=function(id){ var all=inspections(); var r=all.find(function(x){return Number(x.id)===Number(id);}); if(!r) return; if(score(r).fail>0){ alert(L('لا يمكن اعتماد فحص فيه نقاط فشل. عدّل النقاط أو أضف إعادة عمل ثم افحص مرة أخرى.','Cannot approve an inspection with failed points. Fix/rework and inspect again.')); return; } r.status='approved'; r.approvedBy=(window.currentUser&&window.currentUser.username)||'system'; r.approvedAt=new Date().toISOString(); saveInspections(all); syncContractQuality(r); audit('approve_quality_inspection',id); if(typeof window.renderCurrentTab==='function') window.renderCurrentTab(); notify(L('تم اعتماد فحص الجودة','Quality inspection approved'),'#10b981'); };
  window.deleteQualityInspection=function(id){ if(!confirm(L('حذف فحص الجودة؟','Delete quality inspection?'))) return; saveInspections(inspections().filter(function(x){return Number(x.id)!==Number(id);})); audit('delete_quality_inspection',id); if(typeof window.renderCurrentTab==='function') window.renderCurrentTab(); };
  window.createQualityFromContract=function(){ var list=contracts(); if(!list.length){ alert(L('لا توجد عقود لإنشاء فحص منها','No contracts found')); return; } var c=list[0]; if(list.length>1){ var msg=list.map(function(x,i){return (i+1)+') '+contractLabel(x);}).slice(0,20).join('\n'); var n=Number(prompt(L('اختر رقم العقد:\n','Choose contract number:\n')+msg,'1')||1)-1; c=list[n]||list[0]; } openQualityInspectionModal(); setTimeout(function(){ var el=document.getElementById('qi_contractId'); if(el) el.value=c.id; var w=document.getElementById('qi_workshopId'); if(w && c.workshopId) w.value=c.workshopId; },0); };
  window.exportQualityInspectionsCSV=function(){ var header=['Inspection No','Date','Type','Contract','Customer','Workshop','Inspector','Workers','Score','Status','Rework Due','Corrective Action','Notes']; var lines=[header.join(',')].concat(inspections().map(function(r){ var c=contractById(r.contractId); return [r.inspectionNo,r.date,typeLabel(r.type),contractLabel(c),customerFromContract(c),nameOfWorkshop(r.workshopId),nameOfEmployee(r.inspectorId),(r.workerIds||[]).map(nameOfEmployee).join(' | '),score(r).pct,statusLabel(r.status),r.reworkDueDate,r.correctiveAction,(r.notes||'').replace(/\n/g,' ')].map(function(v){return '"'+String(v||'').replace(/"/g,'""')+'"';}).join(','); })); var blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8'}); var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='quality-inspections-integrated.csv'; a.click(); URL.revokeObjectURL(a.href); };
  window.printQualityInspection=function(id){ var r=inspections().find(function(x){return Number(x.id)===Number(id);}); if(!r) return; var c=contractById(r.contractId); var rows=checklistDefs(r.type).map(function(d){ var v=(r.checklist||{})[d[0]]; return '<tr><td>'+esc(d[1])+'</td><td>'+esc(v==='pass'?L('ناجح','Pass'):v==='fail'?L('فشل','Fail'):L('لا ينطبق','N/A'))+'</td></tr>'; }).join(''); var w=window.open('','_blank'); w.document.write('<html><head><title>'+esc(r.inspectionNo)+'</title><style>body{font-family:Arial;padding:24px;direction:'+(isAr()?'rtl':'ltr')+'}table{width:100%;border-collapse:collapse}td,th{border:1px solid #ccc;padding:8px}.sig{margin-top:40px;display:flex;justify-content:space-between}</style></head><body><h2>'+L('تقرير فحص جودة مرتبط بالنظام','Integrated Quality Inspection Report')+'</h2><p><b>'+L('رقم الفحص','Inspection No.')+':</b> '+esc(r.inspectionNo)+'</p><p><b>'+L('العقد','Contract')+':</b> '+esc(contractLabel(c))+'</p><p><b>'+L('العميل','Customer')+':</b> '+esc(customerFromContract(c))+'</p><p><b>'+L('الورشة','Workshop')+':</b> '+esc(nameOfWorkshop(r.workshopId))+'</p><p><b>'+L('الحالة','Status')+':</b> '+esc(statusLabel(r.status))+' - '+score(r).pct+'%</p><table><tbody>'+rows+'</tbody></table><p><b>'+L('الإجراء التصحيحي','Corrective Action')+':</b><br>'+esc(r.correctiveAction||'-')+'</p><p><b>'+L('ملاحظات','Notes')+':</b><br>'+esc(r.notes||'-')+'</p><div class="sig"><div>'+L('توقيع المفتش','Inspector Signature')+'</div><div>'+L('توقيع العميل','Customer Signature')+'</div></div></body></html>'); w.document.close(); w.print(); };
  function injectNav(){ var nav=document.getElementById('navMenu'); if(!nav) return; var old=nav.querySelector('[data-tab="'+TAB+'"]'); if(!old){ var li=document.createElement('li'); li.className='nav-item'; li.setAttribute('data-tab',TAB); li.innerHTML='<i class="fas fa-shield-alt"></i><span>'+L('فحص الجودة','Quality Control')+'</span>'; li.onclick=function(){ try{currentTab=TAB;}catch(e){window.currentTab=TAB;} if(window.renderCurrentTab) window.renderCurrentTab(); if(window.initNav) window.initNav(); }; var after=nav.querySelector('[data-tab="contracts"]'); if(after&&after.nextSibling) nav.insertBefore(li,after.nextSibling); else nav.appendChild(li); } }
  var oldRender=window.renderCurrentTab || (typeof renderCurrentTab==='function'?renderCurrentTab:null); if(oldRender && !oldRender.__qualityEnterprisePatched){ var pr=function(){ var tab; try{tab=currentTab;}catch(e){tab=window.currentTab;} if(tab===TAB){ var m=document.getElementById('mainContent'); if(m) m.innerHTML=window.renderQualityInspectionPage(); try{ if(typeof localizeDynamicDom==='function') localizeDynamicDom(m); }catch(e){} return; } return oldRender.apply(this,arguments); }; pr.__qualityEnterprisePatched=true; window.renderCurrentTab=pr; try{renderCurrentTab=pr;}catch(e){} }
  var oldInit=window.initNav || (typeof initNav==='function'?initNav:null); if(oldInit && !oldInit.__qualityEnterprisePatched){ var pi=function(){ var r=oldInit.apply(this,arguments); injectNav(); return r; }; pi.__qualityEnterprisePatched=true; window.initNav=pi; try{initNav=pi;}catch(e){} }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',function(){setTimeout(injectNav,100);setTimeout(injectNav,700);}); else {setTimeout(injectNav,100);setTimeout(injectNav,700);} 
})();
</script>
<script>
/* =====================================================================
   ADVANCED QUALITY GATE AUTO-LINK PATCH
   تطوير فحص الجودة وربطه تلقائياً بالعقود وبنود العقود بدون حذف أي ميزة
   ===================================================================== */
(function(){
  'use strict';
  if(window.__qualityGateAutoContractsPatch) return;
  window.__qualityGateAutoContractsPatch = true;

  function ar(){ try{return (window.currentLang||localStorage.getItem('erp_lang')||'ar')==='ar';}catch(e){return true;} }
  function L(a,e){ return ar()?a:e; }
  function esc(v){ return String(v==null?'':v).replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];}); }
  function read(k,d){ try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d));}catch(e){return d;} }
  function write(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }
  function contracts(){ var v=Array.isArray(window.contracts)?window.contracts:read('erp_contracts',[]); window.contracts=v; return v; }
  function inspections(){ var v=read('erp_qualityInspections',Array.isArray(window.qualityInspections)?window.qualityInspections:[]); window.qualityInspections=v; return v; }
  function saveInspections(v){ window.qualityInspections=v; write('erp_qualityInspections',v); }
  function workshops(){ var v=Array.isArray(window.workshops)?window.workshops:read('erp_workshops',[]); window.workshops=v; return v; }
  function employees(){ var v=Array.isArray(window.employees)?window.employees:read('erp_employees',[]); window.employees=v; return v; }
  function notify(m,c){ try{ if(typeof window.showNotification==='function') window.showNotification(m,c||'#2563eb'); else alert(m); }catch(e){} }
  function audit(a,id){ try{ if(typeof window.addAudit==='function') window.addAudit(a,'qualityInspection',id); }catch(e){} }
  function n(v){ var x=parseFloat(String(v||0).replace(',','.')); return isNaN(x)?0:x; }
  function today(){ return new Date().toISOString().slice(0,10); }
  function contractName(c){ return c ? ((c.contractNumber||c.invoiceNumber||('#'+c.id))+' - '+(c.projectName||c.customerName||'')) : '-'; }
  function itemName(it,i){ return (it&&(it.productName_ar||it.productName_en||it.name_ar||it.name_en||it.name||it.description)) || (L('بند','Item')+' '+(i+1)); }
  function scoreFromChecklist(ch){
    var keys=Object.keys(ch||{}), done=0, pass=0, fail=0;
    keys.forEach(function(k){ var v=ch[k]; if(v && v!=='na'){ done++; if(v==='pass') pass++; if(v==='fail') fail++; } });
    return {pct:done?Math.round((pass/done)*100):0, fail:fail, done:done};
  }
  function qualityBadge(s){
    var label={pending:L('بانتظار','Pending'),under_inspection:L('قيد الفحص','Under Inspection'),passed:L('مقبول','Passed'),approved:L('معتمد','Approved'),rework:L('إعادة عمل','Rework'),failed:L('مرفوض','Failed')}[s]||s||L('لم يفحص','Not Inspected');
    var cls=(s==='passed'||s==='approved')?'badge-success':((s==='failed'||s==='rework')?'badge-danger':'badge-warning');
    return '<span class="badge '+cls+'">'+esc(label)+'</span>';
  }
  function syncContract(row){
    var all=contracts(), c=all.find(function(x){return String(x.id)===String(row.contractId);});
    if(!c) return;
    var sc=scoreFromChecklist(row.checklist||{});
    c.qualityStatus=row.status||'pending';
    c.qualityScore=sc.pct;
    c.qualityGate=(row.status==='failed'||row.status==='rework')?'blocked':((row.status==='passed'||row.status==='approved')?'passed':'pending');
    c.qualityHold=(c.qualityGate==='blocked');
    c.lastQualityInspectionId=row.id;
    c.lastQualityInspectionNo=row.inspectionNo;
    c.lastQualityInspectionDate=row.date||today();
    c.lastQualityInspectorId=row.inspectorId||'';
    c.qualityCorrectiveAction=row.correctiveAction||'';
    c.qualityNotes=row.notes||'';
    c.qualityUpdatedAt=new Date().toISOString();
    if(row.itemIndex!=='' && row.itemIndex!=null && Array.isArray(c.items)){
      var ix=Number(row.itemIndex); if(c.items[ix]){
        c.items[ix].qualityStatus=c.qualityStatus;
        c.items[ix].qualityScore=sc.pct;
        c.items[ix].qualityGate=c.qualityGate;
        c.items[ix].lastQualityInspectionId=row.id;
        c.items[ix].lastQualityInspectionNo=row.inspectionNo;
        c.items[ix].qualityUpdatedAt=c.qualityUpdatedAt;
      }
    }
    write('erp_contracts',all);
    try{ if(typeof window.saveAll==='function') window.saveAll(); }catch(e){}
  }
  function enrichLatestFromModal(idBefore){
    var itemEl=document.getElementById('qi_contractItemIndex');
    var stageEl=document.getElementById('qi_qualityStage');
    var priorityEl=document.getElementById('qi_priority');
    var blockEl=document.getElementById('qi_blockDelivery');
    var all=inspections();
    var row=null;
    if(idBefore) row=all.find(function(x){return Number(x.id)===Number(idBefore);});
    if(!row) row=all[0];
    if(!row) return;
    if(itemEl) row.itemIndex=itemEl.value;
    if(stageEl) row.qualityStage=stageEl.value||'final';
    if(priorityEl) row.priority=priorityEl.value||'normal';
    if(blockEl) row.blockDelivery=!!blockEl.checked;
    if(row.blockDelivery && (row.status==='failed'||row.status==='rework')) row.deliveryBlocked=true;
    saveInspections(all); syncContract(row); audit('quality_gate_auto_sync',row.id);
  }

  // إضافة حقول متقدمة داخل نافذة فحص الجودة: بند العقد، مرحلة الفحص، أولوية العيب، ومنع التسليم
  var oldOpen=window.openQualityInspectionModal;
  if(typeof oldOpen==='function'){
    window.openQualityInspectionModal=function(id){
      var res=oldOpen.apply(this,arguments);
      setTimeout(function(){
        var modal=document.getElementById('qualityInspectionModal'); if(!modal || document.getElementById('qi_contractItemIndex')) return;
        var current={}; inspections().forEach(function(r){ if(Number(r.id)===Number(id)) current=r; });
        var csel=document.getElementById('qi_contractId');
        var cid=csel?csel.value:(current.contractId||'');
        function itemOptions(contractId,sel){
          var c=contracts().find(function(x){return String(x.id)===String(contractId);});
          var h='<option value="">'+esc(L('كل العقد','Whole Contract'))+'</option>';
          if(c && Array.isArray(c.items)) c.items.forEach(function(it,i){ h+='<option value="'+i+'" '+(String(sel)===String(i)?'selected':'')+'>'+esc(itemName(it,i))+'</option>'; });
          return h;
        }
        var html='<div class="section-card" style="margin:12px 0;background:var(--gray-100)"><h4>🔗 '+L('ربط الجودة بالعقد','Quality Contract Link')+'</h4><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px">'+
          '<div class="form-group"><label>'+L('بند العقد','Contract Item')+'</label><select id="qi_contractItemIndex">'+itemOptions(cid,current.itemIndex)+'</select></div>'+
          '<div class="form-group"><label>'+L('مرحلة الفحص','Quality Stage')+'</label><select id="qi_qualityStage"><option value="before_delivery">'+L('قبل التسليم','Before Delivery')+'</option><option value="production">'+L('أثناء التصنيع','During Production')+'</option><option value="installation">'+L('بعد التركيب','After Installation')+'</option><option value="final">'+L('استلام نهائي','Final Handover')+'</option></select></div>'+
          '<div class="form-group"><label>'+L('أولوية العيب','Defect Priority')+'</label><select id="qi_priority"><option value="normal">'+L('عادي','Normal')+'</option><option value="high">'+L('عالي','High')+'</option><option value="critical">'+L('حرج','Critical')+'</option></select></div>'+
          '<div class="form-group"><label>'+L('منع التسليم عند الرفض','Block delivery if failed')+'</label><select id="qi_blockDelivery"><option value="1">'+L('نعم','Yes')+'</option><option value="0">'+L('لا','No')+'</option></select></div>'+
          '</div><p style="color:var(--gray-500);margin:0">'+L('عند الحفظ يتم تحديث حالة الجودة داخل العقد وبند العقد تلقائياً. إذا فشل الفحص يتم وضع العقد في إيقاف جودة حتى إعادة الفحص.','On save, the contract and contract item quality status update automatically. Failed inspections put the contract on quality hold until reinspection.')+'</p></div>';
        var checklist=document.getElementById('qi_checklist');
        if(checklist) checklist.insertAdjacentHTML('beforebegin',html);
        var st=document.getElementById('qi_qualityStage'); if(st) st.value=current.qualityStage||'final';
        var pr=document.getElementById('qi_priority'); if(pr) pr.value=current.priority||'normal';
        var bl=document.getElementById('qi_blockDelivery'); if(bl) bl.value=(current.blockDelivery===false?'0':'1');
        if(csel) csel.addEventListener('change',function(){ var it=document.getElementById('qi_contractItemIndex'); if(it) it.innerHTML=itemOptions(csel.value,''); });
      },0);
      return res;
    };
  }

  var oldSave=window.saveQualityInspection;
  if(typeof oldSave==='function'){
    window.saveQualityInspection=function(id){
      var keep={ item:document.getElementById('qi_contractItemIndex')&&document.getElementById('qi_contractItemIndex').value,
        stage:document.getElementById('qi_qualityStage')&&document.getElementById('qi_qualityStage').value,
        priority:document.getElementById('qi_priority')&&document.getElementById('qi_priority').value,
        block:document.getElementById('qi_blockDelivery')&&document.getElementById('qi_blockDelivery').value==='1' };
      var result=oldSave.apply(this,arguments);
      setTimeout(function(){
        var all=inspections(); var row=id?all.find(function(x){return Number(x.id)===Number(id);}):all[0]; if(!row) return;
        row.itemIndex=keep.item||''; row.qualityStage=keep.stage||'final'; row.priority=keep.priority||'normal'; row.blockDelivery=keep.block;
        row.deliveryBlocked=keep.block && (row.status==='failed'||row.status==='rework');
        saveInspections(all); syncContract(row);
      },30);
      return result;
    };
  }

  window.generateQualityInspectionsFromContracts=function(){
    var cs=contracts(), all=inspections(), made=0;
    cs.forEach(function(c){
      var exists=all.some(function(r){return String(r.contractId)===String(c.id);});
      if(!exists){
        var r={id:Date.now()+made,inspectionNo:'QC-AUTO-'+(Date.now()+made),type:'final',date:today(),contractId:c.id,workshopId:c.workshopId||'',inspectorId:'',workerIds:[],itemIndex:'',qualityStage:'before_delivery',priority:'normal',blockDelivery:true,status:'pending',checklist:{},reworkDueDate:'',correctiveAction:'',notes:L('تم إنشاء الفحص تلقائياً من العقد.','Inspection created automatically from contract.'),createdAt:new Date().toISOString(),createdBy:'system'};
        all.unshift(r); syncContract(r); made++;
      }
    });
    saveInspections(all);
    if(typeof window.renderCurrentTab==='function') window.renderCurrentTab();
    notify(made?L('تم توليد فحوصات الجودة للعقود التي لا يوجد لها فحص','Quality inspections generated for contracts without inspection'):L('كل العقود لديها فحص جودة بالفعل','All contracts already have quality inspections'), made?'#10b981':'#f59e0b');
  };

  window.openQualityForContract=function(contractId,itemIndex){
    if(typeof window.openQualityInspectionModal!=='function') return;
    window.openQualityInspectionModal();
    setTimeout(function(){
      var c=document.getElementById('qi_contractId'); if(c){ c.value=contractId; c.dispatchEvent(new Event('change')); }
      var i=document.getElementById('qi_contractItemIndex'); if(i && itemIndex!=null) i.value=itemIndex;
    },60);
  };

  // تحسين صفحة الجودة الحالية بإضافة زر التوليد التلقائي وحالة الربط
  var oldRenderQuality=window.renderQualityInspectionPage;
  if(typeof oldRenderQuality==='function'){
    window.renderQualityInspectionPage=function(){
      var html=oldRenderQuality.apply(this,arguments);
      var btn='<button type="button" class="btn btn-warning" onclick="generateQualityInspectionsFromContracts()">⚙️ '+L('توليد تلقائي من العقود','Auto Generate from Contracts')+'</button>';
      html=html.replace('</div></div><div class="stats-grid">',btn+'</div></div><div class="stats-grid">');
      var cs=contracts();
      var blocked=cs.filter(function(c){return c.qualityHold;}).length;
      var waiting=cs.filter(function(c){return !c.lastQualityInspectionId;}).length;
      var panel='<div class="section-card" style="margin-bottom:12px"><h4>🔗 '+L('مؤشر ربط الجودة بالعقود','Contract Quality Link')+'</h4><div class="stats-grid"><div class="stat-card"><div class="stat-title">'+L('عقود بدون فحص','Contracts without inspection')+'</div><div class="stat-value">'+waiting+'</div></div><div class="stat-card"><div class="stat-title">'+L('عقود موقوفة جودة','Quality hold contracts')+'</div><div class="stat-value text-danger">'+blocked+'</div></div></div></div>';
      return panel+html;
    };
  }

  // إضافة أزرار وحالة فحص الجودة في صفحة العقود العامة بدون تغيير منطقها الأصلي
  var oldContractsPage=window.renderContractsPage || (typeof renderContractsPage==='function'?renderContractsPage:null);
  if(typeof oldContractsPage==='function' && !oldContractsPage.__qualityContractDecorated){
    var decorated=function(){
      var html=oldContractsPage.apply(this,arguments);
      html=html.replace('<button id="newContractBtn" class="btn btn-primary">', '<button type="button" class="btn btn-success" onclick="generateQualityInspectionsFromContracts()">🛡️ '+L('فحوصات تلقائية','Auto QC')+'</button> <button id="newContractBtn" class="btn btn-primary">');
