    safeArray('liabilities').forEach(function(l){ var d=daysUntil(l.dueDate||l.due_date); if(d<=7 && String(l.status||'').toLowerCase()!=='paid'){ alerts.push({type:'liability', level:d<0?'danger':'warning', title:d<0?L('دين متأخر','Overdue liability'):L('دين يستحق قريباً','Liability due soon'), msg:(l.creditorName||l.creditor_name||l.creditor||'-')+' — '+num(l.amount).toFixed(3)+' '+L('ر.ع','OMR'), tab:'liabilities'}); } });
    safeArray('contracts').forEach(function(c){ var p=num(c.progress); if(String(c.status||'').toLowerCase()!=='completed' && p>0 && p<100){ alerts.push({type:'contract', level:'info', title:L('عقد قيد التنفيذ','Contract in progress'), msg:(c.contractNumber||c.contract_number||c.id)+' — '+L('نسبة الإنجاز','Progress')+': '+p+'%', tab:'contracts'}); } });
    try{ var last = localStorage.getItem('erp_last_cloud_save') || localStorage.getItem('erp_last_sync_at') || ''; if(last){ alerts.push({type:'sync', level:'success', title:L('آخر حفظ سحابي','Last cloud save'), msg:last, tab:'settings'}); } }catch(e){}
    return alerts;
  };
  window.renderEnterpriseSmartAlertsPage = function(){
    var list = window.erpCollectSmartAlerts ? window.erpCollectSmartAlerts() : [];
    var countDanger=list.filter(function(a){return a.level==='danger';}).length;
    var countWarning=list.filter(function(a){return a.level==='warning';}).length;
    var cards = list.map(function(a){
      var cls = a.level==='danger' ? 'badge-danger' : a.level==='warning' ? 'badge-warning' : a.level==='success' ? 'badge-success' : 'badge-info';
      return '<div class="section-card" style="margin-bottom:10px">'+
        '<div class="section-header"><h3>'+esc(a.title)+'</h3><span class="badge '+cls+'">'+esc(a.level)+'</span></div>'+
        '<p>'+esc(a.msg)+'</p>'+ 
        '<button type="button" class="btn btn-sm btn-primary" onclick="try{currentTab=\''+esc(a.tab)+'\';window.currentTab=\''+esc(a.tab)+'\';renderCurrentTab();initNav();}catch(e){}">'+L('فتح القسم','Open section')+'</button>'+ 
      '</div>';
    }).join('');
    return '<div class="section-card"><div class="section-header"><h2>🔔 '+L('التنبيهات الذكية','Smart Alerts')+'</h2><button type="button" class="btn btn-secondary" onclick="try{renderCurrentTab()}catch(e){}">'+L('تحديث','Refresh')+'</button></div>'+ 
      '<div class="stats-grid"><div class="stat-card"><div class="stat-title">'+L('إجمالي التنبيهات','Total alerts')+'</div><div class="stat-value">'+list.length+'</div></div><div class="stat-card"><div class="stat-title">'+L('حرجة','Critical')+'</div><div class="stat-value text-danger">'+countDanger+'</div></div><div class="stat-card"><div class="stat-title">'+L('قريبة','Upcoming')+'</div><div class="stat-value text-warning">'+countWarning+'</div></div></div>'+ 
      (cards || '<div class="section-card"><p>✅ '+L('لا توجد تنبيهات حالياً','No alerts at the moment')+'</p></div>')+'</div>';
  };
  function ensureSmartAlertsNav(){
    var nav=byId('navMenu'); if(!nav) return;
    var old=nav.querySelector('[data-tab="smartAlerts"],[data-tab="smartNotifications"]');
    if(old){ old.setAttribute('data-tab','smartAlerts'); var sp=old.querySelector('span'); if(sp) sp.textContent=L('التنبيهات الذكية','Smart Alerts'); old.onclick=function(){ try{ currentTab='smartAlerts'; window.currentTab='smartAlerts'; renderCurrentTab(); initNav(); }catch(e){ console.error(e); } }; return; }
    var li=document.createElement('li'); li.className='nav-item'; li.setAttribute('data-tab','smartAlerts');
    li.innerHTML='<i class="fas fa-bell"></i><span>'+L('التنبيهات الذكية','Smart Alerts')+'</span>';
    li.onclick=function(){ try{ currentTab='smartAlerts'; window.currentTab='smartAlerts'; renderCurrentTab(); initNav(); }catch(e){ console.error(e); } };
    nav.appendChild(li);
  }
  var previousRender = window.renderCurrentTab || (typeof renderCurrentTab === 'function' ? renderCurrentTab : null);
  if(previousRender && !previousRender.__v8SafeSmartAlerts){
    var patchedRender=function(){ var tab=''; try{ tab=currentTab; }catch(e){ tab=window.currentTab||''; } if(tab==='smartNotifications') { try{ currentTab='smartAlerts'; }catch(e){} tab='smartAlerts'; } if(tab==='smartAlerts'){ var main=byId('mainContent'); if(main) main.innerHTML=window.renderEnterpriseSmartAlertsPage(); ensureSmartAlertsNav(); return; } return previousRender.apply(this, arguments); };
    patchedRender.__v8SafeSmartAlerts=true; window.renderCurrentTab=patchedRender; try{ renderCurrentTab=patchedRender; }catch(e){}
  }
  var previousInit = window.initNav || (typeof initNav === 'function' ? initNav : null);
  if(previousInit && !previousInit.__v8SafeSmartAlerts){
    var patchedInit=function(){ var r=previousInit.apply(this, arguments); ensureSmartAlertsNav(); return r; };
    patchedInit.__v8SafeSmartAlerts=true; window.initNav=patchedInit; try{ initNav=patchedInit; }catch(e){}
  }
  function safeLogin(){
    var err=byId('loginError'); if(err) err.innerHTML='';
    var username=(byId('loginUsername')&&byId('loginUsername').value||'').trim();
    var password=(byId('loginPassword')&&byId('loginPassword').value||'').trim();
    var key=username.toLowerCase(); if(username==='مسؤول الورشة') key='workshop';
    var users=[]; try{ users=USERS||[]; }catch(e){ users=[]; }
    var user=users.find(function(u){ return String(u.username||'').toLowerCase()===key && String(u.password||'')===password && (u.status||'active')==='active'; });
    if(!user){ if(err) err.innerHTML='<i class="fas fa-exclamation-circle"></i> '+L('اسم المستخدم أو كلمة المرور غير صحيحة','Invalid username or password'); return false; }
    try{ currentUser=user; }catch(e){} window.currentUser=user;
    var loginBox=byId('loginScreen'), app=byId('app'), nameBox=byId('userDisplayName');
    if(loginBox){ loginBox.style.display='none'; loginBox.classList.add('erp-login-hidden'); }
    if(app){ app.style.display='block'; app.style.visibility='visible'; app.style.opacity='1'; }
    if(nameBox) nameBox.innerHTML='<i class="fas fa-user-circle"></i> '+(lang()==='ar' ? (user.name_ar||user.username) : (user.name_en||user.username));
    try{ if(!localStorage.getItem('erp_current_tab')) localStorage.setItem('erp_current_tab','dashboard'); }catch(e){}
    try{ if(typeof initNav==='function') initNav(); }catch(e){ console.error('initNav after login error',e); }
    try{ if(typeof renderCurrentTab==='function') renderCurrentTab(); }catch(e){ console.error('render after login error',e); notify(L('تم الدخول، لكن توجد مشكلة في الصفحة الحالية. تم فتح لوحة المؤشرات.','Logged in, but current page had an issue. Dashboard opened.'),'#f59e0b'); try{ currentTab='dashboard'; window.currentTab='dashboard'; renderCurrentTab(); }catch(_){} }
    try{ if(typeof addAudit==='function') addAudit('Login','auth',user.id); }catch(e){ console.warn('audit login ignored',e); }
    return true;
  }
  window.erpSafeLoginV8=safeLogin;
  function bindLogin(){
    var btn=byId('doLoginBtn'); if(btn && !btn.__v8SafeBound){ btn.__v8SafeBound=true; btn.addEventListener('click',function(ev){ ev.preventDefault(); ev.stopImmediatePropagation(); safeLogin(); }, true); }
    var pass=byId('loginPassword'); if(pass && !pass.__v8SafeBound){ pass.__v8SafeBound=true; pass.addEventListener('keydown',function(ev){ if(ev.key==='Enter'){ ev.preventDefault(); ev.stopImmediatePropagation(); safeLogin(); } }, true); }
    ensureSmartAlertsNav();
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', bindLogin); else bindLogin();
  window.addEventListener('load', function(){ bindLogin(); setTimeout(bindLogin,500); });
})();
</script>
<script id="fakhr-nizwa-v19-delete-customer-stability-final">
(function(){
  'use strict';
  if(window.__FAKHR_NIZWA_V19_FINAL__) return;
  window.__FAKHR_NIZWA_V19_FINAL__ = true;

  function isEn(){ try{return currentLang === 'en';}catch(e){return localStorage.getItem('erp_lang') === 'en';} }
  function L(ar,en){ return isEn() ? en : ar; }
  function esc(v){ return String(v == null ? '' : v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  function notify(msg,color){ try{ if(typeof showNotification === 'function') showNotification(msg,color||'#10b981'); else if(window.showSupabaseToast) window.showSupabaseToast(msg,color||'#10b981'); else console.log(msg); }catch(e){ console.log(msg); } }
  function same(a,b){ return String(a) === String(b) || Number(a) === Number(b); }
  function getId(el){ return el && (el.dataset.id || el.getAttribute('data-id') || el.dataset.username || el.getAttribute('data-username') || el.dataset.employeeId || el.getAttribute('data-employee-id') || ''); }
  function readArray(name){ try{ var arr = eval(name); return Array.isArray(arr) ? arr : []; }catch(e){ try{return Array.isArray(window[name]) ? window[name] : [];}catch(_){return [];} } }
  function writeArray(name, arr){ arr = Array.isArray(arr) ? arr : []; try{ eval(name + ' = arr'); }catch(e){ try{ window[name] = arr; }catch(_){} } }
  function saveLocal(){ try{ if(typeof saveAll === 'function') saveAll(); }catch(e){ console.error('saveAll failed:', e); } }
  function rerender(){ try{ if(typeof renderCurrentTab === 'function') renderCurrentTab(); }catch(e){ console.error('render failed:', e); } }
  function storageKey(name){
    return {
      products:'erp_products', rawMaterials:'erp_raw_materials', customers:'erp_customers', invoices:'erp_invoices', contracts:'erp_contracts',
      bankAccounts:'erp_bank_accounts', cashBoxes:'erp_cash_boxes', expenses:'erp_expenses', supplierInvoices:'erp_supplier_invoices',
      liabilities:'erp_liabilities', receipts:'erp_receipts', auditLogs:'erp_audit'
    }[name] || ('erp_' + name);
  }
  function writeLocalArray(name, arr){ try{ localStorage.setItem(storageKey(name), JSON.stringify(Array.isArray(arr)?arr:[])); }catch(e){} }
  function collectState(){
    var names=['products','rawMaterials','customers','invoices','contracts','bankAccounts','cashBoxes','expenses','supplierInvoices','liabilities','receipts','auditLogs'];
    var state={};
    names.forEach(function(n){ state[n] = readArray(n).map(function(x){ return x; }); });
    state.meta = { company:'مؤسسة فخر نزوى', savedAt:new Date().toISOString(), version:'v19-delete-customer-stability-final' };
    return state;
  }
  async function forceSaveCloud(){
    saveLocal();
    try{
      var state = collectState();
      Object.keys(state).forEach(function(k){ if(Array.isArray(state[k])) writeLocalArray(k, state[k]); });
      if(window.supabase && window.supabase.from){
        var now = new Date().toISOString();
        var res = await window.supabase.from('erp_cloud_state').upsert({id:'main', data:state, updated_at:now}, {onConflict:'id'}).select('updated_at').maybeSingle();
        if(res && res.error) throw res.error;
        try{ localStorage.setItem('erp_cloud_state_updated_at', String((res.data && res.data.updated_at) || now)); }catch(e){}
        return true;
      }
    }catch(e){ console.error('Cloud save after delete failed:', e); notify(L('تم الحفظ محليًا لكن فشل الحفظ السحابي','Saved locally, cloud save failed'),'#f59e0b'); }
    return false;
  }

  var deleteMap = [
    ['deleteProductBtn','products',L('المنتج','product')],
    ['deleteRawMaterialBtn','rawMaterials',L('المادة الخام','raw material')],
    ['deleteInvoiceBtn','invoices',L('المستند','document')],
    ['deleteCustomerBtn','customers',L('العميل','customer')],
    ['deleteExpenseBtn','expenses',L('المصروف','expense')],
    ['deleteBankBtn','bankAccounts',L('الحساب البنكي','bank account')],
    ['deleteCashBtn','cashBoxes',L('الصندوق النقدي','cash box')],
    ['deleteContractBtn','contracts',L('العقد','contract')],
    ['deleteSupplierInvoiceBtn','supplierInvoices',L('فاتورة المورد','supplier invoice')],
    ['deleteLiabilityBtn','liabilities',L('الدين','liability')],
    ['deleteReceiptBtn','receipts',L('سند القبض','receipt')]
  ];
  function classifyDeleteButton(btn){
    for(var i=0;i<deleteMap.length;i++) if(btn.classList && btn.classList.contains(deleteMap[i][0])) return deleteMap[i];
    return null;
  }
  async function deleteFromArray(arrayName, id, label, silent){
    if(id === '' || id == null){ notify(L('لا يوجد رقم للحذف','Missing delete id'),'#ef4444'); return false; }
    if(!silent && !confirm(L('هل تريد حذف ','Delete ') + label + '؟')) return false;
    var arr = readArray(arrayName);
    var before = arr.length;
    var next = arr.filter(function(item){
      return !(same(item && item.id, id) || same(item && item.invoiceNumber, id) || same(item && item.receiptNumber, id) || same(item && item.contractNumber, id));
    });
    if(next.length === before){ notify(L('لم يتم العثور على العنصر للحذف','Item was not found'),'#ef4444'); return false; }
    writeArray(arrayName, next);
    writeLocalArray(arrayName, next);
    try{ if(typeof addAudit === 'function') addAudit('delete', arrayName, id); }catch(e){}
    await forceSaveCloud();
    rerender();
    notify(L('تم الحذف وحفظ التغيير','Deleted and saved successfully'),'#10b981');
    return true;
  }
  window.fakhrDeleteRecord = deleteFromArray;

  document.addEventListener('click', function(ev){
    var btn = ev.target && ev.target.closest ? ev.target.closest('button, a, .btn') : null;
    if(!btn) return;
    var info = classifyDeleteButton(btn);
    if(!info) return;
    ev.preventDefault(); ev.stopPropagation(); if(ev.stopImmediatePropagation) ev.stopImmediatePropagation();
    deleteFromArray(info[1], getId(btn), info[2], false);
  }, true);

  // دعم أزرار الحذف التي تستخدم onclick بدل class listener.
  window.deleteReceipt = function(id){ return deleteFromArray('receipts', id, L('سند القبض','receipt'), false); };
  window.deleteEmployeePayroll = function(id){ return deleteFromArray('employees', id, L('الموظف','employee'), false); };
  window.deleteWorkerSafe = function(id){ return deleteFromArray('employees', id, L('العامل','worker'), false); };
  window.deleteOvertimeSchedule = function(id){
    try{
      var jobs = JSON.parse(localStorage.getItem('erp_overtime_schedule') || '[]').filter(function(x){ return !same(x.id,id); });
      localStorage.setItem('erp_overtime_schedule', JSON.stringify(jobs)); rerender(); notify(L('تم الحذف','Deleted'),'#10b981');
    }catch(e){ notify(L('تعذر الحذف','Delete failed'),'#ef4444'); }
  };
  window.deleteWorkshopWorkerEval = function(id){
    try{
      var arr = JSON.parse(localStorage.getItem('erp_employee_evaluations') || '[]').filter(function(x){ return !same(x.id,id); });
      localStorage.setItem('erp_employee_evaluations', JSON.stringify(arr)); rerender(); notify(L('تم الحذف','Deleted'),'#10b981');
    }catch(e){ notify(L('تعذر الحذف','Delete failed'),'#ef4444'); }
  };

  // صفحة العملاء: معلومات كاملة + موقع تركيب العمل.
  window.renderCustomersPage = function(){
    if(typeof hasPermission === 'function' && !hasPermission('customers')) return '<div class="section-card">⛔ '+(typeof t==='function'?t('noPermission'):L('غير مصرح','No permission'))+'</div>';
    var list = readArray('customers');
    var rows = list.map(function(c){
      return '<tr>'+ 
        '<td><b>'+esc(c.name_ar || c.name || '-')+'</b><br><small>'+esc(c.name_en || '')+'</small></td>'+ 
        '<td>'+esc(c.phone || '-')+'</td>'+ 
        '<td>'+esc(c.email || '-')+'</td>'+ 
        '<td>'+esc(c.address || '-')+'</td>'+ 
        '<td>'+esc(c.installationLocation || c.workLocation || c.siteLocation || '-')+'</td>'+ 
        '<td>'+esc(c.customerType || c.type || '-')+'</td>'+ 
        '<td>'+esc(c.customerInfo || c.notes || '-')+'</td>'+ 
        '<td style="white-space:nowrap"><button type="button" class="editCustomerBtn btn btn-sm btn-secondary" data-id="'+esc(c.id)+'">'+L('تعديل','Edit')+'</button> '+
        '<button type="button" class="deleteCustomerBtn btn btn-sm btn-danger" data-id="'+esc(c.id)+'">'+L('حذف','Delete')+'</button></td>'+ 
      '</tr>';
    }).join('') || '<tr><td colspan="8">'+L('لا توجد بيانات عملاء','No customers yet')+'</td></tr>';
    return '<div class="section-card"><div class="section-header"><h3>👥 '+L('العملاء','Customers')+'</h3><button id="addCustomerBtn" type="button" class="btn btn-primary">+ '+L('إضافة عميل','Add Customer')+'</button></div>'+ 
      '<div style="overflow-x:auto"><table class="table"><thead><tr><th>'+L('الاسم','Name')+'</th><th>'+L('الهاتف','Phone')+'</th><th>'+L('البريد','Email')+'</th><th>'+L('العنوان','Address')+'</th><th>'+L('موقع تركيب العمل','Work Site')+'</th><th>'+L('نوع العميل','Type')+'</th><th>'+L('معلومات العميل','Info')+'</th><th>'+L('إجراءات','Actions')+'</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
  };
  try{ renderCustomersPage = window.renderCustomersPage; }catch(e){}

  window.openCustomerModal = function(id){
    var list = readArray('customers');
    var c = id ? list.find(function(x){ return same(x.id,id); }) : null;
    var old=document.getElementById('customerModalV19'); if(old) old.remove();
    var modal=document.createElement('div'); modal.className='modal'; modal.id='customerModalV19'; modal.style.display='flex';
    modal.innerHTML = '<div class="modal-content" style="max-width:780px">'+
      '<div class="section-header"><h3>'+(c?L('تعديل عميل','Edit Customer'):L('إضافة عميل جديد','Add New Customer'))+'</h3><button type="button" class="btn btn-secondary" id="closeCustomerModalV19">×</button></div>'+ 
      '<div class="form-group"><label>'+L('اسم العميل بالعربي','Customer name Arabic')+'</label><input id="custNameArV19" value="'+esc(c && (c.name_ar||c.name)||'')+'"></div>'+ 
      '<div class="form-group"><label>'+L('اسم العميل بالإنجليزي','Customer name English')+'</label><input id="custNameEnV19" value="'+esc(c && (c.name_en||c.name)||'')+'"></div>'+ 
      '<div class="form-group"><label>'+L('رقم الهاتف','Phone')+'</label><input id="custPhoneV19" value="'+esc(c && c.phone || '')+'"></div>'+ 
      '<div class="form-group"><label>'+L('البريد الإلكتروني','Email')+'</label><input id="custEmailV19" value="'+esc(c && c.email || '')+'"></div>'+ 
      '<div class="form-group"><label>'+L('عنوان العميل','Customer Address')+'</label><input id="custAddressV19" value="'+esc(c && (c.address||c.customerAddress) || '')+'"></div>'+ 
      '<div class="form-group"><label>'+L('موقع تركيب العمل','Installation / Work Site Location')+'</label><textarea id="custInstallV19" rows="2">'+esc(c && (c.installationLocation||c.workLocation||c.siteLocation) || '')+'</textarea></div>'+ 
      '<div class="form-group"><label>'+L('نوع العميل','Customer Type')+'</label><select id="custTypeV19"><option value="فرد">'+L('فرد','Individual')+'</option><option value="شركة">'+L('شركة','Company')+'</option><option value="مقاول">'+L('مقاول','Contractor')+'</option></select></div>'+ 
      '<div class="form-group"><label>'+L('معلومات العميل / ملاحظات','Customer Info / Notes')+'</label><textarea id="custInfoV19" rows="3">'+esc(c && (c.customerInfo||c.info||c.notes) || '')+'</textarea></div>'+ 
      '<button type="button" class="btn btn-primary" id="saveCustomerV19">'+L('حفظ','Save')+'</button>'+ 
    '</div>';
    document.body.appendChild(modal);
    var type=document.getElementById('custTypeV19'); if(type && c && (c.customerType||c.type)) type.value = c.customerType || c.type;
    document.getElementById('closeCustomerModalV19').onclick=function(){ modal.remove(); };
    document.getElementById('saveCustomerV19').onclick=async function(){
      var name_ar=document.getElementById('custNameArV19').value.trim();
      var name_en=document.getElementById('custNameEnV19').value.trim();
      if(!name_ar && !name_en){ notify(L('اكتب اسم العميل','Enter customer name'),'#ef4444'); return; }
      var row={ id:c?c.id:Date.now(), name_ar:name_ar||name_en, name_en:name_en||name_ar, name:name_ar||name_en,
        phone:document.getElementById('custPhoneV19').value.trim(), email:document.getElementById('custEmailV19').value.trim(),
        address:document.getElementById('custAddressV19').value.trim(), installationLocation:document.getElementById('custInstallV19').value.trim(),
        customerType:document.getElementById('custTypeV19').value, customerInfo:document.getElementById('custInfoV19').value.trim(), notes:document.getElementById('custInfoV19').value.trim() };
      if(c){ Object.assign(c,row); } else { list.unshift(row); }
      writeArray('customers', list); writeLocalArray('customers', list); await forceSaveCloud(); modal.remove(); rerender(); notify(L('تم حفظ بيانات العميل','Customer saved'),'#10b981');
    };
  };
  document.addEventListener('click', function(ev){
    var add = ev.target && ev.target.closest ? ev.target.closest('#addCustomerBtn') : null;
    var edit = ev.target && ev.target.closest ? ev.target.closest('.editCustomerBtn') : null;
    if(!add && !edit) return;
    ev.preventDefault(); ev.stopPropagation(); if(ev.stopImmediatePropagation) ev.stopImmediatePropagation();
    window.openCustomerModal(edit ? getId(edit) : null);
  }, true);

  // تثبيت اللغة في القوائم، ومنها employeePayrollPro.
  var navLabels = {
    employeePayrollPro:[L('الموظفون والرواتب','Employees & Payroll'), 'fas fa-users'],
    smartAlerts:[L('التنبيهات الذكية','Smart Alerts'), 'fas fa-bell']
  };
  function fixNavLabels(){
    try{
      var nav=document.getElementById('navMenu'); if(!nav) return;
      Object.keys(navLabels).forEach(function(tab){
        var li=nav.querySelector('[data-tab="'+tab+'"]'); if(!li) return;
        var span=li.querySelector('span'); if(span) span.textContent=navLabels[tab][0];
      });
    }catch(e){}
  }
  var oldInit = window.initNav || (typeof initNav==='function'?initNav:null);
  if(oldInit && !oldInit.__v19Nav){
    var wrappedInit=function(){ var r=oldInit.apply(this,arguments); fixNavLabels(); return r; };
    wrappedInit.__v19Nav=true; window.initNav=wrappedInit; try{ initNav=wrappedInit; }catch(e){}
  }
  setInterval(fixNavLabels, 1200);
  document.addEventListener('DOMContentLoaded', function(){ setTimeout(fixNavLabels,200); setTimeout(fixNavLabels,900); });

  // منع أي نموذج من إعادة تحميل الصفحة أو الرجوع للوحة المؤشرات بعد الحفظ.
  document.addEventListener('submit', function(ev){ ev.preventDefault(); ev.stopPropagation(); if(ev.stopImmediatePropagation) ev.stopImmediatePropagation(); }, true);
  document.addEventListener('click', function(ev){
    var b = ev.target && ev.target.closest ? ev.target.closest('button') : null;
    if(b && !b.getAttribute('type')) b.setAttribute('type','button');
  }, true);

  window.addEventListener('error', function(e){ console.error('ERP runtime error:', e.message, e.error || ''); });
})();
</script>


<script id="annual-leave-plans-v21-safe">
/* ==================== V21 SAFE ANNUAL LEAVE PLANS ==================== */
(function(){
  'use strict';
  if(window.__FAKHR_ANNUAL_LEAVE_V21__) return;
  window.__FAKHR_ANNUAL_LEAVE_V21__ = true;

  var TAB = 'annualLeavePlans';
  var LEAVES_KEY = 'erp_hr_leaves';
  var EMP_KEYS = ['erp_employees','erpEmployees','employees'];
  var WORK_KEYS = ['erp_workshops','erpWorkshops','workshops'];

  function isAr(){
    try { return (window.currentLang || currentLang || localStorage.getItem('erp_lang') || 'ar') !== 'en'; }
    catch(e){ return true; }
  }
  function L(ar,en){ return isAr() ? ar : en; }
  function esc(v){ return String(v == null ? '' : v).replace(/[&<>"']/g,function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function num(v){ return Number(String(v == null ? 0 : v).replace(',','.')) || 0; }
  function today(){ return new Date().toISOString().slice(0,10); }
  function getJSON(k,fallback){ try{ var v=localStorage.getItem(k); return v ? JSON.parse(v) : fallback; }catch(e){ return fallback; } }
  function setJSON(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
  function addDays(dateStr, days){
    var d = new Date((dateStr || today()) + 'T00:00:00');
    if(isNaN(d.getTime())) d = new Date(today() + 'T00:00:00');
    d.setDate(d.getDate() + Number(days || 0));
    return d.toISOString().slice(0,10);
  }
  function diffDays(start, ret){
    var a = new Date((start || today()) + 'T00:00:00');
    var b = new Date((ret || addDays(start,1)) + 'T00:00:00');
    if(isNaN(a.getTime()) || isNaN(b.getTime())) return 1;
    return Math.max(1, Math.round((b - a) / 86400000));
  }
  function arr(v){ return Array.isArray(v) ? v : []; }
  function allEmployees(){
    var out=[];
    try{ if(Array.isArray(window.employees)) out = out.concat(window.employees); }catch(e){}
    EMP_KEYS.forEach(function(k){ out = out.concat(arr(getJSON(k, []))); });
    var seen={};
    return out.filter(function(e){
      if(!e || e.id == null) return false;
      var key=String(e.id);
      if(seen[key]) return false;
      seen[key]=true;
      return true;
    });
  }
  function allWorkshops(){
    var out=[];
    try{ if(Array.isArray(window.workshops)) out = out.concat(window.workshops); }catch(e){}
    WORK_KEYS.forEach(function(k){ out = out.concat(arr(getJSON(k, []))); });
    var seen={};
    return out.filter(function(w){
      if(!w || w.id == null) return false;
      var key=String(w.id);
      if(seen[key]) return false;
      seen[key]=true;
      return true;
    });
  }
  function empName(e){ return e ? (isAr() ? (e.name_ar || e.name || e.name_en || '') : (e.name_en || e.name || e.name_ar || '')) : ''; }
  function workshopName(w){ return w ? (isAr() ? (w.name_ar || w.name || w.name_en || '') : (w.name_en || w.name || w.name_ar || '')) : ''; }
  function empWorkshop(e){
    if(!e) return '';
    var id = e.workshopId || e.workshop_id || e.workshop || e.workshopName || '';
    var w = allWorkshops().find(function(x){ return String(x.id) === String(id) || String(x.name_ar || x.name || x.name_en || '') === String(id); });
    return w ? workshopName(w) : String(e.workshopName || e.workshop_name || id || '');
  }
  function leaves(){ return arr(getJSON(LEAVES_KEY, [])); }
  function saveLeaves(list){
    list = arr(list);
    setJSON(LEAVES_KEY, list);
    try{ window.hrLeaves = list; }catch(e){}
    try{ if(typeof window.saveAll === 'function') window.saveAll(); else if(typeof saveAll === 'function') saveAll(); }catch(e){}
    try{ if(typeof window.syncCompleteSiteNow === 'function') window.syncCompleteSiteNow(); }catch(e){}
    try{ if(typeof window.syncFullSiteNow === 'function') window.syncFullSiteNow(); }catch(e){}
  }
  function statusLabel(s){
    var m = {
      pending:[L('قيد المراجعة','Pending'),'badge-warning'],
      approved:[L('معتمدة','Approved'),'badge-success'],
      rejected:[L('مرفوضة','Rejected'),'badge-danger'],
      returned:[L('عاد للعمل','Returned'),'badge-info']
    };
    var x=m[s]||m.pending;
    return '<span class="badge '+x[1]+'">'+esc(x[0])+'</span>';
  }
  function typeLabel(t){
    var m={annual:L('سنوية','Annual'), emergency:L('طارئة','Emergency'), unpaid:L('بدون راتب','Unpaid'), sick:L('مرضية','Sick')};
    return m[t] || m.annual;
  }
  function renderPage(){
    var emps=allEmployees();
    var lvs=leaves();
    var empRows = emps.map(function(e){
      var empLeaves = lvs.filter(function(x){ return String(x.employeeId) === String(e.id); });
      var total = empLeaves.reduce(function(s,x){ return s + num(x.durationDays || x.days); },0);
      return '<tr><td>'+esc(empName(e))+'</td><td>'+esc(e.job_ar || e.job || e.role || '-佃')+'</td><td>'+esc(empWorkshop(e) || '-佃')+'</td><td>'+total+'</td><td><button type="button" class="btn btn-sm btn-primary v21-leave-open" data-emp="'+esc(e.id)+'">'+L('إضافة إجازة','Add Leave')+'</button></td></tr>';
    }).join('') || '<tr><td colspan="5">'+L('لا يوجد عمال. أضف العمال من سجل الموظفين أولاً.','No workers. Add workers from Employees Registry first.')+'</td></tr>';
    var rows = lvs.map(function(x){
      return '<tr><td>'+esc(x.employeeName || '')+'</td><td>'+esc(x.workshopName || '')+'</td><td>'+esc(typeLabel(x.type))+'</td><td>'+esc(x.startDate || x.from || '')+'</td><td>'+esc(x.durationDays || x.days || '')+'</td><td>'+esc(x.returnDate || '')+'</td><td>'+statusLabel(x.status)+'</td><td>'+esc(x.note || '-佃')+'</td><td style="white-space:nowrap"><button type="button" class="btn btn-sm btn-secondary v21-leave-edit" data-id="'+esc(x.id)+'">'+L('تعديل','Edit')+'</button> <button type="button" class="btn btn-sm btn-success v21-leave-status" data-id="'+esc(x.id)+'" data-status="approved">'+L('اعتماد','Approve')+'</button> <button type="button" class="btn btn-sm btn-info v21-leave-status" data-id="'+esc(x.id)+'" data-status="returned">'+L('عاد','Returned')+'</button> <button type="button" class="btn btn-sm btn-danger v21-leave-delete" data-id="'+esc(x.id)+'">'+L('حذف','Delete')+'</button></td></tr>';
    }).join('') || '<tr><td colspan="9">'+L('لا توجد خطط إجازات مسجلة.','No leave plans registered.')+'</td></tr>';
    return '<div class="v21-annual-leaves"><div class="section-header"><h3><i class="fas fa-calendar-check"></i> '+L('خطط الإجازات السنوية','Annual Leave Plans')+'</h3><button type="button" class="btn btn-primary v21-leave-open"><i class="fas fa-plus"></i> '+L('إضافة إجازة','Add Leave')+'</button></div><div class="section-card"><h4>'+L('العمال والورش','Workers & Workshops')+'</h4><div style="overflow-x:auto"><table><thead><tr><th>'+L('العامل','Worker')+'</th><th>'+L('الوظيفة','Job')+'</th><th>'+L('الورشة','Workshop')+'</th><th>'+L('إجمالي أيام الإجازة','Total Leave Days')+'</th><th>'+L('إجراء','Action')+'</th></tr></thead><tbody>'+empRows+'</tbody></table></div></div><div class="section-card"><h4>'+L('جدول خطط الإجازات','Leave Plans Table')+'</h4><div style="overflow-x:auto"><table><thead><tr><th>'+L('العامل','Worker')+'</th><th>'+L('الورشة','Workshop')+'</th><th>'+L('النوع','Type')+'</th><th>'+L('تاريخ البداية','Start Date')+'</th><th>'+L('المدة','Duration')+'</th><th>'+L('تاريخ العودة','Return Date')+'</th><th>'+L('الحالة','Status')+'</th><th>'+L('ملاحظات','Notes')+'</th><th>'+L('إجراءات','Actions')+'</th></tr></thead><tbody>'+rows+'</tbody></table></div></div><div id="v21LeaveModal" class="modal"><div class="modal-content"><h3 id="v21LeaveTitle">'+L('إضافة إجازة لعامل','Add Worker Leave')+'</h3><input type="hidden" id="v21LeaveId"><div class="form-group"><label>'+L('العامل','Worker')+'</label><select id="v21LeaveEmployee">'+emps.map(function(e){return '<option value="'+esc(e.id)+'">'+esc(empName(e))+'</option>';}).join('')+'</select></div><div class="form-group"><label>'+L('الورشة','Workshop')+'</label><input id="v21LeaveWorkshop" readonly></div><div class="form-group"><label>'+L('نوع الإجازة','Leave Type')+'</label><select id="v21LeaveType"><option value="annual">'+L('سنوية','Annual')+'</option><option value="emergency">'+L('طارئة','Emergency')+'</option><option value="sick">'+L('مرضية','Sick')+'</option><option value="unpaid">'+L('بدون راتب','Unpaid')+'</option></select></div><div class="form-group"><label>'+L('تاريخ بداية الإجازة','Leave Start Date')+'</label><input type="date" id="v21LeaveStart"></div><div class="form-group"><label>'+L('مدة الإجازة بالأيام','Leave Duration in Days')+'</label><input type="number" min="1" id="v21LeaveDuration"></div><div class="form-group"><label>'+L('تاريخ العودة للعمل','Return to Work Date')+'</label><input type="date" id="v21LeaveReturn"></div><div class="form-group"><label>'+L('ملاحظات','Notes')+'</label><textarea id="v21LeaveNote" rows="3"></textarea></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button type="button" id="v21LeaveSave" class="btn btn-primary">'+L('حفظ','Save')+'</button><button type="button" id="v21LeaveCancel" class="btn btn-secondary">'+L('إلغاء','Cancel')+'</button></div></div></div></div>';
  }
  function renderNow(){
    var main=document.getElementById('mainContent');
    if(!main) return;
    try{ window.currentTab=TAB; currentTab=TAB; localStorage.setItem('erp_current_tab', TAB); }catch(e){}
    main.innerHTML = renderPage();
    try{ if(typeof window.localizeDynamicDom === 'function') window.localizeDynamicDom(main); }catch(e){}
    syncWorkshop(); syncReturnFromDuration();
  }
  function ensureNav(){
    var nav=document.getElementById('navMenu'); if(!nav) return;
    var existing=nav.querySelector('[data-tab="'+TAB+'"]');
    var label='<i class="fas fa-calendar-check"></i> <span>'+L('خطط الإجازات السنوية','Annual Leave Plans')+'</span>';
    if(existing){ existing.innerHTML=label; return; }
    var li=document.createElement('li');
    li.className='nav-item';
    li.setAttribute('data-tab', TAB);
    li.innerHTML=label;
    li.onclick=function(ev){ ev.preventDefault(); renderNow(); try{ if(typeof initNav==='function') initNav(); }catch(e){} };
    var after=nav.querySelector('[data-tab="employeesRegistry"], [data-tab="employeePayrollPro"], [data-tab="hrManagement"], [data-tab="monthlyAttendance"]');
    if(after && after.nextSibling) nav.insertBefore(li, after.nextSibling); else nav.appendChild(li);
  }
  function syncWorkshop(){
    var sel=document.getElementById('v21LeaveEmployee');
    var out=document.getElementById('v21LeaveWorkshop');
    if(!sel || !out) return;
    var e=allEmployees().find(function(x){ return String(x.id) === String(sel.value); });
    out.value = empWorkshop(e) || L('غير محدد','Not specified');
  }
  function syncReturnFromDuration(){
    var s=(document.getElementById('v21LeaveStart') || {}).value || today();
    var d=Math.max(1, num((document.getElementById('v21LeaveDuration') || {}).value) || 1);
    var r=document.getElementById('v21LeaveReturn'); if(r) r.value = addDays(s, d);
  }
  function syncDurationFromReturn(){
    var s=(document.getElementById('v21LeaveStart') || {}).value || today();
    var r=(document.getElementById('v21LeaveReturn') || {}).value || addDays(s,1);
    var d=document.getElementById('v21LeaveDuration'); if(d) d.value = diffDays(s, r);
  }
  function openModal(id, empId){
    if(!document.getElementById('v21LeaveModal')) renderNow();
    var m=document.getElementById('v21LeaveModal'); if(!m) return;
    var l = id ? leaves().find(function(x){ return String(x.id) === String(id); }) : null;
    var emps=allEmployees();
    function set(id2,val){ var el=document.getElementById(id2); if(el) el.value = val == null ? '' : val; }
    set('v21LeaveId', l ? l.id : '');
    set('v21LeaveEmployee', l ? l.employeeId : (empId || (emps[0] && emps[0].id) || ''));
    set('v21LeaveType', l ? (l.type || 'annual') : 'annual');
    set('v21LeaveStart', l ? (l.startDate || l.from || today()) : today());
    set('v21LeaveDuration', l ? (l.durationDays || l.days || 1) : 1);
    set('v21LeaveReturn', l ? (l.returnDate || addDays(l.startDate || l.from || today(), l.durationDays || l.days || 1)) : addDays(today(),1));
    set('v21LeaveNote', l ? (l.note || '') : '');
    syncWorkshop();
    m.style.display='flex';
  }
  function closeModal(){ var m=document.getElementById('v21LeaveModal'); if(m) m.style.display='none'; }
  function saveModal(){
    var emps=allEmployees();
    if(!emps.length){ alert(L('أضف العامل أولاً من سجل الموظفين','Add the worker first from Employees Registry')); return; }
    var id=(document.getElementById('v21LeaveId') || {}).value || '';
    var employeeId=(document.getElementById('v21LeaveEmployee') || {}).value || '';
    var e=emps.find(function(x){ return String(x.id) === String(employeeId); });
    var start=(document.getElementById('v21LeaveStart') || {}).value || today();
    var duration=Math.max(1, num((document.getElementById('v21LeaveDuration') || {}).value) || 1);
    var returnDate=(document.getElementById('v21LeaveReturn') || {}).value || addDays(start,duration);
    duration=diffDays(start, returnDate);
    var row={ employeeId:employeeId, employeeName:empName(e), workshopName:empWorkshop(e), type:(document.getElementById('v21LeaveType') || {}).value || 'annual', startDate:start, from:start, durationDays:duration, days:duration, returnDate:returnDate, to:addDays(returnDate,-1), note:(document.getElementById('v21LeaveNote') || {}).value || '', updatedAt:new Date().toISOString() };
    var list=leaves();
    if(id){
      var old=list.find(function(x){ return String(x.id) === String(id); });
      if(old) Object.assign(old,row); else list.unshift(Object.assign({id:id,status:'pending',createdAt:new Date().toISOString()},row));
    }else{
      list.unshift(Object.assign({id:Date.now(),status:'pending',createdAt:new Date().toISOString()},row));
    }
    saveLeaves(list); closeModal(); renderNow();
    try{ if(typeof window.showNotification === 'function') window.showNotification(L('تم حفظ خطة الإجازة','Leave plan saved'),'#10b981'); }catch(e){}
  }

  var oldRender = window.renderCurrentTab || (typeof renderCurrentTab === 'function' ? renderCurrentTab : null);
  window.renderCurrentTab = function(){
    var tab; try{ tab = window.currentTab || currentTab; }catch(e){ tab = window.currentTab; }
    if(tab === TAB){ renderNow(); return; }
    return oldRender ? oldRender.apply(this, arguments) : undefined;
  };
  try{ renderCurrentTab = window.renderCurrentTab; }catch(e){}

  var oldInit = window.initNav || (typeof initNav === 'function' ? initNav : null);
  window.initNav = function(){ var r = oldInit ? oldInit.apply(this, arguments) : undefined; ensureNav(); return r; };
  try{ initNav = window.initNav; }catch(e){}

  document.addEventListener('click',function(ev){
    var t=ev.target;
    if(!t || !t.closest) return;
    var open=t.closest('.v21-leave-open'); if(open){ ev.preventDefault(); openModal(null, open.getAttribute('data-emp') || ''); return; }
    var edit=t.closest('.v21-leave-edit'); if(edit){ ev.preventDefault(); openModal(edit.getAttribute('data-id')); return; }
    var del=t.closest('.v21-leave-delete'); if(del){ ev.preventDefault(); var id=del.getAttribute('data-id'); if(confirm(L('حذف خطة الإجازة؟','Delete leave plan?'))){ saveLeaves(leaves().filter(function(x){ return String(x.id) !== String(id); })); renderNow(); } return; }
    var st=t.closest('.v21-leave-status'); if(st){ ev.preventDefault(); var id2=st.getAttribute('data-id'), status=st.getAttribute('data-status'); var list=leaves(); var row=list.find(function(x){ return String(x.id) === String(id2); }); if(row){ row.status=status; row.updatedAt=new Date().toISOString(); saveLeaves(list); renderNow(); } return; }
    if(t.id === 'v21LeaveSave'){ ev.preventDefault(); saveModal(); return; }
    if(t.id === 'v21LeaveCancel'){ ev.preventDefault(); closeModal(); return; }
  }, true);
  document.addEventListener('change',function(ev){
    if(!ev.target) return;
    if(ev.target.id === 'v21LeaveEmployee') syncWorkshop();
    if(ev.target.id === 'v21LeaveStart' || ev.target.id === 'v21LeaveDuration') syncReturnFromDuration();
    if(ev.target.id === 'v21LeaveReturn') syncDurationFromReturn();
  }, true);
  var css=document.createElement('style');
  css.textContent='.v21-annual-leaves .section-card{margin-top:16px}.v21-annual-leaves table{min-width:980px}.v21-annual-leaves h4{margin-bottom:12px}#v21LeaveModal .modal-content{max-width:720px}@media(max-width:768px){.v21-annual-leaves table{font-size:12px}.v21-annual-leaves .section-header{align-items:stretch}}';
  document.head.appendChild(css);
  document.addEventListener('DOMContentLoaded',function(){ ensureNav(); setTimeout(ensureNav,300); setTimeout(ensureNav,900); });
  if(document.readyState !== 'loading'){ setTimeout(ensureNav,100); setTimeout(ensureNav,500); }
})();

</script>
</body>
</html>
